# Build the Ringwood iOS app on GitHub's cloud Macs and upload it straight to
# App Store Connect (TestFlight). No local Mac needed.
#
# One-time setup (repo Settings -> Secrets and variables -> Actions):
#   APP_STORE_CONNECT_KEY_ID     - the API key's Key ID
#   APP_STORE_CONNECT_ISSUER_ID  - the Issuer ID shown on the same page
#   APP_STORE_CONNECT_KEY        - full contents of the downloaded .p8 file
# Key comes from App Store Connect -> Users and Access -> Integrations ->
# App Store Connect API -> Team Keys -> Generate (role: Admin).
#
# Runs when anything under ios/ changes, or by hand from the Actions tab.
name: iOS build and upload

on:
  push:
    branches: [main]
    paths: ["ios/**", ".github/workflows/ios.yml"]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45
    env:
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Check the App Store Connect secrets exist
        env:
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
        run: |
          if [ -z "$ASC_KEY_ID" ] || [ -z "$ASC_ISSUER_ID" ] || [ -z "$ASC_KEY" ]; then
            echo "::error::Missing secrets. In repo Settings -> Secrets and variables -> Actions, add APP_STORE_CONNECT_KEY_ID, APP_STORE_CONNECT_ISSUER_ID, and APP_STORE_CONNECT_KEY (the .p8 contents). Generate the key in App Store Connect -> Users and Access -> Integrations."
            exit 1
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate the Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Write the App Store Connect API key
        env:
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
        run: |
          mkdir -p "$HOME/private_keys"
          printf '%s' "$ASC_KEY" > "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Archive (cloud signing)
        working-directory: ios
        run: |
          # Monotonic build number so every upload is accepted.
          BUILD_NUMBER=$((100 + GITHUB_RUN_NUMBER * 10 + GITHUB_RUN_ATTEMPT))
          echo "Build number: $BUILD_NUMBER"
          xcodebuild archive \
            -project Ringwood.xcodeproj \
            -scheme Ringwood \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Ringwood.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CURRENT_PROJECT_VERSION=$BUILD_NUMBER

      - name: Upload to App Store Connect
        working-directory: ios
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Ringwood.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/out \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"
