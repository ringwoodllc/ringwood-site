# Codemagic CI for the Ringwood mobile app (Capacitor shell around the live site).
# Builds in the cloud — no Mac required. Two workflows:
#   - android: produces an installable APK you can sideload immediately (no
#     accounts or signing needed to start).
#   - ios: builds on a cloud Mac and uploads to TestFlight (needs an Apple
#     Developer account + an App Store Connect API key set up in the Codemagic UI).
#
# The native ios/ and android/ folders are not committed (Capacitor regenerates
# them), so each build runs `npx cap add` + `cap sync` first.

workflows:
  android:
    name: Ringwood Android (APK)
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      node: 18
    scripts:
      - name: Install dependencies
        script: cd mobile && npm install
      - name: Generate icons and splash
        script: cd mobile && npm run assets || true
      - name: Add Android platform
        script: cd mobile && (npx cap add android || true) && npx cap sync android
      - name: Build debug APK (installable for testing)
        script: cd mobile/android && ./gradlew assembleDebug
    artifacts:
      - mobile/android/app/build/outputs/**/*.apk
    # To ship to Google Play instead, set up a keystore + Play service account in
    # the Codemagic UI, build `bundleRelease`, and add a `publishing: google_play`
    # block here.

  ios:
    name: Ringwood iOS (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Create this in Codemagic: Teams -> Integrations -> App Store Connect.
      # Upload your App Store Connect API key (.p8 + Key ID + Issuer ID) and name
      # the integration exactly "ringwood_asc".
      app_store_connect: ringwood_asc
    environment:
      node: 18
      xcode: latest
      cocoapods: default
      # Managed automatic code signing. With the App Store Connect integration,
      # Codemagic fetches or creates the distribution certificate, GENERATES AND
      # STORES its private key in your Codemagic team, and creates the App Store
      # provisioning profile — reusing all of it on every future build. This is
      # what fixes the "lost private key / certificate limit" trap for good.
      ios_signing:
        distribution_type: app_store
        bundle_identifier: ai.ringwood.app
    scripts:
      - name: Install dependencies
        script: cd mobile && npm install
      - name: Generate icons and splash
        script: cd mobile && npm run assets || true
      - name: Add iOS platform
        script: cd mobile && (npx cap add ios || true) && npx cap sync ios
      - name: Add camera / photo permission strings
        script: |
          PLIST="$CM_BUILD_DIR/mobile/ios/App/App/Info.plist"
          add() { /usr/libexec/PlistBuddy -c "Add :$1 string $2" "$PLIST" 2>/dev/null \
                 || /usr/libexec/PlistBuddy -c "Set :$1 $2" "$PLIST"; }
          add NSCameraUsageDescription "Ringwood uses the camera to photograph equipment and tickets."
          add NSPhotoLibraryUsageDescription "Ringwood attaches photos to assets and tickets."
          add NSPhotoLibraryAddUsageDescription "Ringwood saves photos you capture."
          # Standard HTTPS only -> declare no non-exempt encryption so TestFlight
          # doesn't ask the export-compliance question on every build.
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
      - name: Align bundle id, set unique build number, apply signing
        script: |
          set -e
          cd "$CM_BUILD_DIR/mobile/ios/App"
          # Keep the App target's bundle id aligned with the registered App ID.
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = ai.ringwood.app;/g' App.xcodeproj/project.pbxproj
          # Unique, increasing build number (a timestamp) so App Store Connect
          # never rejects the upload as a duplicate build.
          BN=$(date +%s)
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*;/CURRENT_PROJECT_VERSION = $BN;/g" App.xcodeproj/project.pbxproj
          echo "Build number set to $BN"
          # Managed signing already prepared the certificate + profile; apply them.
          xcode-project use-profiles
      - name: Build IPA
        script: |
          cd "$CM_BUILD_DIR/mobile/ios/App"
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - "**/*.ipa"
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
