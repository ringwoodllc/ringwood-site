<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1f3d2b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ringwood" />
<title>Ringwood · Weekly schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#f4efe4;--bg-2:#efe8d8;--ink:#23282a;--muted:#5f5d52;--green:#2f5d50;--green-deep:#21443a;--clay:#a9633a;--line:rgba(35,40,42,.14)}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:"Hanken Grotesk",-apple-system,sans-serif;min-height:100vh;padding-top:env(safe-area-inset-top);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
  .wrap{max-width:1100px;margin:0 auto;padding:0 16px calc(56px + env(safe-area-inset-bottom))}
  header{padding:18px 0}
  .bar{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:11px;font-family:"Spectral",serif;font-size:1.2rem;font-weight:600;color:var(--green-deep)}
  .back{font-size:.9rem;text-decoration:none;color:var(--green-deep);border-bottom:1px solid var(--clay)}
  .eyebrow{font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;color:var(--clay);font-weight:600;margin:6px 0 8px}
  h1{font-family:"Spectral",serif;font-weight:500;font-size:1.9rem;color:var(--green-deep);line-height:1.1;margin-bottom:12px}
  select,input{font:inherit;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:6px;-webkit-appearance:none;appearance:none}
  select{width:100%;font-size:1rem;padding:10px 12px}
  select:focus,input:focus{outline:none;border-color:var(--green)}
  .field{margin-bottom:12px}
  label{display:block;font-weight:600;font-size:.84rem;color:var(--green-deep);margin-bottom:5px}
  .weekbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:8px 0 14px}
  .nb{background:var(--bg-2);border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-weight:600;font-size:.9rem;color:var(--green-deep);cursor:pointer}
  .nb:hover{border-color:var(--green)}
  .range{font-weight:600;color:var(--green-deep);font-size:1.02rem}
  .btn{background:var(--green);color:#f6f2e8;border:none;cursor:pointer;font-weight:600;font-size:.88rem;padding:9px 14px;border-radius:8px}
  .btn.ghost{background:transparent;color:var(--green-deep);border:1px solid var(--line)}
  .scrollx{overflow-x:auto;border:1px solid var(--line);border-radius:10px;background:var(--bg-2)}
  table{border-collapse:collapse;min-width:760px;width:100%;font-size:.84rem}
  th,td{border-bottom:1px solid var(--line);border-right:1px solid var(--line);padding:6px 7px;text-align:center;vertical-align:middle}
  thead th{background:#e7e0d0;color:var(--green-deep);font-weight:700;position:sticky;top:0;white-space:nowrap}
  th.emp,td.emp{position:sticky;left:0;background:var(--bg-2);text-align:left;min-width:84px;max-width:108px;font-weight:600;color:var(--green-deep);z-index:1;font-size:.82rem;line-height:1.15}
  td.emp a{color:var(--green-deep);text-decoration:none;border-bottom:1px solid var(--clay)}
  thead th.emp{background:#e7e0d0;z-index:2}
  td.day{min-width:92px}
  td.day input{width:84px;font-size:.8rem;padding:4px 4px;text-align:center;margin:1px 0}
  /* Drop the native time-picker clock icon. */
  td.day input::-webkit-calendar-picker-indicator{display:none}
  /* Empty time cells recede: hide the distracting "--:-- --" and dim the box, unless focused for editing. */
  .ti.empty:not(:focus){background:transparent !important;border-color:rgba(35,40,42,.07)}
  .ti.empty:not(:focus)::-webkit-datetime-edit{color:transparent}
  /* Each time field with a value gets a small X to clear it. */
  .tiwrap{position:relative;display:block}
  .tix{position:absolute;top:50%;right:3px;transform:translateY(-50%);border:none;background:transparent;color:#8a3d1c;font-size:.95rem;line-height:1;cursor:pointer;padding:0 2px;display:none}
  /* Show the clear-X only when the cell is hovered or focused, so it isn't distracting. */
  .tiwrap:hover .ti:not(.empty)+.tix,.ti:not(.empty):focus+.tix{display:block}
  td.hrs{font-weight:700;color:var(--green-deep);min-width:48px;background:#efe8d8}
  .dnum{font-size:.74rem;color:var(--muted);font-weight:600}
  .msg{font-size:.86rem;margin:10px 0;min-height:14px}.msg.err{color:#8a3d1c}.msg.ok{color:var(--green-deep)}
  .empty{color:var(--muted);padding:14px}
  .note{background:#f6eccf;border:1px solid var(--line);border-radius:8px;padding:12px 14px;color:#7a5a12;font-size:.9rem;margin-bottom:14px}
  tfoot td{font-weight:700;color:var(--green-deep);background:#e7e0d0}
  /* Printable audit sheet: blank In/Out grid to fill in at the store. Hidden on screen. */
  #auditSheet{display:none}
  @media print{
    body *{visibility:hidden}
    #auditSheet,#auditSheet *{visibility:visible}
    #auditSheet{display:block;position:absolute;left:0;top:0;width:100%;padding:8px;color:#000}
    #auditSheet h2{font-family:"Fraunces",Georgia,serif;font-size:18px;margin:0 0 2px}
    #auditSheet .sub{font-size:12px;margin-bottom:8px;color:#333}
    .audittbl{width:100%;border-collapse:collapse;table-layout:fixed}
    .audittbl th,.audittbl td{border:1px solid #444;font-size:10px;padding:2px 4px}
    .audittbl th{background:#eee}
    .audittbl .nm{text-align:left;font-weight:bold;white-space:normal;width:90px}
    .audittbl .ph{text-align:left;width:78px;font-weight:normal}
    .audittbl .cell{height:38px;padding:0}
    .audittbl .cell .io{height:18px;border-bottom:1px dotted #999}
    .audittbl .cell .io:last-child{border-bottom:none}
    @page{size:landscape;margin:10mm}
  }
</style>
</head>
<body>
<header>
  <div class="wrap bar">
    <div class="brand">
      <svg width="22" height="22" viewBox="0 0 26 26" aria-hidden="true"><g fill="none" stroke="#2f5d50" stroke-width="1.4"><circle cx="13" cy="13" r="3"/><circle cx="13" cy="13" r="7"/><circle cx="13" cy="13" r="11"/></g></svg>
      Ringwood
    </div>
    <a class="back" href="/payroll">Payroll</a>
  </div>
</header>
<main class="wrap">
  <div class="eyebrow">Food service · Admin</div>
  <h1>Weekly schedule</h1>

  <div class="clockcard" style="background:var(--bg-2,#efe8d8);border:1px solid var(--line,rgba(35,40,42,.16));border-radius:10px;padding:11px 14px;margin:4px 0 14px;display:flex;flex-wrap:wrap;gap:8px 16px;align-items:center">
    <a href="https://ors-idm.dunk.oraclerestaurants.com/oidc-ui/" target="_blank" rel="noopener" style="font-weight:700;color:#21443a;border-bottom:1px solid var(--clay,#a9633a);text-decoration:none">⏱ Time clock · Oracle Simphony ↗</a>
    <span style="font-size:.86rem;color:#5f5d52">User <b style="color:#23282a">Tsoliman</b> <button type="button" class="ccopy" data-v="Tsoliman" style="font:inherit;font-size:.74rem;font-weight:600;color:#21443a;background:transparent;border:1px solid var(--line,rgba(35,40,42,.2));border-radius:5px;padding:2px 7px;cursor:pointer">Copy</button></span>
    <span style="font-size:.86rem;color:#5f5d52">Enterprise <b style="color:#23282a">Dunkin Brands</b> <button type="button" class="ccopy" data-v="Dunkin Brands" style="font:inherit;font-size:.74rem;font-weight:600;color:#21443a;background:transparent;border:1px solid var(--line,rgba(35,40,42,.2));border-radius:5px;padding:2px 7px;cursor:pointer">Copy</button></span>
  </div>

  <div class="field"><label>Location (client)</label><select id="clientPick"><option value="">Choose a location…</option></select></div>

  <div id="body" style="display:none">
    <div class="weekbar">
      <button class="nb" id="prevW" type="button">‹ Prev</button>
      <span class="range" id="range"></span>
      <button class="nb" id="nextW" type="button">Next ›</button>
      <button class="nb" id="thisW" type="button">This week</button>
      <button class="btn ghost" id="copyW" type="button">Copy previous week →</button>
      <button class="btn ghost" id="clearW" type="button" style="color:#8a3d1c;border-color:rgba(138,61,28,.4)">Clear week</button>
      <button class="btn" id="scanW" type="button">📷 Scan schedule</button>
      <button class="btn ghost" id="uploadW" type="button">⬆ Upload</button>
      <input type="file" id="scanCam" accept="image/*" capture="environment" style="display:none" />
      <input type="file" id="scanFile" accept="image/*,application/pdf" style="display:none" />
      <select id="showMode" style="width:auto"><option value="all">All active</option><option value="sched">Scheduled only</option></select>
      <button class="btn ghost" id="auditBtn" type="button">🖨 Audit sheet</button>
      <button class="btn ghost" id="schedPdfBtn" type="button">📄 PDF / Print</button>
      <button class="btn ghost" id="schedEmailBtn" type="button">✉ Email</button>
      <label style="display:inline-flex;align-items:center;gap:5px;font-size:.84rem;color:#5f5d52;cursor:pointer"><input type="checkbox" id="auditPhone" style="width:16px;height:16px;accent-color:var(--green)"/> Show phone</label>
    </div>
    <label id="schedDrop" for="scanFile" style="display:block;border:1.5px dashed rgba(47,93,80,.45);border-radius:8px;padding:13px;text-align:center;cursor:pointer;color:#21443a;background:rgba(47,93,80,.05);margin-bottom:12px">
      <span style="font-weight:600">Drop a schedule photo or PDF here</span>
      <span style="font-size:.84rem;color:#5f5d52;margin-left:6px">or paste (Ctrl/Cmd+V), or tap to choose</span>
    </label>
    <div id="setupNote" class="note" style="display:none"></div>
    <div class="msg" id="msg"></div>
    <div class="scrollx"><div id="grid"><div class="empty">Loading…</div></div></div>
    <div style="margin-top:14px;max-width:560px">
      <label for="schedComment" style="display:block;font-weight:600;font-size:.84rem;color:#21443a;margin-bottom:4px">Notes</label>
      <textarea id="schedComment" placeholder="Notes about the schedule (saved)…" style="width:100%;min-height:60px;font:inherit;font-size:.9rem;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:8px;padding:9px 11px;resize:vertical"></textarea>
    </div>
  </div>
  <div id="auditSheet"></div>
</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="/upload-zone.js"></script>
<script>
  function esc(s){ return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
  // Copy buttons (time-clock username / enterprise).
  document.addEventListener("click", function(e){ var b=e.target&&e.target.closest&&e.target.closest(".ccopy"); if(!b) return; var v=b.getAttribute("data-v")||""; var done=function(){ var o=b.textContent; b.textContent="Copied"; setTimeout(function(){ b.textContent=o; },1100); }; if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(v).then(done).catch(function(){}); } else { try{ var ta=document.createElement("textarea"); ta.value=v; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); done(); }catch(_){} } });
  function ymd(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
  function addDays(d,n){ var x=new Date(d); x.setDate(x.getDate()+n); return x; }
  function sundayOf(d){ var x=new Date(d); x.setHours(12,0,0,0); x.setDate(x.getDate()-x.getDay()); return x; }
  function toMin(t){ if(!t) return null; var p=t.split(":"); return (+p[0])*60+(+p[1]); }
  function shiftHrs(inT,outT){ var a=toMin(inT),b=toMin(outT); if(a==null||b==null) return 0; if(b<a) b+=1440; return (b-a)/60; }
  function minsOf(s){ if(!s) return NaN; var p=s.split(":"); return (+p[0])*60+(+(p[1]||0)); }
  // Color the IN cell: opener (start at or before 6AM) blue, afternoon (2PM-3PM) orange.
  function startColor(inT){ var m=minsOf(inT); if(isNaN(m)) return ""; if(m<=360) return "#cfeaf2"; if(m>=840&&m<=900) return "#f9d6b0"; return ""; }
  // Color the OUT cell: closer (ends after 8PM) purple.
  function endColor(outT){ var m=minsOf(outT); if(isNaN(m)) return ""; if(m>1200) return "#e6dcf0"; return ""; }
  // Smart time entry: type just the hour and we pick AM/PM. IN cells: 5-11 -> AM, else PM.
  // OUT cells default to PM (shifts end afternoon/evening). Override with a/p, e.g. "9a", "5p".
  function parseSmartTime(text,isOut){
    var s=(text||"").toString().trim().toLowerCase(); if(!s) return "";
    var ap=/p/.test(s)?"p":(/a/.test(s)?"a":""); var h,m=0;
    if(s.indexOf(":")>=0){ var pp=s.split(":"); h=parseInt(pp[0].replace(/[^0-9]/g,""),10); m=parseInt((pp[1]||"").replace(/[^0-9]/g,""),10)||0; }
    else { var d=s.replace(/[^0-9]/g,""); if(!d) return ""; if(d.length<=2){ h=parseInt(d,10); } else { h=parseInt(d.slice(0,d.length-2),10); m=parseInt(d.slice(-2),10); } }
    if(isNaN(h)||h>23) return ""; if(isNaN(m)||m>59) m=0;
    var H; if(h>12){ H=h; } else if(h===0){ H=0; } else { var pm=ap?(ap==="p"):(isOut?true:!(h>=5&&h<=11)); H=(h===12)?(pm?12:0):(pm?h+12:h); }
    return (H<10?"0":"")+H+":"+(m<10?"0":"")+m;
  }
  function fmtTime12(v){ if(!v) return ""; var p=v.split(":"); var H=+p[0], m=+p[1]||0; if(isNaN(H)) return ""; var ap=H>=12?"PM":"AM"; var h12=H%12; if(h12===0) h12=12; return h12+":"+(m<10?"0":"")+m+" "+ap; }
  var DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  var CLIENT_ID="", START=sundayOf(new Date()), DATA=null, CKEY="rw_emp_client", SHOWMODE="all", CUR_EMPS=[], CUR_DATES=[];
  // Daily rollups (the standard view): total hours, head count, and how many are
  // on a morning / afternoon / evening shift, by shift start time.
  function bucketOf(sh){ var t=(sh&&(sh.in||sh.out))||""; if(!t) return null; var h=+t.split(":")[0]; return h<12?"m":"a"; }
  function shOf(e,d){ return (DATA.shifts[e.id]&&DATA.shifts[e.id][ymd(d)])||{}; }
  function footerInner(){
    var emps=CUR_EMPS, dates=CUR_DATES;
    function cells(fn){ var s=""; dates.forEach(function(d){ s+="<td>"+fn(d)+"</td>"; }); return s; }
    var exp=(DATA.targets&&DATA.targets.hours)||[];
    // Total hrs (computed), colored green/orange/red vs the expected for that weekday.
    var weekTot=0, hrsCells="";
    dates.forEach(function(d){ var dow=d.getDay(); var t=0; emps.forEach(function(e){ var sh=shOf(e,d); t+=shiftHrs(sh.in,sh.out); }); weekTot+=t; var ev=exp[dow]; var bg=""; if(ev!=null&&ev!==""){ var diff=t-(+ev); bg=Math.abs(diff)<0.05?"#cdebd4":(diff>0?"#f3c9c9":"#fbe0c2"); } hrsCells+="<td class='thrs' data-dow='"+dow+"' style='"+(bg?("background:"+bg+";font-weight:700"):"")+"'>"+(t?t.toFixed(1):"0")+"</td>"; });
    var rows="<tr><td class='emp'>Total hrs</td>"+hrsCells+"<td>"+weekTot.toFixed(1)+"</td></tr>";
    // Expected hrs (manual, universal per weekday). Edit to set the target.
    var expTot=0, expCells="";
    dates.forEach(function(d){ var dow=d.getDay(); var v=(exp[dow]!=null?exp[dow]:""); if(v!=="") expTot+=(+v||0); expCells+="<td><input type='number' class='exp' data-dow='"+dow+"' value='"+esc(v)+"' min='0' step='1' style='width:48px;font:inherit;font-size:.78rem;text-align:center;padding:2px;border:1px solid var(--line);border-radius:4px;background:#fff'/></td>"; });
    rows+="<tr><td class='emp'>Expected</td>"+expCells+"<td id='expTotCell'>"+(expTot?expTot.toFixed(1):"")+"</td></tr>";
    rows+="<tr><td class='emp'>Workers</td>"+cells(function(d){ var n=0; emps.forEach(function(e){ var sh=shOf(e,d); if(sh.in||sh.out) n++; }); return n||""; })+"<td></td></tr>";
    var L={m:"Morning",a:"Afternoon"};
    ["m","a"].forEach(function(bk){ rows+="<tr><td class='emp'>"+L[bk]+"</td>"+cells(function(d){ var n=0; emps.forEach(function(e){ var sh=shOf(e,d); if((sh.in||sh.out)&&bucketOf(sh)===bk) n++; }); return n||""; })+"<td></td></tr>"; });
    return rows;
  }
  function saveTargets(){
    if(!CLIENT_ID||!DATA) return;
    var hours=[]; for(var i=0;i<7;i++) hours[i]=null;
    Array.prototype.forEach.call(document.querySelectorAll(".exp"),function(inp){ var dow=+inp.getAttribute("data-dow"); var v=inp.value; hours[dow]=(v===""?null:(+v)); });
    DATA.targets=DATA.targets||{}; DATA.targets.hours=hours;
    // Recolor the Total hrs cells in place — do NOT re-render the footer, or the inputs
    // get recreated and tab/focus jumps back to Sunday.
    var expTot2=0;
    Array.prototype.forEach.call(document.querySelectorAll(".thrs"),function(td){ var dw=+td.getAttribute("data-dow"); var t=parseFloat(td.textContent)||0; var ev=hours[dw]; var bg=""; if(ev!=null){ var diff=t-(+ev); bg=Math.abs(diff)<0.05?"#cdebd4":(diff>0?"#f3c9c9":"#fbe0c2"); } td.style.background=bg; td.style.fontWeight=bg?"700":""; });
    for(var k=0;k<7;k++){ if(hours[k]!=null) expTot2+=hours[k]; }
    var etc=document.getElementById("expTotCell"); if(etc) etc.textContent=expTot2?expTot2.toFixed(1):"";
    fetch("/api/schedule/targets",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({clientId:CLIENT_ID, hours:hours})}).catch(function(){});
  }
  // Notes belong to the specific week being viewed.
  function saveNote(){
    if(!CLIENT_ID) return;
    var comment=(document.getElementById("schedComment")||{}).value||"";
    fetch("/api/schedule/note",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({clientId:CLIENT_ID, weekStart:ymd(START), comment:comment})}).catch(function(){});
  }

  fetch("/api/whoami").then(function(r){return r.json();}).then(function(d){
    if(!d||!d.ok){ location.replace("/login?next=/schedule"); return; }
    if(!(d.role==="master" || (d.perms && d.perms.foodSafety==="edit"))){ location.replace("/app"); return; }
    document.getElementById("prevW").addEventListener("click",function(){ START=addDays(START,-7); load(); });
    document.getElementById("nextW").addEventListener("click",function(){ START=addDays(START,7); load(); });
    document.getElementById("thisW").addEventListener("click",function(){ START=sundayOf(new Date()); load(); });
    document.getElementById("copyW").addEventListener("click", copyPrev);
    document.getElementById("clearW").addEventListener("click", clearWeek);
    document.getElementById("scanW").addEventListener("click",function(){ document.getElementById("scanCam").click(); });
    document.getElementById("uploadW").addEventListener("click",function(){ document.getElementById("scanFile").click(); });
    document.getElementById("scanCam").addEventListener("change",function(e){ var f=e.target.files&&e.target.files[0]; e.target.value=""; scanSchedulePhoto(f); });
    document.getElementById("scanFile").addEventListener("change",function(e){ var f=e.target.files&&e.target.files[0]; e.target.value=""; scanSchedulePhoto(f); });
    // Schedule drop-zone: self-contained drag / drop / paste, no dependency on
    // another script loading first.
    (function(){
      var dz=document.getElementById("schedDrop"); if(!dz) return;
      function stop(e){ e.preventDefault(); e.stopPropagation(); }
      ["dragenter","dragover"].forEach(function(ev){ dz.addEventListener(ev,function(e){ stop(e); dz.style.outline="2px dashed var(--green-deep)"; }); });
      ["dragleave","dragend"].forEach(function(ev){ dz.addEventListener(ev,function(e){ stop(e); dz.style.outline=""; }); });
      dz.addEventListener("drop",function(e){ stop(e); dz.style.outline=""; var fs=Array.prototype.slice.call((e.dataTransfer&&e.dataTransfer.files)||[]); if(fs[0]) scanSchedulePhoto(fs[0]); });
      document.addEventListener("paste",function(e){
        var items=(e.clipboardData&&e.clipboardData.items)||[], f=null;
        for(var i=0;i<items.length;i++){ if(items[i].kind==="file"){ f=items[i].getAsFile(); if(f) break; } }
        if(f){ e.preventDefault(); scanSchedulePhoto(f); }
      });
    })();
    document.getElementById("showMode").addEventListener("change",function(){ SHOWMODE=this.value; if(DATA) render(); });
    var ab=document.getElementById("auditBtn"); if(ab) ab.addEventListener("click", printAudit);
    var spb=document.getElementById("schedPdfBtn"); if(spb) spb.addEventListener("click", function(){ var doc=buildSchedulePdf(); var m=document.getElementById("msg"); if(!doc){ m.className="msg err"; m.textContent="Open a week with employees first."; return; } doc.save(schedFileName()); });
    var seb=document.getElementById("schedEmailBtn"); if(seb) seb.addEventListener("click", function(){ var doc=buildSchedulePdf(); var m=document.getElementById("msg"); if(!doc){ m.className="msg err"; m.textContent="Open a week with employees first."; return; } m.className="msg"; m.style.color="var(--muted)"; m.textContent="Creating the Gmail draft…"; var b64=doc.output("datauristring").split(",")[1]; var range=document.getElementById("range").textContent; fetch("/api/gmail/draft",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({to:"",subject:"Weekly Schedule — "+range,body:"Weekly schedule attached.",attachment:{filename:schedFileName(),base64:b64,contentType:"application/pdf"}})}).then(function(r){return r.json();}).then(function(d){ if(d&&d.ok){ m.className="msg ok"; m.innerHTML="Draft created in Gmail"+(d.link?(" — <a href='"+d.link+"' target='_blank' style='color:var(--green-deep);border-bottom:1px solid var(--clay)'>open it</a>"):"")+"."; } else { m.className="msg err"; m.textContent=(d&&d.error)||"Couldn't create the draft (is Gmail connected?)."; } }).catch(function(){ m.className="msg err"; m.textContent="Couldn't reach the server."; }); });
    document.addEventListener("change", function(e){ if(e.target&&e.target.classList&&e.target.classList.contains("exp")) saveTargets(); });
    var sc=document.getElementById("schedComment"); if(sc) sc.addEventListener("change", saveNote);
    var ap=document.getElementById("auditPhone"); if(ap) ap.addEventListener("change", function(){ if(DATA) render(); });
    loadClients();
  }).catch(function(){});

  function fileToScaledBase64(file){
    return new Promise(function(res){
      if(/pdf/i.test(file.type||"")){ var r=new FileReader(); r.onload=function(){ var d=String(r.result||""); var b=d.indexOf(","); res({base64:b>=0?d.slice(b+1):d, contentType:"application/pdf"}); }; r.onerror=function(){res(null);}; r.readAsDataURL(file); return; }
      var img=new Image(); img.onload=function(){ var max=2000, s=Math.min(1,max/Math.max(img.naturalWidth,img.naturalHeight)); var w=Math.max(1,Math.round(img.naturalWidth*s)), h=Math.max(1,Math.round(img.naturalHeight*s)); var c=document.createElement("canvas"); c.width=w; c.height=h; c.getContext("2d").drawImage(img,0,0,w,h); res({base64:c.toDataURL("image/jpeg",0.85).split(",")[1]||"", contentType:"image/jpeg"}); }; img.onerror=function(){res(null);}; img.src=URL.createObjectURL(file);
    });
  }
  function scanSchedulePhoto(file){
    if(!file||!CLIENT_ID) return;
    var m=document.getElementById("msg"); m.className="msg"; m.style.color="var(--muted)"; m.textContent="Reading the schedule into "+document.getElementById("range").textContent+"…";
    var b=document.getElementById("scanW"); b.disabled=true;
    fileToScaledBase64(file).then(function(p){ if(!p) throw new Error("Couldn't read the file.");
      return fetch("/api/schedule/scan",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({clientId:CLIENT_ID, start:ymd(START), base64:p.base64, contentType:p.contentType})});
    }).then(function(r){return r.json();}).then(function(d){ b.disabled=false;
      if(d&&d.ok){ m.className="msg ok"; m.textContent="Imported "+d.shifts+" shift"+(d.shifts===1?"":"s")+" into this week."+(d.failed?(" "+d.failed+" didn't save — scan again to retry."):"")+((d.unmatched&&d.unmatched.length)?(" Not matched to the roster: "+d.unmatched.join(", ")+"."):""); load(); }
      else { m.className="msg err"; m.textContent=(d&&d.error)||"Couldn't read that."; }
    }).catch(function(e){ b.disabled=false; m.className="msg err"; m.textContent=(e&&e.message)||"Couldn't reach the server."; });
  }

  // Printable blank audit sheet: employee rows x day columns, two write lines per cell
  // (In on top, Out below). No hours or scheduled times. Phone column optional.
  function printAudit(){
    if(!DATA||!DATA.employees||!DATA.employees.length) return;
    var dates=[]; for(var i=0;i<7;i++) dates.push(addDays(START,i));
    var showPhone=document.getElementById("auditPhone")&&document.getElementById("auditPhone").checked;
    var sel=document.getElementById("clientPick"); var loc=(sel&&sel.options[sel.selectedIndex])?sel.options[sel.selectedIndex].textContent:"";
    var range=document.getElementById("range").textContent;
    var h="<h2>Time Audit"+(loc?(" — "+esc(loc)):"")+"</h2><div class='sub'>Week of "+esc(range)+" · write actual In (top) and Out (bottom)</div>";
    h+="<table class='audittbl'><thead><tr><th class='nm'>Employee</th>"+(showPhone?"<th class='ph'>Phone</th>":"")+dates.map(function(d){ return "<th>"+DAYS[d.getDay()]+" "+fmtMD(d)+"</th>"; }).join("")+"</tr></thead><tbody>";
    DATA.employees.forEach(function(e){
      h+="<tr><td class='nm'>"+esc(e.nickname||e.name||"")+"</td>"+(showPhone?("<td class='ph'>"+esc(e.phone||"")+"</td>"):"")+dates.map(function(){ return "<td class='cell'><div class='io'></div><div class='io'></div></td>"; }).join("")+"</tr>";
    });
    h+="</tbody></table>";
    document.getElementById("auditSheet").innerHTML=h;
    window.print();
  }

  // The filled weekly schedule as a clean, centered, single-page landscape PDF.
  function fmtShort(v){ if(!v) return ""; var p=v.split(":"); var Hh=+p[0],mm=+p[1]||0; var ap=Hh>=12?"p":"a"; var h=Hh%12; if(h===0)h=12; return h+(mm?(":"+(mm<10?"0":"")+mm):"")+ap; }
  function buildSchedulePdf(){
    var JS=window.jspdf&&window.jspdf.jsPDF; if(!JS||!DATA||!DATA.employees) return null;
    var doc=new JS({unit:"pt",format:"letter",orientation:"landscape"});
    var W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight(), M=28;
    var sel=document.getElementById("clientPick"); var loc=(sel&&sel.options[sel.selectedIndex])?sel.options[sel.selectedIndex].textContent:"";
    var range=document.getElementById("range").textContent;
    var dates=[]; for(var i=0;i<7;i++) dates.push(addDays(START,i));
    var emps=(CUR_EMPS&&CUR_EMPS.length)?CUR_EMPS:DATA.employees;
    var showPhone=document.getElementById("auditPhone")&&document.getElementById("auditPhone").checked;
    var note=(document.getElementById("schedComment")||{}).value||"";
    // Centered title + week range.
    doc.setFont("helvetica","bold"); doc.setFontSize(15); doc.setTextColor(33,68,58);
    doc.text((loc?loc+" — ":"")+"Weekly Schedule", W/2, 30, {align:"center"});
    doc.setFont("helvetica","normal"); doc.setFontSize(11); doc.setTextColor(95,93,82);
    doc.text(range, W/2, 48, {align:"center"});
    // Geometry — size rows so everything fits on ONE page.
    var top=60, headH=24, noteH=note?40:0, bottom=18;
    var nameW=Math.min(118, Math.max(72, W*0.13)), hrsW=34, dayW=(W-2*M-nameW-hrsW)/7;
    var n=emps.length||1;
    var rowH=Math.min(30, (H-top-headH-noteH-bottom)/n);
    var fs=Math.max(5.5, Math.min(9, rowH*0.4)), twoLine=rowH>=15;
    function colX(i){ return M+nameW+i*dayW; }
    var y=top;
    // Header band.
    doc.setFillColor(231,224,208); doc.rect(M, y, W-2*M, headH, "F");
    doc.setTextColor(33,68,58);
    doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.text("Name", M+nameW/2, y+15, {align:"center"});
    dates.forEach(function(d,i){ var cx=colX(i)+dayW/2; doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.text(DAYS[d.getDay()], cx, y+10, {align:"center"}); doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.text(fmtMD(d), cx, y+20, {align:"center"}); });
    doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.text("Hrs", M+nameW+7*dayW+hrsW/2, y+15, {align:"center"});
    y+=headH;
    // Rows.
    doc.setFont("helvetica","normal");
    emps.forEach(function(e, idx){
      if(idx%2===1){ doc.setFillColor(247,243,236); doc.rect(M, y, W-2*M, rowH, "F"); }
      var ry=y+rowH/2;
      doc.setTextColor(20,20,20); doc.setFontSize(Math.min(8.5, fs+0.5));
      doc.text((e.nickname||e.name||""), M+5, ry+((showPhone&&e.phone)?-2:2.5));
      if(showPhone&&e.phone){ doc.setTextColor(120,120,120); doc.setFontSize(Math.max(5,fs-1.5)); doc.text(String(e.phone), M+5, ry+7.5); }
      doc.setFontSize(fs);
      dates.forEach(function(d,i){ var sh=(DATA.shifts[e.id]&&DATA.shifts[e.id][ymd(d)])||{}; var cx=colX(i)+dayW/2; if(!(sh.in||sh.out)) return; if(twoLine){ if(sh.in){ doc.setTextColor(20,20,20); doc.text(fmtShort(sh.in), cx, ry-1, {align:"center"}); } if(sh.out){ doc.setTextColor(110,110,110); doc.text(fmtShort(sh.out), cx, ry+7.5, {align:"center"}); } } else { doc.setTextColor(20,20,20); doc.text((sh.in?fmtShort(sh.in):"")+(sh.out?"-"+fmtShort(sh.out):""), cx, ry+2.5, {align:"center"}); } });
      doc.setTextColor(20,20,20); doc.setFontSize(fs); doc.text(rowHrs(e.id,dates).toFixed(1), M+nameW+7*dayW+hrsW/2, ry+2.5, {align:"center"});
      y+=rowH;
    });
    // Grid lines.
    doc.setDrawColor(120,120,120); doc.setLineWidth(0.6); doc.rect(M, top, W-2*M, y-top);
    doc.setLineWidth(0.4);
    for(var c=0;c<=7;c++){ var vx=M+nameW+c*dayW; doc.line(vx, top, vx, y); }
    doc.line(M, top+headH, W-M, top+headH);
    // Notes.
    if(note){ var ny=y+15; doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.setTextColor(33,68,58); doc.text("Notes:", M, ny); doc.setFont("helvetica","normal"); doc.setTextColor(40,40,40); doc.text(doc.splitTextToSize(note, W-2*M-40), M+34, ny); }
    return doc;
  }
  function schedFileName(){ return ("Schedule "+document.getElementById("range").textContent).replace(/[^A-Za-z0-9 ._-]/g,"")+".pdf"; }

  function loadClients(){
    fetch("/api/admin/clients",{cache:"no-store"}).then(function(r){return r.json();}).then(function(d){
      if(!d||!d.ok) return;
      var sel=document.getElementById("clientPick");
      (d.clients||[]).forEach(function(c){ var o=document.createElement("option"); o.value=c.id; o.textContent=c.name; sel.appendChild(o); });
      // Scoped to one client (top-bar): pick it and hide the redundant location field.
      var act=[]; try{ var a=JSON.parse(localStorage.getItem("rw_active_clients")||"[]"); if(Array.isArray(a)) act=a.filter(function(x){return x;}); }catch(e){}
      if(act.length===1){
        var want=(act[0]||"").trim().toLowerCase(), mid="";
        for(var i=0;i<sel.options.length;i++){ if((sel.options[i].textContent||"").trim().toLowerCase()===want){ mid=sel.options[i].value; break; } }
        if(mid){ sel.value=mid; CLIENT_ID=mid; try{ localStorage.setItem(CKEY,CLIENT_ID); }catch(e){} var fld=sel.closest?sel.closest(".field"):null; if(fld) fld.style.display="none"; document.getElementById("body").style.display="block"; load(); return; }
      }
      var saved=""; try{ saved=localStorage.getItem(CKEY)||""; }catch(e){}
      if(saved){ sel.value=saved; if(sel.value===saved){ CLIENT_ID=saved; document.getElementById("body").style.display="block"; load(); } }
      sel.addEventListener("change",function(){ CLIENT_ID=sel.value; try{ localStorage.setItem(CKEY,CLIENT_ID); }catch(e){} if(CLIENT_ID){ document.getElementById("body").style.display="block"; load(); } else document.getElementById("body").style.display="none"; });
    }).catch(function(){});
  }

  function fmtMD(d){ return (d.getMonth()+1)+"/"+d.getDate(); }
  function load(){
    var end=addDays(START,6);
    document.getElementById("range").textContent = START.toLocaleDateString(undefined,{month:"short",day:"numeric"})+" – "+end.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});
    fetch("/api/schedule?clientId="+encodeURIComponent(CLIENT_ID)+"&start="+ymd(START)+"&end="+ymd(end),{cache:"no-store"}).then(function(r){return r.json();}).then(function(d){
      var note=document.getElementById("setupNote");
      if(!d||!d.ok){ document.getElementById("grid").innerHTML="<div class='empty'>Couldn't load.</div>"; return; }
      if(d.missing){ note.style.display="block"; note.textContent="No employees here yet — add them in Payroll first."; }
      else if(d.scheduleMissing){ note.style.display="block"; note.textContent="The schedule table isn't set up yet. Run supabase/schedule_shifts.sql once, then reload."; }
      else note.style.display="none";
      DATA=d; var sc=document.getElementById("schedComment"); if(sc) sc.value=d.note||""; render();
    }).catch(function(){ document.getElementById("grid").innerHTML="<div class='empty'>Couldn't reach the server.</div>"; });
  }

  function hasShift(empId,dates){ var m=DATA.shifts[empId]; if(!m) return false; for(var i=0;i<7;i++){ var s=m[ymd(dates[i])]; if(s&&(s.in||s.out)) return true; } return false; }
  function render(){
    var g=document.getElementById("grid");
    if(!DATA.employees.length){ g.innerHTML="<div class='empty'>No active employees for this location.</div>"; return; }
    var dates=[]; for(var i=0;i<7;i++) dates.push(addDays(START,i));
    var emps = SHOWMODE==="sched" ? DATA.employees.filter(function(e){ return hasShift(e.id,dates); }) : DATA.employees;
    if(!emps.length){ g.innerHTML="<div class='empty'>No one is scheduled this week yet. Switch to 'All active' to add shifts.</div>"; return; }
    var showPhone=document.getElementById("auditPhone")&&document.getElementById("auditPhone").checked;
    var h="<table><thead><tr><th class='emp'>Employee</th>";
    dates.forEach(function(d,i){ h+="<th>"+DAYS[i]+"<div class='dnum'>"+fmtMD(d)+"</div></th>"; });
    h+="<th>Hrs</th></tr></thead><tbody>";
    emps.forEach(function(e){
      h+="<tr><td class='emp'><a href='/payroll?client="+encodeURIComponent(CLIENT_ID)+"&emp="+encodeURIComponent(e.id)+"' title='Open in Payroll'>"+esc(e.nickname||e.name)+"</a>"+(showPhone&&e.phone?("<div style='font-size:.72rem;color:var(--muted);font-weight:400'>"+esc(e.phone)+"</div>"):"")+"</td>";
      dates.forEach(function(d){
        var ds=ymd(d); var sh=(DATA.shifts[e.id]&&DATA.shifts[e.id][ds])||{in:"",out:""};
        h+="<td class='day'>"+
          "<span class='tiwrap'><input type='text' inputmode='numeric' autocomplete='off' class='ti tin"+(sh.in?"":" empty")+"' data-emp='"+esc(e.id)+"' data-date='"+ds+"' data-v='"+esc(sh.in)+"' value='"+esc(fmtTime12(sh.in))+"' style='background:"+(startColor(sh.in)||"var(--bg)")+"' /><button type='button' class='tix' tabindex='-1' title='Clear'>×</button></span>"+
          "<span class='tiwrap'><input type='text' inputmode='numeric' autocomplete='off' class='ti tout"+(sh.out?"":" empty")+"' data-emp='"+esc(e.id)+"' data-date='"+ds+"' data-v='"+esc(sh.out)+"' value='"+esc(fmtTime12(sh.out))+"' style='background:"+(endColor(sh.out)||"var(--bg)")+"' /><button type='button' class='tix' tabindex='-1' title='Clear'>×</button></span>"+
        "</td>";
      });
      h+="<td class='hrs' id='hrs_"+esc(e.id)+"'>"+rowHrs(e.id,dates).toFixed(1)+"</td></tr>";
    });
    CUR_EMPS=emps; CUR_DATES=dates;
    h+="</tbody><tfoot id='sfoot'>"+footerInner()+"</tfoot></table>";
    g.innerHTML=h;
    g.querySelectorAll(".ti").forEach(function(inp){ inp.addEventListener("change", onCell); });
    // The X clears that time field (and saves the clear).
    g.querySelectorAll(".tix").forEach(function(btn){ btn.addEventListener("click", function(){ var inp=btn.parentNode.querySelector(".ti"); if(!inp) return; inp.value=""; inp.dispatchEvent(new Event("change",{bubbles:true})); }); });
  }
  function rowHrs(empId,dates){ var t=0; dates.forEach(function(d){ var sh=(DATA.shifts[empId]&&DATA.shifts[empId][ymd(d)])||{}; t+=shiftHrs(sh.in,sh.out); }); return t; }
  function grandHrs(dates){ var t=0; DATA.employees.forEach(function(e){ t+=rowHrs(e.id,dates); }); return t; }

  function onCell(ev){
    var inp=ev.target, emp=inp.getAttribute("data-emp"), date=inp.getAttribute("data-date");
    var cell=inp.closest("td");
    var pv=parseSmartTime(inp.value, inp.classList.contains("tout")); inp.setAttribute("data-v", pv); inp.value=fmtTime12(pv);
    var tin=cell.querySelector(".tin"), tout=cell.querySelector(".tout");
    var inT=tin.getAttribute("data-v")||"", outT=tout.getAttribute("data-v")||"";
    tin.classList.toggle("empty", !inT);
    tout.classList.toggle("empty", !outT);
    tin.style.background = startColor(inT)||"var(--bg)";
    tout.style.background = endColor(outT)||"var(--bg)";
    DATA.shifts[emp]=DATA.shifts[emp]||{}; DATA.shifts[emp][date]={in:inT,out:outT};
    var dates=[]; for(var i=0;i<7;i++) dates.push(addDays(START,i));
    var hc=document.getElementById("hrs_"+emp); if(hc) hc.textContent=rowHrs(emp,dates).toFixed(1);
    var sf=document.getElementById("sfoot"); if(sf) sf.innerHTML=footerInner();
    var m=document.getElementById("msg"); m.className="msg";
    fetch("/api/schedule/shift",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({employeeId:emp,date:date,in:inT,out:outT})})
      .then(function(r){return r.json();}).then(function(d){ if(d&&d.ok){ m.className="msg ok"; m.textContent="Saved ✓"; setTimeout(function(){ if(m.textContent==="Saved ✓") m.textContent=""; },1200); } else { m.className="msg err"; m.textContent=(d&&d.error)||"Couldn't save."; } })
      .catch(function(){ m.className="msg err"; m.textContent="Couldn't reach the server."; });
  }

  function copyPrev(){
    if(!confirm("Copy the previous week's schedule into this week? It overwrites any shifts already set for these dates.")) return;
    var b=document.getElementById("copyW"); b.disabled=true; b.textContent="Copying…";
    fetch("/api/schedule/copy",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({clientId:CLIENT_ID,fromStart:ymd(addDays(START,-7)),toStart:ymd(START)})})
      .then(function(r){return r.json();}).then(function(d){ b.disabled=false; b.textContent="Copy previous week →";
        var m=document.getElementById("msg"); if(d&&d.ok){ m.className="msg ok"; m.textContent="Copied "+d.copied+" shift"+(d.copied===1?"":"s")+" from last week."; load(); } else { m.className="msg err"; m.textContent=(d&&d.error)||"Couldn't copy."; } })
      .catch(function(){ b.disabled=false; b.textContent="Copy previous week →"; });
  }
  function clearWeek(){
    if(!confirm("Clear every shift for this week ("+document.getElementById("range").textContent+")? This can't be undone.")) return;
    var b=document.getElementById("clearW"); b.disabled=true; b.textContent="Clearing…";
    fetch("/api/schedule/clear",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({clientId:CLIENT_ID,start:ymd(START)})})
      .then(function(r){return r.json();}).then(function(d){ b.disabled=false; b.textContent="Clear week";
        var m=document.getElementById("msg"); if(d&&d.ok){ m.className="msg ok"; m.textContent="Cleared the week."; load(); } else { m.className="msg err"; m.textContent=(d&&d.error)||"Couldn't clear."; } })
      .catch(function(){ b.disabled=false; b.textContent="Clear week"; });
  }
