<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1f3d2b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Service records" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<title>Ringwood · Service records</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="/client-color.js"></script>
<style>
  :root{--bg:#f4efe4;--bg-2:#efe8d8;--ink:#23282a;--muted:#5f5d52;--green:#2f5d50;--green-deep:#21443a;--clay:#a9633a;--line:rgba(35,40,42,.14)}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:"Hanken Grotesk",-apple-system,sans-serif;min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:0 22px 56px}
  header{padding:24px 0}
  .bar{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:11px;font-family:"Spectral",serif;font-size:1.25rem;font-weight:600;color:var(--green-deep)}
  .back{font-size:.92rem;text-decoration:none;color:var(--green-deep);border-bottom:1px solid var(--clay);padding-bottom:1px}
  .intro{margin:18px 0 22px}
  .eyebrow{font-size:.8rem;letter-spacing:.18em;text-transform:uppercase;color:var(--clay);font-weight:600;margin-bottom:12px}
  h1{font-family:"Spectral",serif;font-weight:500;font-size:clamp(2rem,7vw,2.7rem);color:var(--green-deep)}
  .lead{color:var(--muted);font-size:1rem;margin:10px 0 18px}
  label{display:block;font-weight:600;font-size:.9rem;color:var(--green-deep);margin-bottom:6px}
  select,input,textarea{width:100%;font:inherit;font-size:1rem;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:11px 13px;-webkit-appearance:none;appearance:none}
  textarea{resize:vertical}
  select:focus,input:focus,textarea:focus{outline:none;border-color:var(--green)}
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .filters .f{flex:1;min-width:150px}
  .total{color:var(--muted);font-size:.92rem;margin-bottom:10px}
  .rec{background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:12px 14px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;cursor:pointer}
  .rec:hover{border-color:var(--green)}
  .rec .bd{flex:1;min-width:0}
  .rec .top{font-weight:600;color:var(--green-deep);font-size:1.14rem;line-height:1.2}
  .rec .meta{color:var(--muted);font-size:.85rem;margin-top:3px}
  .rec .meta b{color:var(--green-deep)}
  .rchev{flex:0 0 auto;align-self:center;color:var(--muted);font-size:1.3rem;line-height:1}
  .rec .notes{color:var(--muted);font-size:.85rem;margin-top:3px;word-break:break-word}
  .rcol{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .cost{font-weight:700;color:var(--green-deep);white-space:nowrap}
  .kind{display:inline-block;font-size:.6rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:999px;vertical-align:middle;margin-right:6px}
  .kind.ks{background:#e3efe7;color:#21443a}
  .kind.kt{background:#f0e0d4;color:#7a4a26}
  .client-chip{font-size:.76rem;font-weight:700;color:#f6f2e8;background:var(--green-deep);padding:3px 10px;border-radius:999px;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}
  .empty{color:var(--muted);padding:18px 4px}
</style>
</head>
<body>
<header>
  <div class="wrap bar">
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 26 26" aria-hidden="true"><g fill="none" stroke="#2f5d50" stroke-width="1.4"><circle cx="13" cy="13" r="3"/><circle cx="13" cy="13" r="7"/><circle cx="13" cy="13" r="11"/></g></svg>
      Ringwood
    </div>
    <a class="back" href="/app">Home</a>
  </div>
</header>
<main class="wrap">
  <div class="intro">
    <div class="eyebrow">Service records</div>
    <h1>Maintenance</h1>
    <p class="lead">Service records and asset repairs, newest first. Tap one to see its details. Repairs link to the ticket; services open here.</p>
  </div>
  <button type="button" id="scanBtn" style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;cursor:pointer;padding:15px;border:1.5px dashed rgba(47,93,80,.45);border-radius:6px;color:var(--green-deep);background:var(--bg-2);font:inherit;font-weight:600;margin-bottom:6px">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M21 14v7h-7"/></svg>
    <span>Scan a QR code</span>
  </button>
  <input type="file" id="qrScanInput" accept="image/*" style="display:none" />
  <div id="qrScanMsg" style="font-size:.85rem;margin-bottom:14px"></div>
  <div class="filters">
    <div class="f" id="clientWrap"><label for="clientSel">Client</label><select id="clientSel"><option value="">All clients</option></select></div>
    <div class="f"><label for="typeSel">Type</label><select id="typeSel"><option value="">All types</option></select></div>
  </div>
  <div class="total" id="total"></div>
  <div id="list"><div class="empty">Loading…</div></div>
</main>
<script src="/jsQR.js"></script>
<script src="/client-pins.js"></script>
<script>
  function esc(s){ return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  // ---- scan a QR code: pull up that asset's service record ----
  function decodeQRFromImage(file){
    return new Promise(function(resolve, reject){
      var img=new Image(), url=URL.createObjectURL(file);
      img.onload=function(){
        var max=1100, w=img.width, h=img.height, s=Math.min(1, max/Math.max(w,h));
        w=Math.round(w*s); h=Math.round(h*s);
        var c=document.createElement("canvas"); c.width=w; c.height=h;
        var ctx=c.getContext("2d"); ctx.drawImage(img,0,0,w,h);
        URL.revokeObjectURL(url);
        function fallback(){ try{ var d=ctx.getImageData(0,0,w,h); var res=window.jsQR?window.jsQR(d.data,w,h):null; if(res&&res.data) resolve(res.data); else reject(new Error("No QR code found in the photo.")); }catch(e){ reject(e); } }
        if(window.BarcodeDetector){ try{ new BarcodeDetector({formats:["qr_code"]}).detect(c).then(function(codes){ if(codes&&codes.length) resolve(codes[0].rawValue); else fallback(); }, fallback); return; }catch(e){} }
        fallback();
      };
      img.onerror=function(){ URL.revokeObjectURL(url); reject(new Error("Couldn't read that image.")); };
      img.src=url;
    });
  }
  (function(){
    var input=document.getElementById("qrScanInput");
    document.getElementById("scanBtn").addEventListener("click", function(){ input.click(); });
    input.addEventListener("change", function(e){
      var file=e.target.files&&e.target.files[0]; e.target.value="";
      var m=document.getElementById("qrScanMsg"); if(!file) return;
      m.style.color="var(--muted)"; m.textContent="Reading the code…";
      decodeQRFromImage(file).then(function(val){
        m.textContent="Looking up the asset…";
        fetch("/api/asset/resolve?code="+encodeURIComponent(val)).then(function(r){return r.json();}).then(function(d){
          if(d&&d.ok){ m.textContent=""; location.href="/service?asset="+encodeURIComponent(d.id); }
          else { m.style.color="#8a3d1c"; m.textContent=(d&&d.error)||"No asset matches that code."; }
        }).catch(function(){ m.style.color="#8a3d1c"; m.textContent="Couldn't reach the server."; });
      }).catch(function(err){ m.style.color="#8a3d1c"; m.textContent=(err&&err.message)||"Couldn't read a QR code. Try a flat, close shot."; });
    });
  })();
  function money(v){ return (v===""||v==null)?"":("$"+Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})); }
  function fdate(s){ if(!s) return ""; try{ return new Date(s).toLocaleDateString(); }catch(e){ return s; } }
  var clientSel=document.getElementById("clientSel"), typeSel=document.getElementById("typeSel");
  var ALL=[];      // service records (used by the inline editor)
  var ITEMS=[];    // combined: service records + asset-linked tickets
  // Technician dropdown sourced from the Vendors directory (same as tickets).
  var SVC_VENDORS=[];
  fetch("/api/vendors",{cache:"no-store"}).then(function(r){return r.json();}).then(function(list){ SVC_VENDORS=Array.isArray(list)?list:[]; }).catch(function(){});
  function techOptions(cur){
    var names={}; SVC_VENDORS.forEach(function(v){ if(v.name) names[v.name]=v; });
    if(cur && !names[cur]) names[cur]={name:cur,trade:""};
    var list=Object.keys(names).sort(function(a,b){return a.toLowerCase().localeCompare(b.toLowerCase());});
    return "<option value=''>— Select —</option>"+list.map(function(n){ var v=names[n]; return "<option value='"+esc(n)+"'"+(cur===n?" selected":"")+">"+esc(n+(v.trade?" · "+v.trade:""))+"</option>"; }).join("");
  }
  // Build the combined work history: formal service records plus any ticket that
  // is tied to an asset (a repair is part of that asset's history too).
  function buildItems(services, tickets){
    var items = (services||[]).map(function(s){
      return { kind:"service", id:s.id, asset:s.asset, client:s.client, clientColor:s.clientColor, date:s.date, type:s.type, summary:s.notes, cost:s.cost };
    });
    (tickets||[]).forEach(function(t){
      if(!t.assetId) return;  // only asset-linked tickets belong here
      items.push({ kind:"ticket", id:t.id, asset:t.asset, client:t.client, clientColor:t.clientColor, date:t.created, type:t.category||"Ticket", summary:t.title||t.description, status:t.status });
    });
    items.sort(function(a,b){ return (b.date||"").localeCompare(a.date||""); });
    return items;
  }

  fetch("/api/whoami").then(function(r){return r.json();}).then(function(w){
    if(w && w.ok && w.role==="client"){ document.getElementById("clientWrap").style.display="none"; }
    else if(window.RWClientPins){ try { window.__cpins = RWClientPins.attach({ selectEl: clientSel, exclude: ["__unassigned"] }); } catch(e){} }
  }).catch(function(){});

  function fillFilters(){
    var clients={}, types={}, hasUn=false;
    ITEMS.forEach(function(s){ if(s.client) clients[s.client]=1; else hasUn=true; if(s.type) types[s.type]=1; });
    var ck=clientSel.value;
    var chtml="<option value=''>All clients</option>"+Object.keys(clients).sort().map(function(c){return "<option>"+esc(c)+"</option>";}).join("");
    if(hasUn) chtml+="<option value='__unassigned'>Unassigned</option>";
    clientSel.innerHTML=chtml; clientSel.value=ck;
    if(window.__cpins) window.__cpins.refresh();
    var tk=typeSel.value; typeSel.innerHTML="<option value=''>All types</option>"+Object.keys(types).sort().map(function(t){return "<option>"+esc(t)+"</option>";}).join(""); typeSel.value=tk;
  }
  function render(){
    var c=clientSel.value, t=typeSel.value;
    var rows=ITEMS.filter(function(s){ if(c==="__unassigned"){ if(s.client) return false; } else if(c && s.client!==c) return false; if(t && s.type!==t) return false; return true; });
    var total=rows.reduce(function(a,s){ var n=Number(s.cost); return a+(isNaN(n)?0:n); },0);
    document.getElementById("total").textContent = rows.length+" record"+(rows.length===1?"":"s")+(total?(" · "+money(total)+" total"):"");
    var el=document.getElementById("list");
    if(!rows.length){ el.innerHTML="<div class='empty'>Nothing"+(ITEMS.length?" matches.":" yet.")+"</div>"; return; }
    el.innerHTML=rows.map(function(s){
      var isTicket = s.kind==="ticket";
      var tag = isTicket ? "<span class='kind kt'>Ticket</span>" : "<span class='kind ks'>Service</span>";
      var meta=(s.date?"<b>"+esc(fdate(s.date))+"</b>":"")+[s.type, isTicket?s.status:null].filter(Boolean).map(esc).map(function(x){return " · "+x;}).join("");
      var onclick = isTicket ? ("location.href='/status?id="+esc(s.id)+"'") : ("openRec('"+esc(s.id)+"', true)");
      return "<div class='rec' onclick=\""+onclick+"\">"+
        "<div class='bd'><div class='top'>"+tag+" "+esc(s.asset||"Asset")+"</div>"+
        (meta?"<div class='meta'>"+meta+"</div>":"")+
        (s.summary?"<div class='notes'>"+esc(s.summary)+"</div>":"")+"</div>"+
        "<div class='rcol'>"+(s.client?"<span class='client-chip' style='background:"+(s.clientColor||clientColor(s.client))+"'>"+esc(s.client)+"</span>":"")+(s.cost!==""&&s.cost!=null?"<span class='cost'>"+esc(money(s.cost))+"</span>":"")+"</div>"+
        "<span class='rchev'>›</span>"+
      "</div>";
    }).join("");
  }
  document.querySelector("main").insertAdjacentHTML("beforeend","<div id='editWrap'></div>");
  clientSel.addEventListener("change", render);
  typeSel.addEventListener("change", render);
  // Re-fetch the records and rebuild the list, so an edit made on a record shows
  // up when you come back. Keeps the current list visible until the data lands.
  function refreshRecords(){
    return Promise.all([
      fetch("/api/services/all",{cache:"no-store"}).then(function(r){return r.json();}).catch(function(){return [];}),
      fetch("/api/tickets/list?archived=1",{cache:"no-store"}).then(function(r){return r.json();}).catch(function(){return [];})
    ]).then(function(res){
      ALL = Array.isArray(res[0])?res[0]:[];
      var tix = Array.isArray(res[1])?res[1]:[];
      ITEMS = buildItems(ALL, tix);
      fillFilters(); render();
    });
  }
  refreshRecords().catch(function(){ document.getElementById("list").innerHTML="<div class='empty'>Could not load records.</div>"; });

  var SERVICE_TYPES=["Install","Inspection","Maintenance","Repair","Replacement","Other"];
  var topEls=[document.querySelector(".filters"),document.getElementById("total"),document.getElementById("list")];
  function showList(show){ topEls.forEach(function(e){ if(e) e.style.display=show?"":"none"; }); }
  // The phone's back gesture / button fires popstate: show whatever the URL says.
  window.addEventListener("popstate", function(){
    var id=new URLSearchParams(location.search).get("id");
    if(id){ openRec(id, false); return; }
    var ew=document.getElementById("editWrap"); if(ew) ew.innerHTML=""; showList(true); refreshRecords(); window.scrollTo(0,0);
  });
  // Returning to the list from a full page nav (browser back): refresh it too.
  window.addEventListener("pageshow", function(e){ var ew=document.getElementById("editWrap"); if(e.persisted && (!ew||!ew.innerHTML)) refreshRecords(); });
  function processPhoto(file){
    return new Promise(function(res,rej){ var img=new Image(),u=URL.createObjectURL(file);
      img.onload=function(){ var max=1600,w=img.width,h=img.height; if(w>max||h>max){ if(w>=h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;} }
        var c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);URL.revokeObjectURL(u);
        var d=c.toDataURL("image/jpeg",0.82); res({base64:d.split(",")[1],contentType:"image/jpeg",preview:d}); };
      img.onerror=function(){ URL.revokeObjectURL(u); rej(new Error("bad")); }; img.src=u; });
  }
  window.openRec=function(id, push){
    // Record the record in history so the phone's back/swipe returns to the list
    // instead of leaving the app. push=true when the user taps a record.
    var u="/services?id="+encodeURIComponent(id);
    if(push) history.pushState({svc:id},"",u); else history.replaceState({svc:id},"",u);
    var rec=ALL.filter(function(x){return x.id===id;})[0]||{};
    var ew=document.getElementById("editWrap");
    showList(false);
    ew.innerHTML="<div class='empty'>Loading…</div>";
    fetch("/api/service/get?id="+encodeURIComponent(id)).then(function(r){return r.json();}).then(function(s){
      if(!s||!s.ok){ showList(true); ew.innerHTML=""; return; }
      var keep=(s.photos&&s.photos.length)?s.photos.slice():[], add=[];
      var typeOpts="<option value=''>Select…</option>"+SERVICE_TYPES.map(function(t){return "<option"+(s.type===t?" selected":"")+">"+t+"</option>";}).join("");
      var card="background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:20px 18px;margin-bottom:30px";
      var fld="margin-bottom:14px";
      ew.innerHTML="<a href='#' class='back' style='display:inline-block;margin:4px 0 14px' onclick='__svcBack();return false;'>&larr; Back to list</a>"+
        "<div style='"+card+"'>"+
        "<div style='display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:4px'><h2 style='font-family:Spectral,serif;font-weight:500;font-size:1.3rem;color:var(--green-deep)'>Service record</h2>"+(rec.client?"<span class='client-chip' style='background:"+clientColor(rec.client)+"'>"+esc(rec.client)+"</span>":"")+"</div>"+
        "<div style='color:var(--muted);font-size:.9rem;margin-bottom:16px'>"+esc(rec.asset||"Asset")+(rec.assetId?(" · <a href='/a/?id="+esc(rec.assetId)+"' style='color:var(--green-deep)'>Open asset →</a>"):"")+"</div>"+
        "<div style='"+fld+"'><label>Date</label><input id='s_date' type='date' value='"+esc(s.date)+"'/></div>"+
        "<div style='"+fld+"'><label>Type</label><select id='s_type'>"+typeOpts+"</select></div>"+
        "<div style='"+fld+"'><label>Technician</label><select id='s_tech'>"+techOptions(s.technician)+"</select></div>"+
        "<div style='"+fld+"'><label>Notes</label><textarea id='s_notes' style='min-height:80px'>"+esc(s.notes)+"</textarea>"+
          "<button type='button' id='s_polish' style='margin-top:8px;background:transparent;border:1px solid var(--clay);color:var(--clay);border-radius:999px;padding:7px 14px;font:inherit;font-size:.86rem;font-weight:600;cursor:pointer'>✨ Clean up with AI</button>"+
          "<div id='s_polishWrap' style='display:none;margin-top:9px;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:11px 13px'>"+
            "<div style='font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--clay);font-weight:600;margin-bottom:5px'>Suggested cleanup</div>"+
            "<div id='s_polishText' style='font-size:.94rem;white-space:pre-wrap'></div>"+
            "<div style='display:flex;gap:8px;margin-top:9px'><button type='button' id='s_polishUse' style='background:var(--green);color:#f6f2e8;border:none;border-radius:5px;padding:8px 15px;font:inherit;font-weight:600;cursor:pointer'>Use this</button><button type='button' id='s_polishKeep' style='background:transparent;border:1px solid var(--line);color:var(--green-deep);border-radius:5px;padding:8px 15px;font:inherit;font-weight:600;cursor:pointer'>Keep mine</button></div>"+
          "</div></div>"+
        "<div style='"+fld+"'><label>Cost</label><input id='s_cost' type='number' step='0.01' value='"+esc(s.cost)+"'/></div>"+
        "<div style='"+fld+"'><label>Photos</label><div id='s_thumbs' style='display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px'></div><input type='file' id='s_file' accept='image/*' multiple capture='environment'/></div>"+
        "<div style='display:flex;gap:10px;margin-top:6px'><button id='s_save' type='button' style='flex:1;background:var(--green);color:#f6f2e8;border:none;border-radius:5px;padding:13px;font:inherit;font-weight:600;cursor:pointer'>Save</button>"+
        "<button id='s_back' type='button' style='flex:1;background:transparent;color:var(--green-deep);border:1px solid var(--line);border-radius:5px;padding:13px;font:inherit;font-weight:600;cursor:pointer'>Back</button></div>"+
        "<div id='s_msg' style='color:#8a3d1c;font-size:.88rem;margin-top:10px'></div></div>";
      window.scrollTo(0,0);
      var tEl=document.getElementById("s_thumbs");
      function thumbs(){ tEl.innerHTML=keep.map(function(u,i){return "<span style='position:relative;display:inline-block'><img class='zoomable' src='"+esc(u)+"' style='width:78px;height:78px;object-fit:cover;border-radius:6px;border:1px solid var(--line)'/><button type='button' onclick='__rk("+i+")' style='position:absolute;top:-7px;right:-8px;width:28px;height:28px;border-radius:999px;border:none;background:var(--green-deep);color:#f6f2e8;font-size:13px;cursor:pointer'>×</button></span>";}).join("")+
        add.map(function(p,i){return "<span style='position:relative;display:inline-block'><img class='zoomable' src='"+p.preview+"' style='width:78px;height:78px;object-fit:cover;border-radius:6px;border:1px solid var(--green)'/><button type='button' onclick='__ra("+i+")' style='position:absolute;top:-7px;right:-8px;width:28px;height:28px;border-radius:999px;border:none;background:var(--green-deep);color:#f6f2e8;font-size:13px;cursor:pointer'>×</button></span>";}).join("")||(keep.length?"":"<span style='color:var(--muted);font-size:.9rem'>No photos.</span>"); }
      window.__rk=function(i){ keep.splice(i,1); thumbs(); };
      window.__ra=function(i){ add.splice(i,1); thumbs(); };
      thumbs();
      document.getElementById("s_file").addEventListener("change",function(e){ var fs=Array.prototype.slice.call(e.target.files||[]); e.target.value=""; Promise.all(fs.map(processPhoto)).then(function(arr){ arr.forEach(function(p){add.push(p);}); thumbs(); }).catch(function(){}); });
      (function(){
        var pb=document.getElementById("s_polish"); if(!pb) return;
        var pw=document.getElementById("s_polishWrap"), pt=document.getElementById("s_polishText"), ne=document.getElementById("s_notes"), em=document.getElementById("s_msg");
        pb.addEventListener("click",function(){
          var text=(ne.value||"").trim(); if(em) em.textContent="";
          if(!text){ ne.focus(); return; }
          pb.disabled=true; pb.textContent="Cleaning up…";
          fetch("/api/ai/polish",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({text:text,kind:"service"})})
            .then(function(r){return r.json();}).then(function(d){
              pb.disabled=false; pb.textContent="✨ Clean up with AI";
              if(d&&d.ok&&d.text){ pt.textContent=d.text; pw.style.display="block"; }
              else if(em){ em.textContent=(d&&d.error)||"The assistant couldn't respond."; }
            }).catch(function(){ pb.disabled=false; pb.textContent="✨ Clean up with AI"; if(em) em.textContent="Couldn't reach the assistant."; });
        });
        document.getElementById("s_polishUse").addEventListener("click",function(){ ne.value=pt.textContent; pw.style.display="none"; });
        document.getElementById("s_polishKeep").addEventListener("click",function(){ pw.style.display="none"; });
      })();
      window.__svcBack=function(){ if(history.state&&history.state.svc) history.back(); else { history.replaceState(null,"","/services"); ew.innerHTML=""; showList(true); refreshRecords(); window.scrollTo(0,0); } };
      document.getElementById("s_back").addEventListener("click", window.__svcBack);
      // Hybrid auto-save: Type and Technician save instantly; Save stays for the rest.
      (function(){
        function svcAuto(field, value){
          var m=document.getElementById("s_msg");
          fetch("/api/service/update",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify((function(){var o={id:id};o[field]=value;return o;})())})
            .then(function(r){return r.json();}).then(function(d){ if(m){ if(d&&d.ok){ m.style.color="var(--green-deep)"; m.textContent="Saved ✓"; } else { m.style.color="#8a3d1c"; m.textContent=(d&&d.error)||"Couldn't save."; } } })
            .catch(function(){ if(m){ m.style.color="#8a3d1c"; m.textContent="Couldn't reach the server."; } });
        }
        document.getElementById("s_type").addEventListener("change", function(){ svcAuto("type", this.value); });
        document.getElementById("s_tech").addEventListener("change", function(){ svcAuto("technician", this.value); });
      })();
      document.getElementById("s_save").addEventListener("click",function(){
        var b=this; b.disabled=true; b.textContent="Saving…";
        var payload={ id:id, date:document.getElementById("s_date").value, type:document.getElementById("s_type").value, technician:document.getElementById("s_tech").value, notes:document.getElementById("s_notes").value, cost:document.getElementById("s_cost").value, keepPhotos:keep, addPhotos:add.map(function(p){return {base64:p.base64,contentType:p.contentType};}) };
        fetch("/api/service/update",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(payload)}).then(function(r){return r.json();}).then(function(d){
          if(d&&d.ok){ history.replaceState(null,"","/services"); ew.innerHTML=""; showList(true); fetch("/api/services/all").then(function(r){return r.json();}).then(function(rows){ ALL=Array.isArray(rows)?rows:[]; fillFilters(); render(); }); }
          else { b.disabled=false; b.textContent="Save"; document.getElementById("s_msg").textContent=(d&&d.error)||"Save failed."; }
        }).catch(function(){ b.disabled=false; b.textContent="Save"; document.getElementById("s_msg").textContent="Couldn't reach the server."; });
      });
    }).catch(function(){ showList(true); ew.innerHTML=""; });
  };
</script>

<script src="/native-camera.js"></script>
<script src="/whoami-badge.js"></script>
