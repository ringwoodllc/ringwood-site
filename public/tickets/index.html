<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Ringwood</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600&display=swap');
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; background: #f4f1ea; color: #1c1c19; font-family: 'Hanken Grotesk', sans-serif; }
.wrap { max-width: 460px; margin: 0 auto; padding: 0 22px 48px; }
header { display: flex; align-items: center; gap: 12px; padding: 30px 0 20px; border-bottom: 1px solid rgba(28,28,25,0.1); }
.brand { font-family: 'Fraunces', serif; font-size: 27px; font-weight: 600; color: #1f3d2b; line-height: 1; letter-spacing: -0.01em; }
.sub { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.55; margin-top: 5px; }
h1 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 32px; letter-spacing: -0.01em; margin: 0 0 10px; }
.lead { opacity: 0.6; font-size: 15.5px; line-height: 1.55; margin: 0 0 24px; }
label { display: block; font-size: 14.5px; font-weight: 600; margin: 0 0 9px; }
input, select, textarea { width: 100%; background: #fff; border: 1px solid rgba(28,28,25,0.13); border-radius: 11px; padding: 14px 15px; font-size: 16px; color: #1c1c19; font-family: inherit; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #1f3d2b; }
.field { margin-bottom: 18px; }
.site { display: flex; align-items: center; gap: 8px; padding: 14px 0; font-size: 13.5px; }
.site span { opacity: 0.55; }
.photoBtn { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 40px 20px; background: #fff; border: 1.5px dashed rgba(31,61,43,0.4); border-radius: 14px; color: #1f3d2b; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
.photoNote { font-size: 13px; opacity: 0.55; margin: 0 0 20px; min-height: 17px; }
.preview { position: relative; margin-bottom: 20px; }
.preview img { width: 100%; border-radius: 14px; display: block; max-height: 280px; object-fit: cover; }
.retake { position: absolute; bottom: 12px; right: 12px; background: rgba(28,28,25,0.78); color: #f4f1ea; border: none; border-radius: 9px; padding: 8px 13px; font-size: 13px; font-weight: 600; cursor: pointer; }
.submit { width: 100%; background: #1f3d2b; color: #f4f1ea; border: none; border-radius: 12px; padding: 17px; font-size: 16.5px; font-weight: 600; cursor: pointer; }
.submit[disabled] { background: #c9c5bc; cursor: default; }
.hidden { display: none; }
.done { text-align: center; padding-top: 56px; }
.check { width: 66px; height: 66px; border-radius: 50%; background: #1f3d2b; color: #f4f1ea; display: flex; align-items: center; justify-content: center; margin: 0 auto 22px; font-size: 32px; }
.recap { text-align: left; background: #fff; border: 1px solid rgba(28,28,25,0.08); border-radius: 14px; padding: 18px; font-size: 14px; line-height: 1.7; margin-top: 8px; }
.recap .cap { opacity: 0.5; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
.again { margin-top: 26px; background: none; border: none; color: #1f3d2b; font-size: 15px; font-weight: 600; cursor: pointer; }
.err { color: #8a2a1f; font-size: 14px; margin-top: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <svg width="42" height="42" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="21" stroke="#1f3d2b" stroke-width="1.5" opacity="0.35" />
      <circle cx="24" cy="24" r="14.5" stroke="#1f3d2b" stroke-width="1.5" opacity="0.6" />
      <circle cx="24" cy="24" r="8" stroke="#1f3d2b" stroke-width="1.5" opacity="0.85" />
      <circle cx="24" cy="24" r="2.5" fill="#1f3d2b" />
    </svg>
    <div>
      <div class="brand">Ringwood</div>
      <div class="sub">Workplace operations</div>
    </div>
  </header>

  <div class="site"><span>Site</span><strong>Pilot Sandbox</strong></div>

  <div id="form">
    <h1>Submit a ticket</h1>
    <p class="lead">Take a photo of the issue. Tell us where it is. We take it from there.</p>

    <input id="file" type="file" accept="image/*" capture="environment" class="hidden" />
    <button id="photoBtn" class="photoBtn" type="button">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#1f3d2b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      <span>Take a photo</span>
    </button>
    <div id="preview" class="preview hidden">
      <img id="previewImg" alt="issue" />
      <button id="retake" class="retake" type="button">Retake</button>
    </div>
    <p id="photoNote" class="photoNote"></p>

    <div class="field">
      <label>Where is it?</label>
      <input id="location" type="text" placeholder="e.g. Conference Room 1, kitchen" />
    </div>

    <div class="field">
      <label>What kind of issue?</label>
      <select id="category"><option value="">Loading...</option></select>
    </div>

    <div class="field">
      <label>Anything we should know? <span style="opacity:0.45;font-weight:400">(optional)</span></label>
      <textarea id="note" rows="3" placeholder="A line or two of detail helps us route it faster."></textarea>
    </div>

    <button id="submit" class="submit" type="button" disabled>Submit ticket</button>
    <div id="err" class="err hidden"></div>
  </div>

  <div id="done" class="done hidden">
    <div class="check">&#10003;</div>
    <h1>Got it. We are on it.</h1>
    <p class="lead">Your ticket reference is <strong id="ref" style="color:#1f3d2b"></strong>. We will follow up here.</p>
    <div class="recap">
      <div class="cap">What we captured</div>
      <div id="recapBody"></div>
    </div>
    <button id="again" class="again" type="button">Submit another</button>
  </div>
</div>

<script>
var photoBase64 = null;
var photoType = "image/jpeg";
var photoReq = {};

var fileInput = document.getElementById("file");
var photoBtn = document.getElementById("photoBtn");
var photoNote = document.getElementById("photoNote");
var preview = document.getElementById("preview");
var previewImg = document.getElementById("previewImg");
var retake = document.getElementById("retake");
var locationEl = document.getElementById("location");
var categoryEl = document.getElementById("category");
var noteEl = document.getElementById("note");
var submitBtn = document.getElementById("submit");
var errEl = document.getElementById("err");
var formEl = document.getElementById("form");
var doneEl = document.getElementById("done");

function needsPhoto() {
  return !!photoReq[categoryEl.value];
}

function updatePhotoNote() {
  if (!categoryEl.value) { photoNote.textContent = ""; return; }
  if (needsPhoto()) {
    photoNote.textContent = photoBase64 ? "" : "A photo is needed for this kind of issue.";
  } else {
    photoNote.textContent = "Photo optional for this kind of issue.";
  }
}

function refresh() {
  var ok = locationEl.value.trim() && categoryEl.value && (needsPhoto() ? photoBase64 : true);
  submitBtn.disabled = !ok;
  updatePhotoNote();
}

fetch("/api/categories").then(function (r) { return r.json(); }).then(function (list) {
  categoryEl.innerHTML = "<option value=''>Choose one</option>";
  for (var i = 0; i < list.length; i++) {
    var item = list[i];
    photoReq[item.name] = item.photoRequired;
    var o = document.createElement("option");
    o.value = item.name; o.textContent = item.name;
    categoryEl.appendChild(o);
  }
}).catch(function () {
  categoryEl.innerHTML = "<option value=''>Could not load</option>";
});

photoBtn.addEventListener("click", function () { fileInput.click(); });
retake.addEventListener("click", function () { fileInput.click(); });

fileInput.addEventListener("change", function (e) {
  var file = e.target.files && e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function (ev) {
    var img = new Image();
    img.onload = function () {
      var max = 1600;
      var w = img.width, h = img.height;
      if (w > max || h > max) {
        if (w > h) { h = Math.round(h * max / w); w = max; }
        else { w = Math.round(w * max / h); h = max; }
      }
      var canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      var dataUrl = canvas.toDataURL("image/jpeg", 0.8);
      photoType = "image/jpeg";
      photoBase64 = dataUrl.split(",")[1];
      previewImg.src = dataUrl;
      preview.classList.remove("hidden");
      photoBtn.classList.add("hidden");
      refresh();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

locationEl.addEventListener("input", refresh);
categoryEl.addEventListener("change", refresh);

submitBtn.addEventListener("click", function () {
  submitBtn.disabled = true;
  submitBtn.textContent = "Submitting...";
  errEl.classList.add("hidden");
  fetch("/api/tickets", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      category: categoryEl.value,
      location: locationEl.value,
      note: noteEl.value,
      photoBase64: photoBase64,
      photoContentType: photoType,
      photoFilename: "ticket.jpg"
    })
  }).then(function (r) { return r.json(); }).then(function (res) {
    if (res.ok) {
      document.getElementById("ref").textContent = res.ref;
      var rb = "<div><strong>Site.</strong> Pilot Sandbox</div>" +
        "<div><strong>Location.</strong> " + escapeHtml(locationEl.value) + "</div>" +
        "<div><strong>Issue.</strong> " + escapeHtml(categoryEl.value) + "</div>";
      if (noteEl.value.trim()) rb += "<div><strong>Note.</strong> " + escapeHtml(noteEl.value) + "</div>";
      document.getElementById("recapBody").innerHTML = rb;
      formEl.classList.add("hidden");
      doneEl.classList.remove("hidden");
    } else {
      errEl.textContent = "Something went wrong. Please try again.";
      errEl.classList.remove("hidden");
      submitBtn.disabled = false;
      submitBtn.textContent = "Submit ticket";
    }
  }).catch(function () {
    errEl.textContent = "Network error. Please try again.";
    errEl.classList.remove("hidden");
    submitBtn.disabled = false;
    submitBtn.textContent = "Submit ticket";
  });
});

document.getElementById("again").addEventListener("click", function () {
  photoBase64 = null;
  fileInput.value = "";
  locationEl.value = "";
  categoryEl.value = "";
  noteEl.value = "";
  preview.classList.add("hidden");
  photoBtn.classList.remove("hidden");
  submitBtn.textContent = "Submit ticket";
  doneEl.classList.add("hidden");
  formEl.classList.remove("hidden");
  refresh();
});

function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
</script>
</body>
</html>
