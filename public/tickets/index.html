<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1f3d2b" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Submit Ticket" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<title>Ringwood · Submit a ticket</title>
<meta name="description" content="Report something that needs attention. Take a photo, tell us where it is, and we take it from there." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="/jsQR.js"></script>
<style>
  :root{
    --bg:#f4efe4;--bg-2:#efe8d8;--ink:#23282a;--muted:#5f5d52;
    --green:#2f5d50;--green-deep:#21443a;--clay:#a9633a;--line:rgba(35,40,42,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:"Hanken Grotesk",-apple-system,sans-serif;font-size:18px;line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:600px;margin:0 auto;padding:0 22px}
  h1{font-family:"Spectral",Georgia,serif;font-weight:500;line-height:1.08;letter-spacing:-.01em;color:var(--green-deep)}
  a{color:inherit}
  header{padding:24px 0}
  .bar{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:11px;font-family:"Spectral",serif;font-size:1.25rem;font-weight:600;color:var(--green-deep)}
  .back{font-size:.92rem;text-decoration:none;color:var(--green-deep);border-bottom:1px solid var(--clay);padding-bottom:1px}
  .intro{margin:18px 0 24px}
  .eyebrow{font-size:.82rem;letter-spacing:.18em;text-transform:uppercase;color:var(--clay);font-weight:600;margin-bottom:14px}
  .intro h1{font-size:clamp(2.2rem,7vw,3rem)}
  .intro p{margin-top:14px;color:var(--muted);font-size:1.08rem;max-width:46ch}

  form{background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:24px 20px 26px;margin-bottom:40px}
  .field{margin-bottom:18px}
  label{display:block;font-weight:600;font-size:.96rem;color:var(--green-deep);margin-bottom:7px}
  .req{color:var(--clay)}
  .hint{font-weight:400;color:var(--muted);font-size:.86rem}
  input,select,textarea{
    width:100%;font:inherit;font-size:1.02rem;color:var(--ink);
    background:var(--bg);border:1px solid var(--line);border-radius:4px;
    padding:13px 14px;-webkit-appearance:none;appearance:none;
  }
  select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' fill='none' stroke='%235f5d52' stroke-width='1.6'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:38px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green)}
  textarea{min-height:90px;resize:vertical}

  .photoBtn{display:flex;flex-direction:column;align-items:center;gap:11px;padding:34px 20px;width:100%;background:var(--bg);border:1.5px dashed rgba(47,93,80,.4);border-radius:6px;color:var(--green-deep);font:inherit;font-size:1rem;font-weight:600;cursor:pointer}
  .photoNote{font-size:.86rem;color:var(--muted);margin:8px 0 0;min-height:18px}
  .preview{position:relative;margin-top:4px}
  .preview img{width:100%;border-radius:6px;display:block;max-height:280px;object-fit:cover}
  .retake{position:absolute;bottom:12px;right:12px;background:rgba(33,68,58,.82);color:#f4efe4;border:none;border-radius:5px;padding:8px 13px;font-size:.85rem;font-weight:600;cursor:pointer}

  .btn{width:100%;background:var(--green);color:#f6f2e8;border:none;cursor:pointer;font-weight:600;font-size:1.05rem;padding:16px;border-radius:4px;transition:background .2s}
  .btn:hover{background:var(--green-deep)}
  .btn:disabled{opacity:.6;cursor:default}
  .msg{margin-top:16px;padding:14px 16px;border-radius:4px;font-size:.98rem;display:none}
  .msg.err{display:block;background:#f4e2d8;color:#8a3d1c;border:1px solid rgba(169,99,58,.35)}

  .done{display:none;text-align:center;padding:30px 10px 50px}
  .done .check{width:62px;height:62px;border-radius:50%;background:var(--green-deep);color:#f4efe4;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:30px}
  .done h2{font-family:"Spectral",serif;font-weight:500;font-size:1.8rem;color:var(--green-deep);margin-bottom:8px}
  .done p{color:var(--muted)}
  .recap{text-align:left;background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:18px;font-size:.96rem;line-height:1.7;margin:20px 0 4px;max-width:420px;margin-left:auto;margin-right:auto}
  .recap .cap{color:var(--clay);font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px}
  .again{margin-top:24px;background:none;border:none;color:var(--green-deep);font-size:1rem;font-weight:600;cursor:pointer;text-decoration:underline;text-decoration-color:var(--clay)}
  .hidden{display:none}
</style>
</head>
<body>

<header>
  <div class="wrap bar">
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 26 26" aria-hidden="true">
        <g fill="none" stroke="#2f5d50" stroke-width="1.4">
          <circle cx="13" cy="13" r="3"/><circle cx="13" cy="13" r="7"/><circle cx="13" cy="13" r="11"/>
        </g>
      </svg>
      Ringwood
    </div>
    <a class="back" href="/app">Home</a>
  </div>
</header>

<main class="wrap">
  <div class="intro" id="intro">
    <div class="eyebrow">Submit a ticket</div>
    <h1>Something need attention?</h1>
    <p>Take a photo of the issue, tell us where it is, and we take it from there. You will get a reference number to track it.</p>
  </div>

  <form id="ticketForm">
    <div class="field">
      <label for="client">Client <span class="req">*</span></label>
      <select id="client">
        <option value="">Loading clients…</option>
      </select>
      <div id="addClientRow" style="display:none;margin-top:10px">
        <input id="newClient" type="text" autocomplete="off" placeholder="New client name" />
        <div style="display:flex;gap:8px;margin-top:8px">
          <button type="button" id="addClientBtn" style="background:var(--green);color:#f6f2e8;border:none;border-radius:4px;padding:11px 18px;font-weight:600;cursor:pointer">Add client</button>
          <button type="button" id="cancelClientBtn" style="background:transparent;color:var(--green-deep);border:1px solid var(--line);border-radius:4px;padding:11px 18px;font-weight:600;cursor:pointer">Cancel</button>
        </div>
        <div id="addClientMsg" style="color:#8a3d1c;font-size:.86rem;margin-top:6px"></div>
      </div>
    </div>

    <div class="field">
      <label>Photos <span class="hint" id="photoReqLabel">— optional, add as many as help</span></label>
      <input id="file" type="file" accept="image/*" capture="environment" multiple class="hidden" />
      <button id="photoBtn" class="photoBtn" type="button">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2f5d50" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <span>Add photos</span>
      </button>
      <div id="thumbs" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px"></div>
      <p id="photoNote" class="photoNote"></p>
    </div>

    <div class="field">
      <label for="category">What kind of work? <span class="req">*</span></label>
      <select id="category"><option value="">Loading…</option></select>
    </div>

    <div class="field">
      <label for="note">Description — anything we should know? <span class="req">*</span></label>
      <textarea id="note" rows="4" style="min-height:120px" placeholder="A line or two of detail helps us route it faster."></textarea>
      <button type="button" id="suggestBtn" style="margin-top:9px;background:transparent;border:1px solid var(--clay);color:var(--clay);border-radius:999px;padding:8px 15px;font:inherit;font-size:.88rem;font-weight:600;cursor:pointer">✨ Suggest with AI</button>
      <div id="suggestMsg" class="photoNote" style="margin-top:7px"></div>
    </div>

    <div class="field">
      <label for="location">Where is it? <span class="hint">— optional</span></label>
      <select id="location"><option value="">Loading…</option></select>
      <div id="addLocRow" style="display:none;margin-top:10px">
        <input id="newLoc" type="text" autocomplete="off" placeholder="New location" />
        <div style="display:flex;gap:8px;margin-top:8px">
          <button type="button" id="addLocBtn" style="background:var(--green);color:#f6f2e8;border:none;border-radius:4px;padding:11px 18px;font-weight:600;cursor:pointer">Add</button>
          <button type="button" id="cancelLocBtn" style="background:transparent;color:var(--green-deep);border:1px solid var(--line);border-radius:4px;padding:11px 18px;font-weight:600;cursor:pointer">Cancel</button>
        </div>
        <div id="addLocMsg" style="color:#8a3d1c;font-size:.86rem;margin-top:6px"></div>
      </div>
    </div>

    <div class="field">
      <label for="asset">Asset <span class="hint">— optional, the equipment this is about</span></label>
      <select id="asset"><option value="">— None —</option></select>
      <div id="newAssetRow" style="display:none;margin-top:10px">
        <input id="newAssetName" type="text" autocomplete="off" placeholder="New asset name (e.g. Lobby TV)" />
      </div>
      <div id="assetAutoNote" style="font-size:.85rem;color:var(--green-deep);font-weight:600;margin-top:8px"></div>
    </div>

    <button class="btn" type="submit" id="submitBtn" disabled>Submit ticket</button>
    <div class="msg" id="msg"></div>
  </form>

  <div class="done" id="done">
    <div class="check">&#10003;</div>
    <h2>Got it. We are on it.</h2>
    <p>Your ticket reference is <strong id="ref" style="color:var(--green-deep)"></strong>. We will follow up here.</p>
    <div class="recap">
      <div class="cap">What we captured</div>
      <div id="recapBody"></div>
    </div>
    <div id="detectNote" style="display:none;margin:14px 0;font-size:.95rem;color:var(--green-deep);font-weight:600"></div>
    <button class="again" id="again" type="button">Submit another</button>
  </div>
</main>

<script>
var photos = [];
var photoReq = {};

var clientEl = document.getElementById("client");
// A client login is always its own client: lock the field to that and hide it.
var CLIENT_LOCK = null;
fetch("/api/whoami").then(function(r){return r.json();}).then(function(w){
  if (w && w.ok && w.role === "client" && w.client){
    CLIENT_LOCK = w.client;
    clientEl.innerHTML = "<option>" + w.client.replace(/</g,"&lt;") + "</option>";
    clientEl.value = w.client;
    var f = clientEl.closest(".field"); if (f) f.style.display = "none";
    var acr = document.getElementById("addClientRow"); if (acr) acr.style.display = "none";
    if (typeof refresh === "function") refresh();
  }
}).catch(function(){});
var fileInput = document.getElementById("file");
var photoBtn = document.getElementById("photoBtn");
var photoNote = document.getElementById("photoNote");
var photoReqLabel = document.getElementById("photoReqLabel");
var thumbsEl = document.getElementById("thumbs");
var locationEl = document.getElementById("location");
var categoryEl = document.getElementById("category");
var noteEl = document.getElementById("note");
var submitBtn = document.getElementById("submitBtn");
var msg = document.getElementById("msg");
var form = document.getElementById("ticketForm");

function clientValue() {
  if (CLIENT_LOCK) return CLIENT_LOCK;
  return clientEl.value === "__add" ? "" : clientEl.value;
}
function locationValue() {
  return locationEl.value === "__add" ? "" : locationEl.value;
}
function needsPhoto() { return !!photoReq[categoryEl.value]; }

function updatePhotoNote() {
  if (!categoryEl.value) { photoNote.textContent = ""; photoReqLabel.textContent = "— optional"; return; }
  if (needsPhoto()) {
    photoReqLabel.innerHTML = "<span class='req'>*</span> required";
    photoNote.textContent = photos.length ? "" : "A photo is needed for this kind of work.";
  } else {
    photoReqLabel.textContent = "— optional";
    photoNote.textContent = "";
  }
}

function refresh() {
  var ok = clientValue() && categoryEl.value && noteEl.value.trim() && (needsPhoto() ? photos.length : true);
  submitBtn.disabled = !ok;
  updatePhotoNote();
}

fetch("/api/categories", { cache: "no-store" }).then(function (r) { return r.json(); }).then(function (list) {
  categoryEl.innerHTML = "<option value=''>Choose one</option>";
  for (var i = 0; i < list.length; i++) {
    var item = list[i];
    photoReq[item.name] = item.photoRequired;
    var o = document.createElement("option");
    o.value = item.name; o.textContent = item.name;
    categoryEl.appendChild(o);
  }
}).catch(function () {
  categoryEl.innerHTML = "<option value=''>Could not load</option>";
});

// Clients come only from the Clients table (one source), via /api/options.
// The menu also offers "＋ Add a client" so new clients are created here, not
// in Airtable.
var ADD_CLIENT = "<option value='__add'>＋ Add a client…</option>";
// Resilient client list: render instantly from the last good list cached in
// this browser (or built-in seeds), then refresh live with retries and update
// the cache. A ~6h timer keeps the cached fallback fresh on its own.
var SEED_CLIENTS = [];
var CACHE_KEY = "rw_lists_v3";
function readClientsCache() {
  try { var c = JSON.parse(localStorage.getItem(CACHE_KEY) || "null"); return (c && c.data && c.data.clients && c.data.clients.length) ? c.data.clients : null; } catch (e) { return null; }
}
function writeClientsCache(clients) {
  try { var c = JSON.parse(localStorage.getItem(CACHE_KEY) || "null") || {}; c.t = Date.now(); c.data = c.data || {}; c.data.clients = clients; localStorage.setItem(CACHE_KEY, JSON.stringify(c)); } catch (e) {}
}
function renderClients(clients) {
  if (CLIENT_LOCK) return; // client login: field is locked and hidden
  var html = "<option value=''>" + (clients && clients.length ? "Select…" : "No clients yet") + "</option>";
  (clients || []).forEach(function (c) { html += "<option>" + c.replace(/</g, "&lt;") + "</option>"; });
  clientEl.innerHTML = html + ADD_CLIENT;
}
// Location uses the same Locations master as the asset form.
var ADD_LOC = "<option value='__add'>＋ Add a location…</option>";
function renderLocations(locs) {
  if (!locs || !locs.length) return;
  var keep = locationEl.value;
  var html = "<option value=''>Select…</option>";
  locs.forEach(function (l) { html += "<option>" + l.replace(/</g, "&lt;") + "</option>"; });
  locationEl.innerHTML = html + ADD_LOC;
  if (keep && keep !== "__add") locationEl.value = keep;
}
renderClients(readClientsCache() || SEED_CLIENTS);
function loadClients(tries) {
  tries = tries || 0;
  fetch("/api/options", { cache: "no-store" }).then(function (r) { return r.json(); }).then(function (o) {
    var clients = (o && o.clients) || [];
    if (o && o.locations) renderLocations(o.locations);
    if (!clients.length && tries < 2) { setTimeout(function () { loadClients(tries + 1); }, 2500); return; }
    if (clients.length) { renderClients(clients); writeClientsCache(clients); if (typeof applyPreselect === "function") applyPreselect(); }
  }).catch(function () { if (tries < 2) { setTimeout(function () { loadClients(tries + 1); }, 2500); } });
}
loadClients();
setInterval(function () { loadClients(); }, 6 * 3600 * 1000);

// ---- optional asset link: pick an existing asset, make a new one, or none ----
var assetEl = document.getElementById("asset");
var newAssetRow = document.getElementById("newAssetRow");
var newAssetNameEl = document.getElementById("newAssetName");
var ALL_ASSETS = [];
function renderAssetOptions() {
  var client = clientValue();
  var keep = assetEl.value;
  var arr = ALL_ASSETS.filter(function (a) { return !client || a.client === client; });
  arr.sort(function (a, b) { return (a.name || "").toLowerCase().localeCompare((b.name || "").toLowerCase()); });
  var html = "<option value=''>— None —</option>";
  arr.forEach(function (a) { html += "<option value='" + a.id + "'>" + (a.name || "Asset").replace(/</g, "&lt;") + "</option>"; });
  html += "<option value='__new'>＋ New asset…</option>";
  assetEl.innerHTML = html;
  if (keep) assetEl.value = keep;
}
function loadAssets() {
  fetch("/api/assets/list").then(function (r) { return r.json(); }).then(function (list) {
    ALL_ASSETS = Array.isArray(list) ? list : [];
    renderAssetOptions();
    applyPreselect();
  }).catch(function () {});
}
loadAssets();
// Coming from an asset page ("New ticket"): pre-select that asset (and its client).
var PRESELECT_ASSET = new URLSearchParams(location.search).get("asset") || "";
function applyPreselect() {
  if (!PRESELECT_ASSET) return;
  var a = ALL_ASSETS.filter(function (x) { return x.id === PRESELECT_ASSET; })[0];
  if (!a) return;
  if (a.client && !CLIENT_LOCK) {
    for (var i = 0; i < clientEl.options.length; i++) { if (clientEl.options[i].text === a.client || clientEl.options[i].value === a.client) { clientEl.value = a.client; break; } }
  }
  renderAssetOptions();
  assetEl.value = PRESELECT_ASSET;
  refresh();
}
assetEl.addEventListener("change", function () {
  newAssetRow.style.display = assetEl.value === "__new" ? "block" : "none";
  if (assetEl.value === "__new") newAssetNameEl.focus();
  document.getElementById("assetAutoNote").textContent = "";
});
function assetValue() {
  if (assetEl.value === "__new") { var n = newAssetNameEl.value.trim(); return n ? { newAssetName: n } : {}; }
  return assetEl.value ? { assetId: assetEl.value } : {};
}

// ---- scan a QR in a ticket photo and auto-link the asset (instant, no wait) ----
function decodeQR(file) {
  return new Promise(function (resolve) {
    if (!window.jsQR) { resolve(null); return; }
    var img = new Image(), url = URL.createObjectURL(file);
    img.onload = function () {
      var max = 1100, w = img.width, h = img.height, s = Math.min(1, max / Math.max(w, h));
      w = Math.round(w * s); h = Math.round(h * s);
      var c = document.createElement("canvas"); c.width = w; c.height = h;
      var ctx = c.getContext("2d"); ctx.drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      try { var r = window.jsQR(ctx.getImageData(0, 0, w, h).data, w, h); resolve(r && r.data ? r.data : null); }
      catch (e) { resolve(null); }
    };
    img.onerror = function () { URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}
function assetFromQR(value) {
  if (!value) return null;
  var m = value.match(/[?&]id=([0-9a-f-]{12,})/i) || value.match(/\/a\/([0-9a-f-]{12,})/i);
  var id = m ? m[1] : value.trim();
  var byId = ALL_ASSETS.filter(function (a) { return a.id === id; })[0];
  if (byId) return byId;
  var byQr = ALL_ASSETS.filter(function (a) { return a.qr && a.qr.toLowerCase() === value.trim().toLowerCase(); })[0];
  return byQr || null;
}
function tryAutoLinkAsset(file) {
  if (assetEl.value && assetEl.value !== "__new") return; // already chosen
  decodeQR(file).then(function (val) {
    if (!val) return;
    var a = assetFromQR(val);
    if (!a) return;
    if (a.client && !CLIENT_LOCK) { for (var i = 0; i < clientEl.options.length; i++) { if (clientEl.options[i].text === a.client) { clientEl.value = a.client; break; } } renderAssetOptions(); }
    assetEl.value = a.id;
    document.getElementById("assetAutoNote").textContent = "✓ Linked to asset: " + (a.name || "Asset");
    refresh();
  });
}

// ---- add a client without leaving the form ----
var addClientRow = document.getElementById("addClientRow");
var newClient = document.getElementById("newClient");
var addClientBtn = document.getElementById("addClientBtn");
var cancelClientBtn = document.getElementById("cancelClientBtn");
var addClientMsg = document.getElementById("addClientMsg");

clientEl.addEventListener("change", function () {
  if (clientEl.value === "__add") { addClientRow.style.display = "block"; addClientMsg.textContent = ""; newClient.focus(); }
  else { addClientRow.style.display = "none"; }
  if (assetEl.value && assetEl.value !== "__new") assetEl.value = "";  // asset belongs to a client
  renderAssetOptions();
  refresh();
});
cancelClientBtn.addEventListener("click", function () {
  addClientRow.style.display = "none"; newClient.value = ""; addClientMsg.textContent = ""; clientEl.value = ""; refresh();
});
addClientBtn.addEventListener("click", function () {
  var name = newClient.value.trim();
  addClientMsg.textContent = "";
  if (!name) { addClientMsg.textContent = "Enter a client name."; return; }
  addClientBtn.disabled = true; addClientBtn.textContent = "Adding…";
  fetch("/api/clients", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ name: name }) })
    .then(function (r) { return r.json(); }).then(function (d) {
      addClientBtn.disabled = false; addClientBtn.textContent = "Add client";
      if (d && d.ok) {
        var nm = d.name || name, found = false;
        for (var i = 0; i < clientEl.options.length; i++) { if (clientEl.options[i].value === nm) { found = true; break; } }
        if (!found) { var op = document.createElement("option"); op.value = nm; op.textContent = nm; clientEl.insertBefore(op, clientEl.querySelector("option[value='__add']")); }
        clientEl.value = nm;
        newClient.value = ""; addClientRow.style.display = "none"; refresh();
      } else { addClientMsg.textContent = (d && d.error) || "Could not add the client."; }
    }).catch(function () { addClientBtn.disabled = false; addClientBtn.textContent = "Add client"; addClientMsg.textContent = "Couldn't reach the server."; });
});

// ---- location (same Locations master as the asset form), with inline add ----
var addLocRow = document.getElementById("addLocRow");
var newLoc = document.getElementById("newLoc");
var addLocBtn = document.getElementById("addLocBtn");
var cancelLocBtn = document.getElementById("cancelLocBtn");
var addLocMsg = document.getElementById("addLocMsg");
locationEl.addEventListener("change", function () {
  if (locationEl.value === "__add") { addLocRow.style.display = "block"; addLocMsg.textContent = ""; newLoc.focus(); }
  else { addLocRow.style.display = "none"; }
  refresh();
});
cancelLocBtn.addEventListener("click", function () {
  addLocRow.style.display = "none"; newLoc.value = ""; addLocMsg.textContent = ""; locationEl.value = ""; refresh();
});
addLocBtn.addEventListener("click", function () {
  var name = newLoc.value.trim(); addLocMsg.textContent = "";
  if (!name) { addLocMsg.textContent = "Enter a location."; return; }
  addLocBtn.disabled = true; addLocBtn.textContent = "Adding…";
  fetch("/api/picklist", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ list: "Location", value: name }) })
    .then(function (r) { return r.json(); }).then(function (d) {
      addLocBtn.disabled = false; addLocBtn.textContent = "Add";
      if (d && d.ok) {
        var nm = d.value || name, found = false;
        for (var i = 0; i < locationEl.options.length; i++) { if (locationEl.options[i].value === nm) { found = true; break; } }
        if (!found) { var op = document.createElement("option"); op.value = nm; op.textContent = nm; locationEl.insertBefore(op, locationEl.querySelector("option[value='__add']")); }
        locationEl.value = nm; newLoc.value = ""; addLocRow.style.display = "none"; refresh();
      } else { addLocMsg.textContent = (d && d.error) || "Could not add the location."; }
    }).catch(function () { addLocBtn.disabled = false; addLocBtn.textContent = "Add"; addLocMsg.textContent = "Couldn't reach the server."; });
});

photoBtn.addEventListener("click", function () { fileInput.click(); });

function processPhoto(file) {
  return new Promise(function (resolve, reject) {
    var reader = new FileReader();
    reader.onerror = reject;
    reader.onload = function (ev) {
      var img = new Image();
      img.onerror = reject;
      img.onload = function () {
        var max = 1600, w = img.width, h = img.height;
        if (w > max || h > max) { if (w > h) { h = Math.round(h * max / w); w = max; } else { w = Math.round(w * max / h); h = max; } }
        var canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        var dataUrl = canvas.toDataURL("image/jpeg", 0.8);
        resolve({ base64: dataUrl.split(",")[1], contentType: "image/jpeg", preview: dataUrl });
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}
function renderThumbs() {
  thumbsEl.innerHTML = photos.map(function (p, i) {
    return "<div style='position:relative'>" +
      "<img class='zoomable' src='" + p.preview + "' style='width:74px;height:74px;object-fit:cover;border-radius:6px;border:1px solid var(--line)' />" +
      "<button type='button' onclick='removePhoto(" + i + ")' style='position:absolute;top:-7px;right:-8px;width:28px;height:28px;border-radius:50%;background:#23282a;color:#fff;border:none;font-size:13px;line-height:1;cursor:pointer'>×</button>" +
      "</div>";
  }).join("");
}
window.removePhoto = function (i) { photos.splice(i, 1); renderThumbs(); refresh(); };
fileInput.addEventListener("change", function (e) {
  var files = Array.prototype.slice.call(e.target.files || []);
  files.forEach(function (file) {
    processPhoto(file).then(function (res) { photos.push(res); renderThumbs(); refresh(); }).catch(function () {});
    tryAutoLinkAsset(file); // if it's a QR, link the asset instantly
  });
  e.target.value = "";
});

noteEl.addEventListener("input", refresh);
categoryEl.addEventListener("change", refresh);

// ---- AI assist: draft the description + suggest a category from photo/notes ----
var suggestBtn = document.getElementById("suggestBtn");
var suggestMsg = document.getElementById("suggestMsg");
suggestBtn.addEventListener("click", function () {
  if (!photos.length && !noteEl.value.trim()) { suggestMsg.textContent = "Add a photo or a few words first."; return; }
  suggestBtn.disabled = true; suggestBtn.textContent = "Thinking…"; suggestMsg.textContent = "";
  fetch("/api/tickets/suggest", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ note: noteEl.value, photos: photos.map(function (p) { return { base64: p.base64, contentType: p.contentType }; }) }) })
    .then(function (r) { return r.json(); }).then(function (d) {
      suggestBtn.disabled = false; suggestBtn.textContent = "✨ Suggest with AI";
      if (d && d.ok) {
        if (d.description) noteEl.value = d.description;
        if (d.category) { for (var i = 0; i < categoryEl.options.length; i++) { if (categoryEl.options[i].value === d.category) { categoryEl.value = d.category; break; } } }
        suggestMsg.textContent = "Drafted by Claude — edit anything that's off.";
        refresh();
      } else { suggestMsg.textContent = (d && d.error) || "Couldn't get a suggestion."; }
    }).catch(function () { suggestBtn.disabled = false; suggestBtn.textContent = "✨ Suggest with AI"; suggestMsg.textContent = "Couldn't reach the assistant."; });
});

form.addEventListener("submit", function (e) {
  e.preventDefault();
  submitBtn.disabled = true;
  submitBtn.textContent = "Submitting…";
  msg.className = "msg";
  var payload = {
    client: clientValue(),
    category: categoryEl.value,
    location: locationValue(),
    note: noteEl.value,
    photos: photos.map(function (p) { return { base64: p.base64, contentType: p.contentType }; })
  };
  var av = assetValue();
  if (av.assetId) payload.assetId = av.assetId;
  if (av.newAssetName) payload.newAssetName = av.newAssetName;
  fetch("/api/tickets", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  }).then(function (r) { return r.json(); }).then(function (res) {
    if (res.ok) {
      document.getElementById("ref").textContent = res.ref;
      var rb = (res.title ? "<div><strong>Title.</strong> " + escapeHtml(res.title) + "</div>" : "") +
        "<div><strong>Client.</strong> " + escapeHtml(clientValue()) + "</div>" +
        "<div><strong>Work.</strong> " + escapeHtml(categoryEl.value) + "</div>";
      if (locationValue()) rb += "<div><strong>Location.</strong> " + escapeHtml(locationValue()) + "</div>";
      if (noteEl.value.trim()) rb += "<div><strong>Note.</strong> " + escapeHtml(noteEl.value) + "</div>";
      if (res.photoCount) {
        var saved = res.savedPhotos != null ? res.savedPhotos : res.photoCount;
        rb += "<div><strong>Photos.</strong> " + saved + " of " + res.photoCount + " saved" +
          (saved < res.photoCount ? " <span style='color:#8a3d1c'>(some didn't upload — reopen the ticket to add them again)</span>" : "") + "</div>";
      }
      document.getElementById("recapBody").innerHTML = rb;
      document.getElementById("intro").style.display = "none";
      form.style.display = "none";
      document.getElementById("done").style.display = "block";
      window.scrollTo(0, 0);
      if (res.detecting && res.id) watchEquipment(res.id);
    } else {
      msg.className = "msg err"; msg.textContent = "Something went wrong. Please try again.";
      submitBtn.disabled = false; submitBtn.textContent = "Submit ticket";
    }
  }).catch(function () {
    msg.className = "msg err"; msg.textContent = "Network error. Please try again.";
    submitBtn.disabled = false; submitBtn.textContent = "Submit ticket";
  });
});

document.getElementById("again").addEventListener("click", function () {
  photos = [];
  thumbsEl.innerHTML = "";
  fileInput.value = "";
  clientEl.value = "";
  locationEl.value = ""; categoryEl.value = ""; noteEl.value = "";
  addLocRow.style.display = "none"; newLoc.value = "";
  assetEl.value = ""; newAssetRow.style.display = "none"; newAssetNameEl.value = ""; renderAssetOptions();
  document.getElementById("assetAutoNote").textContent = "";
  submitBtn.textContent = "Submit ticket";
  document.getElementById("done").style.display = "none";
  document.getElementById("intro").style.display = "block";
  form.style.display = "block";
  refresh();
});

function escapeHtml(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// After submit, show "Identifying equipment…" and update once the agent links an asset.
function watchEquipment(ticketId) {
  var note = document.getElementById("detectNote");
  note.style.display = "block";
  note.textContent = "Identifying equipment…";
  var tries = 0;
  var timer = setInterval(function () {
    tries++;
    fetch("/api/tickets/asset?id=" + encodeURIComponent(ticketId)).then(function (r) { return r.json(); }).then(function (d) {
      if (d && d.ok && d.assetId) {
        clearInterval(timer);
        note.innerHTML = "✓ Identified equipment: <a href='/a/?id=" + encodeURIComponent(d.assetId) + "' style='color:var(--green-deep)'>" + escapeHtml(d.asset || "asset") + "</a>";
      } else if (tries >= 12) {
        clearInterval(timer);
        note.style.display = "none";
      }
    }).catch(function () { if (tries >= 12) { clearInterval(timer); note.style.display = "none"; } });
  }, 2500);
}
