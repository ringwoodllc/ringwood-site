<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1f3d2b" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ticket Status" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<title>Ringwood · Ticket status</title>
<meta name="description" content="See and manage tickets by client. Open, close, or archive." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="/client-color.js"></script>
<style>
  :root{
    --bg:#f4efe4;--bg-2:#efe8d8;--ink:#23282a;--muted:#5f5d52;
    --green:#2f5d50;--green-deep:#21443a;--clay:#a9633a;--line:rgba(35,40,42,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:"Hanken Grotesk",-apple-system,sans-serif;font-size:18px;line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:640px;margin:0 auto;padding:0 22px}
  h1,h2,h3{font-family:"Spectral",Georgia,serif;font-weight:500;line-height:1.1;letter-spacing:-.01em;color:var(--green-deep)}
  a{color:inherit}
  header{padding:24px 0}
  .bar{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:11px;font-family:"Spectral",serif;font-size:1.25rem;font-weight:600;color:var(--green-deep)}
  .back{font-size:.92rem;text-decoration:none;color:var(--green-deep);border-bottom:1px solid var(--clay);padding-bottom:1px}
  .intro{margin:18px 0 22px}
  .eyebrow{font-size:.8rem;letter-spacing:.18em;text-transform:uppercase;color:var(--clay);font-weight:600;margin-bottom:12px}
  .intro h1{font-size:clamp(2rem,7vw,2.7rem)}
  .intro p{margin-top:10px;color:var(--muted);font-size:1.04rem}

  .field{margin-bottom:16px}
  .frow{display:flex;gap:12px;flex-wrap:wrap}
  .frow>.field{flex:1;min-width:150px}
  label{display:block;font-weight:600;font-size:.96rem;color:var(--green-deep);margin-bottom:7px}
  input,select,textarea{width:100%;font:inherit;font-size:1.02rem;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:4px;padding:13px 14px;-webkit-appearance:none;appearance:none}
  select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' fill='none' stroke='%235f5d52' stroke-width='1.6'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:38px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green)}
  textarea{min-height:90px;resize:vertical}

  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:4px 0 14px}
  #filters{margin:8px 0 4px}
  .schips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .schip{display:inline-flex;align-items:center;gap:7px;background:var(--bg-2);border:1px solid var(--line);border-radius:999px;padding:9px 14px;font:inherit;font-size:.9rem;font-weight:600;color:var(--green-deep);cursor:pointer}
  .schip:hover{border-color:var(--green)}
  .schip b{background:var(--line);color:var(--muted);border-radius:999px;padding:1px 8px;font-size:.78rem;min-width:20px;text-align:center}
  .schip.on{background:var(--green);color:#f6f2e8;border-color:var(--green)}
  .schip.on b{background:rgba(255,255,255,.28);color:#f6f2e8}
  .schip.review.on{background:#9a7b12;border-color:#9a7b12}
  .schip .cdot{width:8px;height:8px;border-radius:50%;display:inline-block;flex:0 0 auto}
  .schip.open .cdot{background:#2f5d50}
  .schip.review .cdot{background:#9a7b12}
  .schip.closed .cdot{background:#9a958a}
  .schip.all .cdot{background:transparent;border:1.5px solid var(--muted)}
  .schip.on .cdot{background:#f6f2e8;border-color:#f6f2e8}
  .filterbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
  .filterbar .mini{flex:0 1 auto;width:auto;min-width:150px;padding:9px 12px;font-size:.9rem}
  .archk{display:flex;align-items:center;gap:7px;font-size:.9rem;color:var(--muted);font-weight:600;white-space:nowrap;cursor:pointer}
  .archk input[type=checkbox]{-webkit-appearance:checkbox;appearance:auto;width:17px;height:17px;accent-color:var(--green);padding:0;margin:0}
  .archbtn{background:transparent;border:1px solid var(--line);color:var(--green-deep);border-radius:999px;padding:8px 14px;font:inherit;font-size:.86rem;font-weight:600;cursor:pointer}
  .archbtn.on{background:var(--green);color:#f6f2e8;border-color:var(--green)}

  .ticket{background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;gap:12px;align-items:flex-start}
  .ticket:hover{border-color:var(--green)}
  .ticket .body{flex:1;min-width:0}
  .ticket .t-title{font-weight:600;color:var(--green-deep);font-size:1rem;word-break:break-word}
  .ticket .t-meta{color:var(--muted);font-size:.86rem;margin-top:3px}
  .pill{flex:0 0 auto;font-size:.72rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:4px 9px;border-radius:999px;margin-top:2px}
  .pill.p-open{background:#e3efe7;color:var(--green-deep)}
  .pill.p-sched{background:#eadcc4;color:#6b5524}
  .pill.p-prog{background:#dfe9f4;color:#274a73}
  .pill.p-done{background:#e7e2d6;color:#545047}
  .pill.p-arch{background:#f0e0d4;color:#7a4a26}
  .pill.p-review{background:#f6eccf;color:#7a5a12}
  .qbtn.rev{background:var(--green);color:#f6f2e8;border-color:var(--green)}
  .rcol{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .client-chip{font-size:.8rem;font-weight:700;color:#f6f2e8;background:var(--green-deep);padding:4px 11px;border-radius:999px;white-space:nowrap;max-width:130px;overflow:hidden;text-overflow:ellipsis}
  .actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .qbtn{background:var(--bg);border:1px solid var(--line);color:var(--green-deep);border-radius:999px;padding:9px 15px;font:inherit;font-size:.82rem;font-weight:600;cursor:pointer}
  .qbtn:hover{border-color:var(--green)}
  .empty{color:var(--muted);padding:18px 4px}

  .btn{width:100%;background:var(--green);color:#f6f2e8;border:none;cursor:pointer;font-weight:600;font-size:1.05rem;padding:15px;border-radius:4px}
  .btn:hover{background:var(--green-deep)}
  .btn:disabled{opacity:.6;cursor:default}
  .btn.ghost{background:transparent;color:var(--green-deep);border:1px solid var(--line)}
  .panel{background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:20px 18px;margin-bottom:40px}
  .panel h3{font-size:1.2rem;margin-bottom:4px}
  .rev-pill{display:inline-block;font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 10px;border-radius:999px;vertical-align:middle;margin-right:8px}
  .rev-pill.need{background:#f6eccf;color:#7a5a12}
  .rev-pill.ok{background:#e3efe7;color:#21443a}
  .panel .ref{color:var(--muted);font-size:.86rem;margin-bottom:14px}
  .panel img.photo{width:100%;max-height:240px;object-fit:cover;border-radius:6px;border:1px solid var(--line);margin-bottom:14px}
  .row2{display:flex;gap:10px;margin-top:6px}
  .row2 .btn{padding:13px}
  .msg{margin-top:12px;font-size:.92rem;color:#8a3d1c}

  /* Per-ticket update log */
  .logsec{border-top:1px solid var(--line);margin:22px 0 6px;padding-top:18px}
  .logsec h4{font-family:"Spectral",serif;font-weight:600;font-size:1.06rem;color:var(--green-deep);margin-bottom:12px}
  .log{display:flex;flex-direction:column;gap:12px;margin-bottom:14px}
  .lg{display:flex;flex-direction:column;gap:3px}
  .lg .lghead{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .lg .who{font-weight:700;font-size:.84rem;color:#f6f2e8;background:var(--green-deep);padding:2px 10px;border-radius:999px}
  .lg .meta{font-size:.78rem;color:var(--muted)}
  .lgctrl{margin-left:auto;display:flex;gap:6px}
  .lgbtn{background:var(--bg);border:1px solid var(--line);color:var(--green-deep);border-radius:999px;padding:3px 11px;font:inherit;font-size:.78rem;font-weight:600;cursor:pointer}
  .lgbtn:hover{border-color:var(--green)}
  .lgbtn.del{color:#8a3d1c}
  .navbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin:4px 0 14px}
  .navbar .back{margin:0}
  .navrt{display:flex;align-items:center;gap:8px}
  .navb{background:var(--bg-2);border:1px solid var(--line);color:var(--green-deep);border-radius:999px;padding:6px 13px;font:inherit;font-size:.85rem;font-weight:600;cursor:pointer}
  .navb:hover{border-color:var(--green)}
  .navb:disabled{opacity:.4;cursor:default}
  .navpos{color:var(--muted);font-size:.82rem;min-width:54px;text-align:center}
  .navside{display:none}
  @media(min-width:900px){
    .navside{display:flex;align-items:center;justify-content:center;position:fixed;top:50%;transform:translateY(-50%);width:46px;height:80px;border:1px solid var(--line);background:var(--bg-2);color:var(--green-deep);font-size:2rem;line-height:1;cursor:pointer;z-index:50;border-radius:10px;box-shadow:0 4px 14px rgba(0,0,0,.08)}
    .navside:hover{border-color:var(--green);background:var(--bg)}
    .navside:disabled{opacity:.3;cursor:default}
    .navside.left{left:max(12px, calc(50% - 560px))}
    .navside.right{right:max(12px, calc(50% - 560px))}
  }
  /* Mobile walkthrough bar: Prev, add-photo, Next, always reachable while you
     scroll a long ticket. Mirrors the desktop side arrows (hidden under 900px). */
  .qnav{display:none}
  @media(max-width:899px){
    .qnav{display:flex;align-items:center;gap:12px;position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:60;background:var(--bg-2);border:1px solid var(--line);border-radius:999px;padding:7px 10px;box-shadow:0 6px 20px rgba(0,0,0,.18)}
    .qnavb{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:50%;border:1px solid var(--line);background:var(--bg);color:var(--green-deep);font-size:1.6rem;line-height:1;cursor:pointer}
    .qnavb:disabled{opacity:.3;cursor:default}
    .qnavb.qphoto{background:var(--green);color:#f6f2e8;border-color:var(--green);font-size:1.3rem}
    .panel{padding-bottom:84px}
  }
  .lblrow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:7px}
  /* Description shown as plain read-only text (like the asset view), clamped when
     long. It only becomes an editable box after you tap Edit. */
  .descview{white-space:pre-wrap;font-size:.95rem;line-height:1.55;color:var(--ink);margin:2px 0;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
  .descview.expanded{-webkit-line-clamp:unset;overflow:visible}
  .descmore{display:inline-block;font-size:.85rem;color:var(--green-deep);border-bottom:1px solid var(--clay);margin:0 0 8px;cursor:pointer}
  /* The ticket's read card: quiet, like the asset identity card. */
  .tkcard{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:13px 15px;margin:10px 0 14px}
  .tkcard-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:6px}
  .tkcard-t{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--clay);font-weight:700}
  .tkmeta{color:var(--muted);font-size:.85rem;margin-top:7px}
  .tkmeta:empty{display:none}
  /* Status as a colored bubble in the top-right of the ticket header. */
  .statushdr{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .statushdr h3{margin:0;flex:1}
  .clchip{display:inline-block;color:#f6f2e8;font-size:.78rem;font-weight:700;border-radius:999px;padding:6px 12px;white-space:nowrap}
  .statuspill{flex:0 0 auto;width:auto;-webkit-appearance:none;appearance:none;border:1px solid transparent;border-radius:999px;padding:8px 30px 8px 15px;font:inherit;font-size:.82rem;font-weight:700;cursor:pointer;background-color:#e3efe7;color:#1f3d2b;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' fill='none' stroke='%231f3d2b' stroke-width='1.7'/></svg>");background-repeat:no-repeat;background-position:right 11px center}
  /* The service group (Parts + Assigned to) sits together near the bottom. */
  .svcsec{border-top:1px solid var(--line);margin-top:16px;padding-top:14px}
  .svchead{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--clay);font-weight:700;margin-bottom:10px}
  .lblrow label{margin-bottom:0}
  .aibtn{flex:0 0 auto;background:transparent;border:1px solid var(--clay);color:var(--clay);border-radius:999px;padding:5px 12px;font:inherit;font-size:.8rem;font-weight:600;cursor:pointer;white-space:nowrap}
  .aibtn:hover{background:rgba(169,99,58,.08)}
  .aibtn:disabled{opacity:.6;cursor:default}
  /* Saved parts read as plain text lines, not boxes; icons stay on the right. */
  .prow{display:flex;align-items:center;justify-content:space-between;gap:10px;background:transparent;border:none;border-bottom:1px solid var(--line);border-radius:0;padding:7px 2px;margin-bottom:0}
  .prow .pmain{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  /* Quote one-liners match the parts look. */
  .qrow{border-bottom:1px solid var(--line);padding:7px 2px}
  .qline{display:flex;align-items:center;gap:9px;cursor:pointer;font-size:.96rem}
  .qline .qname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--green-deep);font-weight:600}
  .qline .qamt{font-weight:700}
  .qbody{padding:9px 0 4px}
  .qcmt{font-size:.92rem;padding:5px 0;border-top:1px dashed var(--line)}
  .qcmt b{color:var(--green-deep)}
  .prow .pmain{min-width:0;font-size:.96rem}
  .prow .pqty{font-weight:700;color:var(--green-deep)}
  .prow .psrc{color:var(--muted);font-size:.86rem}
  .prow .pctrl{flex:0 0 auto;display:flex;align-items:center;gap:7px}
  .pstat{border:1px solid var(--line);border-radius:999px;padding:3px 11px;font:inherit;font-size:.76rem;font-weight:700;cursor:pointer;background:var(--bg-2)}
  .icobtn{background:transparent;border:none;color:var(--muted);font-size:1.02rem;line-height:1;cursor:pointer;padding:2px 5px}
  .icobtn:hover{color:var(--green-deep)}
  .pstat.needed{background:#f6eccf;color:#7a5a12;border-color:transparent}
  .pstat.ordered{background:#dfe9f4;color:#274a73;border-color:transparent}
  .pstat.received{background:#e3efe7;color:var(--green-deep);border-color:transparent}
  .paddrow{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:8px}
  .paddrow #p_item{flex:1;min-width:140px}
  .paddrow #p_qty{width:64px}
  .paddrow #p_unit{width:84px}
  .sugg{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 0;border-top:1px solid var(--line);font-size:.92rem}
  .sugg:first-of-type{border-top:none}
  .lgedit{margin-top:6px}
  .lgedit textarea{min-height:56px}
  .lgeditbar{display:flex;gap:8px;margin-top:6px}
  .lg .text{font-size:.98rem;color:var(--ink);white-space:pre-wrap;word-break:break-word}
  .lg.event .text{color:var(--muted);font-style:italic;font-size:.9rem}
  .lg.event .who{background:var(--bg);color:var(--muted);border:1px solid var(--line)}
  .lg.agent{background:#eef3ef;border:1px solid var(--line);border-radius:6px;padding:10px 12px}
  .lg.agent .text{color:var(--green-deep);font-style:normal;font-size:.92rem}
  .lg.agent .who{background:#e3efe7;color:var(--green-deep);border-color:transparent}
  .log .empty-log{color:var(--muted);font-size:.92rem}
  .intake{margin-bottom:12px}
  .intake-tog{background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:8px 12px;font:inherit;font-size:.86rem;font-weight:600;color:var(--green-deep);cursor:pointer;display:inline-flex;align-items:center;gap:7px}
  .intake-tog:hover{border-color:var(--green)}
  .intake-tog #intakeIco{font-size:1rem;width:14px;display:inline-block;text-align:center}
  .intake-body{margin-top:8px;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:11px 13px;font-size:.94rem;color:var(--ink);white-space:pre-wrap}
  .revsec{margin-top:16px;border-top:1px solid var(--line);padding-top:14px}
  #revBody{flex-direction:column;gap:8px;margin-top:10px}
  .evline{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .evline .evico{opacity:.5;font-size:.95rem}
  .evline .evtext{color:var(--green-deep);font-weight:600;font-size:.9rem}
  .evline .evtime{color:var(--muted);font-size:.78rem;margin-left:auto;white-space:nowrap}
  .lg.event{gap:0}
  .lgmore{background:var(--bg);border:1px solid var(--line);color:var(--green-deep);border-radius:999px;width:22px;height:22px;line-height:1;font:inherit;font-size:.9rem;font-weight:700;cursor:pointer;vertical-align:middle;padding:0;flex:0 0 auto}
  .lgmore:hover{border-color:var(--green)}
  .evdetail{margin-top:7px;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:9px 11px;font-size:.86rem;color:var(--muted);white-space:pre-wrap}
  .addnote textarea{min-height:64px}
  .addnote .btn{width:auto;padding:10px 20px;font-size:.96rem}
  .chk input[type=checkbox]{-webkit-appearance:checkbox;appearance:auto;width:18px;height:18px;accent-color:var(--green);padding:0}
  .lg .photos{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .lg .photos img{width:84px;height:84px;object-fit:cover;border-radius:6px;border:1px solid var(--line);cursor:pointer}
</style>
</head>
<body>

<header>
  <div class="wrap bar">
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 26 26" aria-hidden="true">
        <g fill="none" stroke="#2f5d50" stroke-width="1.4">
          <circle cx="13" cy="13" r="3"/><circle cx="13" cy="13" r="7"/><circle cx="13" cy="13" r="11"/>
        </g>
      </svg>
      Ringwood
    </div>
    <a class="back" href="/app">Home</a>
  </div>
</header>

<main class="wrap">
  <div class="intro">
    <div class="eyebrow">Ticket status</div>
    <h1>Tickets</h1>
    <p>Open work first, with the most recently updated on top. Switch to Closed, change the sort, or filter by client and topic. Open one to update it, add a note, or move it along.</p>
  </div>

  <div id="filters">
    <div id="statChips" class="schips"></div>
    <div class="filterbar">
      <select id="sort" class="mini">
        <option value="act" selected>Latest activity</option>
        <option value="new">Newest</option>
        <option value="old">Oldest</option>
      </select>
      <select id="client" class="mini"><option value="">All clients</option></select>
      <label class="archk" id="archkWrap"><input type="checkbox" id="showArch" /> Show archived</label>
    </div>
  </div>

  <div class="toolbar">
    <div id="count" style="color:var(--muted);font-size:.9rem"></div>
  </div>

  <div id="list"></div>
  <div id="editWrap"></div>
</main>

<script src="/client-pins.js"></script>
<script>
  var clientSel = document.getElementById("client");
  var sortSel = document.getElementById("sort");
  var showArchEl = document.getElementById("showArch");
  var chipsEl = document.getElementById("statChips");
  var curStatus = "open";  // open | review | closed | all (driven by the chips)
  var CLOSED = ["Complete","Closed","Archived"];
  // A client login only sees its own tickets, so hide the client filter and the
  // Client field in the editor.
  var IS_CLIENT = false, IS_MASTER = false;
  fetch("/api/whoami").then(function(r){return r.json();}).then(function(w){
    if (w && w.ok && w.role === "client"){
      IS_CLIENT = true;
      // A client only sees its own tickets, never archived: hide the client picker
      // and the Show archived toggle. The chips drop "Needs review" too (admin only).
      clientSel.style.display = "none";
      var aw = document.getElementById("archkWrap"); if (aw) aw.style.display = "none";
    }
    if (w && w.ok && w.role === "master"){ IS_MASTER = true; }
    if (!(w && w.ok && w.role === "client") && window.RWClientPins){ try { window.__cpins = RWClientPins.attach({ selectEl: clientSel }); } catch(e){} }
    renderChips();
  }).catch(function(){ renderChips(); });

  // The status chips double as a counter (like the asset icons) and the filter.
  function renderChips(){
    if(!chipsEl) return;

  /* Read a chosen file, downscale it, and hand back base64 + content type. */
  function processPhoto(file){
    return new Promise(function(resolve, reject){
      var img = new Image();
      var url = URL.createObjectURL(file);
      img.onload = function(){
        // Smaller + lighter so uploads are quick on cell signal. Still legible
        // for a ticket photo; the eye can't tell at 1280px / 0.7 on a phone.
        var max = 1280, w = img.width, h = img.height;
        if (w > max || h > max){ if (w >= h){ h = Math.round(h*max/w); w = max; } else { w = Math.round(w*max/h); h = max; } }
        var c = document.createElement("canvas"); c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        var dataUrl = c.toDataURL("image/jpeg", 0.7);
        resolve({ base64: dataUrl.split(",")[1], contentType: "image/jpeg", preview: dataUrl });
      };
      img.onerror = function(){ URL.revokeObjectURL(url); reject(new Error("bad image")); };
      img.src = url;
    });
  }

      else if (client) { if (t.client !== client) return false; }
      return true;

            if(!SUGG.length){ wrap.innerHTML="<div style='color:var(--muted);font-size:.88rem'>Nothing obvious to suggest. Add parts by hand above.</div>"; return; }
            wrap.innerHTML="<div style='font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--clay);font-weight:600;margin-bottom:5px'>Suggested — add the ones you need</div>"+
              SUGG.map(function(p,i){ return "<div class='sugg'><span>"+esc(p.quantity)+" "+esc(p.unit)+" "+esc(p.item)+"</span><button type='button' class='qbtn rev sugadd' data-i='"+i+"'>＋ Add</button></div>"; }).join("")+
              "<button type='button' class='qbtn' id='p_sugall' style='margin-top:6px'>Add all</button>";
            wrap.querySelectorAll(".sugadd").forEach(function(b){ b.addEventListener("click", function(){ var i=+b.getAttribute("data-i"); b.disabled=true; addSugg(SUGG[i], function(){ var r=b.closest(".sugg"); if(r) r.remove(); loadParts(); }); }); });
            document.getElementById("p_sugall").addEventListener("click", function(){ var all=this; all.disabled=true; var n=SUGG.length, done=0; SUGG.forEach(function(p){ addSugg(p, function(){ done++; if(done>=n){ wrap.style.display="none"; loadParts(); } }); }); });
          }).catch(function(){ sg.disabled=false; sg.textContent="✨ Suggest with AI"; alert("Couldn't reach the assistant."); });
      }
      function addSugg(p, cb){ fetch("/api/tickets/part",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({ticketId:t.id,item:p.item,quantity:p.quantity,unit:p.unit})}).then(function(r){return r.json();}).then(function(d){ if(cb) cb(d); }).catch(function(){ if(cb) cb({}); }); }
      var EDIT_PART_ID=null;
      function loadParts(){ fetch("/api/tickets/parts?id="+encodeURIComponent(t.id),{cache:"no-store"}).then(function(r){return r.json();}).then(function(rows){ PARTS=Array.isArray(rows)?rows:[]; renderParts(); if(typeof renderMoney==="function") renderMoney(); }).catch(function(){ PARTS=[]; renderParts(); }); }
      var sgBtn=document.getElementById("p_suggest"); if(sgBtn) sgBtn.addEventListener("click", suggestParts);
      loadParts();
    }

    // Assigned-to behind a one-line arrow (like Parts). The label reads who's
    // on it; opening it shows the picker.
    var asgT = document.getElementById("e_asgToggle");
    function asgLabel(open){
      if(!asgT) return;
      var name = (asgSel && asgSel.value && asgSel.value !== "__new") ? asgSel.value : (t.assignedTo || "");
      asgT.textContent = (name ? ("Assigned to " + name) : "Assign to someone") + (open ? " ▴" : " ▾");
    }
    if (asgT) asgT.addEventListener("click", function(e){
      e.preventDefault();
      var f = document.getElementById("e_asgField");
      var open = f.style.display !== "none";
      f.style.display = open ? "none" : "block";
      asgLabel(!open);
    });
    // Assigned-to dropdown + quick-add a new vendor without leaving the ticket.
    var asgSel = document.getElementById("e_assigned");
    if (asgSel) asgSel.addEventListener("change", function(){
      var isNew = asgSel.value === "__new";
      var nw = document.getElementById("e_assignedNew");
      if(nw) nw.style.display = isNew ? "block" : "none";
      if(isNew){ var nm = document.getElementById("e_assignedName"); if(nm) nm.focus(); }
      else { autoSaveTicket({ assignedTo: asgSel.value }); asgLabel(true); }
    });
    var asgAdd = document.getElementById("e_assignedAdd");
    if (asgAdd) asgAdd.addEventListener("click", function(){
      var nmEl = document.getElementById("e_assignedName"), nm = (nmEl.value||"").trim();
      if(!nm){ nmEl.focus(); return; }
      var kind = document.getElementById("e_assignedKind").value;
      asgAdd.disabled = true; asgAdd.textContent = "Adding…";
      fetch("/api/admin/vendor",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({ name:nm, kind:kind })})
        .then(function(r){return r.json();}).then(function(d){
          asgAdd.disabled=false; asgAdd.textContent="Add";
          if(d&&d.ok){
            VENDORS.push({ name:nm, kind:kind, trade:"" });
            var o=document.createElement("option"); o.value=nm; o.textContent=nm;
            asgSel.insertBefore(o, asgSel.querySelector("option[value='__new']"));
            asgSel.value=nm;
            document.getElementById("e_assignedNew").style.display="none"; nmEl.value="";
            autoSaveTicket({ assignedTo: nm });
          } else { var em=document.getElementById("e_msg"); if(em){ em.style.color="#8a3d1c"; em.textContent=(d&&d.error)||"Couldn't add the vendor."; } }
        }).catch(function(){ asgAdd.disabled=false; asgAdd.textContent="Add"; });
    });

    /* ---- update log ---- */
    var logEl = document.getElementById("e_log");
    var noteCol = (t.clientColor || clientColor(t.client || "")) ;
    var LOG_ROWS = {};
    function fmtWhen(s){ if(!s) return ""; try{ var d=new Date(s); return d.toLocaleDateString() + " " + d.toLocaleTimeString([], {hour:"numeric", minute:"2-digit"}); }catch(e){ return ""; } }
    function renderLog(rows){
      LOG_ROWS = {};
      rows = rows || [];
      // The customer's original words are kept as an "intake" entry, shown as a
      // collapsible "Entered by <client>" block (the AI draft is the description).
      var intake = rows.filter(function(c){ return c.kind === "intake"; });
      rows = rows.filter(function(c){ return c.kind !== "intake"; });
      var intakeHtml = "";
      if (intake.length){
        var who = intake[0].author || "Customer";
        var when = fmtWhen(intake[0].created);
        var body = intake.map(function(c){ return c.body; }).filter(Boolean).join("\n\n");
        var intakeLabel = IS_CLIENT ? "Your original submission" : ("Original submission by " + esc(who));
        intakeHtml =
          "<div class='intake'>" +
            "<button type='button' class='intake-tog' id='intakeTog'><span id='intakeIco'>＋</span> " + intakeLabel + "</button>" +
            "<div class='intake-body' id='intakeBody' style='display:none'>" + esc(body) +
              (when ? "<div style='color:var(--muted);font-size:.8rem;margin-top:8px'>Submitted " + esc(when) + "</div>" : "") +
            "</div>" +
          "</div>";
      }
      // Two streams: human comments (notes, internal or shared), and the admin
      // revision history (status/title/description changes + the AI agent read).
      var notes = rows.filter(function(c){ var k = c.kind||"note"; return k === "note" || k === "internal"; });
      var events = rows.filter(function(c){ return c.kind === "event"; });
      // A human comment: who, time, text, photos, edit/delete. Staff see a badge
      // on every staff note: Internal (grey) or Shared (green), so it's always
      // obvious what the client can and can't see.
      function noteCard(c){
        LOG_ROWS[c.id] = c;
        var col = c.role === "client" ? noteCol : "var(--green-deep)";
        var whoStyle = (c.role !== "client") ? "" : (" style='background:" + col + "'");
        var vis = "";
        if (!IS_CLIENT && c.role !== "client"){
          vis = (c.kind === "internal")
            ? "<span style='background:var(--line);color:var(--muted);border-radius:999px;padding:2px 9px;font-size:.68rem;font-weight:700;letter-spacing:.05em'>INTERNAL</span>"
            : "<span style='background:#cfe3d2;color:#1f5130;border-radius:999px;padding:2px 9px;font-size:.68rem;font-weight:700;letter-spacing:.05em'>SHARED</span>";
        }
        var hasPhotos = c.photos && c.photos.length;
        var bits = "";
        if (hasPhotos) bits += "<button type='button' class='lgbtn' data-act='promote' data-cid='" + esc(c.id) + "'>&uarr; Add to main photos</button>";
        // Flip a staff note's visibility after the fact: work it out internally,
        // then hand the finished detail to the customer with one tap.
        if (IS_MASTER && c.role !== "client" && (c.kind === "internal" || c.kind === "note"))
          bits += "<button type='button' class='lgbtn' data-act='vis' data-cid='" + esc(c.id) + "'>" + (c.kind === "internal" ? "Share with client" : "Make internal") + "</button>";
        if (IS_MASTER) bits += "<button type='button' class='lgbtn' data-act='edit' data-cid='" + esc(c.id) + "'>Edit</button><button type='button' class='lgbtn del' data-act='del' data-cid='" + esc(c.id) + "'>Delete</button>";
        var ctrls = bits ? "<span class='lgctrl'>" + bits + "</span>" : "";
        var photos = hasPhotos ? "<div class='photos'>" + c.photos.map(function(u){ return "<img class='zoomable' loading='lazy' decoding='async' src='" + esc(u) + "' alt='note photo' />"; }).join("") + "</div>" : "";
        return "<div class='lg note' data-cid='" + esc(c.id) + "'>" +
          "<div class='lghead'><span class='who'" + whoStyle + ">" + esc(c.author) + "</span>" + vis + "<span class='meta'>" + esc(fmtWhen(c.created)) + "</span>" + ctrls + "</div>" +
          (c.body ? "<div class='text'>" + esc(c.body) + "</div>" : "") + photos + "</div>";
      }
      // A revision entry: one tidy line, with the + for before/after detail.
      function eventLine(c){
        LOG_ROWS[c.id] = c;
        var brief = c.body || "", detail = "";
        if (brief.indexOf("\n⋮\n") >= 0){ var pp = brief.split("\n⋮\n"); brief = pp[0]; detail = pp.slice(1).join("\n⋮\n"); }
        var moreBtn = detail ? "<button type='button' class='lgmore' data-cid='" + esc(c.id) + "'>+</button>" : "";
        var del = IS_MASTER ? "<button type='button' class='lgbtn del' data-act='del' data-cid='" + esc(c.id) + "'>Delete</button>" : "";
        var detailDiv = detail ? "<div class='evdetail' id='ev_" + esc(c.id) + "' style='display:none'>" + esc(detail) + "</div>" : "";
        var ico = c.role === "agent" ? "" : "<span class='evico'>&#9998;</span>";
        return "<div class='lg event" + (c.role==="agent"?" agent":"") + "' data-cid='" + esc(c.id) + "'>" +
          "<div class='evline'>" + ico + "<span class='evtext'>" + esc(brief) + "</span>" + moreBtn +
            "<span class='evtime'>" + esc(fmtWhen(c.created)) + "</span>" + del + "</div>" + detailDiv + "</div>";
      }
      var notesHtml = notes.length ? notes.map(noteCard).join("") : "<div class='empty-log'>No comments yet. Add the first note below.</div>";
      var revHtml = "";
      if (events.length){
        revHtml = "<div class='revsec'>" +
          "<button type='button' class='intake-tog' id='revTog'><span id='revIco'>＋</span> Revision history (" + events.length + ")</button>" +
          "<div id='revBody' style='display:none'>" + events.map(eventLine).join("") + "</div>" +
        "</div>";
      }
      // Comments live in the log (the conversation); the revision history is a
      // quiet drawer at the very bottom, under Delete ticket.
      logEl.innerHTML = intakeHtml + notesHtml;
      var revEl = document.getElementById("e_rev");
      if (revEl) revEl.innerHTML = revHtml;
      wireIntake();
      var revTog = document.getElementById("revTog");
      if (revTog) revTog.addEventListener("click", function(){
        var b = document.getElementById("revBody"), ico = document.getElementById("revIco");
        if(!b) return; var open = b.style.display !== "none";
        b.style.display = open ? "none" : "flex"; if(ico) ico.textContent = open ? "＋" : "−";
      });
    }
    // Expand/collapse an event's detail (revision history) when the + is tapped.
    function onLgMore(e){
      var mb = e.target.closest ? e.target.closest(".lgmore") : null;
      if(!mb) return;
      var d = document.getElementById("ev_" + mb.getAttribute("data-cid")); if(!d) return;
      var open = d.style.display !== "none";
      d.style.display = open ? "none" : "block";
      mb.textContent = open ? "+" : "−";
    }
    // Collapsible "Entered by <client>": starts closed, the + opens it for reference.
    function wireIntake(){
      var tog = document.getElementById("intakeTog"); if(!tog) return;
      tog.addEventListener("click", function(){
        var b = document.getElementById("intakeBody"), ico = document.getElementById("intakeIco");
        if(!b) return;
        var open = b.style.display !== "none";
        b.style.display = open ? "none" : "block";
        if(ico) ico.textContent = open ? "＋" : "−";
      });
    }
    function loadLog(){
      fetch("/api/tickets/comments?id=" + encodeURIComponent(t.id), { cache:"no-store" })
        .then(function(r){return r.json();}).then(renderLog)
        .catch(function(){ logEl.innerHTML = "<div class='empty-log'>Couldn't load the log.</div>"; });
    }
    // Master edit/delete, via delegation so it survives re-renders.
    function onLgBtn(e){
      var btn = e.target.closest ? e.target.closest(".lgbtn") : null;
      if(!btn) return;
      var cid = btn.getAttribute("data-cid"), act = btn.getAttribute("data-act");
      var row = LOG_ROWS[cid]; if(!row) return;
      if(act === "promote"){
        btn.disabled = true; btn.textContent = "Moving…";
        fetch("/api/tickets/comment/promote", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ commentId:cid }) })
          .then(function(r){return r.json();}).then(function(d){
            btn.disabled = false; btn.innerHTML = "&uarr; Add to main photos";
            if(d&&d.ok){ if(Array.isArray(d.topPhotos)){ existingPhotos = d.topPhotos.slice(); renderThumbs(); } var m=document.getElementById("e_msg"); if(m){ m.style.color="var(--green-deep)"; m.textContent="Added to the main photos up top."; } window.scrollTo(0,0); }
            else { alert((d&&d.error)||"Couldn't move the photos."); }
          }).catch(function(){ btn.disabled=false; btn.innerHTML="&uarr; Add to main photos"; alert("Couldn't reach the server."); });
        return;
      }
      if(act === "vis"){
        var toShare = row.kind === "internal";
        if(toShare && !confirm("Share this note with " + (t.client||"the client") + "? They'll see it on their ticket.")) return;
        btn.disabled = true; btn.textContent = toShare ? "Sharing…" : "Hiding…";
        fetch("/api/tickets/comment/update", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ commentId:cid, share:toShare }) })
          .then(function(r){return r.json();}).then(function(d){ if(d&&d.ok){ loadLog(); } else { btn.disabled=false; alert((d&&d.error)||"Couldn't change it."); } })
          .catch(function(){ btn.disabled=false; alert("Couldn't reach the server."); });
        return;
      }
      if(act === "del"){
        if(!confirm("Delete this entry? This can't be undone.")) return;
        fetch("/api/tickets/comment/delete", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ commentId:cid }) })
          .then(function(r){return r.json();}).then(function(d){ if(d&&d.ok){ loadLog(); } else { alert((d&&d.error)||"Couldn't delete."); } })
          .catch(function(){ alert("Couldn't reach the server."); });
        return;
      }
      if(act === "edit"){
        var lg = btn.closest(".lg"); var textEl = lg.querySelector(".text");
        if(lg.querySelector(".lgedit")) return;  // already editing
        var wrap = document.createElement("div"); wrap.className = "lgedit";
        var ta = document.createElement("textarea"); ta.value = row.body || "";
        var bar = document.createElement("div"); bar.className = "lgeditbar";
        var save = document.createElement("button"); save.type="button"; save.className="lgbtn"; save.textContent="Save";
        var cancel = document.createElement("button"); cancel.type="button"; cancel.className="lgbtn"; cancel.textContent="Cancel";
        bar.appendChild(save); bar.appendChild(cancel); wrap.appendChild(ta); wrap.appendChild(bar);
        textEl.style.display = "none"; lg.appendChild(wrap); ta.focus();
        cancel.addEventListener("click", function(){ wrap.remove(); textEl.style.display=""; });
        save.addEventListener("click", function(){
          var nv = (ta.value||"").trim(); if(!nv){ ta.focus(); return; }
          save.disabled = true; save.textContent = "Saving…";
          fetch("/api/tickets/comment/update", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ commentId:cid, body:nv }) })
            .then(function(r){return r.json();}).then(function(d){ if(d&&d.ok){ loadLog(); } else { save.disabled=false; save.textContent="Save"; alert((d&&d.error)||"Couldn't save."); } })
            .catch(function(){ save.disabled=false; save.textContent="Save"; alert("Couldn't reach the server."); });
        });
      }
    }
    // Wire the log controls on both the comments list and the revision drawer.
    [logEl, document.getElementById("e_rev")].forEach(function(el){ if(el){ el.addEventListener("click", onLgMore); el.addEventListener("click", onLgBtn); } });
    loadLog();
    // Photos attached to a new note (before it's posted).
    var notePhotos = [];
    var noteThumbs = document.getElementById("e_notethumbs");
    function renderNoteThumbs(){
      noteThumbs.innerHTML = notePhotos.map(function(p, i){
        return "<span style='position:relative;display:inline-block'>" +
          "<img class='zoomable' src='" + p.preview + "' alt='' style='width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--green)' />" +
          "<button type='button' onclick='__rmNotePhoto(" + i + ")' style='position:absolute;top:-7px;right:-8px;width:26px;height:26px;border-radius:999px;border:none;background:var(--green-deep);color:#f6f2e8;font-size:12px;line-height:1;cursor:pointer'>×</button>" +
        "</span>";
      }).join("");
    }
    window.__rmNotePhoto = function(i){ notePhotos.splice(i,1); renderNoteThumbs(); };
    document.getElementById("e_notefile").addEventListener("change", function(e){
      var files = Array.prototype.slice.call(e.target.files||[]); e.target.value = "";
      Promise.all(files.map(processPhoto)).then(function(arr){
        arr.forEach(function(p){ notePhotos.push(p); }); renderNoteThumbs();
      }).catch(function(){ document.getElementById("e_msg").textContent = "Couldn't read one of the photos."; });
    });

    // Clean up the note with AI: preview before it replaces your text.
    (function(){
      var pb=document.getElementById("e_polish"); if(!pb) return;
      var pw=document.getElementById("e_polishWrap"), pt=document.getElementById("e_polishText"), ne=document.getElementById("e_note"), em=document.getElementById("e_msg");
      pb.addEventListener("click", function(){
        var text=(ne.value||"").trim(); if(em) em.textContent="";
        if(!text){ ne.focus(); return; }
        pb.disabled=true; pb.textContent="Cleaning up…";
        fetch("/api/ai/polish",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({text:text,kind:"note"})})
          .then(function(r){return r.json();}).then(function(d){
            pb.disabled=false; pb.textContent="✨ Clean up with AI";
            if(d&&d.ok&&d.text){ pt.textContent=d.text; pw.style.display="block"; }
            else if(em){ em.textContent=(d&&d.error)||"The assistant couldn't respond."; }
          }).catch(function(){ pb.disabled=false; pb.textContent="✨ Clean up with AI"; if(em) em.textContent="Couldn't reach the assistant."; });
      });
      document.getElementById("e_polishUse").addEventListener("click", function(){ ne.value=pt.textContent; pw.style.display="none"; });
      document.getElementById("e_polishKeep").addEventListener("click", function(){ pw.style.display="none"; });
    })();

    // Guard against leaving with unsaved photos or a half-typed note.
    window.__ticketBack = function(){
      var noteEl = document.getElementById("e_note");
      var unsaved = newPhotos.length || notePhotos.length || (noteEl && noteEl.value.trim());
      if (unsaved && !confirm("You have unsaved photos or a note. Leave without saving them?")) return;
      // Go back through history when we pushed an entry, so the swipe-back gesture stays in sync.
      if (history.state && history.state.ticket) history.back();
      else backToTicketList();
    };
    document.getElementById("e_back").addEventListener("click", window.__ticketBack);
    var delBtn = document.getElementById("e_del");
    if (delBtn) delBtn.addEventListener("click", function(){
      if (!confirm("Delete this ticket and its whole update log? This can't be undone.")) return;
      var db = this; db.disabled = true; db.textContent = "Deleting…";
      fetch("/api/tickets/delete", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ id:t.id }) })
        .then(function(r){return r.json();}).then(function(d){
          if(d&&d.ok){ ALL_TICKETS = ALL_TICKETS.filter(function(x){ return x.id !== t.id; }); backToTicketList(); }
          else { db.disabled=false; db.textContent="Delete ticket"; var m=document.getElementById("e_msg"); m.style.color="#8a3d1c"; m.textContent=(d&&d.error)||"Couldn't delete."; }
        }).catch(function(){ db.disabled=false; db.textContent="Delete ticket"; var m=document.getElementById("e_msg"); m.style.color="#8a3d1c"; m.textContent="Couldn't reach the server."; });
    });
    // The ticket fields and photos auto-save on their own. The note is the one
    // thing you post deliberately. Staff notes are INTERNAL unless explicitly
    // shared, so hours/costs never leak into the client's view by accident.
    function postNote(share, btn){
      var noteText = (document.getElementById("e_note").value || "").trim();
      var alsoTop = document.getElementById("e_notetop") ? document.getElementById("e_notetop").checked : false;
      var nm = document.getElementById("e_notemsg");
      if(!noteText && !notePhotos.length){ if(nm){ nm.style.color="var(--muted)"; nm.textContent="Type a note or add a photo first."; } return; }
      if(share && !IS_CLIENT && !confirm("Share this update with " + (t.client||"the client") + "? They'll see it on their ticket.")) return;
      var pending = notePhotos.slice();
      var old = btn.textContent;
      btn.disabled = true; btn.textContent = share ? "Sharing…" : "Posting…"; if(nm){ nm.textContent=""; }
      fetch("/api/tickets/comment", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ id:t.id, body:noteText, share:!!share, photos:pending.map(function(p){ return { base64:p.base64, contentType:p.contentType }; }), alsoTop:alsoTop }) })
        .then(function(r){return r.json();}).then(function(nd){
          btn.disabled=false; btn.textContent=old;
          if(nd && nd.ok){ document.getElementById("e_note").value=""; notePhotos=[]; renderNoteThumbs(); if(document.getElementById("e_notetop")) document.getElementById("e_notetop").checked=false; loadLog(); if(Array.isArray(nd.topPhotos)){ existingPhotos = nd.topPhotos.slice(); renderThumbs(); } if(nm){ nm.style.color="var(--green-deep)"; nm.textContent= share ? "Shared with the client." : "Posted (internal)."; } }
          else if(nm){ nm.style.color="#8a3d1c"; nm.textContent=(nd&&nd.error)||"Couldn't post the note."; }
        }).catch(function(){ btn.disabled=false; btn.textContent=old; if(nm){ nm.style.color="#8a3d1c"; nm.textContent="Couldn't reach the server."; } });
    }
    var postNoteBtn = document.getElementById("e_postnote");
    if (postNoteBtn) postNoteBtn.addEventListener("click", function(){ postNote(IS_CLIENT, postNoteBtn); });
    var shareNoteBtn = document.getElementById("e_sharenote");
    if (shareNoteBtn) shareNoteBtn.addEventListener("click", function(){ postNote(true, shareNoteBtn); });
  };

  clientSel.addEventListener("change", render);
  sortSel.addEventListener("change", render);
  if (showArchEl) showArchEl.addEventListener("change", render);
</script>
<script src="/lightbox.js"></script>
<script src="/native-camera.js"></script>
<script src="/whoami-badge.js"></script>
</body>
