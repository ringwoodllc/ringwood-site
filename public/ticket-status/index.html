<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1f3d2b" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ticket Status" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<title>Ringwood · Ticket status</title>
<meta name="description" content="See and manage tickets by client. Open, close, or archive." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="/client-color.js"></script>
<style>
  :root{
    --bg:#f4efe4;--bg-2:#efe8d8;--ink:#23282a;--muted:#5f5d52;
    --green:#2f5d50;--green-deep:#21443a;--clay:#a9633a;--line:rgba(35,40,42,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:"Hanken Grotesk",-apple-system,sans-serif;font-size:18px;line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:640px;margin:0 auto;padding:0 22px}
  h1,h2,h3{font-family:"Spectral",Georgia,serif;font-weight:500;line-height:1.1;letter-spacing:-.01em;color:var(--green-deep)}
  a{color:inherit}
  header{padding:24px 0}
  .bar{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:11px;font-family:"Spectral",serif;font-size:1.25rem;font-weight:600;color:var(--green-deep)}
  .back{font-size:.92rem;text-decoration:none;color:var(--green-deep);border-bottom:1px solid var(--clay);padding-bottom:1px}
  .intro{margin:18px 0 22px}
  .eyebrow{font-size:.8rem;letter-spacing:.18em;text-transform:uppercase;color:var(--clay);font-weight:600;margin-bottom:12px}
  .intro h1{font-size:clamp(2rem,7vw,2.7rem)}
  .intro p{margin-top:10px;color:var(--muted);font-size:1.04rem}

  .field{margin-bottom:16px}
  label{display:block;font-weight:600;font-size:.96rem;color:var(--green-deep);margin-bottom:7px}
  input,select,textarea{width:100%;font:inherit;font-size:1.02rem;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:4px;padding:13px 14px;-webkit-appearance:none;appearance:none}
  select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' fill='none' stroke='%235f5d52' stroke-width='1.6'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:38px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green)}
  textarea{min-height:90px;resize:vertical}

  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:4px 0 14px}
  .archbtn{background:transparent;border:1px solid var(--line);color:var(--green-deep);border-radius:999px;padding:8px 14px;font:inherit;font-size:.86rem;font-weight:600;cursor:pointer}
  .archbtn.on{background:var(--green);color:#f6f2e8;border-color:var(--green)}

  .ticket{background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;gap:12px;align-items:flex-start}
  .ticket:hover{border-color:var(--green)}
  .ticket .body{flex:1;min-width:0}
  .ticket .t-title{font-weight:600;color:var(--green-deep);font-size:1rem;word-break:break-word}
  .ticket .t-meta{color:var(--muted);font-size:.86rem;margin-top:3px}
  .pill{flex:0 0 auto;font-size:.72rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:4px 9px;border-radius:999px;margin-top:2px}
  .pill.p-open{background:#e3efe7;color:var(--green-deep)}
  .pill.p-sched{background:#eadcc4;color:#6b5524}
  .pill.p-prog{background:#dfe9f4;color:#274a73}
  .pill.p-done{background:#e7e2d6;color:#6b675c}
  .pill.p-arch{background:#f0e0d4;color:#8a5a36}
  .rcol{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .client-chip{font-size:.8rem;font-weight:700;color:#f6f2e8;background:var(--green-deep);padding:4px 11px;border-radius:999px;white-space:nowrap;max-width:130px;overflow:hidden;text-overflow:ellipsis}
  .actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .qbtn{background:var(--bg);border:1px solid var(--line);color:var(--green-deep);border-radius:999px;padding:6px 12px;font:inherit;font-size:.82rem;font-weight:600;cursor:pointer}
  .qbtn:hover{border-color:var(--green)}
  .empty{color:var(--muted);padding:18px 4px}

  .btn{width:100%;background:var(--green);color:#f6f2e8;border:none;cursor:pointer;font-weight:600;font-size:1.05rem;padding:15px;border-radius:4px}
  .btn:hover{background:var(--green-deep)}
  .btn:disabled{opacity:.6;cursor:default}
  .btn.ghost{background:transparent;color:var(--green-deep);border:1px solid var(--line)}
  .panel{background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:20px 18px;margin-bottom:40px}
  .panel h3{font-size:1.2rem;margin-bottom:4px}
  .panel .ref{color:var(--muted);font-size:.86rem;margin-bottom:14px}
  .panel img.photo{width:100%;max-height:240px;object-fit:cover;border-radius:6px;border:1px solid var(--line);margin-bottom:14px}
  .row2{display:flex;gap:10px;margin-top:6px}
  .row2 .btn{padding:13px}
  .msg{margin-top:12px;font-size:.92rem;color:#8a3d1c}

  /* Per-ticket update log */
  .logsec{border-top:1px solid var(--line);margin:22px 0 6px;padding-top:18px}
  .logsec h4{font-family:"Spectral",serif;font-weight:600;font-size:1.06rem;color:var(--green-deep);margin-bottom:12px}
  .log{display:flex;flex-direction:column;gap:12px;margin-bottom:14px}
  .lg{display:flex;flex-direction:column;gap:3px}
  .lg .lghead{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .lg .who{font-weight:700;font-size:.84rem;color:#f6f2e8;background:var(--green-deep);padding:2px 10px;border-radius:999px}
  .lg .meta{font-size:.78rem;color:var(--muted)}
  .lgctrl{margin-left:auto;display:flex;gap:6px}
  .lgbtn{background:var(--bg);border:1px solid var(--line);color:var(--green-deep);border-radius:999px;padding:3px 11px;font:inherit;font-size:.78rem;font-weight:600;cursor:pointer}
  .lgbtn:hover{border-color:var(--green)}
  .lgbtn.del{color:#8a3d1c}
  .lgedit{margin-top:6px}
  .lgedit textarea{min-height:56px}
  .lgeditbar{display:flex;gap:8px;margin-top:6px}
  .lg .text{font-size:.98rem;color:var(--ink);white-space:pre-wrap;word-break:break-word}
  .lg.event .text{color:var(--muted);font-style:italic;font-size:.9rem}
  .lg.event .who{background:var(--bg);color:var(--muted);border:1px solid var(--line)}
  .log .empty-log{color:var(--muted);font-size:.92rem}
  .addnote textarea{min-height:64px}
  .addnote .btn{width:auto;padding:10px 20px;font-size:.96rem}
  .chk input[type=checkbox]{-webkit-appearance:checkbox;appearance:auto;width:18px;height:18px;accent-color:var(--green);padding:0}
  .lg .photos{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .lg .photos img{width:84px;height:84px;object-fit:cover;border-radius:6px;border:1px solid var(--line);cursor:pointer}
</style>
</head>
<body>

<header>
  <div class="wrap bar">
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 26 26" aria-hidden="true">
        <g fill="none" stroke="#2f5d50" stroke-width="1.4">
          <circle cx="13" cy="13" r="3"/><circle cx="13" cy="13" r="7"/><circle cx="13" cy="13" r="11"/>
        </g>
      </svg>
      Ringwood
    </div>
    <a class="back" href="/">Home</a>
  </div>
</header>

<main class="wrap">
  <div class="intro">
    <div class="eyebrow">Ticket status</div>
    <h1>Tickets</h1>
    <p>Open work first, with the most recently updated on top. Switch to Closed, change the sort, or filter by client and topic. Open one to update it, add a note, or move it along.</p>
  </div>

  <div id="filters" style="display:flex;gap:10px;flex-wrap:wrap">
    <div class="field" style="flex:1;min-width:150px">
      <label for="status">Status</label>
      <select id="status">
        <option value="__open" selected>Open</option>
        <option value="__closed">Closed</option>
        <option value="__all">All</option>
        <option value="Open">— Open only</option>
        <option value="Scheduled">— Scheduled</option>
        <option value="In Progress">— In Progress</option>
        <option value="Complete">— Complete</option>
        <option value="Archived">— Archived</option>
      </select>
    </div>
    <div class="field" style="flex:1;min-width:150px">
      <label for="sort">Sort</label>
      <select id="sort">
        <option value="act" selected>Latest activity</option>
        <option value="new">Newest entered</option>
        <option value="old">Oldest entered</option>
      </select>
    </div>
    <div class="field" style="flex:1;min-width:150px">
      <label for="client">Client</label>
      <select id="client"><option value="">All clients</option></select>
    </div>
    <div class="field" style="flex:1;min-width:150px">
      <label for="topic">Topic</label>
      <select id="topic"><option value="">All topics</option></select>
    </div>
  </div>

  <div class="toolbar">
    <div id="count" style="color:var(--muted);font-size:.9rem"></div>
  </div>

  <div id="list"></div>
  <div id="editWrap"></div>
</main>

<script>
  var clientSel = document.getElementById("client");
  var topicSel = document.getElementById("topic");
  var statusSel = document.getElementById("status");
  var sortSel = document.getElementById("sort");
  var CLOSED = ["Complete","Closed","Archived"];
  // A client login only sees its own tickets, so hide the client filter and the
  // Client field in the editor.
  var IS_CLIENT = false, IS_MASTER = false;
  fetch("/api/whoami").then(function(r){return r.json();}).then(function(w){
    if (w && w.ok && w.role === "client"){ IS_CLIENT = true; var f = clientSel.closest(".field"); if (f) f.style.display = "none"; }
    if (w && w.ok && w.role === "master"){ IS_MASTER = true; }
  }).catch(function(){});
  var listEl = document.getElementById("list");
  var editWrap = document.getElementById("editWrap");
  var countEl = document.getElementById("count");
  var CATEGORIES = [];
  var CLIENTS = [];
  var LOCATIONS = [];
  var ALL_TICKETS = [];

  var STATUSES = ["Open","Scheduled","In Progress","Complete","Archived"];
  function statusTok(s){ return ({"Open":"open","Scheduled":"sched","In Progress":"prog","Complete":"done","Closed":"done","Archived":"arch"})[s] || "open"; }

  function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function fmtDate(s){ if(!s) return ""; try{ return new Date(s).toLocaleDateString(); }catch(e){ return ""; } }

  /* Read a chosen file, downscale it, and hand back base64 + content type. */
  function processPhoto(file){
    return new Promise(function(resolve, reject){
      var img = new Image();
      var url = URL.createObjectURL(file);
      img.onload = function(){
        var max = 1600, w = img.width, h = img.height;
        if (w > max || h > max){ if (w >= h){ h = Math.round(h*max/w); w = max; } else { w = Math.round(w*max/h); h = max; } }
        var c = document.createElement("canvas"); c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        var dataUrl = c.toDataURL("image/jpeg", 0.82);
        resolve({ base64: dataUrl.split(",")[1], contentType: "image/jpeg", preview: dataUrl });
      };
      img.onerror = function(){ URL.revokeObjectURL(url); reject(new Error("bad image")); };
      img.src = url;
    });
  }

  /* ---- resilient client list (cache + retry, like the other pages) ---- */
  var SEED_CLIENTS = [];
  var CACHE_KEY = "rw_lists_v3";
  function readClientsCache(){ try{ var c=JSON.parse(localStorage.getItem(CACHE_KEY)||"null"); return (c&&c.data&&c.data.clients&&c.data.clients.length)?c.data.clients:null; }catch(e){ return null; } }
  function writeClientsCache(clients){ try{ var c=JSON.parse(localStorage.getItem(CACHE_KEY)||"null")||{}; c.t=Date.now(); c.data=c.data||{}; c.data.clients=clients; localStorage.setItem(CACHE_KEY, JSON.stringify(c)); }catch(e){} }
  function renderClients(clients){
    CLIENTS = clients || [];
    var keep = clientSel.value;
    var html = "<option value=''>All clients</option>";
    CLIENTS.forEach(function(c){ html += "<option>" + esc(c) + "</option>"; });
    html += "<option value='__unassigned'>Unassigned</option>";
    clientSel.innerHTML = html;
    if(keep) clientSel.value = keep;
  }
  renderClients(readClientsCache() || SEED_CLIENTS);
  function loadClients(tries){
    tries = tries||0;
    fetch("/api/options", { cache:"no-store" }).then(function(r){return r.json();}).then(function(o){
      var clients = (o&&o.clients)||[];
      if(o&&o.locations&&o.locations.length) LOCATIONS = o.locations;
      if(!clients.length && tries<2){ setTimeout(function(){ loadClients(tries+1); }, 2500); return; }
      if(clients.length){ renderClients(clients); writeClientsCache(clients); }
    }).catch(function(){ if(tries<2) setTimeout(function(){ loadClients(tries+1); }, 2500); });
  }
  loadClients();

  function renderTopics(){
    var keep = topicSel.value;
    var html = "<option value=''>All topics</option>";
    CATEGORIES.forEach(function(c){ html += "<option>" + esc(c) + "</option>"; });
    topicSel.innerHTML = html;
    if(keep) topicSel.value = keep;
  }
  fetch("/api/categories", { cache:"no-store" }).then(function(r){return r.json();}).then(function(list){
    CATEGORIES = (list||[]).map(function(i){ return i.name; });
    renderTopics();
  }).catch(function(){});

  var ALL_ASSETS = [];
  fetch("/api/assets/list").then(function(r){return r.json();}).then(function(list){ ALL_ASSETS = Array.isArray(list)?list:[]; }).catch(function(){});

  // Show or hide the list "chrome" (intro + filters + count) so a selected ticket
  // appears on its own at the top, matching the asset lookup screen.
  var introEl = document.querySelector(".intro"), filtersEl = document.getElementById("filters"), toolbarEl = document.querySelector(".toolbar");
  function showChrome(show){
    var d = show ? "" : "none";
    if(introEl) introEl.style.display = d;
    if(filtersEl) filtersEl.style.display = show ? "flex" : "none";
    if(toolbarEl) toolbarEl.style.display = d;
  }
  // Back from a ticket to the list: restore the chrome and clear the deep link.
  function backToTicketList(){ history.replaceState(null,"","/status"); render(); window.scrollTo(0,0); }

  /* ---- tickets ---- */
  function loadAll(){
    editWrap.innerHTML = "";
    listEl.innerHTML = "<div class='empty'>Loading…</div>";
    fetch("/api/tickets/list?archived=1", { cache:"no-store" }).then(function(r){return r.json();}).then(function(rows){
      ALL_TICKETS = rows || [];
      // Deep link: /status?id=<ticketId> opens that ticket straight away.
      var openId = new URLSearchParams(location.search).get("id");
      if(openId){
        var tk = null;
        for(var i=0;i<ALL_TICKETS.length;i++){ if(ALL_TICKETS[i].id===openId){ tk = ALL_TICKETS[i]; break; } }
        if(tk){ openEdit(tk); return; }
      }
      render();
    }).catch(function(){ listEl.innerHTML = "<div class='empty'>Could not load tickets.</div>"; });
  }
  // Map client name -> assigned color (from the server) so the Client dropdown
  // can match the chips. Falls back to the deterministic color.
  var CLIENT_COLORS = {};
  function colorClientSelect(){
    ALL_TICKETS.forEach(function(t){ if(t.client && t.clientColor) CLIENT_COLORS[t.client] = t.clientColor; });
    function colFor(v){ return (!v || v.indexOf("__")===0) ? "" : (CLIENT_COLORS[v] || clientColor(v)); }
    for(var i=0;i<clientSel.options.length;i++){ var o=clientSel.options[i]; o.style.color = colFor(o.value) || ""; }
    var sel = colFor(clientSel.value);
    clientSel.style.color = sel || ""; clientSel.style.fontWeight = sel ? "700" : "";
  }

  function render(){
    editWrap.innerHTML = "";
    showChrome(true);
    colorClientSelect();
    var client = clientSel.value, topic = topicSel.value, status = statusSel.value, sort = sortSel.value;
    var rows = ALL_TICKETS.filter(function(t){
      // Status filter: Open bucket (active work), Closed bucket (Complete/Archived),
      // All, or one exact status.
      var closed = CLOSED.indexOf(t.status) >= 0;
      if (status === "__all") { /* show all */ }
      else if (status === "__open") { if (closed) return false; }
      else if (status === "__closed") { if (!closed) return false; }
      else if (status === "__active") { if (t.status === "Archived") return false; }
      else { if (t.status !== status) return false; }
      if (client === "__unassigned") { if (t.client) return false; }
      else if (client) { if (t.client !== client) return false; }
      if (topic && t.category !== topic) return false;
      return true;
    });
    // Sort: latest activity (newest note/change on top), or by entry date.
    rows.sort(function(a,b){
      if (sort === "old") return (a.created||"").localeCompare(b.created||"");
      if (sort === "new") return (b.created||"").localeCompare(a.created||"");
      return (b.lastActivity||b.created||"").localeCompare(a.lastActivity||a.created||"");  // latest activity
    });
    if(!rows.length){ listEl.innerHTML = "<div class='empty'>No tickets match.</div>"; countEl.textContent = ""; return; }
    countEl.textContent = rows.length + " ticket" + (rows.length===1?"":"s");
    listEl.innerHTML = rows.map(function(t){
      var updated = (t.hasNote && t.lastActivity && t.lastActivity > t.created) ? ("Updated " + fmtDate(t.lastActivity)) : "";
      var meta = [t.category, t.asset ? ("⚙ "+t.asset) : "", t.location, fmtDate(t.created), updated].filter(Boolean).map(esc).join(" · ");
      var actions;
      if (t.status === "Archived") actions = qbtn("Reopen", t.id, "Open");
      else if (t.status === "Complete" || t.status === "Closed") actions = qbtn("Reopen", t.id, "Open") + qbtn("Archive", t.id, "Archived");
      else actions = (t.status !== "In Progress" ? qbtn("Start", t.id, "In Progress") : "") + qbtn("Complete", t.id, "Complete") + qbtn("Archive", t.id, "Archived");
      var clientChip = (!IS_CLIENT && t.client) ? "<span class='client-chip' style='background:" + (t.clientColor||clientColor(t.client)) + "'>" + esc(t.client) + "</span>" : "";
      return "<div class='ticket' onclick='openEdit(" + esc(JSON.stringify(t)).replace(/'/g,"&#39;") + ")'>" +
        "<div class='body'><div class='t-title'>" + esc(t.title) + "</div>" +
        (meta ? "<div class='t-meta'>" + meta + "</div>" : "") +
        (t.description ? "<div class='t-meta'>" + esc(t.description) + "</div>" : "") +
        "<div class='actions'>" + actions + "</div>" +
        "</div><div class='rcol'>" + clientChip + "<span class='pill p-" + statusTok(t.status) + "'>" + esc(t.status) + "</span></div></div>";
    }).join("");
  }
  loadAll();

  function qbtn(label, id, status){
    return "<button class='qbtn' onclick='event.stopPropagation(); quickStatus(\"" + id + "\",\"" + status + "\")'>" + label + "</button>";
  }
  window.quickStatus = function(id, status){
    fetch("/api/tickets/update", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ id:id, status:status }) })
      .then(function(r){return r.json();}).then(function(){ loadAll(); }).catch(function(){ loadAll(); });
  };

  window.openEdit = function(t){
    listEl.innerHTML = "";
    countEl.textContent = "";
    showChrome(false);  // show the ticket on its own, at the top
    var existingPhotos = (t.photos && t.photos.length) ? t.photos.slice() : (t.photo ? [t.photo] : []);
    var newPhotos = [];          // {base64, contentType, preview}
    var genTitle = t.title || "";  // title the AI suggests, sent on save

    var statusList = STATUSES.slice();
    if (t.status && statusList.indexOf(t.status) < 0) statusList.unshift(t.status);  // keep any legacy value
    var statusOpts = statusList.map(function(s){ return "<option" + (t.status===s?" selected":"") + ">" + esc(s) + "</option>"; }).join("");
    var catOpts = "<option value=''>Select…</option>" + CATEGORIES.map(function(c){ return "<option" + (t.category===c?" selected":"") + ">" + esc(c) + "</option>"; }).join("");
    var clientOpts = "<option value=''>— none —</option>" + CLIENTS.map(function(c){ return "<option" + (t.client===c?" selected":"") + ">" + esc(c) + "</option>"; }).join("");
    var hasLoc = !t.location || LOCATIONS.indexOf(t.location) >= 0;
    var locOpts = "<option value=''>— not set —</option>" +
      LOCATIONS.map(function(l){ return "<option" + (t.location===l?" selected":"") + ">" + esc(l) + "</option>"; }).join("") +
      (t.location && !hasLoc ? "<option selected>" + esc(t.location) + "</option>" : "");
    var tClient = t.client || "";
    var assetArr = ALL_ASSETS.filter(function(a){ return !tClient || a.client === tClient; });
    assetArr.sort(function(a,b){ return (a.name||"").toLowerCase().localeCompare((b.name||"").toLowerCase()); });
    var assetOpts = "<option value=''>— None —</option>" +
      assetArr.map(function(a){ return "<option value='" + esc(a.id) + "'" + (t.assetId===a.id?" selected":"") + ">" + esc(a.name||"Asset") + "</option>"; }).join("") +
      "<option value='__new'>＋ New asset…</option>";

    editWrap.innerHTML =
      "<a href='#' class='back' style='display:inline-block;margin:4px 0 14px' onclick='backToTicketList();return false;'>&larr; Back to list</a>" +
      "<div class='panel'>" +
        "<h3>" + esc(t.title) + "</h3>" +
        "<div class='ref'>" + (t.ref?("Ref " + esc(t.ref) + " · "):"") + (t.client?esc(t.client):"Unassigned") + " · " + esc(t.status) + "</div>" +
        "<div class='field'><label>Title</label><input id='e_title' value='" + esc(t.title) + "' /></div>" +
        "<div class='field'><label>Status</label><select id='e_status'>" + statusOpts + "</select></div>" +
        (IS_CLIENT ? "" : "<div class='field'><label>Client</label><select id='e_client'>" + clientOpts + "</select></div>") +
        "<div class='field'><label>Category</label><select id='e_cat'>" + catOpts + "</select></div>" +
        "<div class='field'><label>Asset" + (t.assetId?(" <a href='/a/?id=" + esc(t.assetId) + "' style='font-weight:400;font-size:.85rem'>view</a>"):"") + "</label>" +
          "<select id='e_asset'>" + assetOpts + "</select>" +
          "<input id='e_newasset' type='text' placeholder='New asset name' style='display:none;margin-top:8px' /></div>" +
        "<div class='field'><label>Where is it?</label><select id='e_loc'>" + locOpts + "</select></div>" +
        "<div class='field'><label>Description</label>" +
          "<textarea id='e_desc' style='min-height:120px'>" + esc(t.description) + "</textarea>" +
          "<button class='qbtn' id='e_ai' type='button' style='margin-top:8px'>✨ Suggest with AI</button>" +
        "</div>" +
        "<div class='field'><label>Photos</label>" +
          "<div id='e_thumbs' style='display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px'></div>" +
          "<input type='file' id='e_file' accept='image/*' multiple capture='environment' />" +
        "</div>" +
        "<div class='logsec'>" +
          "<h4>Update log</h4>" +
          "<div class='log' id='e_log'><div class='empty-log'>Loading…</div></div>" +
          "<div class='addnote'><label for='e_note'>Add a note</label>" +
            "<textarea id='e_note' placeholder='Add an update or note for the record. " + (IS_CLIENT ? "Posts as " + esc(t.client||"you") + "." : "Posts as Ringwood.") + "'></textarea>" +
            "<div id='e_notethumbs' style='display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 4px'></div>" +
            "<div style='display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:4px'>" +
              "<label class='qbtn' for='e_notefile' style='cursor:pointer;display:inline-block'>📷 Add photo</label>" +
              "<input type='file' id='e_notefile' accept='image/*' multiple capture='environment' style='display:none' />" +
              "<label class='chk' style='font-weight:400;font-size:.9rem;display:flex;align-items:center;gap:7px;margin:0'><input type='checkbox' id='e_notetop' /> Also add to the photos up top</label>" +
            "</div>" +
            "<button class='btn' id='e_addnote' type='button' style='margin-top:10px'>Add note</button>" +
          "</div>" +
        "</div>" +
        "<div class='row2'><button class='btn' id='e_save' type='button'>Save</button>" +
        "<button class='btn ghost' id='e_back' type='button'>Back</button></div>" +
        "<div class='msg' id='e_msg'></div>" +
      "</div>";
    window.scrollTo(0,0);

    var eClientEl = document.getElementById("e_client");
    if (eClientEl){
      function eColFor(v){ return v ? (CLIENT_COLORS[v] || clientColor(v)) : ""; }
      for(var ci=0;ci<eClientEl.options.length;ci++){ var oo=eClientEl.options[ci]; oo.style.color = eColFor(oo.value) || ""; }
      function paintEClient(){ var c=eColFor(eClientEl.value); eClientEl.style.color=c||""; eClientEl.style.fontWeight=c?"700":""; }
      eClientEl.addEventListener("change", paintEClient); paintEClient();
    }

    var assetSelEl = document.getElementById("e_asset"), newAssetEl = document.getElementById("e_newasset");
    assetSelEl.addEventListener("change", function(){ newAssetEl.style.display = assetSelEl.value === "__new" ? "block" : "none"; if(assetSelEl.value==="__new") newAssetEl.focus(); });

    var thumbsEl = document.getElementById("e_thumbs");
    function renderThumbs(){
      var html = existingPhotos.map(function(u, i){
        return "<span style='position:relative;display:inline-block'>" +
          "<img class='zoomable' src='" + esc(u) + "' alt='' style='width:74px;height:74px;object-fit:cover;border-radius:6px;border:1px solid var(--line)' />" +
          "<button type='button' onclick='__rmPhoto(" + i + ")' style='position:absolute;top:-7px;right:-7px;width:22px;height:22px;border-radius:999px;border:none;background:var(--green-deep);color:#f6f2e8;font-size:13px;line-height:1;cursor:pointer'>×</button>" +
          "</span>";
      }).join("");
      html += newPhotos.map(function(p, i){
        return "<span style='position:relative;display:inline-block'>" +
          "<img class='zoomable' src='" + p.preview + "' alt='' style='width:74px;height:74px;object-fit:cover;border-radius:6px;border:1px solid var(--green)' />" +
          "<button type='button' onclick='__rmNewPhoto(" + i + ")' style='position:absolute;top:-7px;right:-7px;width:22px;height:22px;border-radius:999px;border:none;background:var(--green-deep);color:#f6f2e8;font-size:13px;line-height:1;cursor:pointer'>×</button>" +
          "</span>";
      }).join("");
      thumbsEl.innerHTML = html || "<span style='color:var(--muted);font-size:.9rem'>No photos yet.</span>";
    }
    window.__rmNewPhoto = function(i){ newPhotos.splice(i,1); renderThumbs(); };
    window.__rmPhoto = function(i){ existingPhotos.splice(i,1); renderThumbs(); };
    renderThumbs();

    document.getElementById("e_file").addEventListener("change", function(e){
      var files = Array.prototype.slice.call(e.target.files||[]);
      e.target.value = "";
      Promise.all(files.map(processPhoto)).then(function(arr){
        arr.forEach(function(p){ newPhotos.push(p); });
        renderThumbs();
      }).catch(function(){ document.getElementById("e_msg").textContent = "Couldn't read one of the photos."; });
    });

    document.getElementById("e_ai").addEventListener("click", function(){
      var b = document.getElementById("e_ai"); b.disabled = true; b.textContent = "Thinking…";
      var msg = document.getElementById("e_msg"); msg.textContent = "";
      var payload = {
        note: document.getElementById("e_desc").value,
        photos: newPhotos.map(function(p){ return { base64:p.base64, contentType:p.contentType }; }),
        photoUrls: existingPhotos
      };
      fetch("/api/tickets/suggest", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify(payload) })
        .then(function(r){return r.json();}).then(function(d){
          b.disabled = false; b.textContent = "✨ Suggest with AI";
          if(d&&d.ok){
            if(d.description) document.getElementById("e_desc").value = d.description;
            if(d.category){ var cs=document.getElementById("e_cat"); for(var i=0;i<cs.options.length;i++){ if(cs.options[i].value===d.category||cs.options[i].text===d.category){ cs.selectedIndex=i; break; } } }
            if(d.title){ genTitle = d.title; document.getElementById("e_title").value = d.title; }
          } else { msg.textContent = (d&&d.error)||"The assistant couldn't respond."; }
        }).catch(function(){ b.disabled=false; b.textContent="✨ Suggest with AI"; msg.textContent="Couldn't reach the assistant."; });
    });

    /* ---- update log ---- */
    var logEl = document.getElementById("e_log");
    var noteCol = (t.clientColor || clientColor(t.client || "")) ;
    var LOG_ROWS = {};
    function fmtWhen(s){ if(!s) return ""; try{ var d=new Date(s); return d.toLocaleDateString() + " " + d.toLocaleTimeString([], {hour:"numeric", minute:"2-digit"}); }catch(e){ return ""; } }
    function renderLog(rows){
      LOG_ROWS = {};
      if(!rows || !rows.length){ logEl.innerHTML = "<div class='empty-log'>No updates yet. Add the first note below.</div>"; return; }
      logEl.innerHTML = rows.map(function(c){
        LOG_ROWS[c.id] = c;
        var isEvent = c.kind === "event";
        var col = c.role === "client" ? noteCol : "var(--green-deep)";
        var whoStyle = (isEvent || c.role !== "client") ? "" : (" style='background:" + col + "'");
        // Master can clean up the log: edit notes, delete anything.
        var ctrls = "";
        if (IS_MASTER){
          ctrls = "<span class='lgctrl'>" +
            (isEvent ? "" : "<button type='button' class='lgbtn' data-act='edit' data-cid='" + esc(c.id) + "'>Edit</button>") +
            "<button type='button' class='lgbtn del' data-act='del' data-cid='" + esc(c.id) + "'>Delete</button>" +
          "</span>";
        }
        var photos = (c.photos && c.photos.length) ?
          "<div class='photos'>" + c.photos.map(function(u){ return "<img class='zoomable' src='" + esc(u) + "' alt='note photo' />"; }).join("") + "</div>" : "";
        return "<div class='lg " + (isEvent?"event":"note") + "' data-cid='" + esc(c.id) + "'>" +
          "<div class='lghead'><span class='who'" + whoStyle + ">" + esc(c.author) + "</span>" +
          "<span class='meta'>" + esc(fmtWhen(c.created)) + "</span>" + ctrls + "</div>" +
          (c.body ? "<div class='text'>" + esc(c.body) + "</div>" : "") +
          photos +
        "</div>";
      }).join("");
    }
    function loadLog(){
      fetch("/api/tickets/comments?id=" + encodeURIComponent(t.id), { cache:"no-store" })
        .then(function(r){return r.json();}).then(renderLog)
        .catch(function(){ logEl.innerHTML = "<div class='empty-log'>Couldn't load the log.</div>"; });
    }
    // Master edit/delete, via delegation so it survives re-renders.
    logEl.addEventListener("click", function(e){
      var btn = e.target.closest ? e.target.closest(".lgbtn") : null;
      if(!btn) return;
      var cid = btn.getAttribute("data-cid"), act = btn.getAttribute("data-act");
      var row = LOG_ROWS[cid]; if(!row) return;
      if(act === "del"){
        if(!confirm("Delete this entry? This can't be undone.")) return;
        fetch("/api/tickets/comment/delete", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ commentId:cid }) })
          .then(function(r){return r.json();}).then(function(d){ if(d&&d.ok){ loadLog(); } else { alert((d&&d.error)||"Couldn't delete."); } })
          .catch(function(){ alert("Couldn't reach the server."); });
        return;
      }
      if(act === "edit"){
        var lg = btn.closest(".lg"); var textEl = lg.querySelector(".text");
        if(lg.querySelector(".lgedit")) return;  // already editing
        var wrap = document.createElement("div"); wrap.className = "lgedit";
        var ta = document.createElement("textarea"); ta.value = row.body || "";
        var bar = document.createElement("div"); bar.className = "lgeditbar";
        var save = document.createElement("button"); save.type="button"; save.className="lgbtn"; save.textContent="Save";
        var cancel = document.createElement("button"); cancel.type="button"; cancel.className="lgbtn"; cancel.textContent="Cancel";
        bar.appendChild(save); bar.appendChild(cancel); wrap.appendChild(ta); wrap.appendChild(bar);
        textEl.style.display = "none"; lg.appendChild(wrap); ta.focus();
        cancel.addEventListener("click", function(){ wrap.remove(); textEl.style.display=""; });
        save.addEventListener("click", function(){
          var nv = (ta.value||"").trim(); if(!nv){ ta.focus(); return; }
          save.disabled = true; save.textContent = "Saving…";
          fetch("/api/tickets/comment/update", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ commentId:cid, body:nv }) })
            .then(function(r){return r.json();}).then(function(d){ if(d&&d.ok){ loadLog(); } else { save.disabled=false; save.textContent="Save"; alert((d&&d.error)||"Couldn't save."); } })
            .catch(function(){ save.disabled=false; save.textContent="Save"; alert("Couldn't reach the server."); });
        });
      }
    });
    loadLog();
    // Photos attached to a new note (before it's posted).
    var notePhotos = [];
    var noteThumbs = document.getElementById("e_notethumbs");
    function renderNoteThumbs(){
      noteThumbs.innerHTML = notePhotos.map(function(p, i){
        return "<span style='position:relative;display:inline-block'>" +
          "<img class='zoomable' src='" + p.preview + "' alt='' style='width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--green)' />" +
          "<button type='button' onclick='__rmNotePhoto(" + i + ")' style='position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:999px;border:none;background:var(--green-deep);color:#f6f2e8;font-size:12px;line-height:1;cursor:pointer'>×</button>" +
        "</span>";
      }).join("");
    }
    window.__rmNotePhoto = function(i){ notePhotos.splice(i,1); renderNoteThumbs(); };
    document.getElementById("e_notefile").addEventListener("change", function(e){
      var files = Array.prototype.slice.call(e.target.files||[]); e.target.value = "";
      Promise.all(files.map(processPhoto)).then(function(arr){
        arr.forEach(function(p){ notePhotos.push(p); }); renderNoteThumbs();
      }).catch(function(){ document.getElementById("e_msg").textContent = "Couldn't read one of the photos."; });
    });

    document.getElementById("e_addnote").addEventListener("click", function(){
      var ta = document.getElementById("e_note");
      var text = (ta.value||"").trim();
      var msg = document.getElementById("e_msg"); msg.textContent = "";
      if(!text && !notePhotos.length){ ta.focus(); return; }
      var b = this; b.disabled = true; b.textContent = "Adding…";
      var payload = {
        id: t.id,
        body: text,
        photos: notePhotos.map(function(p){ return { base64:p.base64, contentType:p.contentType }; }),
        alsoTop: document.getElementById("e_notetop").checked
      };
      fetch("/api/tickets/comment", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify(payload) })
        .then(function(r){return r.json();}).then(function(d){
          b.disabled = false; b.textContent = "Add note";
          if(d&&d.ok){ ta.value = ""; notePhotos = []; renderNoteThumbs(); document.getElementById("e_notetop").checked = false; loadLog(); }
          else { msg.textContent = (d&&d.error)||"Couldn't add the note."; }
        }).catch(function(){ b.disabled=false; b.textContent="Add note"; msg.textContent="Couldn't reach the server."; });
    });

    document.getElementById("e_back").addEventListener("click", backToTicketList);
    document.getElementById("e_save").addEventListener("click", function(){
      var b = document.getElementById("e_save"); b.disabled = true; b.textContent = "Saving…";
      var ecl = document.getElementById("e_client");
      var payload = {
        id: t.id,
        status: document.getElementById("e_status").value,
        client: ecl ? ecl.value : undefined,
        category: document.getElementById("e_cat").value,
        location: document.getElementById("e_loc").value,
        description: document.getElementById("e_desc").value,
        title: document.getElementById("e_title").value || genTitle,
        keepPhotos: existingPhotos,
        addPhotos: newPhotos.map(function(p){ return { base64:p.base64, contentType:p.contentType }; })
      };
      if (assetSelEl.value === "__new"){ var nn = newAssetEl.value.trim(); if(nn) payload.newAssetName = nn; }
      else { payload.assetId = assetSelEl.value; }  // "" clears the link
      fetch("/api/tickets/update", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify(payload) })
        .then(function(r){return r.json();}).then(function(d){
          if(d&&d.ok){ loadAll(); }
          else { b.disabled=false; b.textContent="Save"; document.getElementById("e_msg").textContent=(d&&d.error)||"Save failed."; }
        }).catch(function(){ b.disabled=false; b.textContent="Save"; document.getElementById("e_msg").textContent="Couldn't reach the server."; });
    });
  };

  clientSel.addEventListener("change", render);
  topicSel.addEventListener("change", render);
  statusSel.addEventListener("change", render);
  sortSel.addEventListener("change", render);
</script>
<script src="/lightbox.js"></script>
<script src="/whoami-badge.js"></script>
</body>
</html>
