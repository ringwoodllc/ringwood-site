<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1f3d2b" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ticket Status" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<title>Ringwood · Ticket status</title>
<meta name="description" content="See and manage tickets by client. Open, close, or archive." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="/client-color.js"></script>
<style>
  :root{
    --bg:#f4efe4;--bg-2:#efe8d8;--ink:#23282a;--muted:#5f5d52;
    --green:#2f5d50;--green-deep:#21443a;--clay:#a9633a;--line:rgba(35,40,42,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:"Hanken Grotesk",-apple-system,sans-serif;font-size:18px;line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:640px;margin:0 auto;padding:0 22px}
  h1,h2,h3{font-family:"Spectral",Georgia,serif;font-weight:500;line-height:1.1;letter-spacing:-.01em;color:var(--green-deep)}
  a{color:inherit}
  header{padding:24px 0}
  .bar{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:11px;font-family:"Spectral",serif;font-size:1.25rem;font-weight:600;color:var(--green-deep)}
  .back{font-size:.92rem;text-decoration:none;color:var(--green-deep);border-bottom:1px solid var(--clay);padding-bottom:1px}
  .intro{margin:18px 0 22px}
  .eyebrow{font-size:.8rem;letter-spacing:.18em;text-transform:uppercase;color:var(--clay);font-weight:600;margin-bottom:12px}
  .intro h1{font-size:clamp(2rem,7vw,2.7rem)}
  .intro p{margin-top:10px;color:var(--muted);font-size:1.04rem}

  .field{margin-bottom:16px}
  .frow{display:flex;gap:12px;flex-wrap:wrap}
  .frow>.field{flex:1;min-width:150px}
  label{display:block;font-weight:600;font-size:.96rem;color:var(--green-deep);margin-bottom:7px}
  input,select,textarea{width:100%;font:inherit;font-size:1.02rem;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:4px;padding:13px 14px;-webkit-appearance:none;appearance:none}
  select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' fill='none' stroke='%235f5d52' stroke-width='1.6'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:38px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green)}
  textarea{min-height:90px;resize:vertical}

  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:4px 0 14px}
  #filters{margin:8px 0 4px}
  .schips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .schip{display:inline-flex;align-items:center;gap:7px;background:var(--bg-2);border:1px solid var(--line);border-radius:999px;padding:9px 14px;font:inherit;font-size:.9rem;font-weight:600;color:var(--green-deep);cursor:pointer}
  .schip:hover{border-color:var(--green)}
  .schip b{background:var(--line);color:var(--muted);border-radius:999px;padding:1px 8px;font-size:.78rem;min-width:20px;text-align:center}
  .schip.on{background:var(--green);color:#f6f2e8;border-color:var(--green)}
  .schip.on b{background:rgba(255,255,255,.28);color:#f6f2e8}
  .schip.review.on{background:#9a7b12;border-color:#9a7b12}
  .schip .cdot{width:8px;height:8px;border-radius:50%;display:inline-block;flex:0 0 auto}
  .schip.open .cdot{background:#2f5d50}
  .schip.review .cdot{background:#9a7b12}
  .schip.closed .cdot{background:#9a958a}
  .schip.all .cdot{background:transparent;border:1.5px solid var(--muted)}
  .schip.on .cdot{background:#f6f2e8;border-color:#f6f2e8}
  .filterbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
  .filterbar .mini{flex:0 1 auto;width:auto;min-width:150px;padding:9px 12px;font-size:.9rem}
  .archk{display:flex;align-items:center;gap:7px;font-size:.9rem;color:var(--muted);font-weight:600;white-space:nowrap;cursor:pointer}
  .archk input[type=checkbox]{-webkit-appearance:checkbox;appearance:auto;width:17px;height:17px;accent-color:var(--green);padding:0;margin:0}
  .archbtn{background:transparent;border:1px solid var(--line);color:var(--green-deep);border-radius:999px;padding:8px 14px;font:inherit;font-size:.86rem;font-weight:600;cursor:pointer}
  .archbtn.on{background:var(--green);color:#f6f2e8;border-color:var(--green)}

  .ticket{background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;gap:12px;align-items:flex-start}
  .ticket:hover{border-color:var(--green)}
  .ticket .body{flex:1;min-width:0}
  .ticket .t-title{font-weight:600;color:var(--green-deep);font-size:1rem;word-break:break-word}
  .ticket .t-meta{color:var(--muted);font-size:.86rem;margin-top:3px}
  .pill{flex:0 0 auto;font-size:.72rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:4px 9px;border-radius:999px;margin-top:2px}
  .pill.p-open{background:#e3efe7;color:var(--green-deep)}
  .pill.p-sched{background:#eadcc4;color:#6b5524}
  .pill.p-prog{background:#dfe9f4;color:#274a73}
  .pill.p-done{background:#e7e2d6;color:#545047}
  .pill.p-arch{background:#f0e0d4;color:#7a4a26}
  .pill.p-review{background:#f6eccf;color:#7a5a12}
  .qbtn.rev{background:var(--green);color:#f6f2e8;border-color:var(--green)}
  .rcol{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .client-chip{font-size:.8rem;font-weight:700;color:#f6f2e8;background:var(--green-deep);padding:4px 11px;border-radius:999px;white-space:nowrap;max-width:130px;overflow:hidden;text-overflow:ellipsis}
  .actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .qbtn{background:var(--bg);border:1px solid var(--line);color:var(--green-deep);border-radius:999px;padding:9px 15px;font:inherit;font-size:.82rem;font-weight:600;cursor:pointer}
  .qbtn:hover{border-color:var(--green)}
  .empty{color:var(--muted);padding:18px 4px}

  .btn{width:100%;background:var(--green);color:#f6f2e8;border:none;cursor:pointer;font-weight:600;font-size:1.05rem;padding:15px;border-radius:4px}
  .btn:hover{background:var(--green-deep)}
  .btn:disabled{opacity:.6;cursor:default}
  .btn.ghost{background:transparent;color:var(--green-deep);border:1px solid var(--line)}
  .panel{background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:20px 18px;margin-bottom:40px}
  .panel h3{font-size:1.2rem;margin-bottom:4px}
  .rev-pill{display:inline-block;font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 10px;border-radius:999px;vertical-align:middle;margin-right:8px}
  .rev-pill.need{background:#f6eccf;color:#7a5a12}
  .rev-pill.ok{background:#e3efe7;color:#21443a}
  .panel .ref{color:var(--muted);font-size:.86rem;margin-bottom:14px}
  .panel img.photo{width:100%;max-height:240px;object-fit:cover;border-radius:6px;border:1px solid var(--line);margin-bottom:14px}
  .row2{display:flex;gap:10px;margin-top:6px}
  .row2 .btn{padding:13px}
  .msg{margin-top:12px;font-size:.92rem;color:#8a3d1c}

  /* Per-ticket update log */
  .logsec{border-top:1px solid var(--line);margin:22px 0 6px;padding-top:18px}
  .logsec h4{font-family:"Spectral",serif;font-weight:600;font-size:1.06rem;color:var(--green-deep);margin-bottom:12px}
  .log{display:flex;flex-direction:column;gap:12px;margin-bottom:14px}
  .lg{display:flex;flex-direction:column;gap:3px}
  .lg .lghead{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .lg .who{font-weight:700;font-size:.84rem;color:#f6f2e8;background:var(--green-deep);padding:2px 10px;border-radius:999px}
  .lg .meta{font-size:.78rem;color:var(--muted)}
  .lgctrl{margin-left:auto;display:flex;gap:6px}
  .lgbtn{background:var(--bg);border:1px solid var(--line);color:var(--green-deep);border-radius:999px;padding:3px 11px;font:inherit;font-size:.78rem;font-weight:600;cursor:pointer}
  .lgbtn:hover{border-color:var(--green)}
  .lgbtn.del{color:#8a3d1c}
  .lgedit{margin-top:6px}
  .lgedit textarea{min-height:56px}
  .lgeditbar{display:flex;gap:8px;margin-top:6px}
  .lg .text{font-size:.98rem;color:var(--ink);white-space:pre-wrap;word-break:break-word}
  .lg.event .text{color:var(--muted);font-style:italic;font-size:.9rem}
  .lg.event .who{background:var(--bg);color:var(--muted);border:1px solid var(--line)}
  .lg.agent{background:#eef3ef;border:1px solid var(--line);border-radius:6px;padding:10px 12px}
  .lg.agent .text{color:var(--green-deep);font-style:normal;font-size:.92rem}
  .lg.agent .who{background:#e3efe7;color:var(--green-deep);border-color:transparent}
  .log .empty-log{color:var(--muted);font-size:.92rem}
  .intake{margin-bottom:12px}
  .intake-tog{background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:8px 12px;font:inherit;font-size:.86rem;font-weight:600;color:var(--green-deep);cursor:pointer;display:inline-flex;align-items:center;gap:7px}
  .intake-tog:hover{border-color:var(--green)}
  .intake-tog #intakeIco{font-size:1rem;width:14px;display:inline-block;text-align:center}
  .intake-body{margin-top:8px;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:11px 13px;font-size:.94rem;color:var(--ink);white-space:pre-wrap}
  .evico{opacity:.7;margin-right:2px}
  .lgmore{background:var(--bg);border:1px solid var(--line);color:var(--green-deep);border-radius:999px;width:22px;height:22px;line-height:1;font:inherit;font-size:.9rem;font-weight:700;cursor:pointer;vertical-align:middle;padding:0}
  .lgmore:hover{border-color:var(--green)}
  .evdetail{margin-top:7px;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:9px 11px;font-size:.86rem;color:var(--muted);white-space:pre-wrap}
  .addnote textarea{min-height:64px}
  .addnote .btn{width:auto;padding:10px 20px;font-size:.96rem}
  .chk input[type=checkbox]{-webkit-appearance:checkbox;appearance:auto;width:18px;height:18px;accent-color:var(--green);padding:0}
  .lg .photos{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .lg .photos img{width:84px;height:84px;object-fit:cover;border-radius:6px;border:1px solid var(--line);cursor:pointer}
</style>
</head>
<body>

<header>
  <div class="wrap bar">
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 26 26" aria-hidden="true">
        <g fill="none" stroke="#2f5d50" stroke-width="1.4">
          <circle cx="13" cy="13" r="3"/><circle cx="13" cy="13" r="7"/><circle cx="13" cy="13" r="11"/>
        </g>
      </svg>
      Ringwood
    </div>
    <a class="back" href="/app">Home</a>
  </div>
</header>

<main class="wrap">
  <div class="intro">
    <div class="eyebrow">Ticket status</div>
    <h1>Tickets</h1>
    <p>Open work first, with the most recently updated on top. Switch to Closed, change the sort, or filter by client and topic. Open one to update it, add a note, or move it along.</p>
  </div>

  <div id="filters">
    <div id="statChips" class="schips"></div>
    <div class="filterbar">
      <select id="sort" class="mini">
        <option value="act" selected>Latest activity</option>
        <option value="new">Newest</option>
        <option value="old">Oldest</option>
      </select>
      <select id="client" class="mini"><option value="">All clients</option></select>
      <label class="archk" id="archkWrap"><input type="checkbox" id="showArch" /> Show archived</label>
    </div>
  </div>

  <div class="toolbar">
    <div id="count" style="color:var(--muted);font-size:.9rem"></div>
  </div>

  <div id="list"></div>
  <div id="editWrap"></div>
</main>

<script>
  var clientSel = document.getElementById("client");
  var sortSel = document.getElementById("sort");
  var showArchEl = document.getElementById("showArch");
  var chipsEl = document.getElementById("statChips");
  var curStatus = "open";  // open | review | closed | all (driven by the chips)
  var CLOSED = ["Complete","Closed","Archived"];
  // A client login only sees its own tickets, so hide the client filter and the
  // Client field in the editor.
  var IS_CLIENT = false, IS_MASTER = false;
  fetch("/api/whoami").then(function(r){return r.json();}).then(function(w){
    if (w && w.ok && w.role === "client"){
      IS_CLIENT = true;
      // A client only sees its own tickets, never archived: hide the client picker
      // and the Show archived toggle. The chips drop "Needs review" too (admin only).
      clientSel.style.display = "none";
      var aw = document.getElementById("archkWrap"); if (aw) aw.style.display = "none";
    }
    if (w && w.ok && w.role === "master"){ IS_MASTER = true; }
    renderChips();
  }).catch(function(){ renderChips(); });

  // The status chips double as a counter (like the asset icons) and the filter.
  function renderChips(){
    if(!chipsEl) return;
    var showArch = !!(showArchEl && showArchEl.checked);
    var cl = clientSel.value;
    var scoped = (ALL_TICKETS||[]).filter(function(t){
      if(!showArch && t.status === "Archived") return false;
      if(cl === "__unassigned"){ if(t.client) return false; }
      else if(cl){ if(t.client !== cl) return false; }
      return true;
    });
    function isClosed(t){ return CLOSED.indexOf(t.status) >= 0; }
    var nOpen = scoped.filter(function(t){ return !isClosed(t); }).length;
    var nReview = scoped.filter(function(t){ return !t.reviewed && !isClosed(t); }).length;
    var nClosed = scoped.filter(isClosed).length;
    var chips = [{k:"open",label:"Open",n:nOpen}];
    if(!IS_CLIENT) chips.push({k:"review",label:"Needs review",n:nReview});
    chips.push({k:"closed",label:"Closed",n:nClosed});
    chips.push({k:"all",label:"All",n:scoped.length});
    chipsEl.innerHTML = chips.map(function(c){
      return "<button type='button' class='schip "+c.k+(curStatus===c.k?" on":"")+"' data-st='"+c.k+"'><span class='cdot'></span>"+c.label+" <b>"+c.n+"</b></button>";
    }).join("");
    Array.prototype.slice.call(chipsEl.querySelectorAll(".schip")).forEach(function(btn){
      btn.addEventListener("click", function(){ curStatus = btn.getAttribute("data-st"); render(); });
    });
  }
  var listEl = document.getElementById("list");
  var editWrap = document.getElementById("editWrap");
  var countEl = document.getElementById("count");
  var CATEGORIES = [];
  var CLIENTS = [];
  var LOCATIONS = [];
  var ALL_TICKETS = [];

  var STATUSES = ["Open","Scheduled","In Progress","Complete","Archived"];
  function statusTok(s){ return ({"Open":"open","Scheduled":"sched","In Progress":"prog","Complete":"done","Closed":"done","Archived":"arch"})[s] || "open"; }

  function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
  function fmtDate(s){ if(!s) return ""; try{ return new Date(s).toLocaleDateString(); }catch(e){ return ""; } }

  /* Read a chosen file, downscale it, and hand back base64 + content type. */
  function processPhoto(file){
    return new Promise(function(resolve, reject){
      var img = new Image();
      var url = URL.createObjectURL(file);
      img.onload = function(){
        var max = 1600, w = img.width, h = img.height;
        if (w > max || h > max){ if (w >= h){ h = Math.round(h*max/w); w = max; } else { w = Math.round(w*max/h); h = max; } }
        var c = document.createElement("canvas"); c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        var dataUrl = c.toDataURL("image/jpeg", 0.82);
        resolve({ base64: dataUrl.split(",")[1], contentType: "image/jpeg", preview: dataUrl });
      };
      img.onerror = function(){ URL.revokeObjectURL(url); reject(new Error("bad image")); };
      img.src = url;
    });
  }

  /* ---- resilient client list (cache + retry, like the other pages) ---- */
  var SEED_CLIENTS = [];
  var CACHE_KEY = "rw_lists_v3";
  function readClientsCache(){ try{ var c=JSON.parse(localStorage.getItem(CACHE_KEY)||"null"); return (c&&c.data&&c.data.clients&&c.data.clients.length)?c.data.clients:null; }catch(e){ return null; } }
  function writeClientsCache(clients){ try{ var c=JSON.parse(localStorage.getItem(CACHE_KEY)||"null")||{}; c.t=Date.now(); c.data=c.data||{}; c.data.clients=clients; localStorage.setItem(CACHE_KEY, JSON.stringify(c)); }catch(e){} }
  // CLIENTS is the full list (used by the editor's Client dropdown). The filter
  // dropdown, though, only lists clients that actually have tickets — no hunting
  // through empty clients.
  function renderClients(clients){ CLIENTS = clients || []; }
  function buildClientFilter(){
    var names = {}, hasUn = false;
    (ALL_TICKETS||[]).forEach(function(t){ if(t.client) names[t.client]=true; else hasUn=true; });
    var list = Object.keys(names).sort(function(a,b){ return a.toLowerCase().localeCompare(b.toLowerCase()); });
    var keep = clientSel.value;
    var html = "<option value=''>All clients</option>" + list.map(function(c){ return "<option>"+esc(c)+"</option>"; }).join("");
    if(hasUn) html += "<option value='__unassigned'>Unassigned</option>";
    clientSel.innerHTML = html;
    if(keep){ clientSel.value = keep; if(clientSel.value !== keep) clientSel.value = ""; }
  }
  renderClients(readClientsCache() || SEED_CLIENTS);
  function loadClients(tries){
    tries = tries||0;
    fetch("/api/options", { cache:"no-store" }).then(function(r){return r.json();}).then(function(o){
      var clients = (o&&o.clients)||[];
      if(o&&o.locations&&o.locations.length) LOCATIONS = o.locations;
      if(!clients.length && tries<2){ setTimeout(function(){ loadClients(tries+1); }, 2500); return; }
      if(clients.length){ renderClients(clients); writeClientsCache(clients); }
    }).catch(function(){ if(tries<2) setTimeout(function(){ loadClients(tries+1); }, 2500); });
  }
  loadClients();

  // Categories still power the editor's Topic dropdown; there's no Topic list filter.
  fetch("/api/categories", { cache:"no-store" }).then(function(r){return r.json();}).then(function(list){
    CATEGORIES = (list||[]).map(function(i){ return i.name; });
  }).catch(function(){});

  var ALL_ASSETS = [];
  fetch("/api/assets/list").then(function(r){return r.json();}).then(function(list){ ALL_ASSETS = Array.isArray(list)?list:[]; }).catch(function(){});

  // Show or hide the list "chrome" (intro + filters + count) so a selected ticket
  // appears on its own at the top, matching the asset lookup screen.
  var introEl = document.querySelector(".intro"), filtersEl = document.getElementById("filters"), toolbarEl = document.querySelector(".toolbar");
  function showChrome(show){
    var d = show ? "" : "none";
    if(introEl) introEl.style.display = d;
    if(filtersEl) filtersEl.style.display = show ? "flex" : "none";
    if(toolbarEl) toolbarEl.style.display = d;
  }
  // Back from a ticket to the list: restore the chrome and clear the deep link.
  function backToTicketList(){ history.replaceState(null,"","/status"); render(); refreshTickets(); window.scrollTo(0,0); }
  // Re-fetch the tickets and re-render the list, so edits made on a ticket show
  // up when you come back. Keeps the current list visible until the data lands.
  function refreshTickets(){
    return fetch("/api/tickets/list?archived=1",{cache:"no-store"}).then(function(r){return r.json();}).then(function(rows){
      ALL_TICKETS = rows || []; render();
    }).catch(function(){});
  }
  // Open a ticket straight from its id (used by deep links and the back gesture).
  function openById(id, push){
    for(var i=0;i<ALL_TICKETS.length;i++){ if(ALL_TICKETS[i].id===id){ openEdit(ALL_TICKETS[i], push); return true; } }
    return false;
  }
  // The phone's back gesture / button fires popstate: show whatever the URL says.
  window.addEventListener("popstate", function(){
    var id = new URLSearchParams(location.search).get("id");
    if(id && openById(id, false)) return;
    render(); refreshTickets(); window.scrollTo(0,0);
  });
  // Returning to the list from a full page nav (browser back): refresh it too.
  window.addEventListener("pageshow", function(e){ if(e.persisted && !editWrap.innerHTML) refreshTickets(); });

  /* ---- tickets ---- */
  function loadAll(){
    editWrap.innerHTML = "";
    listEl.innerHTML = "<div class='empty'>Loading…</div>";
    fetch("/api/tickets/list?archived=1", { cache:"no-store" }).then(function(r){return r.json();}).then(function(rows){
      ALL_TICKETS = rows || [];
      // Deep link: /status?id=<ticketId> opens that ticket straight away.
      var openId = new URLSearchParams(location.search).get("id");
      if(openId){
        var tk = null;
        for(var i=0;i<ALL_TICKETS.length;i++){ if(ALL_TICKETS[i].id===openId){ tk = ALL_TICKETS[i]; break; } }
        if(tk){ openEdit(tk); return; }
      }
      render();
    }).catch(function(){ listEl.innerHTML = "<div class='empty'>Could not load tickets.</div>"; });
  }
  // Map client name -> assigned color (from the server) so the Client dropdown
  // can match the chips. Falls back to the deterministic color.
  var CLIENT_COLORS = {};
  function colorClientSelect(){
    ALL_TICKETS.forEach(function(t){ if(t.client && t.clientColor) CLIENT_COLORS[t.client] = t.clientColor; });
    function colFor(v){ return (!v || v.indexOf("__")===0) ? "" : (CLIENT_COLORS[v] || clientColor(v)); }
    for(var i=0;i<clientSel.options.length;i++){ var o=clientSel.options[i]; o.style.color = colFor(o.value) || ""; }
    var sel = colFor(clientSel.value);
    clientSel.style.color = sel || ""; clientSel.style.fontWeight = sel ? "700" : "";
  }

  function render(){
    editWrap.innerHTML = "";
    showChrome(true);
    buildClientFilter();
    colorClientSelect();
    var client = clientSel.value, sort = sortSel.value;
    var showArch = !!(showArchEl && showArchEl.checked);
    renderChips();
    var rows = ALL_TICKETS.filter(function(t){
      // Archived is an advanced view: hidden unless "Show archived" is on.
      if (!showArch && t.status === "Archived") return false;
      // Status buckets, driven by the chips: open work, the review queue, closed, or all.
      var closed = CLOSED.indexOf(t.status) >= 0;
      if (curStatus === "all") { /* show all (within the archive setting) */ }
      else if (curStatus === "review") { if (t.reviewed || closed) return false; }  // review queue = active tickets only
      else if (curStatus === "open") { if (closed) return false; }
      else if (curStatus === "closed") { if (!closed) return false; }
      if (client === "__unassigned") { if (t.client) return false; }
      else if (client) { if (t.client !== client) return false; }
      return true;
    });
    // Sort: latest activity (newest note/change on top), or by entry date.
    rows.sort(function(a,b){
      if (sort === "old") return (a.created||"").localeCompare(b.created||"");
      if (sort === "new") return (b.created||"").localeCompare(a.created||"");
      return (b.lastActivity||b.created||"").localeCompare(a.lastActivity||a.created||"");  // latest activity
    });
    if(!rows.length){ listEl.innerHTML = "<div class='empty'>No tickets match.</div>"; countEl.textContent = ""; return; }
    countEl.textContent = rows.length + " ticket" + (rows.length===1?"":"s");
    listEl.innerHTML = rows.map(function(t){
      var updated = (t.hasNote && t.lastActivity && t.lastActivity > t.created) ? ("Updated " + fmtDate(t.lastActivity)) : "";
      var meta = [t.category, t.asset ? ("⚙ "+t.asset) : "", t.location, t.assignedTo ? ("👤 "+t.assignedTo) : "", fmtDate(t.created), updated].filter(Boolean).map(esc).join(" · ");
      // Review only applies to active tickets, not Complete/Archived ones.
      var isClosedRow = (t.status === "Complete" || t.status === "Closed" || t.status === "Archived");
      var needsReview = !t.reviewed && !isClosedRow;
      // Confirm (review), Start and Complete are admin-only; a client can only Archive (dismiss).
      var actions = "";
      if (!IS_CLIENT){
        if (needsReview) actions += reviewBtn(t.id);
        if (t.status === "Archived") actions += qbtn("Reopen", t.id, "Open");
        else if (t.status === "Complete" || t.status === "Closed") actions += qbtn("Reopen", t.id, "Open") + qbtn("Archive", t.id, "Archived");
        else actions += (t.status !== "In Progress" ? qbtn("Start", t.id, "In Progress") : "") + qbtn("Complete", t.id, "Complete") + qbtn("Archive", t.id, "Archived");
      } else {
        // Client: dismiss (Archive) only.
        if (t.status !== "Archived") actions += qbtn("Archive", t.id, "Archived");
      }
      var clientChip = (!IS_CLIENT && t.client) ? "<span class='client-chip' style='background:" + (t.clientColor||clientColor(t.client)) + "'>" + esc(t.client) + "</span>" : "";
      var reviewPill = (needsReview && !IS_CLIENT) ? "<span class='pill p-review'>Needs review</span>" : "";
      return "<div class='ticket' onclick='openEdit(" + esc(JSON.stringify(t)).replace(/'/g,"&#39;") + ", true)'>" +
        "<div class='body'><div class='t-title'>" + esc(t.title) + "</div>" +
        (meta ? "<div class='t-meta'>" + meta + "</div>" : "") +
        (t.description ? "<div class='t-meta'>" + esc(t.description) + "</div>" : "") +
        "<div class='actions'>" + actions + "</div>" +
        "</div><div class='rcol'>" + clientChip + "<span class='pill p-" + statusTok(t.status) + "'>" + esc(t.status) + "</span>" + reviewPill + "</div></div>";
    }).join("");
  }
  loadAll();

  function qbtn(label, id, status){
    return "<button class='qbtn' onclick='event.stopPropagation(); quickStatus(\"" + id + "\",\"" + status + "\")'>" + label + "</button>";
  }
  function reviewBtn(id){
    return "<button class='qbtn rev' onclick='event.stopPropagation(); quickReviewed(\"" + id + "\")'>✓ Confirm</button>";
  }
  window.quickReviewed = function(id){
    fetch("/api/tickets/update", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ id:id, reviewed:true }) })
      .then(function(r){return r.json();}).then(function(){ loadAll(); }).catch(function(){ loadAll(); });
  };
  window.quickStatus = function(id, status){
    fetch("/api/tickets/update", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ id:id, status:status }) })
      .then(function(r){return r.json();}).then(function(){ loadAll(); }).catch(function(){ loadAll(); });
  };

  window.openEdit = function(t, push){
    // Record the ticket in history so the phone's back/swipe returns to the list
    // instead of leaving the app. push=true when the user taps into a ticket;
    // deep links and the back gesture replace in place.
    var url = "/status?id=" + encodeURIComponent(t.id);
    if(push) history.pushState({ticket:t.id},"",url); else history.replaceState({ticket:t.id},"",url);
    listEl.innerHTML = "";
    countEl.textContent = "";
    showChrome(false);  // show the ticket on its own, at the top
    var existingPhotos = (t.photos && t.photos.length) ? t.photos.slice() : (t.photo ? [t.photo] : []);
    var newPhotos = [];          // {base64, contentType, preview}
    var genTitle = t.title || "";  // title the AI suggests, sent on save

    var statusList = STATUSES.slice();
    if (t.status && statusList.indexOf(t.status) < 0) statusList.unshift(t.status);  // keep any legacy value
    var statusOpts = statusList.map(function(s){ return "<option" + (t.status===s?" selected":"") + ">" + esc(s) + "</option>"; }).join("");
    var catOpts = "<option value=''>Select…</option>" + CATEGORIES.map(function(c){ return "<option" + (t.category===c?" selected":"") + ">" + esc(c) + "</option>"; }).join("");
    var clientOpts = "<option value=''>— none —</option>" + CLIENTS.map(function(c){ return "<option" + (t.client===c?" selected":"") + ">" + esc(c) + "</option>"; }).join("");
    var hasLoc = !t.location || LOCATIONS.indexOf(t.location) >= 0;
    var locOpts = "<option value=''>— not set —</option>" +
      LOCATIONS.map(function(l){ return "<option" + (t.location===l?" selected":"") + ">" + esc(l) + "</option>"; }).join("") +
      (t.location && !hasLoc ? "<option selected>" + esc(t.location) + "</option>" : "");
    var tClient = t.client || "";
    var assetArr = ALL_ASSETS.filter(function(a){ return !tClient || a.client === tClient; });
    assetArr.sort(function(a,b){ return (a.name||"").toLowerCase().localeCompare((b.name||"").toLowerCase()); });
    var assetOpts = "<option value=''>— None —</option>" +
      assetArr.map(function(a){ return "<option value='" + esc(a.id) + "'" + (t.assetId===a.id?" selected":"") + ">" + esc(a.name||"Asset") + "</option>"; }).join("") +
      "<option value='__new'>＋ New asset…</option>";

    editWrap.innerHTML =
      "<a href='#' class='back' style='display:inline-block;margin:4px 0 14px' onclick='__ticketBack();return false;'>&larr; Back to list</a>" +
      "<div class='panel'>" +
        "<h3>" + esc(t.title) + "</h3>" +
        "<div class='ref'>" + (t.ref?("Ref " + esc(t.ref) + " · "):"") + (t.client?esc(t.client):"Unassigned") + " · " + esc(t.status) + "</div>" +
        // Admin controls (review, AI rewrite, status, category, client, where,
        // assigned, asset). A client gets a simple view: read the ticket, add
        // photos and notes. Status, tech, location and asset are admin-only.
        (IS_CLIENT ? "" :
          "<div style='display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px'>" +
            "<div id='e_review'></div>" +
            "<button class='qbtn' id='e_ai' type='button'>✨ Rewrite with AI</button>" +
          "</div>" +
          "<div class='field'><label>Title</label><input id='e_title' value='" + esc(t.title) + "' /></div>" +
          "<div class='frow'>" +
            "<div class='field'><label>Status</label><select id='e_status'>" + statusOpts + "</select></div>" +
            "<div class='field'><label>Category</label><select id='e_cat'>" + catOpts + "</select></div>" +
          "</div>" +
          "<div class='frow'>" +
            "<div class='field'><label>Client</label><select id='e_client'>" + clientOpts + "</select></div>" +
            "<div class='field'><label>Where is it?</label><select id='e_loc'>" + locOpts + "</select></div>" +
          "</div>" +
          "<div class='frow'>" +
            "<div class='field'><label>Assigned to</label><input id='e_assigned' value='" + esc(t.assignedTo||"") + "' placeholder='Name or tech' /></div>" +
            "<div class='field'><label>Asset" + (t.assetId?(" <a href='/a/?id=" + esc(t.assetId) + "' style='font-weight:400;font-size:.85rem'>view</a>"):"") + "</label>" +
              "<select id='e_asset'>" + assetOpts + "</select>" +
              "<input id='e_newasset' type='text' placeholder='New asset name' style='display:none;margin-top:8px' /></div>" +
          "</div>"
        ) +
        "<div class='field'><label>Description</label>" +
          "<textarea id='e_desc' style='min-height:120px'" + (IS_CLIENT ? " readonly" : "") + ">" + esc(t.description) + "</textarea>" +
        "</div>" +
        "<div class='field'><label>Main photos <span style='font-weight:400;color:var(--muted);font-size:.86rem'>— the headline shots shown up top</span></label>" +
          "<div id='e_thumbs' style='display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px'></div>" +
          "<label class='qbtn' for='e_file' style='cursor:pointer;display:inline-block'>📷 Add photo</label>" +
          "<input type='file' id='e_file' accept='image/*' multiple capture='environment' style='display:none' />" +
        "</div>" +
        "<div class='logsec'>" +
          "<h4>Update log</h4>" +
          "<div class='log' id='e_log'><div class='empty-log'>Loading…</div></div>" +
          "<div class='addnote'><label for='e_note'>Add a note</label>" +
            "<textarea id='e_note' placeholder='Add an update or note for the record. " + (IS_CLIENT ? "Posts as " + esc(t.client||"you") + "." : "Posts as Ringwood.") + "'></textarea>" +
            "<div id='e_notethumbs' style='display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 4px'></div>" +
            "<div style='display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:4px'>" +
              "<label class='qbtn' for='e_notefile' style='cursor:pointer;display:inline-block'>📷 Add photo</label>" +
              "<input type='file' id='e_notefile' accept='image/*' multiple capture='environment' style='display:none' />" +
              "<button type='button' class='qbtn' id='e_polish' style='border-color:var(--clay);color:var(--clay)'>✨ Clean up with AI</button>" +
              "<label class='chk' style='font-weight:400;font-size:.9rem;display:flex;align-items:center;gap:7px;margin:0'><input type='checkbox' id='e_notetop' /> Also add these to the main photos at the top</label>" +
            "</div>" +
            "<div id='e_polishWrap' style='display:none;margin-top:10px;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:11px 13px'>" +
              "<div style='font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--clay);font-weight:600;margin-bottom:5px'>Suggested cleanup</div>" +
              "<div id='e_polishText' style='font-size:.95rem;white-space:pre-wrap'></div>" +
              "<div style='display:flex;gap:8px;margin-top:9px'><button type='button' class='qbtn rev' id='e_polishUse'>Use this</button><button type='button' class='qbtn' id='e_polishKeep'>Keep mine</button></div>" +
            "</div>" +
            "<div style='font-size:.84rem;color:var(--muted);margin-top:10px'>Press Save below to post your note and any changes.</div>" +
          "</div>" +
        "</div>" +
        "<div class='row2'><button class='btn' id='e_save' type='button'>Save</button>" +
        "<button class='btn ghost' id='e_back' type='button'>Back</button></div>" +
        "<div class='msg' id='e_msg'></div>" +
        (IS_CLIENT ? "" : "<button class='btn' id='e_del' type='button' style='background:transparent;color:#8a3d1c;border:1px solid rgba(138,61,28,.4);margin-top:16px'>Delete ticket</button>") +
      "</div>";
    window.scrollTo(0,0);

    // Human review: a ticket is "Needs review" until a person confirms it.
    var reviewed = !!t.reviewed;
    function renderReview(){
      var el = document.getElementById("e_review"); if(!el) return;
      var isClosed = (t.status === "Complete" || t.status === "Closed" || t.status === "Archived");
      if (reviewed){
        el.innerHTML = "<span class='rev-pill ok'>✓ Reviewed</span><button class='qbtn' id='e_unreview' type='button'>Undo</button>";
        document.getElementById("e_unreview").addEventListener("click", function(){ setReviewed(false); });
      } else if (isClosed){
        el.innerHTML = "";  // closed tickets don't need review
      } else {
        el.innerHTML = "<span class='rev-pill need'>Needs review</span><button class='qbtn' id='e_doreview' type='button'>Mark reviewed</button>";
        document.getElementById("e_doreview").addEventListener("click", function(){ setReviewed(true); });
      }
    }
    function setReviewed(v){
      fetch("/api/tickets/update", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ id:t.id, reviewed:v }) })
        .then(function(r){return r.json();}).then(function(d){ if(d&&d.ok){ reviewed=v; t.reviewed=v; renderReview(); if(typeof loadLog==="function") loadLog(); } });
    }
    renderReview();

    var eClientEl = document.getElementById("e_client");
    if (eClientEl){
      function eColFor(v){ return v ? (CLIENT_COLORS[v] || clientColor(v)) : ""; }
      for(var ci=0;ci<eClientEl.options.length;ci++){ var oo=eClientEl.options[ci]; oo.style.color = eColFor(oo.value) || ""; }
      function paintEClient(){ var c=eColFor(eClientEl.value); eClientEl.style.color=c||""; eClientEl.style.fontWeight=c?"700":""; }
      eClientEl.addEventListener("change", paintEClient); paintEClient();
    }

    var assetSelEl = document.getElementById("e_asset"), newAssetEl = document.getElementById("e_newasset");
    if (assetSelEl) assetSelEl.addEventListener("change", function(){ newAssetEl.style.display = assetSelEl.value === "__new" ? "block" : "none"; if(assetSelEl.value==="__new") newAssetEl.focus(); });

    var thumbsEl = document.getElementById("e_thumbs");
    function renderThumbs(){
      var html = existingPhotos.map(function(u, i){
        return "<span style='position:relative;display:inline-block'>" +
          "<img class='zoomable' src='" + esc(u) + "' alt='' style='width:74px;height:74px;object-fit:cover;border-radius:6px;border:1px solid var(--line)' />" +
          "<button type='button' onclick='__rmPhoto(" + i + ")' style='position:absolute;top:-7px;right:-8px;width:28px;height:28px;border-radius:999px;border:none;background:var(--green-deep);color:#f6f2e8;font-size:13px;line-height:1;cursor:pointer'>×</button>" +
          "</span>";
      }).join("");
      html += newPhotos.map(function(p, i){
        return "<span style='position:relative;display:inline-block'>" +
          "<img class='zoomable' src='" + p.preview + "' alt='' style='width:74px;height:74px;object-fit:cover;border-radius:6px;border:1px solid var(--green)' />" +
          "<button type='button' onclick='__rmNewPhoto(" + i + ")' style='position:absolute;top:-7px;right:-8px;width:28px;height:28px;border-radius:999px;border:none;background:var(--green-deep);color:#f6f2e8;font-size:13px;line-height:1;cursor:pointer'>×</button>" +
          "</span>";
      }).join("");
      thumbsEl.innerHTML = html || "<span style='color:var(--muted);font-size:.9rem'>No photos yet.</span>";
    }
    window.__rmNewPhoto = function(i){ newPhotos.splice(i,1); renderThumbs(); };
    window.__rmPhoto = function(i){ existingPhotos.splice(i,1); renderThumbs(); };
    renderThumbs();

    document.getElementById("e_file").addEventListener("change", function(e){
      var files = Array.prototype.slice.call(e.target.files||[]);
      e.target.value = "";
      Promise.all(files.map(processPhoto)).then(function(arr){
        arr.forEach(function(p){ newPhotos.push(p); });
        renderThumbs();
      }).catch(function(){ document.getElementById("e_msg").textContent = "Couldn't read one of the photos."; });
    });

    var aiBtnEl = document.getElementById("e_ai");
    if (aiBtnEl) aiBtnEl.addEventListener("click", function(){
      var b = document.getElementById("e_ai"); b.disabled = true; b.textContent = "Thinking…";
      var msg = document.getElementById("e_msg"); msg.textContent = "";
      var payload = {
        note: document.getElementById("e_desc").value,
        title: (document.getElementById("e_title") ? document.getElementById("e_title").value : ""),
        asset: (function(){ var s=document.getElementById("e_asset"); if(!s) return ""; var v=s.value; if(!v||v==="__new"||v==="") return ""; var o=s.options[s.selectedIndex]; return o?o.text:""; })(),
        photos: newPhotos.map(function(p){ return { base64:p.base64, contentType:p.contentType }; }),
        photoUrls: existingPhotos
      };
      fetch("/api/tickets/suggest", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify(payload) })
        .then(function(r){return r.json();}).then(function(d){
          b.disabled = false; b.textContent = "✨ Rewrite with AI";
          if(d&&d.ok){
            if(d.description) document.getElementById("e_desc").value = d.description;
            if(d.category){ var cs=document.getElementById("e_cat"); for(var i=0;i<cs.options.length;i++){ if(cs.options[i].value===d.category||cs.options[i].text===d.category){ cs.selectedIndex=i; break; } } }
            if(d.title){ genTitle = d.title; document.getElementById("e_title").value = d.title; }
          } else { msg.textContent = (d&&d.error)||"The assistant couldn't respond."; }
        }).catch(function(){ b.disabled=false; b.textContent="✨ Rewrite with AI"; msg.textContent="Couldn't reach the assistant."; });
    });

    /* ---- update log ---- */
    var logEl = document.getElementById("e_log");
    var noteCol = (t.clientColor || clientColor(t.client || "")) ;
    var LOG_ROWS = {};
    function fmtWhen(s){ if(!s) return ""; try{ var d=new Date(s); return d.toLocaleDateString() + " " + d.toLocaleTimeString([], {hour:"numeric", minute:"2-digit"}); }catch(e){ return ""; } }
    function renderLog(rows){
      LOG_ROWS = {};
      rows = rows || [];
      // The customer's original words are kept as an "intake" entry, shown as a
      // collapsible "Entered by <client>" block (the AI draft is the description).
      var intake = rows.filter(function(c){ return c.kind === "intake"; });
      rows = rows.filter(function(c){ return c.kind !== "intake"; });
      var intakeHtml = "";
      if (intake.length){
        var who = intake[0].author || "Customer";
        var when = fmtWhen(intake[0].created);
        var body = intake.map(function(c){ return c.body; }).filter(Boolean).join("\n\n");
        var intakeLabel = IS_CLIENT ? "Your original submission" : ("Original submission by " + esc(who));
        intakeHtml =
          "<div class='intake'>" +
            "<button type='button' class='intake-tog' id='intakeTog'><span id='intakeIco'>＋</span> " + intakeLabel + "</button>" +
            "<div class='intake-body' id='intakeBody' style='display:none'>" + esc(body) +
              (when ? "<div style='color:var(--muted);font-size:.8rem;margin-top:8px'>Submitted " + esc(when) + "</div>" : "") +
            "</div>" +
          "</div>";
      }
      if(!rows.length){ logEl.innerHTML = intakeHtml + "<div class='empty-log'>No updates yet. Add the first note below.</div>"; wireIntake(); return; }
      logEl.innerHTML = intakeHtml + rows.map(function(c){
        LOG_ROWS[c.id] = c;
        var isEvent = c.kind === "event";
        // Admin events can carry an expandable detail (brief ⋮ detail).
        var brief = c.body || "", detail = "";
        if (isEvent && brief.indexOf("\n⋮\n") >= 0){ var pp = brief.split("\n⋮\n"); brief = pp[0]; detail = pp.slice(1).join("\n⋮\n"); }
        var col = c.role === "client" ? noteCol : "var(--green-deep)";
        var whoStyle = (isEvent || c.role !== "client") ? "" : (" style='background:" + col + "'");
        // "Up top" promotes a note's photos to the ticket's photo set. Master can
        // also edit notes and delete anything.
        var hasPhotos = c.photos && c.photos.length;
        var bits = "";
        if (!isEvent && hasPhotos) bits += "<button type='button' class='lgbtn' data-act='promote' data-cid='" + esc(c.id) + "'>&uarr; Add to main photos</button>";
        if (IS_MASTER){
          bits += (isEvent ? "" : "<button type='button' class='lgbtn' data-act='edit' data-cid='" + esc(c.id) + "'>Edit</button>") +
            "<button type='button' class='lgbtn del' data-act='del' data-cid='" + esc(c.id) + "'>Delete</button>";
        }
        var ctrls = bits ? "<span class='lgctrl'>" + bits + "</span>" : "";
        var photos = (c.photos && c.photos.length) ?
          "<div class='photos'>" + c.photos.map(function(u){ return "<img class='zoomable' src='" + esc(u) + "' alt='note photo' />"; }).join("") + "</div>" : "";
        return "<div class='lg " + (isEvent?"event":"note") + (c.role==="agent"?" agent":"") + "' data-cid='" + esc(c.id) + "'>" +
          "<div class='lghead'><span class='who'" + whoStyle + ">" + esc(c.author) + "</span>" +
          "<span class='meta'>" + esc(fmtWhen(c.created)) + "</span>" + ctrls + "</div>" +
          (c.body ?
            "<div class='text'>" +
              (isEvent && c.role !== "agent" ? "<span class='evico'>✎</span> " : "") + esc(brief) +
              (detail ? " <button type='button' class='lgmore' data-cid='" + esc(c.id) + "'>+</button><div class='evdetail' id='ev_" + esc(c.id) + "' style='display:none'>" + esc(detail) + "</div>" : "") +
            "</div>"
          : "") +
          photos +
        "</div>";
      }).join("");
      wireIntake();
    }
    // Expand/collapse an event's detail (revision history) when the + is tapped.
    logEl.addEventListener("click", function(e){
      var mb = e.target.closest ? e.target.closest(".lgmore") : null;
      if(!mb) return;
      var d = document.getElementById("ev_" + mb.getAttribute("data-cid")); if(!d) return;
      var open = d.style.display !== "none";
      d.style.display = open ? "none" : "block";
      mb.textContent = open ? "+" : "−";
    });
    // Collapsible "Entered by <client>": starts closed, the + opens it for reference.
    function wireIntake(){
      var tog = document.getElementById("intakeTog"); if(!tog) return;
      tog.addEventListener("click", function(){
        var b = document.getElementById("intakeBody"), ico = document.getElementById("intakeIco");
        if(!b) return;
        var open = b.style.display !== "none";
        b.style.display = open ? "none" : "block";
        if(ico) ico.textContent = open ? "＋" : "−";
      });
    }
    function loadLog(){
      fetch("/api/tickets/comments?id=" + encodeURIComponent(t.id), { cache:"no-store" })
        .then(function(r){return r.json();}).then(renderLog)
        .catch(function(){ logEl.innerHTML = "<div class='empty-log'>Couldn't load the log.</div>"; });
    }
    // Master edit/delete, via delegation so it survives re-renders.
    logEl.addEventListener("click", function(e){
      var btn = e.target.closest ? e.target.closest(".lgbtn") : null;
      if(!btn) return;
      var cid = btn.getAttribute("data-cid"), act = btn.getAttribute("data-act");
      var row = LOG_ROWS[cid]; if(!row) return;
      if(act === "promote"){
        btn.disabled = true; btn.textContent = "Moving…";
        fetch("/api/tickets/comment/promote", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ commentId:cid }) })
          .then(function(r){return r.json();}).then(function(d){
            btn.disabled = false; btn.innerHTML = "&uarr; Add to main photos";
            if(d&&d.ok){ if(Array.isArray(d.topPhotos)){ existingPhotos = d.topPhotos.slice(); renderThumbs(); } var m=document.getElementById("e_msg"); if(m){ m.style.color="var(--green-deep)"; m.textContent="Added to the main photos up top."; } window.scrollTo(0,0); }
            else { alert((d&&d.error)||"Couldn't move the photos."); }
          }).catch(function(){ btn.disabled=false; btn.innerHTML="&uarr; Add to main photos"; alert("Couldn't reach the server."); });
        return;
      }
      if(act === "del"){
        if(!confirm("Delete this entry? This can't be undone.")) return;
        fetch("/api/tickets/comment/delete", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ commentId:cid }) })
          .then(function(r){return r.json();}).then(function(d){ if(d&&d.ok){ loadLog(); } else { alert((d&&d.error)||"Couldn't delete."); } })
          .catch(function(){ alert("Couldn't reach the server."); });
        return;
      }
      if(act === "edit"){
        var lg = btn.closest(".lg"); var textEl = lg.querySelector(".text");
        if(lg.querySelector(".lgedit")) return;  // already editing
        var wrap = document.createElement("div"); wrap.className = "lgedit";
        var ta = document.createElement("textarea"); ta.value = row.body || "";
        var bar = document.createElement("div"); bar.className = "lgeditbar";
        var save = document.createElement("button"); save.type="button"; save.className="lgbtn"; save.textContent="Save";
        var cancel = document.createElement("button"); cancel.type="button"; cancel.className="lgbtn"; cancel.textContent="Cancel";
        bar.appendChild(save); bar.appendChild(cancel); wrap.appendChild(ta); wrap.appendChild(bar);
        textEl.style.display = "none"; lg.appendChild(wrap); ta.focus();
        cancel.addEventListener("click", function(){ wrap.remove(); textEl.style.display=""; });
        save.addEventListener("click", function(){
          var nv = (ta.value||"").trim(); if(!nv){ ta.focus(); return; }
          save.disabled = true; save.textContent = "Saving…";
          fetch("/api/tickets/comment/update", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ commentId:cid, body:nv }) })
            .then(function(r){return r.json();}).then(function(d){ if(d&&d.ok){ loadLog(); } else { save.disabled=false; save.textContent="Save"; alert((d&&d.error)||"Couldn't save."); } })
            .catch(function(){ save.disabled=false; save.textContent="Save"; alert("Couldn't reach the server."); });
        });
      }
    });
    loadLog();
    // Photos attached to a new note (before it's posted).
    var notePhotos = [];
    var noteThumbs = document.getElementById("e_notethumbs");
    function renderNoteThumbs(){
      noteThumbs.innerHTML = notePhotos.map(function(p, i){
        return "<span style='position:relative;display:inline-block'>" +
          "<img class='zoomable' src='" + p.preview + "' alt='' style='width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--green)' />" +
          "<button type='button' onclick='__rmNotePhoto(" + i + ")' style='position:absolute;top:-7px;right:-8px;width:26px;height:26px;border-radius:999px;border:none;background:var(--green-deep);color:#f6f2e8;font-size:12px;line-height:1;cursor:pointer'>×</button>" +
        "</span>";
      }).join("");
    }
    window.__rmNotePhoto = function(i){ notePhotos.splice(i,1); renderNoteThumbs(); };
    document.getElementById("e_notefile").addEventListener("change", function(e){
      var files = Array.prototype.slice.call(e.target.files||[]); e.target.value = "";
      Promise.all(files.map(processPhoto)).then(function(arr){
        arr.forEach(function(p){ notePhotos.push(p); }); renderNoteThumbs();
      }).catch(function(){ document.getElementById("e_msg").textContent = "Couldn't read one of the photos."; });
    });

    // Clean up the note with AI: preview before it replaces your text.
    (function(){
      var pb=document.getElementById("e_polish"); if(!pb) return;
      var pw=document.getElementById("e_polishWrap"), pt=document.getElementById("e_polishText"), ne=document.getElementById("e_note"), em=document.getElementById("e_msg");
      pb.addEventListener("click", function(){
        var text=(ne.value||"").trim(); if(em) em.textContent="";
        if(!text){ ne.focus(); return; }
        pb.disabled=true; pb.textContent="Cleaning up…";
        fetch("/api/ai/polish",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({text:text,kind:"note"})})
          .then(function(r){return r.json();}).then(function(d){
            pb.disabled=false; pb.textContent="✨ Clean up with AI";
            if(d&&d.ok&&d.text){ pt.textContent=d.text; pw.style.display="block"; }
            else if(em){ em.textContent=(d&&d.error)||"The assistant couldn't respond."; }
          }).catch(function(){ pb.disabled=false; pb.textContent="✨ Clean up with AI"; if(em) em.textContent="Couldn't reach the assistant."; });
      });
      document.getElementById("e_polishUse").addEventListener("click", function(){ ne.value=pt.textContent; pw.style.display="none"; });
      document.getElementById("e_polishKeep").addEventListener("click", function(){ pw.style.display="none"; });
    })();

    // Guard against leaving with unsaved photos or a half-typed note.
    window.__ticketBack = function(){
      var noteEl = document.getElementById("e_note");
      var unsaved = newPhotos.length || notePhotos.length || (noteEl && noteEl.value.trim());
      if (unsaved && !confirm("You have unsaved photos or a note. Leave without saving them?")) return;
      // Go back through history when we pushed an entry, so the swipe-back gesture stays in sync.
      if (history.state && history.state.ticket) history.back();
      else backToTicketList();
    };
    document.getElementById("e_back").addEventListener("click", window.__ticketBack);
    var delBtn = document.getElementById("e_del");
    if (delBtn) delBtn.addEventListener("click", function(){
      if (!confirm("Delete this ticket and its whole update log? This can't be undone.")) return;
      var db = this; db.disabled = true; db.textContent = "Deleting…";
      fetch("/api/tickets/delete", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ id:t.id }) })
        .then(function(r){return r.json();}).then(function(d){
          if(d&&d.ok){ ALL_TICKETS = ALL_TICKETS.filter(function(x){ return x.id !== t.id; }); backToTicketList(); }
          else { db.disabled=false; db.textContent="Delete ticket"; var m=document.getElementById("e_msg"); m.style.color="#8a3d1c"; m.textContent=(d&&d.error)||"Couldn't delete."; }
        }).catch(function(){ db.disabled=false; db.textContent="Delete ticket"; var m=document.getElementById("e_msg"); m.style.color="#8a3d1c"; m.textContent="Couldn't reach the server."; });
    });
    document.getElementById("e_save").addEventListener("click", function(){
      var b = document.getElementById("e_save"); b.disabled = true; b.textContent = "Saving…";
      var payload = {
        id: t.id,
        keepPhotos: existingPhotos,
        addPhotos: newPhotos.map(function(p){ return { base64:p.base64, contentType:p.contentType }; })
      };
      // The admin fields only exist for non-clients; clients just save photos + notes.
      if (!IS_CLIENT){
        var ecl = document.getElementById("e_client");
        payload.status = document.getElementById("e_status").value;
        payload.client = ecl ? ecl.value : undefined;
        payload.category = document.getElementById("e_cat").value;
        payload.location = document.getElementById("e_loc").value;
        payload.assignedTo = document.getElementById("e_assigned") ? document.getElementById("e_assigned").value : undefined;
        payload.description = document.getElementById("e_desc").value;
        payload.title = document.getElementById("e_title").value || genTitle;
        if (assetSelEl && assetSelEl.value === "__new"){ var nn = newAssetEl.value.trim(); if(nn) payload.newAssetName = nn; }
        else if (assetSelEl) { payload.assetId = assetSelEl.value; }  // "" clears the link
      }
      // Save also commits anything typed in the "Add a note" box, so nothing is lost.
      var noteText = (document.getElementById("e_note").value || "").trim();
      var pendingNotePhotos = notePhotos.slice();
      var alsoTop = document.getElementById("e_notetop") ? document.getElementById("e_notetop").checked : false;
      var msgEl = document.getElementById("e_msg"); msgEl.style.color = ""; msgEl.textContent = "";

      function finish(warn){
        b.disabled = false; b.textContent = "Save";
        // Stay on this ticket; refresh the list quietly for when you go Back.
        fetch("/api/tickets/list?archived=1", { cache:"no-store" }).then(function(r){return r.json();}).then(function(rows){ if(Array.isArray(rows)) ALL_TICKETS = rows; }).catch(function(){});
        msgEl.style.color = warn ? "#8a3d1c" : "var(--green-deep)";
        msgEl.textContent = "Saved." + (warn ? " " + warn : "");
      }

      fetch("/api/tickets/update", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify(payload) })
        .then(function(r){return r.json();}).then(function(d){
          if(!(d && d.ok)){ b.disabled=false; b.textContent="Save"; msgEl.style.color="#8a3d1c"; msgEl.textContent=(d&&d.error)||"Save failed."; return; }
          // Reflect the saved photos in place so they stay on screen.
          if (Array.isArray(d.photos)) existingPhotos = d.photos.slice();
          newPhotos = []; renderThumbs();
          var warn = d.photoWarning || "";
          // Commit the pending note (with its photos), if any.
          if (noteText || pendingNotePhotos.length){
            fetch("/api/tickets/comment", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ id:t.id, body:noteText, photos:pendingNotePhotos.map(function(p){ return { base64:p.base64, contentType:p.contentType }; }), alsoTop:alsoTop }) })
              .then(function(r){return r.json();}).then(function(nd){
                if(nd && nd.ok){ document.getElementById("e_note").value=""; notePhotos=[]; renderNoteThumbs(); if(document.getElementById("e_notetop")) document.getElementById("e_notetop").checked=false; loadLog(); if(Array.isArray(nd.topPhotos)){ existingPhotos = nd.topPhotos.slice(); renderThumbs(); } }
                else if(!warn){ warn = "Your note didn't save. Try Save again."; }
                finish(warn);
              }).catch(function(){ finish(warn || "Your note didn't save. Try Save again."); });
          } else {
            loadLog();
            finish(warn);
          }
        }).catch(function(){ b.disabled=false; b.textContent="Save"; msgEl.style.color="#8a3d1c"; msgEl.textContent="Couldn't reach the server."; });
    });
  };

  clientSel.addEventListener("change", render);
  sortSel.addEventListener("change", render);
  if (showArchEl) showArchEl.addEventListener("change", render);
</script>
<script src="/lightbox.js"></script>
<script src="/native-camera.js"></script>
<script src="/whoami-badge.js"></script>
</body>
</html>
