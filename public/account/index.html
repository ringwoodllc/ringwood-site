<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1f3d2b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Ringwood" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<title>Ringwood · Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#f4efe4;--bg-2:#efe8d8;--ink:#23282a;--muted:#5f5d52;--green:#2f5d50;--green-deep:#21443a;--clay:#a9633a;--line:rgba(35,40,42,.14)}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:"Hanken Grotesk",-apple-system,sans-serif;min-height:100vh}
  .wrap{max-width:440px;margin:0 auto;padding:0 22px 48px}
  header{padding:24px 0;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:11px;font-family:"Spectral",serif;font-size:1.25rem;font-weight:600;color:var(--green-deep)}
  .back{font-size:.92rem;text-decoration:none;color:var(--green-deep);border-bottom:1px solid var(--clay);padding-bottom:1px}
  h1{font-family:"Spectral",serif;font-weight:500;font-size:1.7rem;color:var(--green-deep);margin:14px 0 4px}
  .who{color:var(--muted);font-size:.95rem;margin-bottom:20px}
  form{background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:22px 20px}
  label{display:block;font-weight:600;font-size:.92rem;color:var(--green-deep);margin-bottom:6px}
  .field{margin-bottom:15px}
  input{width:100%;font:inherit;font-size:1.02rem;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:13px 14px}
  input:focus{outline:none;border-color:var(--green)}
  .pwwrap{position:relative}
  .pwwrap input{padding-right:64px}
  .pwtoggle{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:var(--green-deep);font:inherit;font-size:.82rem;font-weight:600;cursor:pointer;padding:6px 8px}
  .btn{width:100%;background:var(--green);color:#f6f2e8;border:none;cursor:pointer;font-weight:600;font-size:1.05rem;padding:15px;border-radius:5px}
  .btn:hover{background:var(--green-deep)}
  .btn:disabled{opacity:.6;cursor:default}
  .msg{margin-top:14px;font-size:.92rem;text-align:center;min-height:18px}
  .msg.err{color:#8a3d1c}
  .msg.ok{color:var(--green-deep)}
  .sec{margin-top:30px}
  .sec h2{font-family:"Spectral",serif;font-weight:500;font-size:1.3rem;color:var(--green-deep);margin-bottom:4px}
  .sec .lead{color:var(--muted);font-size:.92rem;margin-bottom:14px}
  .panel{background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:18px 16px}
  select{width:100%;font:inherit;font-size:1.02rem;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:12px 14px;-webkit-appearance:none;appearance:none}
  .tok{border:1px solid var(--line);border-radius:6px;padding:11px 13px;margin-top:10px;background:var(--bg)}
  .tok .th{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
  .tok .tc{font-weight:600;color:var(--green-deep)}
  .tok .te{font-size:.78rem;color:var(--muted)}
  .tok .tu{font-size:.78rem;color:var(--muted);word-break:break-all;margin:6px 0 8px}
  .tok .tb{display:flex;gap:8px;flex-wrap:wrap}
  .tok button{background:var(--bg-2);border:1px solid var(--line);color:var(--green-deep);border-radius:999px;padding:6px 12px;font:inherit;font-size:.82rem;font-weight:600;cursor:pointer}
  .tok button:hover{border-color:var(--green)}
  .tok.revoked{opacity:.55}
  .tag{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 8px;border-radius:999px;background:#f0e0d4;color:#8a5a36}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 26 26" aria-hidden="true"><g fill="none" stroke="#2f5d50" stroke-width="1.4"><circle cx="13" cy="13" r="3"/><circle cx="13" cy="13" r="7"/><circle cx="13" cy="13" r="11"/></g></svg>
      Ringwood
    </div>
    <a class="back" href="/app">Back</a>
  </header>

  <h1>Account</h1>
  <div class="who" id="who"></div>

  <form id="f">
    <div class="field">
      <label for="current">Current password</label>
      <div class="pwwrap">
        <input id="current" type="password" autocomplete="current-password" placeholder="Current password" />
        <button type="button" class="pwtoggle" data-for="current">Show</button>
      </div>
    </div>
    <div class="field">
      <label for="next">New password</label>
      <div class="pwwrap">
        <input id="next" type="password" autocomplete="new-password" placeholder="At least 8 characters" />
        <button type="button" class="pwtoggle" data-for="next">Show</button>
      </div>
    </div>
    <button class="btn" type="submit" id="btn">Update password</button>
    <div class="msg" id="msg"></div>
  </form>

  <div id="admin"></div>
</div>
<script>
  var f = document.getElementById("f"), btn = document.getElementById("btn"), msg = document.getElementById("msg");

  function esc(s){ return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

  // Show who's signed in; master sees the client-links panel.
  fetch("/api/whoami").then(function(r){return r.json();}).then(function(d){
    if (d && d.ok){
      var role = d.role === "master" ? "Master — all clients" : (d.client ? d.client : "Client");
      document.getElementById("who").textContent = d.email + " · " + role;
      if (d.role === "master") buildAdmin();
    } else { window.location.replace("/login?next=/account"); }
  }).catch(function(){});

  function buildAdmin(){
    var el = document.getElementById("admin");
    el.innerHTML =
      "<div class='sec'><h2>Client magic links</h2>"+
      "<div class='lead'>Send a client a link to sign in with no password. Links last 30 days and can be revoked.</div>"+
      "<div class='panel'>"+
        "<div class='field'><label>Client</label><select id='m_client'><option value=''>Loading…</option></select></div>"+
        "<div class='field'><label>Their email</label><input id='m_email' type='email' inputmode='email' autocomplete='off' placeholder='name@client.com' /></div>"+
        "<button class='btn' id='m_make' type='button'>Generate link</button>"+
        "<div class='msg' id='m_msg'></div>"+
        "<div id='m_list'></div>"+
      "</div></div>";
    var sel = document.getElementById("m_client");
    fetch("/api/options").then(function(r){return r.json();}).then(function(o){
      var cl = (o&&o.clients)||[];
      sel.innerHTML = "<option value=''>Select a client…</option>" + cl.map(function(c){ return "<option>"+esc(c)+"</option>"; }).join("");
    }).catch(function(){ sel.innerHTML = "<option value=''>Could not load</option>"; });
    document.getElementById("m_make").addEventListener("click", makeLink);
    loadTokens();
  }

  function makeLink(){
    var b = document.getElementById("m_make"), mm = document.getElementById("m_msg");
    var client = document.getElementById("m_client").value, email = document.getElementById("m_email").value.trim();
    mm.className = "msg";
    if (!client || !email){ mm.className="msg err"; mm.textContent="Pick a client and enter their email."; return; }
    b.disabled = true; b.textContent = "Generating…"; mm.textContent = "";
    fetch("/api/admin/token", { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ client: client, email: email }) })
      .then(function(r){return r.json();}).then(function(d){
        b.disabled=false; b.textContent="Generate link";
        if (d && d.ok){ mm.className="msg ok"; mm.textContent="Link created."; document.getElementById("m_email").value=""; loadTokens(); }
        else { mm.className="msg err"; mm.textContent=(d&&d.error)||"Could not create the link."; }
      }).catch(function(){ b.disabled=false; b.textContent="Generate link"; mm.className="msg err"; mm.textContent="Couldn't reach the server."; });
  }

  function loadTokens(){
    fetch("/api/admin/tokens").then(function(r){return r.json();}).then(function(d){
      var list = document.getElementById("m_list"); if(!list) return;
      var ts = (d&&d.tokens)||[];
      if(!ts.length){ list.innerHTML="<div class='lead' style='margin-top:14px'>No links yet.</div>"; return; }
      list.innerHTML = ts.map(function(t){
        var exp = t.expires_at ? new Date(t.expires_at).toLocaleDateString() : "—";
        return "<div class='tok"+(t.revoked?" revoked":"")+"'>"+
          "<div class='th'><span class='tc'>"+esc(t.client||t.email)+"</span>"+(t.revoked?"<span class='tag'>Revoked</span>":"<span class='te'>Expires "+esc(exp)+"</span>")+"</div>"+
          "<div class='te'>"+esc(t.email)+"</div>"+
          "<div class='tu'>"+esc(t.url)+"</div>"+
          (t.revoked?"":"<div class='tb'><button type='button' onclick=\"copyTok('"+esc(t.url)+"',this)\">Copy link</button>"+
            "<button type='button' onclick=\"revokeTok('"+esc(t.token)+"')\">Revoke</button></div>")+
          "</div>";
      }).join("");
    }).catch(function(){});
  }

  window.copyTok = function(url, btn){
    var done=function(){ var o=btn.textContent; btn.textContent="Copied"; setTimeout(function(){btn.textContent=o;},1400); };
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(url).then(done,function(){}); }
    else { var i=document.createElement("input"); i.value=url; document.body.appendChild(i); i.select(); try{document.execCommand("copy");}catch(e){} document.body.removeChild(i); done(); }
  };
  window.revokeTok = function(token){
    fetch("/api/admin/token/revoke", { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ token: token }) })
      .then(function(r){return r.json();}).then(function(){ loadTokens(); }).catch(function(){});
  };

  // Show/hide for each password field.
  Array.prototype.forEach.call(document.querySelectorAll(".pwtoggle"), function(t){
    t.addEventListener("click", function(){
      var el = document.getElementById(t.getAttribute("data-for"));
      var show = el.type === "password";
      el.type = show ? "text" : "password";
      t.textContent = show ? "Hide" : "Show";
      el.focus();
    });
  });

  f.addEventListener("submit", function(e){
    e.preventDefault();
    var current = document.getElementById("current").value;
    var next = document.getElementById("next").value;
    msg.className = "msg";
    if (next.length < 8){ msg.className = "msg err"; msg.textContent = "New password must be at least 8 characters."; return; }
    btn.disabled = true; btn.textContent = "Updating…"; msg.textContent = "";
    fetch("/api/account/password", { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ current: current, next: next }) })
      .then(function(r){ return r.json(); }).then(function(d){
        btn.disabled = false; btn.textContent = "Update password";
        if (d && d.ok){ msg.className = "msg ok"; msg.textContent = "Password updated."; f.reset(); }
        else { msg.className = "msg err"; msg.textContent = (d && d.error) || "Could not update."; }
      }).catch(function(){ btn.disabled = false; btn.textContent = "Update password"; msg.className = "msg err"; msg.textContent = "Couldn't reach the server."; });
  });
</script>
<script src="/whoami-badge.js"></script>
</body>
</html>
