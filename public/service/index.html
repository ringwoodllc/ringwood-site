<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1f3d2b" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Service Log" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<title>Ringwood · Log a service</title>
<meta name="description" content="Record a service event against a tracked asset: date, type, technician, notes, cost, and photos." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f4efe4;--bg-2:#efe8d8;--ink:#23282a;--muted:#5f5d52;
    --green:#2f5d50;--green-deep:#21443a;--clay:#a9633a;--line:rgba(35,40,42,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:"Hanken Grotesk",-apple-system,sans-serif;font-size:18px;line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:640px;margin:0 auto;padding:0 22px}
  h1{font-family:"Spectral",Georgia,serif;font-weight:500;line-height:1.1;letter-spacing:-.01em;color:var(--green-deep)}
  a{color:inherit}
  header{padding:24px 0}
  .bar{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:11px;font-family:"Spectral",serif;font-size:1.25rem;font-weight:600;color:var(--green-deep)}
  .back{font-size:.92rem;text-decoration:none;color:var(--green-deep);border-bottom:1px solid var(--clay);padding-bottom:1px}
  .intro{margin:18px 0 22px}
  .eyebrow{font-size:.8rem;letter-spacing:.18em;text-transform:uppercase;color:var(--clay);font-weight:600;margin-bottom:12px}
  .intro h1{font-size:clamp(2rem,7vw,2.7rem)}
  .intro p{margin-top:12px;color:var(--muted);font-size:1.04rem}
  form{background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:22px 20px 26px;margin-bottom:40px}
  .field{margin-bottom:18px}
  label{display:block;font-weight:600;font-size:.96rem;color:var(--green-deep);margin-bottom:7px}
  .hint{font-weight:400;color:var(--muted);font-size:.86rem}
  input,select,textarea{
    width:100%;font:inherit;font-size:1.02rem;color:var(--ink);
    background:var(--bg);border:1px solid var(--line);border-radius:4px;
    padding:13px 14px;-webkit-appearance:none;appearance:none;
  }
  select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' fill='none' stroke='%235f5d52' stroke-width='1.6'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:38px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green)}
  textarea{min-height:70px;resize:vertical}
  .row{display:flex;gap:12px}
  .row .field{flex:1}

  .photo-btn{display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;text-align:center;padding:18px;border:1.5px dashed rgba(47,93,80,.45);border-radius:6px;color:var(--green-deep);font-weight:600;background:var(--bg)}
  .photo-btn:hover{border-color:var(--green)}
  #photoInput{display:none}
  .thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .thumbs img{width:72px;height:72px;object-fit:cover;border-radius:5px;border:1px solid var(--line)}

  .btn{width:100%;background:var(--green);color:#f6f2e8;border:none;cursor:pointer;font-weight:600;font-size:1.05rem;padding:16px;border-radius:4px;transition:background .2s}
  .btn:hover{background:var(--green-deep)}
  .btn:disabled{opacity:.6;cursor:default}
  .msg{margin-top:16px;padding:14px 16px;border-radius:4px;font-size:.98rem;display:none}
  .msg.ok{display:block;background:#e3efe7;color:var(--green-deep);border:1px solid rgba(47,93,80,.3)}
  .msg.err{display:block;background:#f4e2d8;color:#8a3d1c;border:1px solid rgba(169,99,58,.35)}

  .history{margin:2px 0 20px}
  .history h3{font-family:"Spectral",serif;font-weight:500;font-size:1.05rem;color:var(--green-deep);margin-bottom:8px}
  .history table{width:100%;border-collapse:collapse;background:var(--bg);border:1px solid var(--line);border-radius:6px;overflow:hidden;font-size:.9rem}
  .history th,.history td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  .history th{background:var(--bg-2);font-weight:600;color:var(--green-deep);font-size:.74rem;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
  .history td:first-child{white-space:nowrap}
  .history tr:last-child td{border-bottom:none}
  .history .empty{color:var(--muted);font-size:.92rem;padding:2px}
</style>
</head>
<body>

<header>
  <div class="wrap bar">
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 26 26" aria-hidden="true">
        <g fill="none" stroke="#2f5d50" stroke-width="1.4">
          <circle cx="13" cy="13" r="3"/><circle cx="13" cy="13" r="7"/><circle cx="13" cy="13" r="11"/>
        </g>
      </svg>
      Ringwood
    </div>
    <a class="back" href="/">Home</a>
  </div>
</header>

<main class="wrap">
  <div class="intro">
    <div class="eyebrow">Service record</div>
    <h1>Log a service</h1>
    <p>Record a service event against a piece of equipment. It builds that asset's service history.</p>
  </div>

  <form id="serviceForm">
    <div id="assetBanner" style="display:none"></div>
    <div class="field" id="pickerField">
      <label for="clientFilter">Client</label>
      <select id="clientFilter" style="margin-bottom:10px"><option value="">All clients</option></select>
      <label for="assetFilter">Asset</label>
      <input id="assetFilter" type="text" autocomplete="off" placeholder="Type to filter…" style="margin-bottom:8px" />
      <select id="asset"><option value="">Loading assets…</option></select>
    </div>

    <div id="history" class="history"></div>

    <div class="row">
      <div class="field">
        <label for="serviceDate">Date</label>
        <input id="serviceDate" type="date" />
      </div>
      <div class="field">
        <label for="serviceType">Type</label>
        <select id="serviceType">
          <option value="">Select…</option>
          <option>Install</option><option>Inspection</option><option>Maintenance</option>
          <option>Repair</option><option>Replacement</option><option>Other</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label for="technician">Technician</label>
      <input id="technician" type="text" autocomplete="off" placeholder="Who did the work" />
    </div>

    <div class="field">
      <label for="notes">Notes</label>
      <textarea id="notes" placeholder="What was done"></textarea>
    </div>

    <div class="field">
      <label for="cost">Cost <span class="hint">— optional</span></label>
      <input id="cost" type="number" inputmode="decimal" step="0.01" placeholder="0.00" />
    </div>

    <div class="field">
      <label>Photos <span class="hint">— optional, add as many as you like</span></label>
      <label class="photo-btn" for="photoInput" id="photoBtn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 8a2 2 0 0 1 2-2h2l1.4-2h7.2L19 6h0a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><circle cx="12" cy="12.5" r="3.4"/></svg>
        <span>Add photos</span>
      </label>
      <input type="file" id="photoInput" accept="image/*" capture="environment" multiple />
      <div class="thumbs" id="thumbs"></div>
    </div>

    <button class="btn" type="submit" id="submitBtn">Save service record</button>
    <div class="msg" id="msg"></div>
  </form>
</main>

<script>
  // ---- assets dropdown ----
  var assetSel = document.getElementById("asset");
  var assetFilter = document.getElementById("assetFilter");
  var clientFilter = document.getElementById("clientFilter");
  // A client login only works within its own client; hide just the client filter
  // (its field is shared with the asset picker, so don't hide the whole field).
  fetch("/api/whoami").then(function(r){return r.json();}).then(function(w){
    if (w && w.ok && w.role === "client"){
      clientFilter.style.display = "none";
      var lbl = document.querySelector("label[for='clientFilter']"); if (lbl) lbl.style.display = "none";
    }
  }).catch(function(){});
  var allAssets = [];
  var SERVICE_TYPES = ["Install","Inspection","Maintenance","Repair","Replacement","Other"];

  // Service Type list, read live from the Picklists master table (falls back to
  // the hardcoded options above if the request fails).
  var serviceTypeSel = document.getElementById("serviceType");
  var ADD_SVC = "<option value='__add'>＋ Add a type…</option>";
  // Resilient lists: render from the last good values cached in this browser
  // (or built-in seeds), then refresh live with retries and update the cache.
  // A ~6h timer keeps the cached fallback fresh on its own.
  var SEED_SVC = ["Install","Inspection","Maintenance","Repair","Replacement","Other"];
  var SEED_CLIENTS = [];
  var CACHE_KEY = "rw_lists_v3";
  function readCache(){ try { var c = JSON.parse(localStorage.getItem(CACHE_KEY) || "null"); return (c && c.data) ? c.data : null; } catch(e){ return null; } }
  function writeCache(d){ try { var c = JSON.parse(localStorage.getItem(CACHE_KEY) || "null") || {}; c.t = Date.now(); c.data = Object.assign(c.data || {}, d); localStorage.setItem(CACHE_KEY, JSON.stringify(c)); } catch(e){} }

  function renderServiceTypes(types){
    if (!types || !types.length) return;
    SERVICE_TYPES = types;
    var keep = serviceTypeSel.value;
    var html = "<option value=''>Select…</option>";
    types.forEach(function(v){ html += "<option>" + v.replace(/</g,"&lt;") + "</option>"; });
    serviceTypeSel.innerHTML = html + ADD_SVC;
    if (keep) serviceTypeSel.value = keep;
  }
  function renderClientFilter(clients){
    var keep = clientFilter.value;
    var html = "<option value=''>All clients</option>";
    (clients || []).forEach(function(c){ html += "<option>" + c.replace(/</g,"&lt;") + "</option>"; });
    clientFilter.innerHTML = html;
    if (keep) clientFilter.value = keep;
  }
  var cached = readCache() || {};
  renderServiceTypes(cached.serviceTypes || SEED_SVC);
  renderClientFilter(cached.clients || SEED_CLIENTS);

  function loadServiceOptions(tries){
    tries = tries || 0;
    fetch("/api/options", { cache: "no-store" }).then(function(r){ return r.json(); }).then(function(o){
      o = o || {};
      var hasClients = o.clients && o.clients.length, hasTypes = o.serviceTypes && o.serviceTypes.length;
      if (!hasClients && !hasTypes && tries < 2){ setTimeout(function(){ loadServiceOptions(tries + 1); }, 2500); return; }
      if (hasTypes) renderServiceTypes(o.serviceTypes);
      if (hasClients) renderClientFilter(o.clients);
      if (hasClients || hasTypes) writeCache({ serviceTypes: o.serviceTypes || cached.serviceTypes, clients: o.clients || cached.clients });
    }).catch(function(){ if (tries < 2){ setTimeout(function(){ loadServiceOptions(tries + 1); }, 2500); } });
  }
  loadServiceOptions();
  setInterval(function(){ loadServiceOptions(); }, 6 * 3600 * 1000);

  // Reusable "＋ Add" that writes a new value to the Dropdown Lists table.
  function makeAdder(sel, listName, label){
    var row = document.createElement("div");
    row.style.cssText = "display:none;margin-top:10px";
    row.innerHTML =
      "<input type='text' autocomplete='off' placeholder='New " + label + "' />" +
      "<div style='display:flex;gap:8px;margin-top:8px'>" +
        "<button type='button' class='addOk' style='background:var(--green);color:#f6f2e8;border:none;border-radius:4px;padding:11px 18px;font-weight:600;cursor:pointer'>Add</button>" +
        "<button type='button' class='addCancel' style='background:transparent;color:var(--green-deep);border:1px solid var(--line);border-radius:4px;padding:11px 18px;font-weight:600;cursor:pointer'>Cancel</button>" +
      "</div><div class='addMsg' style='color:#8a3d1c;font-size:.86rem;margin-top:6px'></div>";
    sel.parentNode.insertBefore(row, sel.nextSibling);
    var input = row.querySelector("input"), okBtn = row.querySelector(".addOk"), cancelBtn = row.querySelector(".addCancel"), msg2 = row.querySelector(".addMsg");
    sel.addEventListener("change", function(){
      if (sel.value === "__add"){ row.style.display = "block"; msg2.textContent = ""; input.focus(); }
      else { row.style.display = "none"; }
    });
    cancelBtn.addEventListener("click", function(){ row.style.display = "none"; input.value = ""; msg2.textContent = ""; sel.value = ""; });
    okBtn.addEventListener("click", function(){
      var name = input.value.trim(); msg2.textContent = "";
      if (!name){ msg2.textContent = "Enter a value."; return; }
      okBtn.disabled = true; okBtn.textContent = "Adding…";
      fetch("/api/picklist", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ list: listName, value: name }) })
        .then(function(r){ return r.json(); }).then(function(d){
          okBtn.disabled = false; okBtn.textContent = "Add";
          if (d && d.ok){
            var nm = d.value || name, found = false;
            for (var i = 0; i < sel.options.length; i++){ if (sel.options[i].value === nm){ found = true; break; } }
            if (!found){ var op = document.createElement("option"); op.value = nm; op.textContent = nm; sel.insertBefore(op, sel.querySelector("option[value='__add']")); }
            sel.value = nm; input.value = ""; row.style.display = "none";
          } else { msg2.textContent = (d && d.error) || "Could not add."; }
        }).catch(function(){ okBtn.disabled = false; okBtn.textContent = "Add"; msg2.textContent = "Couldn't reach the server."; });
    });
  }
  makeAdder(serviceTypeSel, "Service Type", "type");

  function renderAssets(){
    var f = (assetFilter.value || "").toLowerCase();
    var cl = clientFilter.value;
    var matches = allAssets.filter(function(a){ return (!cl || a.client === cl) && a.name.toLowerCase().indexOf(f) !== -1; });
    assetSel.innerHTML = "<option value=''>" + (matches.length ? "Choose an asset" : "No match") + "</option>";
    matches.slice(0, 300).forEach(function(a){ var o=document.createElement("option"); o.value=a.id; o.textContent=a.name; assetSel.appendChild(o); });
  }

  fetch("/api/assets/list").then(function(r){ return r.json(); }).then(function(list){
    allAssets = Array.isArray(list) ? list : [];
    if (!allAssets.length){ assetSel.innerHTML = "<option value=''>No assets yet</option>"; return; }
    renderAssets();
    var pre = new URLSearchParams(location.search).get("asset");
    if (pre){ assetSel.value = pre; if (assetSel.value === pre){ loadHistory(); lockToAsset(pre); } }
  }).catch(function(){ assetSel.innerHTML = "<option value=''>Could not load assets</option>"; });

  // Came from an asset page: lock to that asset and show its details, so the
  // tech doesn't pick or re-enter it. "Change asset" reopens the picker.
  function lockToAsset(id){
    document.getElementById("pickerField").style.display = "none";
    fetch("/api/asset?id=" + encodeURIComponent(id)).then(function(r){ return r.json(); }).then(function(a){
      if (!a || !a.ok) return;
      var bits = [];
      if (a.client) bits.push(escapeHtml(a.client));
      if (a.equipmentType) bits.push(escapeHtml(a.equipmentType));
      if (a.model) bits.push("Model " + escapeHtml(a.model));
      if (a.serial) bits.push("S/N " + escapeHtml(a.serial));
      if (a.location) bits.push(escapeHtml(a.location));
      var banner = document.getElementById("assetBanner");
      banner.style.cssText = "background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:16px 18px;margin-bottom:18px";
      banner.innerHTML =
        "<div style='font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:var(--clay);font-weight:600;margin-bottom:6px'>Logging service for</div>" +
        "<div style='font-family:Spectral,serif;font-size:1.2rem;color:var(--green-deep);font-weight:500'>" + escapeHtml(a.name) + "</div>" +
        (bits.length ? "<div style='color:var(--muted);font-size:.92rem;margin-top:4px'>" + bits.join(" · ") + "</div>" : "") +
        "<a href='/' style='display:inline-block;margin-top:10px;font-size:.86rem;color:var(--green-deep);border-bottom:1px solid var(--clay)'>Change asset</a>";
      banner.style.display = "block";
    }).catch(function(){});
  }

  assetFilter.addEventListener("input", function(){ renderAssets(); historyEl.innerHTML = ""; });
  clientFilter.addEventListener("change", function(){ renderAssets(); historyEl.innerHTML = ""; });

  // ---- live service history for the selected asset ----
  var historyEl = document.getElementById("history");
  function escapeHtml(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function money(v){ return (v===""||v==null)?"":("$"+Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})); }

  function loadHistory(){
    var assetId = assetSel.value;
    var name = assetSel.options[assetSel.selectedIndex] ? assetSel.options[assetSel.selectedIndex].textContent : "";
    if (!assetId){ historyEl.innerHTML = ""; return; }
    historyEl.innerHTML = "<h3>Service history</h3><div class='empty'>Loading…</div>";
    fetch("/api/service/list?assetId=" + encodeURIComponent(assetId)).then(function(r){ return r.json(); }).then(function(rows){
      if (!rows || !rows.length){
        historyEl.innerHTML = "<h3>Service history</h3><div class='empty'>No service history yet for " + escapeHtml(name) + ".</div>";
        return;
      }
      var html = "<h3>Service history — " + escapeHtml(name) + "</h3>" +
        "<table><thead><tr><th>Date</th><th>Type</th><th>Tech</th><th>Notes</th><th>Cost</th></tr></thead><tbody>";
      rows.forEach(function(s){
        html += "<tr style='cursor:pointer' onclick=\"editService('"+s.id+"')\"><td>" + escapeHtml(s.date || "—") + "</td><td>" + escapeHtml(s.type || "—") +
                "</td><td>" + escapeHtml(s.technician || "") + "</td><td>" + escapeHtml(s.notes || "") + "</td><td>" + escapeHtml(money(s.cost)) + "</td></tr>";
      });
      html += "</tbody></table><div style='font-size:.84rem;color:var(--muted);margin-top:6px'>Tap a row to edit it.</div>";
      historyEl.innerHTML = html;
    }).catch(function(){ historyEl.innerHTML = "<h3>Service history</h3><div class='empty'>Couldn't load history.</div>"; });
  }
  assetSel.addEventListener("change", loadHistory);

  // ---- edit a service record ----
  window.editService = function(sid){
    historyEl.innerHTML = "<div class='empty'>Loading…</div>";
    fetch("/api/service/get?id="+encodeURIComponent(sid)).then(function(r){return r.json();}).then(function(s){
      if(!s||!s.ok){ loadHistory(); return; }
      var typeOpts = SERVICE_TYPES.map(function(t){ return "<option"+(s.type===t?" selected":"")+">"+t+"</option>"; }).join("");
      historyEl.innerHTML =
        "<h3>Edit service</h3><div id='svcmsg' style='color:#8a3d1c;margin-bottom:8px'></div>"+
        "<div class='row'><div class='field'><label>Date</label><input id='s_date' type='date' value='"+escapeHtml(s.date)+"'/></div>"+
        "<div class='field'><label>Type</label><select id='s_type'><option value=''>Select…</option>"+typeOpts+"</select></div></div>"+
        "<div class='field'><label>Technician</label><input id='s_tech' type='text' value='"+escapeHtml(s.technician)+"'/></div>"+
        "<div class='field'><label>Notes</label><textarea id='s_notes'>"+escapeHtml(s.notes)+"</textarea></div>"+
        "<div class='field'><label>Cost</label><input id='s_cost' type='number' step='0.01' value='"+escapeHtml(s.cost)+"'/></div>"+
        "<div style='display:flex;gap:10px;margin-bottom:20px'><button class='btn' id='svcSave' type='button' style='width:auto;padding:13px 22px'>Save</button>"+
        "<button class='btn' id='svcBack' type='button' style='width:auto;padding:13px 22px;background:transparent;color:var(--green-deep);border:1px solid var(--line)'>Back</button></div>";
      document.getElementById("svcBack").addEventListener("click", loadHistory);
      document.getElementById("svcSave").addEventListener("click", function(){ saveService(sid); });
    }).catch(function(){ loadHistory(); });
  };
  function saveService(sid){
    var b=document.getElementById("svcSave"); b.disabled=true; b.textContent="Saving…";
    var payload={ id:sid, date:document.getElementById("s_date").value, type:document.getElementById("s_type").value, technician:document.getElementById("s_tech").value, notes:document.getElementById("s_notes").value, cost:document.getElementById("s_cost").value };
    fetch("/api/service/update",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(payload)}).then(function(r){return r.json();}).then(function(d){
      if(d&&d.ok){ loadHistory(); } else { b.disabled=false; b.textContent="Save"; var m=document.getElementById("svcmsg"); if(m) m.textContent=(d&&d.error)||"Save failed."; }
    }).catch(function(){ b.disabled=false; b.textContent="Save"; var m=document.getElementById("svcmsg"); if(m) m.textContent="Couldn't reach the server."; });
  }

  // default date = today
  document.getElementById("serviceDate").value = new Date().toISOString().slice(0,10);

  // ---- photos (multiple) ----
  function processPhoto(file){
    return new Promise(function(resolve, reject){
      var reader = new FileReader();
      reader.onerror = reject;
      reader.onload = function(){
        var img = new Image();
        img.onerror = reject;
        img.onload = function(){
          var max = 1600, w = img.width, h = img.height;
          if (w > max || h > max){
            if (w >= h){ h = Math.round(h * max / w); w = max; } else { w = Math.round(w * max / h); h = max; }
          }
          var canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          var dataUrl = canvas.toDataURL("image/jpeg", 0.82);
          resolve({ preview: dataUrl, base64: dataUrl.split(",")[1], contentType: "image/jpeg",
            filename: (file.name || "service").replace(/\.[^.]+$/, "") + ".jpg" });
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  var photos = [];
  var thumbs = document.getElementById("thumbs");
  document.getElementById("photoInput").addEventListener("change", function(e){
    var files = Array.prototype.slice.call(e.target.files || []);
    files.forEach(function(file){
      processPhoto(file).then(function(res){
        photos.push(res);
        var img = document.createElement("img");
        img.src = res.preview;
        thumbs.appendChild(img);
      }).catch(function(){});
    });
    e.target.value = "";
  });

  // ---- submit ----
  var form = document.getElementById("serviceForm");
  var submitBtn = document.getElementById("submitBtn");
  var msg = document.getElementById("msg");
  function showMsg(kind, text){ msg.className = "msg " + kind; msg.textContent = text; }

  form.addEventListener("submit", function(e){
    e.preventDefault();
    var assetId = assetSel.value;
    if (!assetId){ showMsg("err", "Pick the asset this service is for."); return; }
    var assetName = assetSel.options[assetSel.selectedIndex] ? assetSel.options[assetSel.selectedIndex].textContent : "";

    var payload = {
      assetId: assetId,
      assetName: assetName,
      serviceDate: document.getElementById("serviceDate").value,
      serviceType: serviceTypeSel.value === "__add" ? "" : serviceTypeSel.value,
      technician: document.getElementById("technician").value,
      notes: document.getElementById("notes").value,
      cost: document.getElementById("cost").value,
      photos: photos
    };

    submitBtn.disabled = true;
    submitBtn.textContent = "Saving…";
    msg.className = "msg";

    fetch("/api/service", {
      method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(payload)
    }).then(function(r){ return r.json(); }).then(function(data){
      if (data && data.ok){
        var keepId = payload.assetId;
        document.getElementById("serviceType").value = "";
        document.getElementById("technician").value = "";
        document.getElementById("notes").value = "";
        document.getElementById("cost").value = "";
        document.getElementById("serviceDate").value = new Date().toISOString().slice(0,10);
        photos = []; thumbs.innerHTML = "";
        renderAssets();
        assetSel.value = keepId;
        loadHistory();
        showMsg("ok", "Saved. Added to this asset's history below.");
      } else {
        showMsg("err", (data && data.error) || "Something went wrong. Please try again.");
      }
    }).catch(function(){
      showMsg("err", "Couldn't reach the server. Check your connection and try again.");
    }).finally(function(){
      submitBtn.disabled = false;
      submitBtn.textContent = "Save service record";
    });
  });
</script>
<script src="/whoami-badge.js"></script>
</body>
</html>
