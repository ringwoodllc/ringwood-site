<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#1f3d2b" />
<title>Ringwood</title>
<style>
  body{margin:0;background:#f4f1ea;color:#1f3d2b;font-family:"Hanken Grotesk",-apple-system,sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center;text-align:center;padding:24px}
  a{color:#1f3d2b}
</style>
</head>
<body>
<!-- The standalone "Log a service" form is retired. Service is now logged from a
     ticket. Send anyone who lands here to the asset (to open a ticket) or to the
     service records list. -->
<div>
  <div style="font-size:1.05rem;font-weight:600;margin-bottom:8px">Service is logged from a ticket now.</div>
  <div style="color:#5c6b60;font-size:.92rem">Taking you there…</div>
</div>
<script>
  (function(){
    var a = new URLSearchParams(location.search).get("asset");
    if (a) { location.replace("/a/?id=" + encodeURIComponent(a)); }
    else { location.replace("/services"); }
  })();
</script>
</body>
</html>
