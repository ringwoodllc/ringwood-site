<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1f3d2b" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Asset Lookup" />
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<title>Ringwood · Asset lookup</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="/client-color.js"></script>
<script src="/qrcode.js"></script>
<script src="/jsQR.js"></script>
<style>
  :root{--bg:#f4efe4;--bg-2:#efe8d8;--ink:#23282a;--muted:#5f5d52;--green:#2f5d50;--green-deep:#21443a;--clay:#a9633a;--line:rgba(35,40,42,.14)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:"Hanken Grotesk",-apple-system,sans-serif;font-size:18px;line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:640px;margin:0 auto;padding:0 22px 48px}
  h1,h2{font-family:"Spectral",Georgia,serif;font-weight:500;line-height:1.1;letter-spacing:-.01em;color:var(--green-deep)}
  a{color:inherit}
  header{padding:24px 0}
  .bar{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:11px;font-family:"Spectral",serif;font-size:1.25rem;font-weight:600;color:var(--green-deep)}
  .back{font-size:.92rem;text-decoration:none;color:var(--green-deep);border-bottom:1px solid var(--clay);padding-bottom:1px}
  .eyebrow{font-size:.8rem;letter-spacing:.18em;text-transform:uppercase;color:var(--clay);font-weight:600;margin:8px 0 10px}
  .lookup{background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:18px;margin-bottom:24px}
  .lookup h1{font-size:1.5rem;margin-bottom:12px}
  label{display:block;font-weight:600;font-size:.9rem;color:var(--green-deep);margin:0 0 6px}
  select,input,textarea{width:100%;font:inherit;font-size:1.02rem;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:4px;padding:12px 14px;-webkit-appearance:none;appearance:none}
  textarea{min-height:62px;resize:vertical}
  select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' fill='none' stroke='%235f5d52' stroke-width='1.6'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:38px}
  select:focus,input:focus,textarea:focus{outline:none;border-color:var(--green)}
  .or{text-align:center;color:var(--muted);font-size:.85rem;margin:14px 0}
  .sortrow{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin:2px 0 10px}
  .sorts{display:flex;gap:7px}
  .sortb{background:var(--bg-2);border:1px solid var(--line);color:var(--green-deep);border-radius:999px;padding:6px 12px;font:inherit;font-size:.82rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .sortb:hover{border-color:var(--green)}
  .sortb.on{background:var(--green);color:#f6f2e8;border-color:var(--green)}
  .sortb .dir{font-size:.74rem;opacity:.85}
  .assetlist{max-height:340px;overflow-y:auto;border:1px solid var(--line);border-radius:6px;background:var(--bg)}
  .arow{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:11px 13px;border-bottom:1px solid var(--line);cursor:pointer}
  .arow:last-child{border-bottom:none}
  .arow:hover{background:var(--bg-2)}
  .arow .an{font-weight:600;color:var(--green-deep);font-size:.98rem;word-break:break-word}
  .arow .am{color:var(--muted);font-size:.82rem;margin-top:2px}
  .svc-tag{display:inline-block;margin-top:5px;font-size:.74rem;font-weight:700;color:#274a73;background:#dfe9f4;padding:2px 9px;border-radius:999px}
  .arow .acl{flex:0 0 auto;color:var(--muted);font-size:.78rem;text-align:right;white-space:nowrap}
  .client-chip{flex:0 0 auto;align-self:flex-start;font-size:.78rem;font-weight:700;color:#f6f2e8;background:var(--green-deep);padding:3px 11px;border-radius:999px;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}
  .assetlist .empty{color:var(--muted);padding:14px 13px;font-size:.92rem}
  .revsec{border-top:1px solid var(--line);padding-top:14px}
  .revtog{background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:8px 12px;font:inherit;font-size:.9rem;font-weight:600;color:var(--green-deep);cursor:pointer;display:inline-flex;align-items:center;gap:7px}
  .revtog:hover{border-color:var(--green)}
  #assetRevBody{flex-direction:column;gap:8px;margin-top:10px}
  .revrow{background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:9px 12px}
  .revrow.agent{background:#eef3ef}
  .revline{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .revico{opacity:.5}
  .revtext{color:var(--green-deep);font-weight:600;font-size:.9rem}
  .revtime{color:var(--muted);font-size:.78rem;margin-left:auto;white-space:nowrap}
  .revmore{background:var(--bg);border:1px solid var(--line);color:var(--green-deep);border-radius:999px;width:22px;height:22px;line-height:1;font:inherit;font-weight:700;cursor:pointer;padding:0;flex:0 0 auto}
  .revdetail{margin-top:7px;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:9px 11px;font-size:.86rem;color:var(--muted);white-space:pre-wrap}
  .scanbig{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;cursor:pointer;padding:15px;border:1.5px dashed rgba(47,93,80,.45);border-radius:6px;color:var(--green-deep);background:var(--bg);font-weight:600;margin-bottom:16px}
  .scanbig:hover{border-color:var(--green)}
  .qrchip{display:inline-block;background:var(--bg-2);border:1px solid var(--line);color:var(--green-deep);border-radius:999px;padding:6px 13px;font-size:.85rem;font-weight:600;cursor:pointer;margin:0 6px 6px 0}
  .qrchip:hover{border-color:var(--green)}
  .qrrow{display:flex;gap:8px}
  .qrrow input{flex:1}
  .gobtn{background:var(--green);color:#f6f2e8;border:none;cursor:pointer;font-weight:600;font-size:1rem;padding:0 18px;border-radius:4px}
  .gobtn:hover{background:var(--green-deep)}
  .titlerow{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:4px}
  h1.assetname{font-size:clamp(1.7rem,6vw,2.2rem)}
  .pill{font-size:.7rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:4px 11px;border-radius:999px;white-space:nowrap;margin-top:6px}
  .pill.pending{background:#f6eccf;color:#7a5a12}
  .pill.ai{background:#dfe9f4;color:#274a73}
  .pill.verified{background:#e3efe7;color:#21443a}
  .sub{color:var(--muted);font-size:.98rem;margin-bottom:16px}
  .photos{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px}
  @media(max-width:520px){.photos{grid-template-columns:1fr 1fr}}
  .photos figure{margin:0}
  .photos img{width:100%;height:120px;object-fit:cover;border-radius:6px;border:1px solid var(--line);display:block;background:var(--bg-2)}
  .photos figcaption{font-size:.7rem;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-top:5px}
  .card{background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:18px;margin-bottom:20px}
  dl{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;font-size:.98rem;margin:0}
  dt{color:var(--muted);font-weight:600}
  dd{color:var(--ink);margin:0}
  .ainote{font-size:.86rem;color:var(--muted);white-space:pre-line;margin-top:4px}
  h2{font-size:1.2rem;margin:0 0 10px}
  table{width:100%;border-collapse:collapse;background:var(--bg-2);border:1px solid var(--line);border-radius:6px;overflow:hidden;font-size:.9rem}
  th,td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--line);vertical-align:top}
  th{background:#e7decd;font-weight:600;color:var(--green-deep);font-size:.74rem;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
  td:first-child{white-space:nowrap}
  tbody tr{cursor:pointer}
  tbody tr:hover td{background:#eee3cf}
  tr:last-child td{border-bottom:none}
  .empty{color:var(--muted);font-size:.95rem;background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:14px}
  .btn{display:inline-block;background:var(--green);color:#f6f2e8;text-decoration:none;font-weight:600;font-size:1rem;padding:13px 22px;border-radius:4px;border:none;cursor:pointer}
  .btn:hover{background:var(--green-deep)}
  .btn.ghost{background:transparent;color:var(--green-deep);border:1px solid var(--line)}
  .btn.ghost:hover{background:var(--bg-2)}
  .btn:disabled{opacity:.6;cursor:default}
  .btnrow{display:flex;flex-wrap:nowrap;gap:8px;margin:16px 0 6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .btnrow .btn{flex:0 0 auto;white-space:nowrap;padding:11px 15px;font-size:.94rem}
  .stats{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 22px}
  .stat{display:inline-flex;align-items:center;gap:8px;background:var(--bg-2);border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:.92rem;font-family:inherit;font-weight:600;color:var(--green-deep);text-decoration:none;cursor:pointer}
  .statadd{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:999px;border:1.5px solid var(--green);color:var(--green);font-size:1rem;font-weight:700;cursor:pointer;background:var(--bg);text-decoration:none;vertical-align:middle}
  .statadd:hover{background:var(--green);color:#f6f2e8}
  .histadd{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:0 0 12px}
  .hadd{display:inline-flex;align-items:center;gap:4px;background:var(--bg-2);border:1px solid var(--line);color:var(--green-deep);border-radius:999px;padding:6px 13px;font-size:.86rem;font-weight:600;text-decoration:none}
  .hadd:hover{border-color:var(--green)}
  .hall{font-size:.82rem;color:var(--green-deep);border-bottom:1px solid var(--clay);text-decoration:none;margin-left:auto}
  .hrow{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:11px 13px;margin-bottom:8px;cursor:pointer}
  .hrow:hover{border-color:var(--green)}
  .hbd{min-width:0}
  .htag{display:inline-block;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 8px;border-radius:999px;margin-right:7px;vertical-align:middle}
  .htag.t{background:#dfe9f4;color:#274a73}
  .htag.s{background:#e3efe7;color:var(--green-deep)}
  .htitle{font-weight:600;color:var(--green-deep)}
  .hmeta{color:var(--muted);font-size:.84rem;margin-top:3px;word-break:break-word}
  .hright{flex:0 0 auto;display:flex;align-items:center;gap:6px;color:var(--muted);font-size:.85rem;white-space:nowrap}
  .hchev{color:var(--muted);font-size:1.2rem}
  .agenttog{background:transparent;border:none;padding:0;font:inherit;font-weight:600;color:var(--green-deep);cursor:pointer;display:inline-flex;align-items:center;gap:8px}
  .agenttog #agentIco{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:999px;border:1px solid var(--line);font-size:.95rem}
  .stat:hover{border-color:var(--green)}
  .stat b{background:var(--green);color:#f6f2e8;border-radius:999px;padding:1px 9px;font-size:.82rem;min-width:22px;text-align:center}
  .stat.zero b{background:var(--line);color:var(--muted)}
  .field{margin-bottom:14px}
  .hint{font-size:.84rem;color:var(--muted);margin:-8px 0 14px}
  .state{color:var(--muted);padding:8px 0 30px}
  .err{color:#8a3d1c}
  .agentnote{background:#dfe9f4;color:#274a73;border-radius:4px;padding:10px 12px;font-size:.9rem;margin-bottom:14px}
  .qrcard{display:flex;gap:14px;align-items:center;background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:12px 14px;margin-bottom:20px;flex-wrap:wrap}
  .qrcard .qrimg{flex:0 0 auto;background:#fff;padding:6px;border-radius:6px;border:1px solid var(--line);line-height:0}
  .qrcard .qrimg svg,.qrcard .qrimg img{width:84px;height:84px;display:block}
  .qrcard .qrinfo{flex:1;min-width:200px}
  .qrcard .qrinfo .lbl{font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--clay);font-weight:600;margin-bottom:4px}
  .qrcard .qrurl{font-size:.8rem;color:var(--muted);word-break:break-all;margin-bottom:10px}
  .qrcard .qrbtns{display:flex;gap:8px;flex-wrap:wrap}
  .qrcard .qrbtns button{background:var(--bg);border:1px solid var(--line);color:var(--green-deep);border-radius:999px;padding:7px 14px;font:inherit;font-size:.84rem;font-weight:600;cursor:pointer}
  .qrcard .qrbtns .qrscan{display:inline-block;background:var(--green);color:#f6f2e8;border:1px solid var(--green);border-radius:999px;padding:7px 14px;font:inherit;font-size:.84rem;font-weight:600}
  .qrcard .qrbtns button:hover{border-color:var(--green)}
  /* Prev/Next within the filtered list (same pattern as the ticket editor). */
  .navbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .navrt{display:flex;align-items:center;gap:8px}
  .navb{background:var(--bg-2);border:1px solid var(--line);color:var(--green-deep);border-radius:999px;padding:6px 13px;font:inherit;font-size:.85rem;font-weight:600;cursor:pointer}
  .navb:hover{border-color:var(--green)}
  .navb:disabled{opacity:.4;cursor:default}
  .navpos{color:var(--muted);font-size:.82rem;min-width:54px;text-align:center}
  .navside{display:none}
  @media(min-width:900px){
    .navside{display:flex;align-items:center;justify-content:center;position:fixed;top:50%;transform:translateY(-50%);width:46px;height:80px;border:1px solid var(--line);background:var(--bg-2);color:var(--green-deep);font-size:2rem;line-height:1;cursor:pointer;z-index:50;border-radius:10px;box-shadow:0 4px 14px rgba(0,0,0,.08)}
    .navside:hover{border-color:var(--green);background:var(--bg)}
    .navside:disabled{opacity:.3;cursor:default}
    .navside.left{left:max(12px, calc(50% - 440px))}
    .navside.right{right:max(12px, calc(50% - 440px))}
  }
  @media print{ body * {visibility:hidden} #printArea, #printArea * {visibility:visible} #printArea{position:absolute;left:0;top:0;width:100%;text-align:center} }
</style>
</head>
<body>

<header>
  <div class="wrap bar">
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 26 26" aria-hidden="true"><g fill="none" stroke="#2f5d50" stroke-width="1.4"><circle cx="13" cy="13" r="3"/><circle cx="13" cy="13" r="7"/><circle cx="13" cy="13" r="11"/></g></svg>
      Ringwood
    </div>
    <a class="back" href="/app">Home</a>
  </div>
</header>

<main class="wrap">
  <div class="eyebrow">Asset lookup</div>
  <div class="lookup">
    <h1>Find an asset</h1>
    <label class="scanbig" for="scanInput">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M21 14v7h-7"/></svg>
      <span>Scan a QR code</span>
    </label>
    <input type="file" id="scanInput" accept="image/*" style="display:none" />
    <div id="scanMsg" style="font-size:.84rem;color:var(--muted);margin:-8px 0 14px"></div>
    <div id="scanAssign" style="display:none;margin-bottom:14px"></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <div class="field" style="flex:1;min-width:120px;margin-bottom:10px"><label for="clientFilter">Client</label><select id="clientFilter"><option value="">All clients</option></select></div>
      <div class="field" style="flex:2;min-width:150px;margin-bottom:10px"><label for="searchInput">Search</label><input id="searchInput" type="text" autocomplete="off" placeholder="Name, model, serial…" /></div>
    </div>
    <div class="sortrow">
      <div class="sorts">
        <button type="button" class="sortb" id="sortName">Name <span class="dir">A→Z</span></button>
        <button type="button" class="sortb" id="sortDate">Date <span class="dir">Newest</span></button>
      </div>
      <div id="assetCount" style="color:var(--muted);font-size:.84rem"></div>
    </div>
    <div id="assetList" class="assetlist"><div class="empty">Loading assets…</div></div>
    <div class="or">— or paste an ID / link —</div>
    <div class="qrrow"><input id="qrInput" type="text" autocomplete="off" placeholder="QR-1, rec…, or a scanned link" /><button class="gobtn" id="goBtn" type="button">View</button></div>
  </div>
  <div id="view"></div>
</main>

<script>
  function esc(s){ return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function row(label, val){ return val ? "<dt>"+esc(label)+"</dt><dd>"+esc(val)+"</dd>" : ""; }
  function money(v){ return (v===""||v==null)?"":("$"+Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})); }
  function parseId(raw){ var s=(raw||"").trim(); if(!s)return""; var m=s.match(/[?&]id=([A-Za-z0-9]+)/); if(m)return m[1]; m=s.match(/\/a\/([A-Za-z0-9]+)/); if(m)return m[1]; m=s.match(/rec[A-Za-z0-9]{14}/); if(m)return m[0]; return s; }
  var SERVICE_TYPES = ["Install","Inspection","Maintenance","Repair","Replacement","Other"];
  var OPTIONS = { types:[], locations:[], clients:[] };

  var assetList=document.getElementById("assetList"), searchInput=document.getElementById("searchInput"), qrInput=document.getElementById("qrInput"), view=document.getElementById("view"), clientFilter=document.getElementById("clientFilter"), assetCount=document.getElementById("assetCount");
  var allAssets=[], curAsset=null, curId="";
  // A client login only sees its own assets; hide the client filter.
  fetch("/api/whoami").then(function(r){return r.json();}).then(function(w){
    if (w && w.ok && w.role === "client"){ var f = clientFilter.closest(".field"); if (f) f.style.display = "none"; }
    else if (window.RWClientPins){ try { window.__cpins = RWClientPins.attach({ selectEl: clientFilter, exclude: ["__unassigned"], hide: "field" }); } catch(e){} }
  }).catch(function(){});

  // Lists from /api/options, with a resilient cache: render from the last good
  // values in this browser first, then refresh live (with retries) and update
  // the cache. A ~6h timer keeps the cached fallback fresh on its own.
  var CACHE_KEY = "rw_lists_v3";
  function readCache(){ try{ var c=JSON.parse(localStorage.getItem(CACHE_KEY)||"null"); return (c&&c.data)?c.data:null; }catch(e){ return null; } }
  function writeCache(d){ try{ localStorage.setItem(CACHE_KEY, JSON.stringify({t:Date.now(),data:d})); }catch(e){} }
  // Only list clients that actually have assets (plus Unassigned, if any) — no
  // hunting through empty clients.
  function renderClientFilter(){
    var names={}, hasUn=false;
    (allAssets||[]).forEach(function(a){ if(a.client) names[a.client]=true; else hasUn=true; });
    var list=Object.keys(names).sort(function(x,y){ return x.toLowerCase().localeCompare(y.toLowerCase()); });
    var keep=clientFilter.value, html="<option value=''>All clients</option>"+list.map(function(c){ return "<option>"+esc(c)+"</option>"; }).join("");
    if(hasUn) html+="<option value='__unassigned'>Unassigned</option>";
    clientFilter.innerHTML=html;
    if(keep){ clientFilter.value=keep; if(clientFilter.value!==keep) clientFilter.value=""; }
    if(window.__cpins) window.__cpins.refresh();
  }
  var cachedLists = readCache();
  if(cachedLists){ OPTIONS=cachedLists; if(cachedLists.serviceTypes&&cachedLists.serviceTypes.length) SERVICE_TYPES=cachedLists.serviceTypes; renderClientFilter(cachedLists.clients); }
  function loadLists(tries){
    tries=tries||0;
    fetch("/api/options", { cache: "no-store" }).then(function(r){return r.json();}).then(function(o){
      o=o||{};
      if((!o.clients||!o.clients.length) && tries<2){ setTimeout(function(){loadLists(tries+1);},2500); return; }
      if(o.clients&&o.clients.length){ OPTIONS=o; if(o.serviceTypes&&o.serviceTypes.length) SERVICE_TYPES=o.serviceTypes; renderClientFilter(o.clients); writeCache(o); }
    }).catch(function(){ if(tries<2) setTimeout(function(){loadLists(tries+1);},2500); });
  }
  loadLists();
  setInterval(function(){ loadLists(); }, 6*3600*1000);

  // Re-fetch the asset list and re-render it. Called on load and whenever we
  // return to the list, so edits (new client, verified status, etc.) show up.
  function refreshAssets(){
    return fetch("/api/assets/list",{cache:"no-store"}).then(function(r){return r.json();}).then(function(list){
      allAssets = Array.isArray(list)?list:[];
      renderList();
    });
  }
  refreshAssets().then(function(){
    // Deep link: ?id=<uuid> loads directly; a QR tag resolves to its asset.
    var raw = new URLSearchParams(location.search).get("id") || new URLSearchParams(location.search).get("qr") || location.pathname.replace(/^\/a\//,"");
    var id = resolveRef(raw);
    if (id && /^rec|^[0-9a-f]{8}-/.test(id)){ load(id); }
  }).catch(function(){ assetList.innerHTML="<div class='empty'>Could not load assets.</div>"; });

  // Turn a pasted value (uuid, /a/?id=, a QR tag like QR-1) into an asset id.
  function resolveRef(raw){
    var s=(raw||"").trim(); if(!s) return "";
    var id=parseId(s);
    var byQr=allAssets.find(function(a){ return a.qr && a.qr.toLowerCase()===s.toLowerCase(); });
    if(byQr) return byQr.id;
    var byQr2=allAssets.find(function(a){ return a.qr && a.qr.toLowerCase()===id.toLowerCase(); });
    if(byQr2) return byQr2.id;
    return id;
  }

  // The filter + sort pipeline, shared by the list and Prev/Next navigation so
  // stepping through assets follows exactly what the list shows.
  function filteredAssets(){
    var client=clientFilter.value, q=(searchInput.value||"").trim().toLowerCase(), sort=curSort;
    var arr=allAssets.filter(function(a){
      if(client==="__unassigned"){ if(a.client) return false; }
      else if(client && a.client!==client) return false;
      if(q){ var hay=[a.name,a.fullName,a.make,a.model,a.serial,a.type,a.location,a.qr,a.description].join(" ").toLowerCase(); if(hay.indexOf(q)<0) return false; }
      return true;
    });
    // The chosen sort (Name / Date) is the tiebreaker.
    function baseCmp(a,b){
      if(sort==="new") return (b.loggedAt||"").localeCompare(a.loggedAt||"");
      if(sort==="old") return (a.loggedAt||"").localeCompare(b.loggedAt||"");
      if(sort==="za") return (b.name||"").toLowerCase().localeCompare((a.name||"").toLowerCase());  // Z–A
      return (a.name||"").toLowerCase().localeCompare((b.name||"").toLowerCase());  // A–Z default
    }
    // When searching, rank by where the match is: a hit in the name beats one
    // buried in the description, so the obvious results lead.
    function score(a){
      var nm=(a.name||"").toLowerCase(), fn=(a.fullName||"").toLowerCase();
      var prim=[a.make,a.model,a.serial,a.type,a.location,a.qr].join(" ").toLowerCase();
      var desc=(a.description||"").toLowerCase();
      var s=0;
      if(nm.indexOf(q)===0) s+=100; else if(nm.indexOf(q)>=0) s+=70;
      if(fn.indexOf(q)>=0) s+=40;
      if(prim.indexOf(q)>=0) s+=25;
      if(desc.indexOf(q)>=0) s+=8;
      return s;
    }
    arr.sort(function(a,b){
      if(q){ var d=score(b)-score(a); if(d) return d; }
      return baseCmp(a,b);
    });
    return arr;
  }
  function renderList(){
    renderClientFilter();
    var arr=filteredAssets();
    assetCount.textContent = allAssets.length ? (arr.length+" of "+allAssets.length+" asset"+(allAssets.length===1?"":"s")) : "";
    if(!arr.length){ assetList.innerHTML="<div class='empty'>"+(allAssets.length?"No assets match.":"No assets yet.")+"</div>"; return; }
    assetList.innerHTML = arr.map(function(a){
      var meta=[a.make,a.model,a.serial?("SN "+a.serial):"",a.location].filter(Boolean).map(esc).join(" · ");
      var svc = a.services ? "<span class='svc-tag'>🔧 "+a.services+" service"+(a.services===1?"":"s")+"</span>" : "";
      return "<div class='arow' onclick=\"load('"+esc(a.id)+"', true)\">"+
        "<div><div class='an'>"+esc(a.name)+(a.qr?" <span class='acl'>("+esc(a.qr)+")</span>":"")+"</div>"+
        (meta?"<div class='am'>"+meta+"</div>":"")+svc+"</div>"+
        (a.client?"<span class='client-chip' style='background:"+(a.clientColor||clientColor(a.client))+"'>"+esc(a.client)+"</span>":"")+"</div>";
    }).join("");
  }
  clientFilter.addEventListener("change", renderList);
  searchInput.addEventListener("input", renderList);
  // Sort toggles: Name (A→Z / Z→A) and Date (Newest / Oldest). Tapping the active
  // one flips its direction; tapping the other switches to it.
  var curSort = "az";
  var lastNavIndex = 0;  // for Next/Prev within the filtered view
  function syncSort(){
    var nb=document.getElementById("sortName"), db=document.getElementById("sortDate");
    var nameActive = (curSort==="az"||curSort==="za"), dateActive=(curSort==="new"||curSort==="old");
    nb.classList.toggle("on", nameActive); db.classList.toggle("on", dateActive);
    nb.querySelector(".dir").textContent = curSort==="za" ? "Z→A" : "A→Z";
    db.querySelector(".dir").textContent = curSort==="old" ? "Oldest" : "Newest";
  }
  document.getElementById("sortName").addEventListener("click", function(){ curSort = (curSort==="az") ? "za" : "az"; syncSort(); renderList(); });
  document.getElementById("sortDate").addEventListener("click", function(){ curSort = (curSort==="new") ? "old" : "new"; syncSort(); renderList(); });
  syncSort();
  document.getElementById("goBtn").addEventListener("click", function(){ var id=resolveRef(qrInput.value); if(id) load(id, true); });
  qrInput.addEventListener("keydown", function(e){ if(e.key==="Enter"){ var id=resolveRef(qrInput.value); if(id) load(id, true); } });
  document.getElementById("scanInput").addEventListener("change", function(e){
    var file=e.target.files&&e.target.files[0]; e.target.value="";
    var sm=document.getElementById("scanMsg"), sa=document.getElementById("scanAssign"); if(!file) return;
    sa.style.display="none"; sa.innerHTML="";
    sm.style.color="var(--muted)"; sm.textContent="Reading the code…";
    decodeQRFromImage(file).then(function(val){
      var id=resolveRef(val);
      if(id && (/^rec|^[0-9a-f]{8}-/.test(id) || allAssets.some(function(a){return a.id===id;}))){ sm.textContent=""; load(id, true); }
      else { offerAssign(val); }
    }).catch(function(err){ sm.style.color="#8a3d1c"; sm.textContent=(err&&err.message)||"Couldn't read a QR code."; });
  });

  // Unknown (store-bought) code: let the user link it to an asset right here.
  function offerAssign(code){
    var sm=document.getElementById("scanMsg"), sa=document.getElementById("scanAssign");
    sm.style.color="var(--muted)"; sm.textContent="This code isn't linked yet. Assign it to an asset:";
    var opts=allAssets.slice().sort(function(a,b){ return (a.name||"").toLowerCase().localeCompare((b.name||"").toLowerCase()); })
      .map(function(a){ return "<option value='"+esc(a.id)+"'>"+esc(a.name||"Asset")+(a.client?(" — "+esc(a.client)):"")+"</option>"; }).join("");
    sa.innerHTML="<div style='display:flex;gap:8px;flex-wrap:wrap;align-items:center'>"+
      "<select id='asgSel' style='flex:1;min-width:160px'>"+opts+"</select>"+
      "<button class='gobtn' id='asgBtn' type='button' style='padding:11px 16px'>Assign</button></div>"+
      "<div id='asgMsg' style='font-size:.84rem;margin-top:6px'></div>";
    sa.style.display="block";
    document.getElementById("asgBtn").addEventListener("click", function(){
      var aid=document.getElementById("asgSel").value; if(!aid) return;
      var b=this; b.disabled=true; b.textContent="Saving…";
      fetch("/api/asset/update",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({ id:aid, qrTag:code })})
        .then(function(r){return r.json();}).then(function(d){
          if(d&&d.ok){
            // Refresh the local list so the new code resolves, then open the asset.
            fetch("/api/assets/list").then(function(r){return r.json();}).then(function(list){ allAssets=Array.isArray(list)?list:allAssets; sm.textContent=""; sa.style.display="none"; load(aid, true); }).catch(function(){ sm.textContent=""; sa.style.display="none"; load(aid, true); });
          } else { b.disabled=false; b.textContent="Assign"; document.getElementById("asgMsg").style.color="#8a3d1c"; document.getElementById("asgMsg").textContent=(d&&d.error)||"Couldn't assign."; }
        }).catch(function(){ b.disabled=false; b.textContent="Assign"; document.getElementById("asgMsg").style.color="#8a3d1c"; document.getElementById("asgMsg").textContent="Couldn't reach the server."; });
    });
  }

  // Show the search list (no history change of its own).
  function showListView(){
    var lk=document.querySelector(".lookup"), eb=document.querySelector(".eyebrow");
    if(lk) lk.style.display=""; if(eb) eb.style.display="";
    view.innerHTML=""; curId=""; curAsset=null;
    window.scrollTo(0,0);
    refreshAssets();  // pull in any edits made on the detail screen
  }
  // load(id, push): push=true adds a history entry so the phone's back/swipe
  // returns to the list instead of leaving the app.
  function load(id, push){
    curId=id; view.innerHTML="<div class='state'>Loading asset…</div>";
    var u="/a/?id="+encodeURIComponent(id);
    if(push) history.pushState({asset:id},"",u); else history.replaceState({asset:id},"",u);
    // Show the asset on its own, at the very top: collapse the lookup form.
    var lk=document.querySelector(".lookup"), eb=document.querySelector(".eyebrow");
    if(lk) lk.style.display="none"; if(eb) eb.style.display="none";
    window.scrollTo(0,0);
    fetch("/api/asset?id="+encodeURIComponent(id)).then(function(r){return r.json();}).then(function(a){
      if(!a||!a.ok){ view.innerHTML="<div class='state err'>Asset not found.</div>"; return; }
      curAsset=a; renderRead(a);
    }).catch(function(){ view.innerHTML="<div class='state err'>Couldn't load. Try again.</div>"; });
  }
  // Back to the list: go back through history so the swipe-back gesture stays in sync.
  window.backToList=function(){
    if (history.state && history.state.asset) { history.back(); }
    else { history.replaceState(null,"","/a/"); showListView(); }
  };
  // The phone's back gesture / button fires popstate: show whatever the URL says.
  window.addEventListener("popstate", function(){
    var raw = new URLSearchParams(location.search).get("id") || "";
    var id = raw ? resolveRef(raw) : "";
    if (id && /^rec|^[0-9a-f]{8}-/.test(id)) { load(id, false); }
    else { showListView(); }
  });

        "</div>";

      docs = "<div class='card'>"+

      "</div>"+

    // ---- Next / Prev within the current filtered view (mirrors the ticket editor) ----
    function navTo(dir){
      var list = filteredAssets();
      var idx = -1; for(var i=0;i<list.length;i++){ if(list[i].id===curId){ idx=i; break; } }
      var target;
      if(idx<0){ var anchor=Math.min(Math.max(lastNavIndex,0), list.length-1); target = dir>0 ? anchor : anchor-1; }
      else { target = idx+dir; }
      if(target<0 || target>=list.length) return;
      lastNavIndex=target; load(list[target].id, true);
    }
    (function(){
      var list=filteredAssets(), idx=-1; for(var i=0;i<list.length;i++){ if(list[i].id===curId){ idx=i; break; } }
      if(idx>=0) lastNavIndex=idx;
      var pos=document.getElementById("a_navpos");

      ["a_next","a_nextSide"].forEach(function(bid){ var b=document.getElementById(bid); if(b){ b.disabled=atEnd; b.addEventListener("click",function(){ navTo(1); }); } });

  // One combined history list: this asset's tickets and service records together,
  // newest first, each tagged. Tickets open the ticket; services open inline.
  function loadAssetHistory(id){

  // Canonical deep link a printed/scanned code opens. Stable host so stickers
  // keep working wherever the page is viewed.
  function assetUrl(id){ return "https://app.ringwood.ai/a/?id="+encodeURIComponent(id); }
  // Branded QR: high error-correction so the Ringwood rings can sit in the
  // center without breaking the scan.
  function qrSvg(text){
    try{
      var qr=qrcode(0,"H"); qr.addData(text); qr.make();
      var n=qr.getModuleCount(), m=2, size=n+m*2, rects="";
      for(var r=0;r<n;r++){ for(var c=0;c<n;c++){ if(qr.isDark(r,c)){ rects+="<rect x='"+(c+m)+"' y='"+(r+m)+"' width='1.03' height='1.03'/>"; } } }
      var cx=size/2, lr=Math.max(2.6, n*0.085), pad=lr+1.1;
      var overlay=
        "<rect x='"+(cx-pad)+"' y='"+(cx-pad)+"' width='"+(pad*2)+"' height='"+(pad*2)+"' rx='"+(pad*0.45)+"' fill='#ffffff'/>"+
        "<g fill='none' stroke='#2f5d50' stroke-width='"+(lr*0.16)+"'>"+
          "<circle cx='"+cx+"' cy='"+cx+"' r='"+(lr*0.34)+"'/>"+
          "<circle cx='"+cx+"' cy='"+cx+"' r='"+(lr*0.64)+"'/>"+
          "<circle cx='"+cx+"' cy='"+cx+"' r='"+(lr*0.94)+"'/>"+
        "</g>";
      return "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 "+size+" "+size+"' shape-rendering='crispEdges'><rect width='"+size+"' height='"+size+"' fill='#ffffff'/><g fill='#21443a'>"+rects+"</g>"+overlay+"</svg>";
    }catch(e){ return ""; }
  }
  // Read a QR out of a photo (purchased sticker). Uses the native detector when
  // available, falls back to jsQR.
  function decodeQRFromImage(file){
    return new Promise(function(resolve, reject){
      var img=new Image(), url=URL.createObjectURL(file);
      img.onload=function(){
        var max=1100, w=img.width, h=img.height, s=Math.min(1, max/Math.max(w,h));
        w=Math.round(w*s); h=Math.round(h*s);
        var c=document.createElement("canvas"); c.width=w; c.height=h;
        var ctx=c.getContext("2d"); ctx.drawImage(img,0,0,w,h);
        URL.revokeObjectURL(url);
        function fallback(){
          try{ var d=ctx.getImageData(0,0,w,h); var res=window.jsQR?window.jsQR(d.data,w,h):null; if(res&&res.data) resolve(res.data); else reject(new Error("No QR code found in the photo.")); }
          catch(e){ reject(e); }
        }
        if(window.BarcodeDetector){
          try{ new BarcodeDetector({formats:["qr_code"]}).detect(c).then(function(codes){ if(codes&&codes.length) resolve(codes[0].rawValue); else fallback(); }, fallback); return; }
          catch(e){}
        }
        fallback();
      };
      img.onerror=function(){ URL.revokeObjectURL(url); reject(new Error("Couldn't read that image.")); };
      img.src=url;
    });
  }

      "<input type='file' id='qrAssign' accept='image/*' capture='environment' style='display:none' />";
    // A store-bought sticker already assigned: show its code (the sticker IS the QR).
    if (a.qr && !isOwnKey(a.qr)){
      return "<div class='qrcard'>"+
        "<div class='qrinfo'><div class='lbl'>QR code assigned</div>"+
        "<div style='font-weight:600;color:var(--green-deep);word-break:break-all;font-size:1.05rem'>"+esc(a.qr)+"</div>"+

        "<div id='qrCardMsg' style='font-size:.82rem;color:var(--muted);margin-top:6px'></div></div></div>";
    }
    // A generated Ringwood code: show the image to print.

      return "<div class='qrcard'>"+
        "<div class='qrimg'>"+qrSvg(url)+"</div>"+

    return "<div class='qrcard'>"+

      "<div class='qrurl'>No code yet. Stick a code on the equipment and scan it, or generate one to print.</div>"+

    var m=document.getElementById("qrCardMsg"); if(m){ m.style.color="var(--muted)"; m.textContent="Reading the code…"; }

      if(m){ m.textContent="Saving…"; }
      fetch("/api/asset/update",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({ id:curId, qrTag:val })})
        .then(function(r){return r.json();}).then(function(d){ if(d&&d.ok){ load(curId); } else { if(m){ m.style.color="#8a3d1c"; m.textContent=(d&&d.error)||"Couldn't save the code."; } } })
        .catch(function(){ if(m){ m.style.color="#8a3d1c"; m.textContent="Couldn't reach the server."; } });
    }).catch(function(err){ if(m){ m.style.color="#8a3d1c"; m.textContent=(err&&err.message)||"Couldn't read a QR code. Try a flat, close shot."; } });

    var m=document.getElementById("qrCardMsg"); if(m){ m.style.color="var(--muted)"; m.textContent="Generating…"; }

  // Our own auto key looks like RW-XXXXX or a /a/?id= link; anything else is a

  function isOwnKey(v){ v=(v||"").trim(); return /^RW-[0-9A-Z]{4,}$/i.test(v) || v.indexOf("/a/")>=0 || v.indexOf("id=")>=0; }
  function copyText(t, btn){
    var done=function(){ var o=btn.textContent; btn.textContent="Copied"; setTimeout(function(){ btn.textContent=o; },1400); };
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(done,function(){}); }
    else { var i=document.createElement("input"); i.value=t; document.body.appendChild(i); i.select(); try{document.execCommand("copy");}catch(e){} document.body.removeChild(i); done(); }
  }

  // Shrink large phone photos client-side so uploads are quick on cell signal.
  function processPhoto(file){
    return new Promise(function(resolve, reject){
      var img = new Image(), url = URL.createObjectURL(file);
      img.onload = function(){
        var max=1280, w=img.width, h=img.height;
        if(w>max||h>max){ if(w>=h){ h=Math.round(h*max/w); w=max; } else { w=Math.round(w*max/h); h=max; } }
        var c=document.createElement("canvas"); c.width=w; c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        URL.revokeObjectURL(url);
        var d=c.toDataURL("image/jpeg",0.7);
        resolve({ base64:d.split(",")[1], contentType:"image/jpeg", preview:d });
      };
      img.onerror=function(){ URL.revokeObjectURL(url); reject(new Error("bad image")); };
      img.src=url;
    });
  }

        "<div style='display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin:14px 0 4px'><div style='font-weight:600;color:var(--green-deep)'>Extended warranty</div><span style='font-size:.82rem;color:var(--muted)'>kicks in after the manufacturer's</span></div>"+
        "<div id='extWrap'>"+
          "<div class='field'><label>Provider</label><input id='f_extProvider' type='text' value='"+esc(a.extProvider||"")+"' placeholder='e.g. Allstate'/></div>"+
          "<div class='field'><label>Length</label><input id='f_extLength' type='text' value='"+esc(a.extLength||"")+"' placeholder='e.g. 3 years'/></div>"+
          "<div class='field'><label>Expires</label><input id='f_extExpires' type='date' value='"+esc(a.extExpires||"")+"'/></div>"+
        "</div>"+
        "<div class='field'><label>Support contact <span style='font-weight:400;color:var(--muted);font-size:.85rem'>— who to call first</span></label><input id='f_supportContact' type='text' value='"+esc(a.supportContact||"")+"' placeholder='e.g. Costco Concierge 1-866-861-0450'/></div>"+
        "<div class='field'><label>Notes</label><textarea id='f_warrantyNotes' placeholder='Order number, what is covered, etc.'>"+esc(a.warrantyNotes||"")+"</textarea></div>"+
      "</div>"+
      "<div class='btnrow'><button class='btn' id='saveBtn' type='button'>Save</button><button class='btn ghost' id='cancelBtn' type='button'>Cancel</button></div>"+
      "<div class='btnrow' style='margin-top:18px'><button class='btn ghost' id='delBtn' type='button' style='color:#8a3d1c;border-color:rgba(138,61,28,.4)'>Delete asset</button></div>";
    document.getElementById("cancelBtn").addEventListener("click", function(){ renderRead(curAsset); });
    document.getElementById("saveBtn").addEventListener("click", saveEdit);
    document.getElementById("delBtn").addEventListener("click", function(){
      if(!confirm("Delete this asset? Any tickets or service records linked to it will be unlinked (not deleted).")) return;
      var b=this; b.disabled=true; b.textContent="Deleting…";
      fetch("/api/asset/delete",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({id:curId})}).then(function(r){return r.json();}).then(function(d){
        if(d&&d.ok){ location.replace("/a/"); }
        else { b.disabled=false; b.textContent="Delete asset"; setMsg((d&&d.error)||"Could not delete."); }
      }).catch(function(){ b.disabled=false; b.textContent="Delete asset"; setMsg("Couldn't reach the server."); });
    });
    document.getElementById("runBtn").addEventListener("click", runAgentNow);
    var qpb=document.getElementById("f_qrprint"); if(qpb) qpb.addEventListener("click", function(){ printQR(curAsset); });
    document.getElementById("f_qrscan").addEventListener("change", function(e){
      var file=e.target.files&&e.target.files[0]; e.target.value="";
      var qm=document.getElementById("f_qrmsg"); if(!file) return;
      qm.style.color="var(--muted)"; qm.textContent="Reading the code…";
      decodeQRFromImage(file).then(function(val){
        document.getElementById("f_qr").value=val;
        qm.style.color="var(--green-deep)"; qm.textContent="Assigned: "+val+" — press Save to keep it.";
      }).catch(function(err){ qm.style.color="#8a3d1c"; qm.textContent=(err&&err.message)||"Couldn't read a QR code from that photo."; });
    });
    wireEditPhotos();
    var fut=document.getElementById("futToggle");
    if(fut) fut.addEventListener("click", function(e){ e.preventDefault(); var w=document.getElementById("futWrap"); var open=w.style.display!=="none"; w.style.display=open?"none":"block"; fut.textContent=open?"Future development +":"Future development −"; });
    wireWarrantyScan();
  }

  // Read a warranty/purchase file (image or PDF) and fill the warranty fields.
  function readWarrantyFile(file){
    if(/pdf/i.test(file.type||"")){
      return new Promise(function(resolve,reject){
        var r=new FileReader();
        r.onload=function(){ var s=String(r.result||""); var b=s.indexOf(","); resolve({ base64: b>=0?s.slice(b+1):s, contentType:"application/pdf" }); };
        r.onerror=function(){ reject(new Error("read")); };
        r.readAsDataURL(file);
      });
    }
    return processPhoto(file).then(function(p){ return { base64:p.base64, contentType:p.contentType }; });
  }
  function wireWarrantyScan(){
    var wf=document.getElementById("w_file"); if(!wf) return;
    wf.addEventListener("change", function(e){ var fs=Array.prototype.slice.call(e.target.files||[]); e.target.value=""; if(fs.length) handleWarrantyFiles(fs); });
    var dz=document.getElementById("w_drop");
    if(dz){
      var reset=function(){ dz.style.background="var(--bg)"; dz.style.borderColor="rgba(47,93,80,.45)"; };
      ["dragenter","dragover"].forEach(function(ev){ dz.addEventListener(ev, function(e){ e.preventDefault(); e.stopPropagation(); dz.style.background="rgba(47,93,80,.08)"; dz.style.borderColor="var(--green)"; }); });
      ["dragleave","dragend"].forEach(function(ev){ dz.addEventListener(ev, function(e){ e.preventDefault(); e.stopPropagation(); reset(); }); });
      dz.addEventListener("drop", function(e){ e.preventDefault(); e.stopPropagation(); reset(); var fs=Array.prototype.slice.call((e.dataTransfer&&e.dataTransfer.files)||[]); if(fs.length) handleWarrantyFiles(fs); });
    }
    // Paste screenshots anywhere while the warranty section is on screen.
    if(!window.__warrantyPaste){
      window.__warrantyPaste=function(e){
        if(!document.getElementById("w_msg")) return;
        var items=(e.clipboardData&&e.clipboardData.items)||[], fs=[];
        for(var i=0;i<items.length;i++){ if(items[i].kind==="file"){ var f=items[i].getAsFile(); if(f) fs.push(f); } }
        if(fs.length){ e.preventDefault(); handleWarrantyFiles(fs); }
      };
      document.addEventListener("paste", window.__warrantyPaste);
    }
  }
  function handleWarrantyFiles(fileArr){
    var wm=document.getElementById("w_msg"); if(!wm) return;
    var files=fileArr.filter(function(f){ return /pdf/i.test(f.type||"") || /^image\//.test(f.type||""); });
    if(!files.length){ wm.style.color="#8a3d1c"; wm.textContent="Drop images or PDFs."; return; }
    wm.style.color="var(--muted)"; wm.textContent="Reading "+files.length+" file"+(files.length===1?"":"s")+"… this can take a few seconds.";
    Promise.all(files.map(readWarrantyFile)).then(function(parts){
      return fetch("/api/asset/scan-warranty",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({ id:curId, files:parts })});
    }).then(function(r){return r.json();}).then(function(d){
      if(!d||!d.ok){ wm.style.color="#8a3d1c"; wm.textContent=(d&&d.error)||"Couldn't read those files."; return; }
      function setIf(id,val){ var el=document.getElementById(id); if(el&&val) el.value=val; }
      setIf("f_purchasedOn",d.purchasedOn); setIf("f_purchasedFrom",d.purchasedFrom); setIf("f_purchasePrice",d.purchasePrice);
      setIf("f_warrantyProvider",d.warrantyProvider); setIf("f_warrantyLength",d.warrantyLength); setIf("f_warrantyExpires",d.warrantyExpires);
      setIf("f_extProvider",d.extProvider); setIf("f_extLength",d.extLength); setIf("f_extExpires",d.extExpires);
      setIf("f_supportContact",d.supportContact);
      if(d.notes){ var n=document.getElementById("f_warrantyNotes"); if(n) n.value = n.value ? (n.value+"\n"+d.notes) : d.notes; }
      if(d.docs && curAsset) curAsset.adminDocs = d.docs;  // shown in the read view
      var got=[d.purchasedOn,d.purchasedFrom,d.purchasePrice,d.warrantyProvider,d.warrantyLength,d.warrantyExpires,d.extProvider,d.extLength,d.extExpires,d.supportContact].filter(Boolean).length;
      var saved = d.docs ? (" Saved "+d.docs.length+" file"+(d.docs.length===1?"":"s")+" to the asset.") : "";
      wm.style.color="var(--green-deep)";
      wm.textContent = (got ? ("Filled in "+got+" field"+(got===1?"":"s")+" from your document. Review and Save.") : "Couldn't find clear warranty details. Enter them by hand.") + saved;
    }).catch(function(){ wm.style.color="#8a3d1c"; wm.textContent="Couldn't read those files."; });
  }

  function runAgentNow(){
    var b=document.getElementById("runBtn"); b.disabled=true; b.textContent="Thinking…"; setMsg("");
    fetch("/api/asset/analyze",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({id:curId})}).then(function(r){return r.json();}).then(function(d){
      if(d&&d.ok){ return fetch("/api/asset?id="+encodeURIComponent(curId)).then(function(r){return r.json();}).then(function(a){ if(a&&a.ok){ curAsset=a; showEdit(a,"The Ringwood Agent updated the fields below. Review and Save."); } }); }
      else { b.disabled=false; b.textContent="✨ Suggest with AI"; setMsg((d&&d.error)||"The agent could not run."); }
    }).catch(function(){ b.disabled=false; b.textContent="✨ Suggest with AI"; setMsg("Couldn't reach the agent."); });
  }

  function saveEdit(){
    var b=document.getElementById("saveBtn"); b.disabled=true; b.textContent="Saving…"; setMsg("");
    function fv(id){ var el=document.getElementById(id); return el?el.value:""; }
    var payload={ id:curId, nickname:document.getElementById("f_nickname").value, name:document.getElementById("f_name").value, description:document.getElementById("f_desc").value, manufacturer:document.getElementById("f_make").value, model:document.getElementById("f_model").value, serial:document.getElementById("f_serial").value, equipmentType:comboValue("f_type"), client:comboValue("f_client"), location:comboValue("f_location"), qrTag:document.getElementById("f_qr").value,
      purchasedOn:fv("f_purchasedOn"), purchasedFrom:fv("f_purchasedFrom"), purchasePrice:fv("f_purchasePrice"), warrantyProvider:fv("f_warrantyProvider"), warrantyLength:fv("f_warrantyLength"), warrantyExpires:fv("f_warrantyExpires"), extProvider:fv("f_extProvider"), extLength:fv("f_extLength"), extExpires:fv("f_extExpires"), supportContact:fv("f_supportContact"), warrantyNotes:fv("f_warrantyNotes"),
      keepPhotos:editKeep, addPhotos:editNew.map(function(p){ return { base64:p.base64, contentType:p.contentType }; }) };
    fetch("/api/asset/update",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(payload)}).then(function(r){return r.json();}).then(function(d){
      if(d&&d.ok){ load(curId); } else { b.disabled=false; b.textContent="Save"; setMsg((d&&d.error)||"Save failed."); }
    }).catch(function(){ b.disabled=false; b.textContent="Save"; setMsg("Couldn't reach the server."); });
  }

  // ---- service record edit ----
  window.editService = function(sid){
    view.innerHTML="<div class='state'>Loading…</div>";
    fetch("/api/service/get?id="+encodeURIComponent(sid)).then(function(r){return r.json();}).then(function(s){
      if(!s||!s.ok){ renderRead(curAsset); return; }
      svcKeep = (s.photos && s.photos.length) ? s.photos.slice() : [];
      svcNew = [];
      var typeOpts = SERVICE_TYPES.map(function(t){ return "<option"+(s.type===t?" selected":"")+">"+t+"</option>"; }).join("");
      view.innerHTML =
        "<div class='titlerow'><h1 class='assetname'>Edit service</h1></div>"+
        "<div class='sub'>"+esc(curAsset?curAsset.name:"")+"</div>"+
        "<div id='svcmsg' class='err' style='margin-bottom:10px'></div>"+
        "<div class='field'><label>Date</label><input id='s_date' type='date' value='"+esc(s.date)+"'/></div>"+
        "<div class='field'><label>Type</label><select id='s_type'><option value=''>Select…</option>"+typeOpts+"</select></div>"+
        "<div class='field'><label>Technician 1</label><input id='s_tech' type='text' value='"+esc(s.technician)+"'/></div>"+
        "<div class='field'><label>Technician 2</label><input id='s_tech2' type='text' value='"+esc(s.tech2||"")+"' placeholder='Second tech, if any'/></div>"+
        "<div class='field'><label>Travel time (hrs)</label><input id='s_travel' type='number' step='0.25' value='"+esc(s.travelHours)+"' placeholder='e.g. 1.5'/></div>"+
        "<div class='field'><label>Notes</label><textarea id='s_notes'>"+esc(s.notes)+"</textarea></div>"+
        "<div style='font-weight:600;color:var(--green-deep);margin:8px 0 4px'>Billing</div>"+
        "<div class='field'><label>Labor / service cost</label><input id='s_cost' type='number' step='0.01' value='"+esc(s.cost)+"' placeholder='e.g. 250.00'/></div>"+
        "<div class='field'><label>Vendor cost</label><input id='s_vendor' type='number' step='0.01' value='"+esc(s.vendorCost)+"' placeholder='what an outside vendor charged'/></div>"+
        "<div class='field'><label>Parts purchased</label><textarea id='s_parts' placeholder='List the parts used for the job'>"+esc(s.parts||"")+"</textarea></div>"+
        "<div class='field'><label>Parts cost</label><input id='s_partscost' type='number' step='0.01' value='"+esc(s.partsCost)+"' placeholder='cost of those parts'/></div>"+
        "<div class='field'><label>Photos <span style='font-weight:400;color:var(--muted);font-size:.85rem'>— receipts, invoices, the work</span></label><div id='svcthumbs' style='display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px'></div>"+
          "<input type='file' id='svcfile' accept='image/*' multiple /></div>"+
        "<div class='btnrow'><button class='btn' id='svcSave' type='button'>Save</button><button class='btn ghost' id='svcBack' type='button'>Back</button></div>";
      document.getElementById("svcBack").addEventListener("click", function(){ renderRead(curAsset); });
      document.getElementById("svcSave").addEventListener("click", function(){ saveService(sid); });
      renderSvcThumbs();
      document.getElementById("svcfile").addEventListener("change", function(e){
        var files=Array.prototype.slice.call(e.target.files||[]); e.target.value="";
        Promise.all(files.map(processPhoto)).then(function(arr){ arr.forEach(function(p){ svcNew.push(p); }); renderSvcThumbs(); })
          .catch(function(){ document.getElementById("svcmsg").textContent="Couldn't read one of the photos."; });
      });
    }).catch(function(){ renderRead(curAsset); });
  };
  function renderSvcThumbs(){
    var el=document.getElementById("svcthumbs"); if(!el) return;
    var html = svcKeep.map(function(u,i){
      return "<span style='position:relative;display:inline-block'><img class='zoomable' src='"+esc(u)+"' alt='' style='width:84px;height:84px;object-fit:cover;border-radius:6px;border:1px solid var(--line)'/>"+
        "<button type='button' onclick='__svcRmKeep("+i+")' style='position:absolute;top:-7px;right:-8px;width:28px;height:28px;border-radius:999px;border:none;background:var(--green-deep);color:#f6f2e8;font-size:13px;line-height:1;cursor:pointer'>×</button></span>";
    }).join("");
    html += svcNew.map(function(p,i){
      return "<span style='position:relative;display:inline-block'><img class='zoomable' src='"+p.preview+"' alt='' style='width:84px;height:84px;object-fit:cover;border-radius:6px;border:1px solid var(--green)'/>"+
        "<button type='button' onclick='__svcRmNew("+i+")' style='position:absolute;top:-7px;right:-8px;width:28px;height:28px;border-radius:999px;border:none;background:var(--green-deep);color:#f6f2e8;font-size:13px;line-height:1;cursor:pointer'>×</button></span>";
    }).join("");
    el.innerHTML = html || "<span class='sub' style='color:var(--muted)'>No photos yet.</span>";
  }
  window.__svcRmKeep=function(i){ svcKeep.splice(i,1); renderSvcThumbs(); };
  window.__svcRmNew=function(i){ svcNew.splice(i,1); renderSvcThumbs(); };
  function saveService(sid){
    var b=document.getElementById("svcSave"); b.disabled=true; b.textContent="Saving…";
    function fv(id){ var el=document.getElementById(id); return el?el.value:""; }
    var payload={ id:sid, date:fv("s_date"), type:fv("s_type"), technician:fv("s_tech"), tech2:fv("s_tech2"), travelHours:fv("s_travel"), notes:fv("s_notes"), cost:fv("s_cost"), vendorCost:fv("s_vendor"), parts:fv("s_parts"), partsCost:fv("s_partscost"), keepPhotos:svcKeep, addPhotos:svcNew.map(function(p){ return { base64:p.base64, contentType:p.contentType }; }) };
    fetch("/api/service/update",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(payload)}).then(function(r){return r.json();}).then(function(d){
      if(d&&d.ok){ load(curId); } else { b.disabled=false; b.textContent="Save"; document.getElementById("svcmsg").textContent=(d&&d.error)||"Save failed."; }
    }).catch(function(){ b.disabled=false; b.textContent="Save"; document.getElementById("svcmsg").textContent="Couldn't reach the server."; });
  }
</script>
