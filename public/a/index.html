<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ringwood · Asset</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f4efe4;--bg-2:#efe8d8;--ink:#23282a;--muted:#5f5d52;
    --green:#2f5d50;--green-deep:#21443a;--clay:#a9633a;--line:rgba(35,40,42,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:"Hanken Grotesk",-apple-system,sans-serif;font-size:18px;line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:640px;margin:0 auto;padding:0 22px 48px}
  h1,h2{font-family:"Spectral",Georgia,serif;font-weight:500;line-height:1.1;letter-spacing:-.01em;color:var(--green-deep)}
  a{color:inherit}
  header{padding:24px 0}
  .bar{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:11px;font-family:"Spectral",serif;font-size:1.25rem;font-weight:600;color:var(--green-deep)}
  .back{font-size:.92rem;text-decoration:none;color:var(--green-deep);border-bottom:1px solid var(--clay);padding-bottom:1px}

  .eyebrow{font-size:.8rem;letter-spacing:.18em;text-transform:uppercase;color:var(--clay);font-weight:600;margin:8px 0 10px}
  .titlerow{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px}
  h1{font-size:clamp(1.8rem,6vw,2.4rem)}
  .pill{font-size:.7rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:4px 11px;border-radius:999px;white-space:nowrap;margin-top:6px}
  .pill.pending{background:#f6eccf;color:#7a5a12}
  .pill.ai{background:#dfe9f4;color:#274a73}
  .pill.verified{background:#e3efe7;color:#21443a}
  .sub{color:var(--muted);font-size:1rem;margin-bottom:18px}

  .photos{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:22px}
  @media(max-width:520px){.photos{grid-template-columns:1fr 1fr}}
  .photos figure{margin:0}
  .photos img{width:100%;height:120px;object-fit:cover;border-radius:6px;border:1px solid var(--line);display:block;background:var(--bg-2)}
  .photos figcaption{font-size:.7rem;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-top:5px}

  .card{background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:18px 18px 8px;margin-bottom:20px}
  dl{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;font-size:.98rem;margin:0}
  dt{color:var(--muted);font-weight:600}
  dd{color:var(--ink);margin:0}

  h2{font-size:1.2rem;margin:0 0 10px}
  table{width:100%;border-collapse:collapse;background:var(--bg-2);border:1px solid var(--line);border-radius:6px;overflow:hidden;font-size:.9rem}
  th,td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--line);vertical-align:top}
  th{background:#e7decd;font-weight:600;color:var(--green-deep);font-size:.74rem;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
  td:first-child{white-space:nowrap}
  tr:last-child td{border-bottom:none}
  .empty{color:var(--muted);font-size:.95rem;background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:14px}

  .ai-note{font-size:.86rem;color:var(--muted);white-space:pre-line;margin-top:4px}
  .btn{display:inline-block;background:var(--green);color:#f6f2e8;text-decoration:none;font-weight:600;font-size:1rem;padding:14px 22px;border-radius:4px;margin:18px 0 6px}
  .btn:hover{background:var(--green-deep)}
  .state{color:var(--muted);padding:40px 0}
</style>
</head>
<body>

<header>
  <div class="wrap bar">
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 26 26" aria-hidden="true">
        <g fill="none" stroke="#2f5d50" stroke-width="1.4">
          <circle cx="13" cy="13" r="3"/><circle cx="13" cy="13" r="7"/><circle cx="13" cy="13" r="11"/>
        </g>
      </svg>
      Ringwood
    </div>
    <a class="back" href="https://ringwood.ai">Home</a>
  </div>
</header>

<main class="wrap" id="main">
  <div class="state" id="state">Loading asset…</div>
</main>

<script>
  function esc(s){ return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function row(label, val){ return val ? "<dt>" + esc(label) + "</dt><dd>" + esc(val) + "</dd>" : ""; }
  function money(v){ return (v === "" || v == null) ? "" : ("$" + Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})); }

  // /a/<recordId>
  var id = window.location.pathname.replace(/^\/a\//, "").replace(/\/$/, "");
  var main = document.getElementById("main");

  if (!id){
    main.innerHTML = "<div class='state'>No asset specified.</div>";
  } else {
    fetch("/api/asset?id=" + encodeURIComponent(id)).then(function(r){ return r.json(); }).then(function(a){
      if (!a || !a.ok){ main.innerHTML = "<div class='state'>Asset not found.</div>"; return; }

      var statusClass = a.status === "AI suggested" ? "ai" : (a.status === "Verified" ? "verified" : "pending");

      var photos = "";
      function fig(url, cap){ return url ? "<figure><img src='" + url + "' alt='" + esc(cap) + "' /><figcaption>" + esc(cap) + "</figcaption></figure>" : ""; }
      var p = fig(a.overallPhoto,"Overall") + fig(a.nameplatePhoto,"Nameplate") + fig(a.serialPhoto,"Serial");
      if (p) photos = "<div class='photos'>" + p + "</div>";

      var identity = "<div class='card'><dl>" +
        row("Description", a.description) +
        row("Manufacturer", a.manufacturer) +
        row("Model", a.model) +
        row("Serial", a.serial) +
        row("Type", a.equipmentType) +
        row("Client", a.client) +
        row("Location", a.location) +
        "</dl></div>";

      var ai = a.aiReading ? "<div class='card'><dt style='color:var(--muted);font-weight:600;margin-bottom:4px'>Nameplate reading (AI)</dt><div class='ai-note'>" + esc(a.aiReading) + "</div></div>" : "";

      var hist;
      if (a.services && a.services.length){
        var rows = a.services.map(function(s){
          return "<tr><td>" + esc(s.date||"—") + "</td><td>" + esc(s.type||"—") + "</td><td>" + esc(s.technician||"") +
                 "</td><td>" + esc(s.notes||"") + "</td><td>" + esc(money(s.cost)) + "</td></tr>";
        }).join("");
        hist = "<table><thead><tr><th>Date</th><th>Type</th><th>Tech</th><th>Notes</th><th>Cost</th></tr></thead><tbody>" + rows + "</tbody></table>";
      } else {
        hist = "<div class='empty'>No service history yet.</div>";
      }

      main.innerHTML =
        "<div class='eyebrow'>Asset</div>" +
        "<div class='titlerow'><h1>" + esc(a.name) + "</h1><span class='pill " + statusClass + "'>" + esc(a.status) + "</span></div>" +
        "<div class='sub'>Ringwood asset record</div>" +
        photos + identity + ai +
        "<h2>Service history</h2>" + hist +
        "<a class='btn' href='https://service.ringwood.ai/?asset=" + encodeURIComponent(id) + "'>Log a service for this asset</a>";
    }).catch(function(){
      main.innerHTML = "<div class='state'>Couldn't load this asset. Check your connection and try again.</div>";
    });
  }
</script>
</body>
</html>
