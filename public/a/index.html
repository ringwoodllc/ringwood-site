<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1f3d2b" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Asset Lookup" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<title>Ringwood · Asset lookup</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="/client-color.js"></script>
<script src="/qrcode.js"></script>
<script src="/jsQR.js"></script>
<style>
  :root{--bg:#f4efe4;--bg-2:#efe8d8;--ink:#23282a;--muted:#5f5d52;--green:#2f5d50;--green-deep:#21443a;--clay:#a9633a;--line:rgba(35,40,42,.14)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:"Hanken Grotesk",-apple-system,sans-serif;font-size:18px;line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:640px;margin:0 auto;padding:0 22px 48px}
  h1,h2{font-family:"Spectral",Georgia,serif;font-weight:500;line-height:1.1;letter-spacing:-.01em;color:var(--green-deep)}
  a{color:inherit}
  header{padding:24px 0}
  .bar{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:11px;font-family:"Spectral",serif;font-size:1.25rem;font-weight:600;color:var(--green-deep)}
  .back{font-size:.92rem;text-decoration:none;color:var(--green-deep);border-bottom:1px solid var(--clay);padding-bottom:1px}
  .eyebrow{font-size:.8rem;letter-spacing:.18em;text-transform:uppercase;color:var(--clay);font-weight:600;margin:8px 0 10px}
  .lookup{background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:18px;margin-bottom:24px}
  .lookup h1{font-size:1.5rem;margin-bottom:12px}
  label{display:block;font-weight:600;font-size:.9rem;color:var(--green-deep);margin:0 0 6px}
  select,input,textarea{width:100%;font:inherit;font-size:1.02rem;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:4px;padding:12px 14px;-webkit-appearance:none;appearance:none}
  textarea{min-height:62px;resize:vertical}
  select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' fill='none' stroke='%235f5d52' stroke-width='1.6'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:38px}
  select:focus,input:focus,textarea:focus{outline:none;border-color:var(--green)}
  .or{text-align:center;color:var(--muted);font-size:.85rem;margin:14px 0}
  .assetlist{max-height:340px;overflow-y:auto;border:1px solid var(--line);border-radius:6px;background:var(--bg)}
  .arow{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:11px 13px;border-bottom:1px solid var(--line);cursor:pointer}
  .arow:last-child{border-bottom:none}
  .arow:hover{background:var(--bg-2)}
  .arow .an{font-weight:600;color:var(--green-deep);font-size:.98rem;word-break:break-word}
  .arow .am{color:var(--muted);font-size:.82rem;margin-top:2px}
  .svc-tag{display:inline-block;margin-top:5px;font-size:.74rem;font-weight:700;color:#274a73;background:#dfe9f4;padding:2px 9px;border-radius:999px}
  .arow .acl{flex:0 0 auto;color:var(--muted);font-size:.78rem;text-align:right;white-space:nowrap}
  .client-chip{flex:0 0 auto;align-self:flex-start;font-size:.78rem;font-weight:700;color:#f6f2e8;background:var(--green-deep);padding:3px 11px;border-radius:999px;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}
  .assetlist .empty{color:var(--muted);padding:14px 13px;font-size:.92rem}
  .qrchip{display:inline-block;background:var(--bg-2);border:1px solid var(--line);color:var(--green-deep);border-radius:999px;padding:6px 13px;font-size:.85rem;font-weight:600;cursor:pointer;margin:0 6px 6px 0}
  .qrchip:hover{border-color:var(--green)}
  .qrrow{display:flex;gap:8px}
  .qrrow input{flex:1}
  .gobtn{background:var(--green);color:#f6f2e8;border:none;cursor:pointer;font-weight:600;font-size:1rem;padding:0 18px;border-radius:4px}
  .gobtn:hover{background:var(--green-deep)}
  .titlerow{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:4px}
  h1.assetname{font-size:clamp(1.7rem,6vw,2.2rem)}
  .pill{font-size:.7rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:4px 11px;border-radius:999px;white-space:nowrap;margin-top:6px}
  .pill.pending{background:#f6eccf;color:#7a5a12}
  .pill.ai{background:#dfe9f4;color:#274a73}
  .pill.verified{background:#e3efe7;color:#21443a}
  .sub{color:var(--muted);font-size:.98rem;margin-bottom:16px}
  .photos{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px}
  @media(max-width:520px){.photos{grid-template-columns:1fr 1fr}}
  .photos figure{margin:0}
  .photos img{width:100%;height:120px;object-fit:cover;border-radius:6px;border:1px solid var(--line);display:block;background:var(--bg-2)}
  .photos figcaption{font-size:.7rem;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-top:5px}
  .card{background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:18px;margin-bottom:20px}
  dl{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;font-size:.98rem;margin:0}
  dt{color:var(--muted);font-weight:600}
  dd{color:var(--ink);margin:0}
  .ainote{font-size:.86rem;color:var(--muted);white-space:pre-line;margin-top:4px}
  h2{font-size:1.2rem;margin:0 0 10px}
  table{width:100%;border-collapse:collapse;background:var(--bg-2);border:1px solid var(--line);border-radius:6px;overflow:hidden;font-size:.9rem}
  th,td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--line);vertical-align:top}
  th{background:#e7decd;font-weight:600;color:var(--green-deep);font-size:.74rem;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
  td:first-child{white-space:nowrap}
  tbody tr{cursor:pointer}
  tbody tr:hover td{background:#eee3cf}
  tr:last-child td{border-bottom:none}
  .empty{color:var(--muted);font-size:.95rem;background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:14px}
  .btn{display:inline-block;background:var(--green);color:#f6f2e8;text-decoration:none;font-weight:600;font-size:1rem;padding:13px 22px;border-radius:4px;border:none;cursor:pointer}
  .btn:hover{background:var(--green-deep)}
  .btn.ghost{background:transparent;color:var(--green-deep);border:1px solid var(--line)}
  .btn.ghost:hover{background:var(--bg-2)}
  .btn:disabled{opacity:.6;cursor:default}
  .btnrow{display:flex;flex-wrap:wrap;gap:10px;margin:16px 0 6px}
  .field{margin-bottom:14px}
  .hint{font-size:.84rem;color:var(--muted);margin:-8px 0 14px}
  .state{color:var(--muted);padding:8px 0 30px}
  .err{color:#8a3d1c}
  .agentnote{background:#dfe9f4;color:#274a73;border-radius:4px;padding:10px 12px;font-size:.9rem;margin-bottom:14px}
  .qrcard{display:flex;gap:16px;align-items:center;background:var(--bg-2);border:1px solid var(--line);border-radius:6px;padding:16px;margin-bottom:20px;flex-wrap:wrap}
  .qrcard .qrimg{flex:0 0 auto;background:#fff;padding:8px;border-radius:6px;border:1px solid var(--line);line-height:0}
  .qrcard .qrimg svg,.qrcard .qrimg img{width:128px;height:128px;display:block}
  .qrcard .qrinfo{flex:1;min-width:200px}
  .qrcard .qrinfo .lbl{font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--clay);font-weight:600;margin-bottom:4px}
  .qrcard .qrurl{font-size:.8rem;color:var(--muted);word-break:break-all;margin-bottom:10px}
  .qrcard .qrbtns{display:flex;gap:8px;flex-wrap:wrap}
  .qrcard .qrbtns button{background:var(--bg);border:1px solid var(--line);color:var(--green-deep);border-radius:999px;padding:7px 14px;font:inherit;font-size:.84rem;font-weight:600;cursor:pointer}
  .qrcard .qrbtns button:hover{border-color:var(--green)}
  @media print{ body * {visibility:hidden} #printArea, #printArea * {visibility:visible} #printArea{position:absolute;left:0;top:0;width:100%;text-align:center} }
</style>
</head>
<body>

<header>
  <div class="wrap bar">
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 26 26" aria-hidden="true"><g fill="none" stroke="#2f5d50" stroke-width="1.4"><circle cx="13" cy="13" r="3"/><circle cx="13" cy="13" r="7"/><circle cx="13" cy="13" r="11"/></g></svg>
      Ringwood
    </div>
    <a class="back" href="/">Home</a>
  </div>
</header>

<main class="wrap">
  <div class="eyebrow">Asset lookup</div>
  <div class="lookup">
    <h1>Find an asset</h1>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <div class="field" style="flex:1;min-width:140px;margin-bottom:10px"><label for="clientFilter">Client</label><select id="clientFilter"><option value="">All clients</option></select></div>
      <div class="field" style="flex:1;min-width:140px;margin-bottom:10px"><label for="searchInput">Search</label><input id="searchInput" type="text" autocomplete="off" placeholder="Name, model, serial…" /></div>
      <div class="field" style="flex:1;min-width:140px;margin-bottom:10px"><label for="sortSel">Sort</label><select id="sortSel"><option value="alpha">A – Z</option><option value="new">Newest first</option><option value="old">Oldest first</option></select></div>
    </div>
    <div id="assetCount" style="color:var(--muted);font-size:.86rem;margin-bottom:8px"></div>
    <div id="assetList" class="assetlist"><div class="empty">Loading assets…</div></div>
    <div class="or">— or scan / paste —</div>
    <label for="qrInput">Asset ID, QR code, or link</label>
    <div class="qrrow"><input id="qrInput" type="text" autocomplete="off" placeholder="QR-1, rec…, or a scanned link" /><button class="gobtn" id="goBtn" type="button">View</button></div>
    <label class="qrchip" for="scanInput" style="margin-top:10px;display:inline-block">Scan a QR code</label>
    <input type="file" id="scanInput" accept="image/*" capture="environment" style="display:none" />
    <div id="scanMsg" style="font-size:.84rem;color:var(--muted);margin-top:6px"></div>
  </div>
  <div id="view"></div>
</main>

<script>
  function esc(s){ return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function row(label, val){ return val ? "<dt>"+esc(label)+"</dt><dd>"+esc(val)+"</dd>" : ""; }
  function money(v){ return (v===""||v==null)?"":("$"+Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})); }
  function parseId(raw){ var s=(raw||"").trim(); if(!s)return""; var m=s.match(/[?&]id=([A-Za-z0-9]+)/); if(m)return m[1]; m=s.match(/\/a\/([A-Za-z0-9]+)/); if(m)return m[1]; m=s.match(/rec[A-Za-z0-9]{14}/); if(m)return m[0]; return s; }
  var SERVICE_TYPES = ["Install","Inspection","Maintenance","Repair","Replacement","Other"];
  var OPTIONS = { types:[], locations:[], clients:[] };

  var assetList=document.getElementById("assetList"), searchInput=document.getElementById("searchInput"), qrInput=document.getElementById("qrInput"), view=document.getElementById("view"), clientFilter=document.getElementById("clientFilter"), assetCount=document.getElementById("assetCount");
  var allAssets=[], curAsset=null, curId="";
  // A client login only sees its own assets; hide the client filter.
  fetch("/api/whoami").then(function(r){return r.json();}).then(function(w){
    if (w && w.ok && w.role === "client"){ var f = clientFilter.closest(".field"); if (f) f.style.display = "none"; }
  }).catch(function(){});

  // Lists from /api/options, with a resilient cache: render from the last good
  // values in this browser first, then refresh live (with retries) and update
  // the cache. A ~6h timer keeps the cached fallback fresh on its own.
  var CACHE_KEY = "rw_lists_v3";
  function readCache(){ try{ var c=JSON.parse(localStorage.getItem(CACHE_KEY)||"null"); return (c&&c.data)?c.data:null; }catch(e){ return null; } }
  function writeCache(d){ try{ localStorage.setItem(CACHE_KEY, JSON.stringify({t:Date.now(),data:d})); }catch(e){} }
  function renderClientFilter(clients){
    var keep=clientFilter.value, html="<option value=''>All clients</option>";
    (clients||[]).forEach(function(c){ html+="<option>"+c.replace(/</g,"&lt;")+"</option>"; });
    clientFilter.innerHTML=html; if(keep) clientFilter.value=keep;
  }
  var cachedLists = readCache();
  if(cachedLists){ OPTIONS=cachedLists; if(cachedLists.serviceTypes&&cachedLists.serviceTypes.length) SERVICE_TYPES=cachedLists.serviceTypes; renderClientFilter(cachedLists.clients); }
  function loadLists(tries){
    tries=tries||0;
    fetch("/api/options", { cache: "no-store" }).then(function(r){return r.json();}).then(function(o){
      o=o||{};
      if((!o.clients||!o.clients.length) && tries<2){ setTimeout(function(){loadLists(tries+1);},2500); return; }
      if(o.clients&&o.clients.length){ OPTIONS=o; if(o.serviceTypes&&o.serviceTypes.length) SERVICE_TYPES=o.serviceTypes; renderClientFilter(o.clients); writeCache(o); }
    }).catch(function(){ if(tries<2) setTimeout(function(){loadLists(tries+1);},2500); });
  }
  loadLists();
  setInterval(function(){ loadLists(); }, 6*3600*1000);

  fetch("/api/assets/list").then(function(r){return r.json();}).then(function(list){
    allAssets = Array.isArray(list)?list:[];
    renderList();
    // Deep link: ?id=<uuid> loads directly; a QR tag resolves to its asset.
    var raw = new URLSearchParams(location.search).get("id") || new URLSearchParams(location.search).get("qr") || location.pathname.replace(/^\/a\//,"");
    var id = resolveRef(raw);
    if (id && /^rec|^[0-9a-f]{8}-/.test(id)){ load(id); }
  }).catch(function(){ assetList.innerHTML="<div class='empty'>Could not load assets.</div>"; });

  // Turn a pasted value (uuid, /a/?id=, a QR tag like QR-1) into an asset id.
  function resolveRef(raw){
    var s=(raw||"").trim(); if(!s) return "";
    var id=parseId(s);
    var byQr=allAssets.find(function(a){ return a.qr && a.qr.toLowerCase()===s.toLowerCase(); });
    if(byQr) return byQr.id;
    var byQr2=allAssets.find(function(a){ return a.qr && a.qr.toLowerCase()===id.toLowerCase(); });
    if(byQr2) return byQr2.id;
    return id;
  }

  function renderList(){
    var client=clientFilter.value, q=(searchInput.value||"").trim().toLowerCase(), sort=document.getElementById("sortSel").value;
    var arr=allAssets.filter(function(a){
      if(client && a.client!==client) return false;
      if(q){ var hay=[a.name,a.make,a.model,a.serial,a.type,a.location,a.qr].join(" ").toLowerCase(); if(hay.indexOf(q)<0) return false; }
      return true;
    });
    arr.sort(function(a,b){
      if(sort==="new") return (b.loggedAt||"").localeCompare(a.loggedAt||"");
      if(sort==="old") return (a.loggedAt||"").localeCompare(b.loggedAt||"");
      return (a.name||"").toLowerCase().localeCompare((b.name||"").toLowerCase());  // A–Z default
    });
    assetCount.textContent = allAssets.length ? (arr.length+" of "+allAssets.length+" asset"+(allAssets.length===1?"":"s")) : "";
    if(!arr.length){ assetList.innerHTML="<div class='empty'>"+(allAssets.length?"No assets match.":"No assets yet.")+"</div>"; return; }
    assetList.innerHTML = arr.map(function(a){
      var meta=[a.make,a.model,a.serial?("SN "+a.serial):"",a.location].filter(Boolean).map(esc).join(" · ");
      var svc = a.services ? "<span class='svc-tag'>🔧 "+a.services+" service"+(a.services===1?"":"s")+"</span>" : "";
      return "<div class='arow' onclick=\"load('"+esc(a.id)+"')\">"+
        "<div><div class='an'>"+esc(a.name)+(a.qr?" <span class='acl'>("+esc(a.qr)+")</span>":"")+"</div>"+
        (meta?"<div class='am'>"+meta+"</div>":"")+svc+"</div>"+
        (a.client?"<span class='client-chip' style='background:"+(a.clientColor||clientColor(a.client))+"'>"+esc(a.client)+"</span>":"")+"</div>";
    }).join("");
  }
  clientFilter.addEventListener("change", renderList);
  searchInput.addEventListener("input", renderList);
  document.getElementById("sortSel").addEventListener("change", renderList);
  document.getElementById("goBtn").addEventListener("click", function(){ var id=resolveRef(qrInput.value); if(id) load(id); });
  qrInput.addEventListener("keydown", function(e){ if(e.key==="Enter"){ var id=resolveRef(qrInput.value); if(id) load(id); } });
  document.getElementById("scanInput").addEventListener("change", function(e){
    var file=e.target.files&&e.target.files[0]; e.target.value="";
    var sm=document.getElementById("scanMsg"); if(!file) return;
    sm.style.color="var(--muted)"; sm.textContent="Reading the code…";
    decodeQRFromImage(file).then(function(val){
      var id=resolveRef(val);
      if(id && (/^rec|^[0-9a-f]{8}-/.test(id) || allAssets.some(function(a){return a.id===id;}))){ sm.textContent=""; load(id); }
      else { sm.style.color="#8a3d1c"; sm.textContent="Scanned "+val+", but no matching asset. Assign it to an asset first."; }
    }).catch(function(err){ sm.style.color="#8a3d1c"; sm.textContent=(err&&err.message)||"Couldn't read a QR code."; });
  });

  function load(id){
    curId=id; view.innerHTML="<div class='state'>Loading asset…</div>";
    history.replaceState(null,"","/a/?id="+encodeURIComponent(id));
    // The detail opens below the list, so bring it into view right away. That
    // makes it obvious something loaded instead of leaving it offscreen.
    try{ view.scrollIntoView({behavior:"smooth", block:"start"}); }catch(e){ try{ view.scrollIntoView(); }catch(e2){} }
    fetch("/api/asset?id="+encodeURIComponent(id)).then(function(r){return r.json();}).then(function(a){
      if(!a||!a.ok){ view.innerHTML="<div class='state err'>Asset not found.</div>"; return; }
      curAsset=a; renderRead(a);
    }).catch(function(){ view.innerHTML="<div class='state err'>Couldn't load. Try again.</div>"; });
  }
  function statusClass(s){ return s==="AI suggested"?"ai":(s==="Verified"?"verified":"pending"); }

  function assetPhotoList(a){ if(a.photos && a.photos.length) return a.photos; return [a.overallPhoto,a.nameplatePhoto,a.serialPhoto].filter(Boolean); }
  function renderRead(a){
    var list = assetPhotoList(a);
    var photos = list.map(function(u){ return "<figure><img src='"+esc(u)+"' alt=''/></figure>"; }).join("");
    photos = photos?"<div class='photos'>"+photos+"</div>":"";
    var added = a.loggedAt ? new Date(a.loggedAt).toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"}) + " at " + new Date(a.loggedAt).toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"}) : "";
    var identity = "<div class='card'><dl>"+row("Description",a.description)+row("Manufacturer",a.manufacturer)+row("Model",a.model)+row("Serial",a.serial)+row("Type",a.equipmentType)+row("Client",a.client)+row("Location",a.location)+row("Logged",added)+"</dl></div>";
    var ai = a.aiReading?"<div class='card'><dt style='color:var(--muted);font-weight:600;margin-bottom:4px'>Agent reading</dt><div class='ainote'>"+esc(a.aiReading)+"</div></div>":"";
    var svcArr = a.services || [];
    var lastSvc = svcArr.reduce(function(m,s){ return (s.date && (!m || s.date>m)) ? s.date : m; }, "");
    var totalCost = svcArr.reduce(function(t,s){ var c=Number(s.cost); return t + (isNaN(c)?0:c); }, 0);
    var svcLine = svcArr.length
      ? (svcArr.length + " record" + (svcArr.length===1?"":"s") + (lastSvc?(" · last "+new Date(lastSvc).toLocaleDateString()):"") + (totalCost?(" · "+money(totalCost)+" total"):""))
      : "No service records yet";
    var svcSummary =
      "<div class='card' style='display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;cursor:pointer' onclick=\"var e=document.getElementById('svc'); if(e) e.scrollIntoView({behavior:'smooth'});\">"+
        "<div><div style='font-weight:600;color:var(--green-deep);display:flex;align-items:center;gap:7px'>🔧 Maintenance</div>"+
        "<div style='color:var(--muted);font-size:.9rem;margin-top:2px'>"+esc(svcLine)+"</div></div>"+
        "<a class='btn ghost' href='/service?asset="+encodeURIComponent(curId)+"' style='white-space:nowrap' onclick='event.stopPropagation()'>Log a service</a>"+
      "</div>";
    var hist;
    if(a.services && a.services.length){
      var rows = a.services.map(function(s){
        return "<tr onclick=\"editService('"+s.id+"')\"><td>"+esc(s.date||"—")+"</td><td>"+esc(s.type||"—")+"</td><td>"+esc(s.technician||"")+"</td><td>"+esc(s.notes||"")+"</td><td>"+esc(money(s.cost))+"</td></tr>";
      }).join("");
      hist = "<table><thead><tr><th>Date</th><th>Type</th><th>Tech</th><th>Notes</th><th>Cost</th></tr></thead><tbody>"+rows+"</tbody></table><div class='hint'>Tap a row to edit it.</div>";
    } else { hist="<div class='empty'>No service history yet.</div>"; }
    view.innerHTML =
      "<a href='#' class='back' style='display:inline-block;margin:18px 0 12px' onclick=\"document.querySelector('.lookup').scrollIntoView({behavior:'smooth',block:'start'});return false;\">&larr; Back to list</a>"+
      "<div class='titlerow'><h1 class='assetname'>"+esc(a.nickname || a.name)+"</h1><span class='pill "+statusClass(a.status)+"'>"+esc(a.status)+"</span></div>"+
      "<div class='sub'>"+((a.nickname && a.name && a.name!==a.nickname) ? esc(a.name) : "Ringwood asset record")+"</div>"+
      "<div class='btnrow'><button class='btn' id='editBtn' type='button'>Edit asset</button>"+

  // Canonical deep link a printed/scanned code opens. Stable host so stickers
  // keep working wherever the page is viewed.
  function assetUrl(id){ return "https://app.ringwood.ai/a/?id="+encodeURIComponent(id); }
  // Branded QR: high error-correction so the Ringwood rings can sit in the
  // center without breaking the scan.
  function qrSvg(text){
    try{
      var qr=qrcode(0,"H"); qr.addData(text); qr.make();
      var n=qr.getModuleCount(), m=2, size=n+m*2, rects="";
      for(var r=0;r<n;r++){ for(var c=0;c<n;c++){ if(qr.isDark(r,c)){ rects+="<rect x='"+(c+m)+"' y='"+(r+m)+"' width='1.03' height='1.03'/>"; } } }
      var cx=size/2, lr=Math.max(2.6, n*0.085), pad=lr+1.1;
      var overlay=
        "<rect x='"+(cx-pad)+"' y='"+(cx-pad)+"' width='"+(pad*2)+"' height='"+(pad*2)+"' rx='"+(pad*0.45)+"' fill='#ffffff'/>"+
        "<g fill='none' stroke='#2f5d50' stroke-width='"+(lr*0.16)+"'>"+
          "<circle cx='"+cx+"' cy='"+cx+"' r='"+(lr*0.34)+"'/>"+
          "<circle cx='"+cx+"' cy='"+cx+"' r='"+(lr*0.64)+"'/>"+
          "<circle cx='"+cx+"' cy='"+cx+"' r='"+(lr*0.94)+"'/>"+
        "</g>";
      return "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 "+size+" "+size+"' shape-rendering='crispEdges'><rect width='"+size+"' height='"+size+"' fill='#ffffff'/><g fill='#21443a'>"+rects+"</g>"+overlay+"</svg>";
    }catch(e){ return ""; }
  }
  // Read a QR out of a photo (purchased sticker). Uses the native detector when
  // available, falls back to jsQR.
  function decodeQRFromImage(file){
    return new Promise(function(resolve, reject){
      var img=new Image(), url=URL.createObjectURL(file);
      img.onload=function(){
        var max=1100, w=img.width, h=img.height, s=Math.min(1, max/Math.max(w,h));
        w=Math.round(w*s); h=Math.round(h*s);
        var c=document.createElement("canvas"); c.width=w; c.height=h;
        var ctx=c.getContext("2d"); ctx.drawImage(img,0,0,w,h);
        URL.revokeObjectURL(url);
        function fallback(){
          try{ var d=ctx.getImageData(0,0,w,h); var res=window.jsQR?window.jsQR(d.data,w,h):null; if(res&&res.data) resolve(res.data); else reject(new Error("No QR code found in the photo.")); }
          catch(e){ reject(e); }
        }
        if(window.BarcodeDetector){
          try{ new BarcodeDetector({formats:["qr_code"]}).detect(c).then(function(codes){ if(codes&&codes.length) resolve(codes[0].rawValue); else fallback(); }, fallback); return; }
          catch(e){}
        }
        fallback();
      };
      img.onerror=function(){ URL.revokeObjectURL(url); reject(new Error("Couldn't read that image.")); };
      img.src=url;
    });
  }
  function qrCard(a){
    var url=assetUrl(a.id);
    // An assigned / store-bought sticker: show its code, not a generated image
    // (the physical sticker is the QR). Still offer the Ringwood QR to print.
    if (a.qr && !isOwnKey(a.qr)){
      return "<div class='qrcard'>"+
        "<div class='qrinfo'><div class='lbl'>QR code assigned</div>"+
        "<div style='font-weight:600;color:var(--green-deep);word-break:break-all;font-size:1.05rem'>"+esc(a.qr)+"</div>"+
        "<div class='qrurl'>Scan this sticker with Asset lookup in the app to open this asset.</div>"+
        "<div class='qrbtns'><button type='button' id='qrPrint'>Print Ringwood QR</button>"+
        "<button type='button' id='qrCopy'>Copy link</button></div></div></div>";
    }
    var tag=a.qr?(" <span class='acl'>("+esc(a.qr)+")</span>"):"";
    return "<div class='qrcard'>"+
      "<div class='qrimg'>"+qrSvg(url)+"</div>"+
      "<div class='qrinfo'><div class='lbl'>QR code"+tag+"</div>"+
      "<div class='qrurl'>"+esc(url)+"</div>"+
      "<div class='qrbtns'><button type='button' id='qrPrint'>Print code</button>"+
      "<button type='button' id='qrCopy'>Copy link</button></div></div></div>";
  }
  // Our own auto key looks like RW-XXXXX or a /a/?id= link; anything else is a
  // store-bought code the user assigned.
  function isOwnKey(v){ v=(v||"").trim(); return /^RW-[0-9A-Z]{4,}$/i.test(v) || v.indexOf("/a/")>=0 || v.indexOf("id=")>=0; }
  function copyText(t, btn){
    var done=function(){ var o=btn.textContent; btn.textContent="Copied"; setTimeout(function(){ btn.textContent=o; },1400); };
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(done,function(){}); }
    else { var i=document.createElement("input"); i.value=t; document.body.appendChild(i); i.select(); try{document.execCommand("copy");}catch(e){} document.body.removeChild(i); done(); }
  }
  function printQR(a){
    var w=window.open("","_blank");
    if(!w) return;
    var svg=qrSvg(assetUrl(a.id),6,4);
    w.document.write("<html><head><title>"+esc(a.name)+" — QR</title><style>body{font-family:-apple-system,Arial,sans-serif;text-align:center;padding:40px;color:#21443a}h2{font-size:18px;margin:0 0 4px}.m{color:#666;font-size:12px;margin-bottom:16px}svg{width:240px;height:240px}.t{margin-top:10px;font-weight:600;font-size:14px}</style></head><body>"+
      "<h2>"+esc(a.name)+"</h2><div class='m'>"+esc([a.client,a.location].filter(Boolean).join(" · "))+"</div>"+svg+
      "<div class='t'>"+esc(a.qr||"Ringwood asset")+"</div>"+
      "</body></html>");
    w.document.close();
    setTimeout(function(){ try{ w.focus(); w.print(); }catch(e){} }, 350);
  }

  function field(id,label,val,ta){ var c = ta?"<textarea id='"+id+"'>"+esc(val||"")+"</textarea>":"<input id='"+id+"' type='text' value='"+esc(val||"")+"'/>"; return "<div class='field'><label>"+esc(label)+"</label>"+c+"</div>"; }

  // Shrink large phone photos client-side so uploads are quick on cell signal.
  function processPhoto(file){
    return new Promise(function(resolve, reject){
      var img = new Image(), url = URL.createObjectURL(file);
      img.onload = function(){
        var max=1600, w=img.width, h=img.height;
        if(w>max||h>max){ if(w>=h){ h=Math.round(h*max/w); w=max; } else { w=Math.round(w*max/h); h=max; } }
        var c=document.createElement("canvas"); c.width=w; c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        URL.revokeObjectURL(url);
        var d=c.toDataURL("image/jpeg",0.82);
        resolve({ base64:d.split(",")[1], contentType:"image/jpeg", preview:d });
      };
      img.onerror=function(){ URL.revokeObjectURL(url); reject(new Error("bad image")); };
      img.src=url;
    });
  }

  var editNew = [];    // newly added {base64,contentType,preview}

    var payload={ id:sid, date:document.getElementById("s_date").value, type:document.getElementById("s_type").value, technician:document.getElementById("s_tech").value, notes:document.getElementById("s_notes").value, cost:document.getElementById("s_cost").value, keepPhotos:svcKeep, addPhotos:svcNew.map(function(p){ return { base64:p.base64, contentType:p.contentType }; }) };
    fetch("/api/service/update",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(payload)}).then(function(r){return r.json();}).then(function(d){
      if(d&&d.ok){ load(curId); } else { b.disabled=false; b.textContent="Save"; document.getElementById("svcmsg").textContent=(d&&d.error)||"Save failed."; }
    }).catch(function(){ b.disabled=false; b.textContent="Save"; document.getElementById("svcmsg").textContent="Couldn't reach the server."; });
  }
</script>
