<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1f3d2b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ringwood" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<title>Ringwood · Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#f4efe4;--bg-2:#efe8d8;--ink:#23282a;--muted:#5f5d52;--green:#2f5d50;--green-deep:#21443a;--clay:#a9633a;--line:rgba(35,40,42,.14)}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:"Hanken Grotesk",-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px}
  .card{width:100%;max-width:380px}
  .brand{display:flex;align-items:center;gap:11px;font-family:"Spectral",serif;font-size:1.3rem;font-weight:600;color:var(--green-deep);justify-content:center;margin-bottom:6px}
  h1{font-family:"Spectral",serif;font-weight:500;font-size:1.6rem;color:var(--green-deep);text-align:center;margin-bottom:4px}
  .sub{text-align:center;color:var(--muted);font-size:.95rem;margin-bottom:22px}
  form{background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:22px 20px}
  label{display:block;font-weight:600;font-size:.92rem;color:var(--green-deep);margin-bottom:6px}
  .field{margin-bottom:15px}
  input{width:100%;font:inherit;font-size:1.02rem;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:13px 14px}
  input:focus{outline:none;border-color:var(--green)}
  .btn{width:100%;background:var(--green);color:#f6f2e8;border:none;cursor:pointer;font-weight:600;font-size:1.05rem;padding:15px;border-radius:5px;transition:background .2s}
  .btn:hover{background:var(--green-deep)}
  .btn:disabled{opacity:.6;cursor:default}
  .msg{margin-top:14px;font-size:.92rem;color:#8a3d1c;text-align:center;min-height:18px}
  .pwwrap{position:relative}
  .pwwrap input{padding-right:64px}
  .pwtoggle{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:var(--green-deep);font:inherit;font-size:.82rem;font-weight:600;cursor:pointer;padding:6px 8px}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <svg width="26" height="26" viewBox="0 0 26 26" aria-hidden="true"><g fill="none" stroke="#2f5d50" stroke-width="1.4"><circle cx="13" cy="13" r="2.6"/><circle cx="13" cy="13" r="6"/><circle cx="13" cy="13" r="9.5"/></g></svg>
    Ringwood
  </div>
  <h1>Sign in</h1>
  <p class="sub">Use your Ringwood account.</p>
  <form id="f">
    <div class="field">
      <label for="email">Email or username</label>
      <input id="email" type="text" autocomplete="username" placeholder="you@ringwood.ai or a username" />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <div class="pwwrap">
        <input id="password" type="password" autocomplete="current-password" placeholder="Your password" />
        <button type="button" class="pwtoggle" id="pwToggle" aria-label="Show password">Show</button>
      </div>
    </div>
    <button class="btn" type="submit" id="btn">Sign in</button>
    <div class="msg" id="msg"></div>
  </form>
</div>
<script>
  var f = document.getElementById("f"), btn = document.getElementById("btn"), msg = document.getElementById("msg");

  // Magic link: ?token=... signs in with no password.
  (function(){
    var token = new URLSearchParams(location.search).get("token");
    if (!token) return;
    msg.textContent = "Signing you in…";
    fetch("/api/login", { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ token: token }) })
      .then(function(r){ return r.json(); }).then(function(d){
        if (d && d.ok){ window.location.replace(nextUrl()); }
        else { msg.textContent = (d && d.error) || "This link is no longer valid."; }
      }).catch(function(){ msg.textContent = "Couldn't reach the server."; });
  })();

  (function(){
    var pw = document.getElementById("password"), t = document.getElementById("pwToggle");
    t.addEventListener("click", function(){
      var show = pw.type === "password";
      pw.type = show ? "text" : "password";
      t.textContent = show ? "Hide" : "Show";
      pw.focus();
    });
  })();
  function nextUrl(){
    var n = new URLSearchParams(location.search).get("next");
    if (n && n.charAt(0) === "/" && n.charAt(1) !== "/") return n;
    return "/app";
  }
  f.addEventListener("submit", function(e){
    e.preventDefault();
    var email = document.getElementById("email").value.trim();
    var password = document.getElementById("password").value;
    if (!email || !password){ msg.textContent = "Enter your email and password."; return; }
    btn.disabled = true; btn.textContent = "Signing in…"; msg.textContent = "";
    fetch("/api/login", { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ email: email, password: password }) })
      .then(function(r){ return r.json(); }).then(function(d){
        if (d && d.ok){ window.location.replace(nextUrl()); }
        else { btn.disabled = false; btn.textContent = "Sign in"; msg.textContent = (d && d.error) || "Couldn't sign in."; }
      }).catch(function(){ btn.disabled = false; btn.textContent = "Sign in"; msg.textContent = "Couldn't reach the server."; });
  });
</script>
</body>
</html>
