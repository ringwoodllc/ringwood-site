<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1f3d2b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ringwood" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<title>Ringwood · Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#f4efe4;--bg-2:#efe8d8;--ink:#23282a;--muted:#5f5d52;--green:#2f5d50;--green-deep:#21443a;--clay:#a9633a;--line:rgba(35,40,42,.14)}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:"Hanken Grotesk",-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px}
  .card{width:100%;max-width:380px;text-align:center}
  .badge{display:inline-block;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--clay);font-weight:700;border:1px solid var(--clay);border-radius:999px;padding:4px 12px;margin-bottom:20px}
  .ring{margin:0 auto 14px}
  .brand{font-family:"Spectral",serif;font-size:1.5rem;font-weight:600;color:var(--green-deep);margin-bottom:4px}
  h1{font-family:"Spectral",serif;font-weight:500;font-size:1.5rem;color:var(--green-deep);margin-bottom:6px}
  .sub{color:var(--muted);font-size:.98rem;margin-bottom:26px}
  .btn{width:100%;background:var(--green);color:#f6f2e8;border:none;cursor:pointer;font-weight:600;font-size:1.1rem;padding:16px;border-radius:6px;transition:background .2s}
  .btn:hover{background:var(--green-deep)}
  .foot{margin-top:18px;font-size:.85rem;color:var(--muted)}
  .foot a{color:var(--green-deep)}
</style>
</head>
<body>
<div class="card">
  <div class="badge">Sample</div>
  <svg class="ring" width="56" height="56" viewBox="0 0 26 26" aria-hidden="true"><g fill="none" stroke="#2f5d50" stroke-width="1.2"><circle cx="13" cy="13" r="2.4"/><circle cx="13" cy="13" r="5.5"/><circle cx="13" cy="13" r="8.5"/><circle cx="13" cy="13" r="11"/></g></svg>
  <div class="brand">Ringwood</div>
  <h1>Sign in</h1>
  <p class="sub">Sample access — tap Log in to explore the app.</p>
  <button class="btn" id="login" type="button">Log in</button>
  <div class="foot"><a href="https://ringwood.ai">Back to ringwood.ai</a></div>
</div>
<script>
  document.getElementById("login").addEventListener("click", function(){
    window.location.href = "/app";
  });
</script>
</body>
</html>
