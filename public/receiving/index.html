<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1f3d2b" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Receiving" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<title>Ringwood · Receiving Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#f4efe4;--bg-2:#efe8d8;--ink:#23282a;--muted:#5f5d52;--green:#2f5d50;--green-deep:#21443a;--clay:#a9633a;--line:rgba(35,40,42,.14);--red:#8a3d1c;--ok:#2f5d50}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:"Hanken Grotesk",-apple-system,sans-serif;min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:0 22px 56px}
  header{padding:24px 0}
  .bar{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:11px;font-family:"Spectral",serif;font-size:1.25rem;font-weight:600;color:var(--green-deep)}
  .back{font-size:.92rem;text-decoration:none;color:var(--green-deep);border-bottom:1px solid var(--clay);padding-bottom:1px}
  .intro{margin:16px 0 14px}
  .eyebrow{font-size:.8rem;letter-spacing:.18em;text-transform:uppercase;color:var(--clay);font-weight:600;margin-bottom:10px}
  h1{font-family:"Spectral",serif;font-weight:500;font-size:clamp(2rem,7vw,2.6rem);color:var(--green-deep)}
  .lead{color:var(--muted);font-size:1rem;margin:10px 0 14px}
  label{display:block;font-weight:600;font-size:.86rem;color:var(--green-deep);margin-bottom:6px}
  select,input[type=date],input[type=text],input[type=number]{width:100%;font:inherit;font-size:1rem;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:11px 13px;-webkit-appearance:none;appearance:none}
  .note{background:#f6eccf;border:1px solid var(--line);border-radius:8px;padding:12px 14px;color:#7a5a12;font-size:.9rem;margin-bottom:14px}
  .row2{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .row2>div{flex:1;min-width:160px}
  .daterow{display:flex;gap:8px;align-items:center}
  .daterow input{flex:1;min-width:0}
  .dstep{flex:0 0 auto;background:var(--bg);border:1px solid var(--line);border-radius:6px;width:44px;height:44px;font-size:1rem;color:var(--green-deep);cursor:pointer}
  .dstep:hover{border-color:var(--green)}
  .card{background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:14px 15px;margin-bottom:16px}
  .cardhd{font-family:"Spectral",serif;font-weight:500;font-size:1.05rem;color:var(--green-deep);margin-bottom:10px}
  .frow{display:flex;gap:10px;flex-wrap:wrap}
  .frow>div{flex:1;min-width:140px}
  .frow.tight>div{min-width:120px}
  .yn{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .yn button{background:var(--bg);border:none;font:inherit;font-weight:700;font-size:.84rem;color:var(--muted);padding:11px 14px;cursor:pointer}
  .yn button.acc.on{background:var(--green);color:#f6f2e8}
  .yn button.rej.on{background:var(--red);color:#f6f2e8}
  .btn{display:inline-flex;align-items:center;gap:7px;cursor:pointer;background:var(--green);color:#f6f2e8;border:none;border-radius:6px;padding:11px 17px;font:inherit;font-weight:600;font-size:.92rem;margin-top:12px}
  .savemsg{font-size:.84rem;font-weight:600;color:var(--muted);margin-left:10px}
  .entry{display:flex;gap:10px;align-items:flex-start;background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:11px 13px;margin-bottom:9px}
  .entry .bd{flex:1;min-width:0}
  .etitle{font-weight:600;color:var(--green-deep)}
  .emeta{color:var(--muted);font-size:.82rem;margin-top:2px}
  .enotes{color:var(--muted);font-size:.85rem;margin-top:3px;word-break:break-word}
  .badge{flex:0 0 auto;font-size:.7rem;font-weight:700;border-radius:999px;padding:2px 10px;align-self:flex-start}
  .badge.acc{background:rgba(47,93,80,.14);color:var(--ok)}
  .badge.rej{background:rgba(138,61,28,.14);color:var(--red)}
  .edel{flex:0 0 auto;background:transparent;border:1px solid rgba(138,61,28,.4);color:var(--red);border-radius:999px;width:26px;height:26px;font:inherit;cursor:pointer}
  .empty{color:var(--muted);padding:10px 0;font-size:.9rem}
</style>
</head>
<body>
<header>
  <div class="wrap bar">
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 26 26" aria-hidden="true"><g fill="none" stroke="#2f5d50" stroke-width="1.4"><circle cx="13" cy="13" r="3"/><circle cx="13" cy="13" r="7"/><circle cx="13" cy="13" r="11"/></g></svg>
      Ringwood
    </div>
    <a class="back" href="/redbook">Red Book</a>
  </div>
</header>
<main class="wrap">
  <div class="intro">
    <div class="eyebrow">Food safety · Logs</div>
    <h1>Receiving Log</h1>
    <p class="lead">Log each delivery as it arrives: vendor, item, temperature, and whether it was accepted or rejected.</p>
  </div>

  <div id="clientPick" style="display:none;margin-bottom:14px"><label for="clientSel">Client</label><select id="clientSel"></select></div>
  <div class="row2">
    <div><label for="dateSel">Date</label>
      <div class="daterow"><button type="button" class="dstep" id="dPrev" title="Previous day">◀</button><input type="date" id="dateSel" /><button type="button" class="dstep" id="dNext" title="Next day">▶</button></div>
    </div>
  </div>
  <div id="note" class="note" style="display:none"></div>

  <div class="card" id="addCard" style="display:none">
    <div class="cardhd">Add a delivery</div>
    <div class="frow">
      <div><label for="aVendor">Vendor / supplier</label><input type="text" id="aVendor" autocomplete="off" placeholder="e.g. Sysco" /></div>
      <div><label for="aItem">Item / product</label><input type="text" id="aItem" autocomplete="off" placeholder="e.g. Chicken" /></div>
    </div>
    <div class="frow tight" style="margin-top:10px;align-items:flex-end">
      <div style="max-width:140px"><label for="aTemp">Temp °F</label><input type="number" inputmode="decimal" step="0.1" id="aTemp" placeholder="—" /></div>
      <div style="flex:0 0 auto"><label>Condition</label><span class="yn"><button type="button" class="acc on" id="stAcc">Accepted</button><button type="button" class="rej" id="stRej">Rejected</button></span></div>
      <div><label for="aNotes">Notes (optional)</label><input type="text" id="aNotes" autocomplete="off" placeholder="Corrective action, condition…" /></div>
    </div>
    <button type="button" class="btn" id="addBtn">＋ Add delivery</button><span class="savemsg" id="addMsg"></span>
  </div>

  <div id="list"><div class="empty">Loading…</div></div>
</main>
<script>
  function esc(s){ return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
  var CAN_EDIT=false, IS_MASTER=false, CLIENT="", DATE="", ENTRIES=[], MISSING=false, STATUS="Accepted";
  function pad(n){ return String(n).padStart(2,"0"); }
  function today(){ var d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function timeOf(s){ return s?new Date(s).toLocaleTimeString([], {hour:"numeric",minute:"2-digit"}):""; }
  function val(id){ return (document.getElementById(id).value||"").trim(); }

  fetch("/api/whoami").then(function(r){return r.json();}).then(function(d){
    if(!d||!d.ok){ location.replace("/login?next=/receiving"); return; }
    IS_MASTER = d.role==="master";
    var lvl = IS_MASTER ? "edit" : ((d.perms&&d.perms.foodSafety)||"none");
    if(!IS_MASTER && lvl==="none"){ location.replace("/app"); return; }
    CAN_EDIT = IS_MASTER || lvl==="edit";
    DATE = today(); document.getElementById("dateSel").value = DATE;
    document.getElementById("dateSel").addEventListener("change", function(e){ DATE=e.target.value||today(); load(); });
    document.getElementById("dPrev").addEventListener("click", function(){ shiftDate(-1); });
    document.getElementById("dNext").addEventListener("click", function(){ shiftDate(1); });
    if(CAN_EDIT) document.getElementById("addCard").style.display="block";
    document.getElementById("stAcc").addEventListener("click", function(){ STATUS="Accepted"; this.classList.add("on"); document.getElementById("stRej").classList.remove("on"); });
    document.getElementById("stRej").addEventListener("click", function(){ STATUS="Rejected"; this.classList.add("on"); document.getElementById("stAcc").classList.remove("on"); });
    document.getElementById("addBtn").addEventListener("click", addEntry);
    if(IS_MASTER){
      document.getElementById("clientPick").style.display="block";
      fetch("/api/options").then(function(r){return r.json();}).then(function(o){
        RWClientPins.mount({ selectEl: document.getElementById("clientSel"), clients:(o&&o.clients)||[], placeholder:"Select a client…",
          onPick:function(name){ CLIENT=name; if(!name){ document.getElementById("list").innerHTML="<div class='empty'>Pick a client to see deliveries.</div>"; } else load(); } });
      }).catch(function(){});
    } else { CLIENT=d.client||""; load(); }
  }).catch(function(){});

  function shiftDate(n){ var p=DATE.split("-"); var d=new Date(+p[0],+p[1]-1,+p[2]); d.setDate(d.getDate()+n); DATE=d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); document.getElementById("dateSel").value=DATE; load(); }

  function load(){
    if(IS_MASTER && !CLIENT){ document.getElementById("list").innerHTML="<div class='empty'>Pick a client to see deliveries.</div>"; return; }
    document.getElementById("list").innerHTML="<div class='empty'>Loading…</div>";
    fetch("/api/receiving?client="+encodeURIComponent(CLIENT)+"&date="+encodeURIComponent(DATE),{cache:"no-store"}).then(function(r){return r.json();}).then(function(d){
      var note=document.getElementById("note");
      if(!d||!d.ok){ document.getElementById("list").innerHTML="<div class='empty'>Couldn't load.</div>"; return; }
      MISSING=!!d.missing;
      if(MISSING){ note.style.display="block"; note.textContent="The receiving log table isn't set up yet. Add it in Supabase (one-time), then entries save."; } else note.style.display="none";
      ENTRIES=d.entries||[]; render();
    }).catch(function(){ document.getElementById("list").innerHTML="<div class='empty'>Couldn't reach the server.</div>"; });
  }

  function render(){
    var el=document.getElementById("list");
    if(!ENTRIES.length){ el.innerHTML="<div class='empty'>No deliveries logged for this date.</div>"; return; }
    el.innerHTML=ENTRIES.map(function(e){
      var rej=e.status==="Rejected";
      var title=esc(e.item||e.vendor||"Delivery");
      var meta=[e.vendor&&e.item?esc(e.vendor):"", (e.temp!=null?esc(e.temp)+"°F":""), timeOf(e.at), e.by].filter(Boolean).join(" · ");
      return "<div class='entry'><div class='bd'><div class='etitle'>"+title+"</div>"+
        (meta?"<div class='emeta'>"+esc(meta)+"</div>":"")+
        (e.notes?"<div class='enotes'>"+esc(e.notes)+"</div>":"")+"</div>"+
        "<span class='badge "+(rej?"rej":"acc")+"'>"+(rej?"Rejected":"Accepted")+"</span>"+
        (CAN_EDIT?"<button type='button' class='edel' data-id='"+esc(e.id)+"' title='Remove'>×</button>":"")+
      "</div>";
    }).join("");
    Array.prototype.slice.call(el.querySelectorAll(".edel")).forEach(function(b){ b.addEventListener("click", function(){ if(!confirm("Remove this delivery?")) return; fetch("/api/receiving/delete",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({id:b.getAttribute("data-id")})}).then(function(r){return r.json();}).then(function(d){ if(d&&d.ok) load(); else alert((d&&d.error)||"Couldn't delete."); }); }); });
  }

  function addEntry(){
    if(IS_MASTER && !CLIENT){ alert("Pick a client first."); return; }
    var vendor=val("aVendor"), item=val("aItem");
    if(!vendor && !item){ setMsg("Enter a vendor or item.","var(--red)"); return; }
    var b=document.getElementById("addBtn"); b.disabled=true;
    fetch("/api/receiving/add",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({client:CLIENT,date:DATE,vendor:vendor,item:item,temp:val("aTemp"),status:STATUS,notes:val("aNotes")})})
      .then(function(r){return r.json();}).then(function(d){ b.disabled=false; if(d&&d.ok){ document.getElementById("aVendor").value=""; document.getElementById("aItem").value=""; document.getElementById("aTemp").value=""; document.getElementById("aNotes").value=""; setMsg("Added ✓","var(--ok)"); setTimeout(function(){ setMsg("",""); },1400); load(); } else setMsg((d&&d.error)||"Couldn't save","var(--red)"); })
      .catch(function(){ b.disabled=false; setMsg("No connection","var(--red)"); });
  }
  function setMsg(t,c){ var m=document.getElementById("addMsg"); if(m){ m.textContent=t; m.style.color=c||"var(--muted)"; } }
</script>
<script src="/client-pins.js"></script>
<script src="/whoami-badge.js"></script>
</body>
</html>
