<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1f3d2b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Ringwood" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<title>Ringwood · Client setup</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="/client-color.js"></script>
<style>
  :root{--bg:#f4efe4;--bg-2:#efe8d8;--ink:#23282a;--muted:#5f5d52;--green:#2f5d50;--green-deep:#21443a;--clay:#a9633a;--line:rgba(35,40,42,.14)}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:"Hanken Grotesk",-apple-system,sans-serif;min-height:100vh}
  .wrap{max-width:640px;margin:0 auto;padding:0 22px 56px}
  header{padding:24px 0}
  .bar{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:11px;font-family:"Spectral",serif;font-size:1.25rem;font-weight:600;color:var(--green-deep)}
  .back{font-size:.92rem;text-decoration:none;color:var(--green-deep);border-bottom:1px solid var(--clay);padding-bottom:1px}
  .intro{margin:18px 0 22px}
  .eyebrow{font-size:.8rem;letter-spacing:.18em;text-transform:uppercase;color:var(--clay);font-weight:600;margin-bottom:12px}
  h1{font-family:"Spectral",serif;font-weight:500;font-size:clamp(2rem,7vw,2.7rem);color:var(--green-deep);line-height:1.1}
  .lead{color:var(--muted);font-size:1rem;margin:10px 0 18px}
  h2{font-family:"Spectral",serif;font-weight:500;font-size:1.25rem;color:var(--green-deep);margin:24px 0 10px}
  label{display:block;font-weight:600;font-size:.86rem;color:var(--green-deep);margin-bottom:5px}
  .field{margin-bottom:12px}
  input,select{width:100%;font:inherit;font-size:1rem;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:11px 13px;-webkit-appearance:none;appearance:none}
  select:focus{outline:none;border-color:var(--green)}
  .swatches{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
  .sw{width:30px;height:30px;border-radius:999px;border:2px solid transparent;cursor:pointer;padding:0}
  .sw.on{box-shadow:0 0 0 2px var(--bg-2),0 0 0 4px var(--green-deep)}
  .sw[disabled]{opacity:.25;cursor:not-allowed}
  .sw.auto{background:var(--bg);border:1px dashed var(--line);color:var(--muted);font-weight:700;font-size:.78rem}
  .sw.auto.on{border-color:var(--green-deep)}
  input:focus{outline:none;border-color:var(--green)}
  .panel{background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:18px 16px;margin-bottom:14px}
  .btn{background:var(--green);color:#f6f2e8;border:none;cursor:pointer;font-weight:600;font-size:.98rem;padding:12px 16px;border-radius:6px}
  .btn:hover{background:var(--green-deep)}
  .btn.sm{padding:8px 13px;font-size:.86rem;border-radius:999px}
  .btn:disabled{opacity:.6;cursor:default}
  .citem{background:var(--bg-2);border:1px solid var(--line);border-radius:8px;margin-bottom:10px;overflow:hidden}
  .csum{display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer;padding:14px 16px}
  .csum:hover{background:rgba(33,68,58,.04)}
  .chip{font-size:.82rem;font-weight:700;color:#f6f2e8;padding:4px 12px;border-radius:999px;white-space:nowrap}
  .cs{color:var(--muted);font-size:.84rem;margin-top:2px}
  .caret{color:var(--muted);font-size:1.1rem;transition:transform .15s}
  .citem.open .caret{transform:rotate(90deg)}
  .cbody{padding:14px 16px 16px;border-top:1px solid var(--line);display:none}
  .row2{display:flex;gap:10px;flex-wrap:wrap}.row2 .field{flex:1;min-width:140px}
  .msg{font-size:.86rem;margin-top:8px;min-height:14px}.msg.err{color:#8a3d1c}.msg.ok{color:var(--green-deep)}
</style>
</head>
<body>
<header>
  <div class="wrap bar">
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 26 26" aria-hidden="true"><g fill="none" stroke="#2f5d50" stroke-width="1.4"><circle cx="13" cy="13" r="3"/><circle cx="13" cy="13" r="7"/><circle cx="13" cy="13" r="11"/></g></svg>
      Ringwood
    </div>
    <a class="back" href="/app">Home</a>
  </div>
</header>
<main class="wrap">
  <div class="intro">
    <div class="eyebrow">Admin</div>
    <h1>Client setup</h1>
    <p class="lead">Add clients and keep their basic details: name, address, contact, and phone. Each client gets its own color used across the app.</p>
  </div>

  <h2>Add a client</h2>
  <div class="panel">
    <div class="field"><label>Client name</label><input id="n_name" type="text" autocomplete="off" placeholder="e.g. United" /></div>
    <div class="field"><label>Address</label><input id="n_address" type="text" autocomplete="off" placeholder="Street, city" /></div>
    <div class="row2">
      <div class="field"><label>Contact</label><input id="n_contact" type="text" autocomplete="off" placeholder="Who to reach" /></div>
      <div class="field"><label>Phone</label><input id="n_phone" type="tel" autocomplete="off" placeholder="(555) 555-5555" /></div>
    </div>
    <div class="row2">
      <div class="field" style="flex:0 0 auto"><label>Status</label><select id="n_status"><option>Active</option><option>Archived</option></select></div>
    </div>
    <div class="field"><label>Color <span style="font-weight:400;color:var(--muted)">— each color is used by one client</span></label><div id="n_sw"></div></div>
    <button class="btn" id="n_add" type="button">Add client</button>
    <div class="msg" id="n_msg"></div>
  </div>

  <h2>Clients</h2>
  <div id="list"><div class="lead">Loading…</div></div>
</main>
<script>
  function esc(s){ return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function fmtPhone(v){ var d=(v||"").replace(/\D/g,""); if(d.length>10&&d[0]==="1")d=d.slice(1); d=d.slice(0,10); if(d.length>6)return "("+d.slice(0,3)+") "+d.slice(3,6)+"-"+d.slice(6); if(d.length>3)return "("+d.slice(0,3)+") "+d.slice(3); if(d.length>0)return "("+d.slice(0,3); return v||""; }
  function phoneInput(el){ el.addEventListener("input",function(){ el.value=fmtPhone(el.value); }); }
  phoneInput(document.getElementById("n_phone"));

  var CLIENTS = [], PALETTE = window.CLIENT_PALETTE || [];

  fetch("/api/whoami").then(function(r){return r.json();}).then(function(d){
    if(!d||!d.ok){ location.replace("/login?next=/clients"); return; }
    if(d.role!=="master"){ location.replace("/app"); return; }
    document.getElementById("n_add").addEventListener("click", addClient);
    load();
  }).catch(function(){});

  // Swatch picker. selfId lets a client keep its own color (not "taken" by self).
  function swatchesHtml(prefix, selected, selfId){
    var taken={}; CLIENTS.forEach(function(c){ if(c.color && c.id!==selfId) taken[c.color]=c.name; });
    var h="<div class='swatches' data-prefix='"+prefix+"'>";
    h+="<button type='button' class='sw auto"+(!selected?" on":"")+"' data-c=''>Auto</button>";
    PALETTE.forEach(function(col){
      var dis=taken[col]?" disabled title='Used by "+esc(taken[col])+"'":"";
      h+="<button type='button' class='sw"+(selected===col?" on":"")+"' data-c='"+col+"' style='background:"+col+"'"+dis+"></button>";
    });
    h+="</div><input type='hidden' id='"+prefix+"_color' value='"+(selected||"")+"'>";
    return h;
  }
  document.addEventListener("click", function(e){
    var sw=e.target.closest && e.target.closest(".sw");
    if(!sw || sw.disabled) return;
    var box=sw.parentNode, prefix=box.getAttribute("data-prefix");
    Array.prototype.forEach.call(box.querySelectorAll(".sw"), function(x){ x.classList.remove("on"); });
    sw.classList.add("on");
    document.getElementById(prefix+"_color").value = sw.getAttribute("data-c") || "";
  });

  function load(){
    fetch("/api/admin/clients").then(function(r){return r.json();}).then(function(d){
      if(d&&d.palette) PALETTE=d.palette;
      CLIENTS=(d&&d.clients)||[];
      document.getElementById("n_sw").innerHTML = swatchesHtml("n", "", null);
      var el=document.getElementById("list");
      if(!CLIENTS.length){ el.innerHTML="<div class='lead'>No clients yet.</div>"; return; }
      el.innerHTML=CLIENTS.map(renderClient).join("");
      CLIENTS.forEach(wire);
    }).catch(function(){ document.getElementById("list").innerHTML="<div class='lead'>Could not load.</div>"; });
  }
  function ukey(s){ return btoa(s).replace(/[^A-Za-z0-9]/g,""); }
  function renderClient(c){
    var k=ukey(c.id);
    var sum=[c.status&&c.status!=="Active"?c.status:"",c.contact,c.phone].filter(Boolean).map(esc).join(" · ")||"No details yet";
    var stOpts=["Active","Archived"]; if(c.status && stOpts.indexOf(c.status)<0) stOpts.unshift(c.status);
    var statusSel="<select id='st_"+k+"'>"+stOpts.map(function(s){return "<option"+(c.status===s?" selected":"")+">"+s+"</option>";}).join("")+"</select>";
    var demoSel="<select id='dm_"+k+"'><option value='0'"+(c.demo?"":" selected")+">Not Active</option><option value='1'"+(c.demo?" selected":"")+">Active</option></select>";
    return "<div class='citem' id='it_"+k+"'>"+
      "<div class='csum' aria-expanded='false' onclick=\"tog('"+k+"')\">"+
        "<div><span class='chip' style='background:"+(c.color||clientColor(c.name))+"'>"+esc(c.name)+"</span><div class='cs'>"+esc(sum)+"</div></div>"+
        "<span class='caret'>›</span></div>"+
      "<div class='cbody' id='b_"+k+"'>"+
        "<div class='field'><label>Client name</label><input id='nm_"+k+"' value='"+esc(c.name)+"'/></div>"+
        "<div class='field'><label>Address</label><input id='ad_"+k+"' value='"+esc(c.address)+"'/></div>"+
        "<div class='row2'><div class='field'><label>Contact</label><input id='ct_"+k+"' value='"+esc(c.contact)+"'/></div>"+
        "<div class='field'><label>Phone</label><input id='ph_"+k+"' type='tel' value='"+esc(c.phone)+"'/></div></div>"+
        "<div class='row2'><div class='field' style='flex:0 0 auto'><label>Status</label>"+statusSel+"</div></div>"+
        "<div style='font-size:.82rem;color:var(--muted);margin:-4px 0 6px'>Archived hides this client and its tickets, assets, and service records from the admin, and blocks its logins.</div>"+
        "<div class='row2'><div class='field' style='flex:0 0 auto'><label>RedBook Demo</label>"+demoSel+"</div></div>"+
        "<div style='font-size:.82rem;color:var(--muted);margin:-4px 0 6px'>When Active, this client's temp logs auto-fill on the New York schedule (6/10/2/6) for investor demos. Leave Not Active for real food-safety records.</div>"+
        "<div class='field'><label>Color</label>"+swatchesHtml("c"+k, c.color, c.id)+"</div>"+
        "<div style='margin-top:6px;display:flex;gap:10px;flex-wrap:wrap'><button class='btn sm' id='sv_"+k+"' type='button'>Save</button>"+
          "<button class='btn sm' id='del_"+k+"' type='button' style='background:transparent;color:#8a3d1c;border:1px solid rgba(138,61,28,.4)'>Delete client</button></div>"+
        "<div class='msg' id='m_"+k+"'></div></div></div>";
  }
  window.tog=function(k){ var it=document.getElementById("it_"+k),b=document.getElementById("b_"+k); var openNow=b.style.display!=="block"; b.style.display=openNow?"block":"none"; it.classList.toggle("open", openNow); var s=it.querySelector(".csum"); if(s) s.setAttribute("aria-expanded", openNow?"true":"false"); };
  function wire(c){
    var k=ukey(c.id);
    phoneInput(document.getElementById("ph_"+k));
    document.getElementById("sv_"+k).addEventListener("click", function(){
      var b=this, m=document.getElementById("m_"+k); m.className="msg";
      var name=document.getElementById("nm_"+k).value.trim();
      if(!name){ m.className="msg err"; m.textContent="Enter a client name."; return; }
      b.disabled=true; b.textContent="Saving…";
      fetch("/api/admin/client",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({id:c.id,name:name,address:document.getElementById("ad_"+k).value,contact:document.getElementById("ct_"+k).value,phone:document.getElementById("ph_"+k).value,status:document.getElementById("st_"+k).value,demo:document.getElementById("dm_"+k).value==="1",color:document.getElementById("c"+k+"_color").value})})
        .then(function(r){return r.json();}).then(function(d){ b.disabled=false; b.textContent="Save";
          if(d&&d.ok){ m.className="msg ok"; m.textContent="Saved."; load(); }
          else { m.className="msg err"; m.textContent=(d&&d.error)||"Could not save."; } })
        .catch(function(){ b.disabled=false; b.textContent="Save"; m.className="msg err"; m.textContent="Couldn't reach the server."; });
    });
    var del=document.getElementById("del_"+k);
    if(del) del.addEventListener("click", function(){
      var m=document.getElementById("m_"+k); m.className="msg";
      if(!confirm("Delete "+c.name+"? Its tickets, assets, and service records are kept but unlinked (shown as Unassigned), and its logins are removed. This can't be undone. To just hide it, set Status to Archived instead.")) return;
      var b=this; b.disabled=true; b.textContent="Deleting…";
      fetch("/api/admin/client/delete",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({id:c.id})})
        .then(function(r){return r.json();}).then(function(d){
          if(d&&d.ok){ load(); } else { b.disabled=false; b.textContent="Delete client"; m.className="msg err"; m.textContent=(d&&d.error)||"Could not delete."; } })
        .catch(function(){ b.disabled=false; b.textContent="Delete client"; m.className="msg err"; m.textContent="Couldn't reach the server."; });
    });
  }
  function addClient(){
    var b=document.getElementById("n_add"), m=document.getElementById("n_msg"); m.className="msg";
    var name=document.getElementById("n_name").value.trim();
    if(!name){ m.className="msg err"; m.textContent="Enter a client name."; return; }
    b.disabled=true; b.textContent="Adding…";
    fetch("/api/admin/client",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({name:name,address:document.getElementById("n_address").value,contact:document.getElementById("n_contact").value,phone:document.getElementById("n_phone").value,status:document.getElementById("n_status").value,color:document.getElementById("n_color").value})})
      .then(function(r){return r.json();}).then(function(d){ b.disabled=false; b.textContent="Add client";
        if(d&&d.ok){ m.className="msg ok"; m.textContent="Client added."; ["n_name","n_address","n_contact","n_phone"].forEach(function(i){document.getElementById(i).value="";}); document.getElementById("n_status").value="Active"; load(); }
        else { m.className="msg err"; m.textContent=(d&&d.error)||"Could not add."; } })
      .catch(function(){ b.disabled=false; b.textContent="Add client"; m.className="msg err"; m.textContent="Couldn't reach the server."; });
  }
</script>
<script src="/whoami-badge.js"></script>
</body>
</html>
