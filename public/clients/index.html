<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1f3d2b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Ringwood" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<title>Ringwood · Client setup</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="/client-color.js"></script>
<style>
  :root{--bg:#f4efe4;--bg-2:#efe8d8;--ink:#23282a;--muted:#5f5d52;--green:#2f5d50;--green-deep:#21443a;--clay:#a9633a;--line:rgba(35,40,42,.14)}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:"Hanken Grotesk",-apple-system,sans-serif;min-height:100vh}
  .wrap{max-width:640px;margin:0 auto;padding:0 22px 56px}
  header{padding:24px 0}
  .bar{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:11px;font-family:"Spectral",serif;font-size:1.25rem;font-weight:600;color:var(--green-deep)}
  .back{font-size:.92rem;text-decoration:none;color:var(--green-deep);border-bottom:1px solid var(--clay);padding-bottom:1px}
  .intro{margin:18px 0 22px}
  .eyebrow{font-size:.8rem;letter-spacing:.18em;text-transform:uppercase;color:var(--clay);font-weight:600;margin-bottom:12px}
  h1{font-family:"Spectral",serif;font-weight:500;font-size:clamp(2rem,7vw,2.7rem);color:var(--green-deep);line-height:1.1}
  .lead{color:var(--muted);font-size:1rem;margin:10px 0 18px}
  h2{font-family:"Spectral",serif;font-weight:500;font-size:1.25rem;color:var(--green-deep);margin:24px 0 10px}
  label{display:block;font-weight:600;font-size:.86rem;color:var(--green-deep);margin-bottom:5px}
  .field{margin-bottom:12px}
  input{width:100%;font:inherit;font-size:1rem;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:11px 13px}
  input:focus{outline:none;border-color:var(--green)}
  .panel{background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:18px 16px;margin-bottom:14px}
  .btn{background:var(--green);color:#f6f2e8;border:none;cursor:pointer;font-weight:600;font-size:.98rem;padding:12px 16px;border-radius:6px}
  .btn:hover{background:var(--green-deep)}
  .btn.sm{padding:8px 13px;font-size:.86rem;border-radius:999px}
  .btn:disabled{opacity:.6;cursor:default}
  .citem{background:var(--bg-2);border:1px solid var(--line);border-radius:8px;margin-bottom:10px;overflow:hidden}
  .csum{display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer;padding:14px 16px}
  .csum:hover{background:rgba(33,68,58,.04)}
  .chip{font-size:.82rem;font-weight:700;color:#f6f2e8;padding:4px 12px;border-radius:999px;white-space:nowrap}
  .cs{color:var(--muted);font-size:.84rem;margin-top:2px}
  .caret{color:var(--muted);font-size:1.1rem;transition:transform .15s}
  .citem.open .caret{transform:rotate(90deg)}
  .cbody{padding:14px 16px 16px;border-top:1px solid var(--line);display:none}
  .row2{display:flex;gap:10px;flex-wrap:wrap}.row2 .field{flex:1;min-width:140px}
  .msg{font-size:.86rem;margin-top:8px;min-height:14px}.msg.err{color:#8a3d1c}.msg.ok{color:var(--green-deep)}
</style>
</head>
<body>
<header>
  <div class="wrap bar">
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 26 26" aria-hidden="true"><g fill="none" stroke="#2f5d50" stroke-width="1.4"><circle cx="13" cy="13" r="3"/><circle cx="13" cy="13" r="7"/><circle cx="13" cy="13" r="11"/></g></svg>
      Ringwood
    </div>
    <a class="back" href="/app">Home</a>
  </div>
</header>
<main class="wrap">
  <div class="intro">
    <div class="eyebrow">Admin</div>
    <h1>Client setup</h1>
    <p class="lead">Add clients and keep their basic details: name, address, contact, and phone. Each client gets its own color used across the app.</p>
  </div>

  <h2>Add a client</h2>
  <div class="panel">
    <div class="field"><label>Client name</label><input id="n_name" type="text" autocomplete="off" placeholder="e.g. United" /></div>
    <div class="field"><label>Address</label><input id="n_address" type="text" autocomplete="off" placeholder="Street, city" /></div>
    <div class="row2">
      <div class="field"><label>Contact</label><input id="n_contact" type="text" autocomplete="off" placeholder="Who to reach" /></div>
      <div class="field"><label>Phone</label><input id="n_phone" type="tel" autocomplete="off" placeholder="(555) 555-5555" /></div>
    </div>
    <button class="btn" id="n_add" type="button">Add client</button>
    <div class="msg" id="n_msg"></div>
  </div>

  <h2>Clients</h2>
  <div id="list"><div class="lead">Loading…</div></div>
</main>
<script>
  function esc(s){ return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function fmtPhone(v){ var d=(v||"").replace(/\D/g,""); if(d.length>10&&d[0]==="1")d=d.slice(1); d=d.slice(0,10); if(d.length>6)return "("+d.slice(0,3)+") "+d.slice(3,6)+"-"+d.slice(6); if(d.length>3)return "("+d.slice(0,3)+") "+d.slice(3); if(d.length>0)return "("+d.slice(0,3); return v||""; }
  function phoneInput(el){ el.addEventListener("input",function(){ el.value=fmtPhone(el.value); }); }
  phoneInput(document.getElementById("n_phone"));

  fetch("/api/whoami").then(function(r){return r.json();}).then(function(d){
    if(!d||!d.ok){ location.replace("/login?next=/clients"); return; }
    if(d.role!=="master"){ location.replace("/app"); return; }
    document.getElementById("n_add").addEventListener("click", addClient);
    load();
  }).catch(function(){});

  function load(){
    fetch("/api/admin/clients").then(function(r){return r.json();}).then(function(d){
      var el=document.getElementById("list"), cs=(d&&d.clients)||[];
      if(!cs.length){ el.innerHTML="<div class='lead'>No clients yet.</div>"; return; }
      el.innerHTML=cs.map(renderClient).join("");
      cs.forEach(wire);
    }).catch(function(){ document.getElementById("list").innerHTML="<div class='lead'>Could not load.</div>"; });
  }
  function ukey(s){ return btoa(s).replace(/[^A-Za-z0-9]/g,""); }
  function renderClient(c){
    var k=ukey(c.id);
    var sum=[c.contact,c.phone].filter(Boolean).map(esc).join(" · ")||"No details yet";
    return "<div class='citem' id='it_"+k+"'>"+
      "<div class='csum' onclick=\"tog('"+k+"')\">"+
        "<div><span class='chip' style='background:"+clientColor(c.name)+"'>"+esc(c.name)+"</span><div class='cs'>"+esc(sum)+"</div></div>"+
        "<span class='caret'>›</span></div>"+
      "<div class='cbody' id='b_"+k+"'>"+
        "<div class='field'><label>Client name</label><input id='nm_"+k+"' value='"+esc(c.name)+"'/></div>"+
        "<div class='field'><label>Address</label><input id='ad_"+k+"' value='"+esc(c.address)+"'/></div>"+
        "<div class='row2'><div class='field'><label>Contact</label><input id='ct_"+k+"' value='"+esc(c.contact)+"'/></div>"+
        "<div class='field'><label>Phone</label><input id='ph_"+k+"' type='tel' value='"+esc(c.phone)+"'/></div></div>"+
        "<div style='margin-top:6px'><button class='btn sm' id='sv_"+k+"' type='button'>Save</button></div>"+
        "<div class='msg' id='m_"+k+"'></div></div></div>";
  }
  window.tog=function(k){ var it=document.getElementById("it_"+k),b=document.getElementById("b_"+k); var open=b.style.display!=="none"&&b.style.display!==""; b.style.display=(b.style.display==="block")?"none":"block"; it.classList.toggle("open", b.style.display==="block"); };
  function wire(c){
    var k=ukey(c.id);
    phoneInput(document.getElementById("ph_"+k));
    document.getElementById("sv_"+k).addEventListener("click", function(){
      var b=this, m=document.getElementById("m_"+k); m.className="msg";
      var name=document.getElementById("nm_"+k).value.trim();
      if(!name){ m.className="msg err"; m.textContent="Enter a client name."; return; }
      b.disabled=true; b.textContent="Saving…";
      fetch("/api/admin/client",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({id:c.id,name:name,address:document.getElementById("ad_"+k).value,contact:document.getElementById("ct_"+k).value,phone:document.getElementById("ph_"+k).value})})
        .then(function(r){return r.json();}).then(function(d){ b.disabled=false; b.textContent="Save";
          if(d&&d.ok){ m.className="msg ok"; m.textContent="Saved."; load(); }
          else { m.className="msg err"; m.textContent=(d&&d.error)||"Could not save."; } })
        .catch(function(){ b.disabled=false; b.textContent="Save"; m.className="msg err"; m.textContent="Couldn't reach the server."; });
    });
  }
  function addClient(){
    var b=document.getElementById("n_add"), m=document.getElementById("n_msg"); m.className="msg";
    var name=document.getElementById("n_name").value.trim();
    if(!name){ m.className="msg err"; m.textContent="Enter a client name."; return; }
    b.disabled=true; b.textContent="Adding…";
    fetch("/api/admin/client",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({name:name,address:document.getElementById("n_address").value,contact:document.getElementById("n_contact").value,phone:document.getElementById("n_phone").value})})
      .then(function(r){return r.json();}).then(function(d){ b.disabled=false; b.textContent="Add client";
        if(d&&d.ok){ m.className="msg ok"; m.textContent="Client added."; ["n_name","n_address","n_contact","n_phone"].forEach(function(i){document.getElementById(i).value="";}); load(); }
        else { m.className="msg err"; m.textContent=(d&&d.error)||"Could not add."; } })
      .catch(function(){ b.disabled=false; b.textContent="Add client"; m.className="msg err"; m.textContent="Couldn't reach the server."; });
  }
</script>
<script src="/whoami-badge.js"></script>
</body>
</html>
